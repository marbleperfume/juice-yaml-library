Intent:
  Narrative: >
    Iblis Grabbers -- octopus and squid humanoids with variable arm
    growths; most have developed away from looking like deformed Landwin,
    though mutated-looking individuals still occur. Highly adaptive and
    intelligent, but voracious eaters that stick close to the water. In a
    fight they're stealth melee hunters that blend into any environment,
    backed by strong paralysis, poison, and restraint abilities tied to
    their tentacle types.
