Intent:
  Narrative: >
    Chunkers -- shark and piranha humanoids that stick to the water.
    Remarkably tame, but impossible to talk out of a hunt once it starts,
    which makes them impossible to domesticate. Much of their evolution
    has revolved around communicating with adjacent aquatic races, making
    them exceptionally logical despite their appearance. Can fire tooth
    projectiles that explode, making them dangerous to anyone unfamiliar
    with their fighting habits.
