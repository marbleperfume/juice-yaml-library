Intent:
  Narrative: >
    Rawrotin -- wolf-like people ranging from Nyanto-esque dog-featured
    looks to outright werewolf forms. Tightly bound to Landwin society as
    bodyguards, caretakers, and package couriers. Unlike Nyanto they can
    mark enemies and benefit from repeated strikes to the same mark to
    eventually break through tougher foes; they're fast, but don't
    otherwise mimic Nyanto playstyle. There's a soft rivalry between the
    two subraces.
