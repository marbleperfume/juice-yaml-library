Intent:
  Narrative: >
    Wyrpincers -- beetle humanoids considered the physically strongest
    race, who typically do nothing with it. If not for the health of the
    magic forests they inhabit, they'd likely be extinct, since they lack
    the drive to travel long distances. Some are kept as pets by Soue or
    Landwin; most survive by hunting giant creatures or eating plants.
