Intent:
  Narrative: >
    Nyanto -- highly agile feline people capable of covering long
    distances in a dash and climbing walls. They rely on small hunts and
    struggle against bigger or armored foes, though relationships with
    Landwin have accelerated their adaptation to weapon styles that work
    around that weakness.
