Intent:
  Narrative: >
    Pyrien -- fire elves born in "Ra," a small, extremely exposed hot
    section of the magic forests kept rainless by an overarching stone
    structure held up by plant life; it isn't sun-drenched so much as
    stripped of any tree cover to hide in. Ra's Pyrien rely on an
    underground oasis to survive and develop pink or purple skin with age,
    regardless of being born white- or dark-skinned. Rejected even by the
    superstitious Soue shamans, they rarely survive long outside Ra and
    naturally cluster there. Past a certain age, or after enough time
    living in Ra, a Pyrien must survive the Ring of Fire -- a trial meant
    to remind them they can die without constant preparation for battle.
    Survivors enter a military structure and rarely deviate from its
    chain-of-command; all Pyrien at the military level can conjure fire
    weapons from thin air and can use almost anything as kindling.
