Intent:
  Narrative: >
    Harvesters -- insect humanoids descended from a single ancestor
    species with ant, butterfly, and moth traits at a larger scale, since
    downsized into three phenotypes. Builders (ant-likes) dig complex
    underground tunnels and are naturally very strong. Flutters
    (butterfly-likes) are mistaken for fairies or magical beings, though
    most of what they do is harvest fruit, honey, and flower nectar.
    Nightflies (moth-likes, colloquially "pests") do similar work at
    night and feed off magic-rich insects. The stat block below is a
    generalist baseline across all three phenotypes -- split it out per
    phenotype later if one of them needs its own kit.
