Intent:
  Narrative: >
    Heavenly Black Drakols -- the closest living relatives of the dragon
    ancestors, ranked as the highest tier of non-dragon magic race. They
    can morph into forms more dragonic than a Midnight's, are proficient
    at nearly anything given enough time to adapt, and reproduce rarely
    enough that they're treated as national treasures rather than royalty
    or political figures. When they live within a society like Landwin's,
    it's typically for personal gain. HBDs settled in enclosed societies
    typically enslave Lower Drakols, who cannot fight back with a
    reasonable chance of winning and don't share a spoken tongue with
    them.
