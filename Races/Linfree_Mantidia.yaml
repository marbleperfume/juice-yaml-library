Intent:
  Narrative: >
    Mantidia -- praying-mantis humanoids with razor-sharp arms hidden
    beneath a shell casing, letting them eviscerate targets at high speed
    without scraping themselves on their surroundings. Temperamental and
    difficult to handle, but they help their environment significantly by
    hunting down other insects. Capable of limited flight.
