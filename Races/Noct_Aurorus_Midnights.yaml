Intent:
  Narrative: >
    Midnights -- dragonic-origin race with a mostly Landwin build. Armored
    forearms and ankles combine with dragon claws and adapted
    drago-humanoid feet to make them exceptional unarmed fighters,
    comparable to jaguars in how they maul targets. Unlike other dragonic
    races they are wingless, though they keep a tail. They struggle with
    science and tend to linger in urban areas to take advantage of local
    conveniences -- arguably the reason they've drifted from their
    dragonic brethren.
