Intent:
  Narrative: >
    Featherin -- avian people with humanoid features who still carry
    hollow bones. They rely on magic auras to dodge rather than block, as
    their frames can't carry enough mana or structural defense to tank
    hits otherwise. They can be found anywhere, but rarely assimilate
    fully due to migration habits -- a land race convincing a Featherin
    to marry them is considered a rare case.
