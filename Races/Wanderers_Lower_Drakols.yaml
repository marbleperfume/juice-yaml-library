Intent:
  Narrative: >
    Lower Drakol -- semi-aquatic, lizard-like wanderers with green skin and
    a big tail usable as a third hand. They carry an innate Water Slime
    companion from birth to offset an inherited vulnerability to dry
    environments (see Passives/DrySkin.yaml). They have a natural affinity
    for elemental spirits and communicate with them more successfully than
    any other race, which keeps them naturally peaceful despite their
    situation -- enslaved by Heavenly Black Drakols
    (Wanderers_Heavenly_Black_Drakols.yaml) in enclosed HBD societies,
    unable to fight back with a reasonable chance of winning and lacking a
    shared tongue with their captors.
