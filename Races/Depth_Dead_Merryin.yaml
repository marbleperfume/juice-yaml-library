Intent:
  Narrative: >
    Merryin -- mermaid and merman-based people who can float on land.
    Excellent at lightning and water magic, and skilled with harpoons,
    bows, and other ranged tools. Exceptional singers, to the point that
    their "sirens" can be a public threat by luring people to their
    deaths. Generally peaceful, but anti-Landwin and currently tense with
    Landwin sympathizers over water pollution.
