Intent:
  Narrative: >
    Jumpers -- whale and dolphin-based humanoids who use sound to
    communicate and to attack. Far stronger in water than on land. Their
    behaviors resemble Hecapqo, but Jumpers are usually far more sadistic
    in the wild and difficult to avoid confrontation with once in the
    water.
