Intent:
  Narrative: >
    Grimm -- darker-skinned Landwin concentrated in the hard labor trades.
    Most work the mines; the ones who make something of themselves tend to
    end up blacksmiths, the more knowledgeable and successful branch of the
    subrace. Their CRAFT and GATHER attributes should read high relative to
    other Landwin subraces to reflect this.
