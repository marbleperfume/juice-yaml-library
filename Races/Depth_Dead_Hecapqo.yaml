Intent:
  Narrative: >
    Hecapqo -- walrus and seal-based humanoids, highly playful when young
    and fiercely territorial with age. Zoo-friendly, and typically don't
    return to the wild once domesticated. Their signature trait is their
    blubber, which lets them resist temperature swings and take damage
    differently from other creatures.
