Key: Summon.Shaman.BoneSpirit
Name: Bone Spirit
RacialAttachment: null   # not a racial grant -- consumable-gated class mechanic, see Items/Item.Consumable.Bone.MonsterBone.yaml
PresenceType: Cast
PresenceNote: >
  Summoned by Skill.Combat.Shaman.BoneSummon.yaml at the cost of one Monster
  Bone. Deliberately narrow in function -- NOT a generic damage pet.
PassiveListener:
  Description: >
    Carries an armed Combat/DelayedStatus.yaml effect that "listens" for an
    incoming enemy interrupt targeting the Shaman and redirects it onto the
    Spirit instead -- the "counter the counter" mechanic. This is the
    Spirit's primary job.
  TargetCap: 1   # handles at most ONE incoming interrupt/target before being spent -- not a standing immunity
  VisualIndicator: "Bone Spirit glows while its listener is armed; dims once consumed"
RequiredCondition: null
DismissTrigger:
  Condition: "PassiveListener consumed, OR Skill.Combat.Shaman.SpiritChannel.yaml cast (spends the Spirit for burst damage)"
  Note: "The Spirit doesn't return after either -- a new Monster Bone is required for the next one."
PassiveEffect: null
Attributes:
  STRENGTH: 0.0
  STAMINA: 0.2
  SPEED: 0.1
  CRAFT: 0.0
  GATHER: 0.0
  MAGICCAPACITY: 0.3
  MAG: 0.2
  MED: 0.0
  DEXTERITY: 0.0
AI:
  Behavior: "Stationary listener; does not chase or auto-attack. Exists only to catch an interrupt or be spent by Spirit Channel."
Lifecycle:
  Duration: 60   # despawns unspent after this if neither trigger occurs
Tags:
  - Tag.Summon.Consumable
  - Tag.Class.Shaman
NarrativeIntent: >
  Built as the worked example for Combat/DelayedStatus.yaml's
  PassiveListenerPattern -- previously documented there as a pending concept,
  now a real file. The 1-target cap is what keeps it a narrow defensive
  tool rather than a universal interrupt-immunity button.
