Key: Summon.Shaman.FloatingBone
Name: Floating Bone
RacialAttachment: null
PresenceType: Cast
PresenceNote: >
  Raised by Skill.Combat.Shaman.BonePointing.yaml -- an INSTALLATION, not a
  companion: it hovers near its marked target and does not follow the
  Shaman. Featherfoot-inspired (Tree of Savior): Hexing is animated through
  a floating bone striking with needle attacks, not a direct player-cast
  hit.
RequiredCondition: null
AutoAttack:
  Description: "Repeatedly strikes its marked target with needle attacks on a fixed interval."
  IntervalSeconds: 2.0
  PotencyPerHit: 90     # PLACEHOLDER -- needs a simulated pass like everything else this session
  AppliesStatusPerHit: Hex
DismissTrigger:
  Condition: "Marked target dies, OR installation duration expires, OR Bone Pointing is recast (raises a new one, does not stack two)"
PassiveEffect: null
Attributes:
  STRENGTH: 0.0
  STAMINA: 0.1
  SPEED: 0.0
  CRAFT: 0.0
  GATHER: 0.0
  MAGICCAPACITY: 0.2
  MAG: 0.15
  MED: 0.0
  DEXTERITY: 0.0
AI:
  Behavior: "Fully stationary near its marked target; no movement, no targeting logic of its own beyond the one marked target."
Lifecycle:
  Duration: 20
Tags:
  - Tag.Summon.Consumable
  - Tag.Class.Shaman
  - Tag.Mechanic.Curse
NarrativeIntent: >
  Distinct from Summons/Summon.Shaman.BoneSpirit.yaml -- that one is a
  narrow, spendable defensive tool (1-target interrupt catch); this one is
  the Shaman's sustained, "go-to" DoT/curse-stacking engine. Both are
  Monster-Bone-consumable-gated (Items/Item.Consumable.Bone.MonsterBone.yaml),
  reflecting the class's core resource being itemized rather than a numeric
  gauge.
