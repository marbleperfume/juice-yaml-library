Name: Hex
UE5_Context: GE_Hex_Base
PillarAffinity: RoleMechanic
Duration: 12.0
IsCleanseable: true
Stacking:
  IsStackable: true
  MaxStacks: 5
AudioTrigger: "SFX_Bone_NeedleImpact"
VisualTrigger: "VFX_Curse_HexMarkGrow"
Effect:
  PerStack:
    CurseDamageTakenIncrease: 0.04   # +4% damage taken from Shaman curse-tagged skills, per stack -- see Skill.Combat.Shaman.CurseExplosion
  At3PlusStacks:
    AppliesStatus: Slow
    SlowPercent: 35
GameplayGoal: >
  The Shaman's "go-to" stacking curse -- built passively by
  Summons/Summon.Shaman.FloatingBone.yaml's needle attacks (see
  Skill.Combat.Shaman.BonePointing.yaml), not by a direct-cast CC. Other
  Shaman curse skills (Tag.Mechanic.Curse) benefit from stacks present on
  the target, which is what makes this "a stable go-to skill for class
  mechanics" rather than a one-off slow. The Slow at 3+ stacks is the
  layer added specifically to help the Shaman survive being Focus-targeted
  by higher-rank foes (see Combat/AggroSystem.yaml) -- it is NOT the point
  of Hex, just a needed patch on top of it.
CCImmunityExempt:
  Ref: Combat.CCImmunity.CommitmentExemption
  Reason: >
    The Slow only arrives after the real commitment: casting Bone Pointing,
    accepting the installation's exposed cast/position, and waiting through
    multiple needle-strike ticks to ramp stacks -- a longer, riskier
    investment than a single hard-cast, so it earns the same unresistable
    exemption Skills/Skill.Combat.Shaman.BonePointing.yaml's ramp-up
    represents.
NarrativeIntent: >
  Featherfoot-inspired (Tree of Savior): Hexing is cast through Bone
  Pointing, which raises a floating bone installation that animates via
  needle-attacks -- damage plus this stacking curse -- rather than being a
  direct hit-and-forget debuff.
