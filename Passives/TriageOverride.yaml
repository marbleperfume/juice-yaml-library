Name: Triage Override
UE5_Context: GameplayCue.Status.TriageOverride
PillarAffinity: RoleMechanic.Healer
AudioTrigger: ""
VisualTrigger: ""
Duration: 10
IsCleanseable: false
CleanseRequirement: Mechanic
Stacking:
  IsStackable: false
  MaxStacks: 1
AppliesTo: Self
TriggerCondition: >
  "PartyHP <= 25%" OR "DeadPartyMembers >= ceil(PartySize / 2)" -- crisis-
  triggered, never on-demand. Mirrors Quest.Test.Mercenary.Rank2.Healer's
  Phase2Trigger exactly.
Effect:
  KitConversion: true
  Description: >
    NOT a flat potency multiplier on one skill -- while active, the
    Healer's entire kit loses its offensive/support qualities and each
    offense-flavored skill is replaced by its healing-equivalent, hard-cast
    counterpart. Most conversions cross ELEMENT too, not just function:
    Fire never carries a healing identity (see
    Combat/ElementalConvergence.yaml HealingElementRule), so
    Skill.Combat.Elementalist.EmberLance (Fire) swaps to
    Skill.Combat.Elementalist.TidalSurge (WATER), not a same-element Fire
    "heal." Skill.Combat.Elementalist.EarthBreak (Earth) is the one
    exception that stays in its own element: Earth's identity was never
    pure damage the way Fire's is -- Stone Coffin already establishes Earth
    as this kit's control/defense element, so its crisis conversion,
    Skill.Combat.Elementalist.EarthenArmor, extends that SAME identity
    (defense) into a party-wide shield instead of crossing into a healing
    element it has no claim to. Fire has no such fallback identity, which
    is exactly why IT has to cross into Water. These hard casts are
    deliberately STRONGER per-cast than the kit's normal weak HoTs
    (Skill.Combat.Elementalist.TidalMending) -- HoTs are the efficient,
    CONSISTENT tool when the team is stable and built to get the party back
    out of this status; Light's Emergent Light/Blinding Flare are the
    EMERGENCY-flavored tools amplified specifically during the crisis
    itself. Resurrection (Skill.Combat.Elementalist.TidalRevival) is also
    gated behind this status -- it is not castable outside a genuine
    crisis.
  ConversionMap:
    Skill.Combat.Elementalist.EmberLance: Skill.Combat.Elementalist.TidalSurge
    Skill.Combat.Elementalist.EarthBreak: Skill.Combat.Elementalist.EarthenArmor
    Skill.Combat.Shaman.LeechLife: Skill.Combat.Shaman.MagicLeech
  UnlocksSkills:
    - Skill.Combat.Elementalist.TidalRevival
    - Skill.Combat.Shaman.SpiritCleansing
    - Skill.Combat.Shaman.Necromancy
CrisisManaBurst:
  Description: >
    The moment this status triggers ("Crisis Mode" -- see NarrativeIntent),
    both Healer sub-archetypes get a large immediate mana-regen spike on
    top of Combat/ManaEconomy.yaml's baseline caster rules. This is
    deliberate: the FIRST heals thrown out during a genuine party crisis
    need to land without the caster instantly running dry, or a Healer
    would be punished for reacting to the exact emergency their kit exists
    for. What happens AFTER that initial spike is where the two
    sub-archetypes diverge, and where the real cost of staying in Crisis
    Mode gets paid -- if either could sustain the burst rate indefinitely,
    the party would be functionally unkillable, which breaks the threat
    model every encounter system in this project assumes (Combat/EncounterDamageCurve.yaml,
    Combat/AggroSystem.yaml).
  InitialSpike:
    RatePerTick: "25% of MaxMana per 5 seconds"   # PLACEHOLDER -- deliberate large overshoot vs Combat/ManaEconomy.yaml's baseline 1-mana/5s in-combat trickle
    Note: "Applies from the instant TriggerCondition fires."
  Shaman:
    DecayShape: TimeBased
    Description: >
      Decays linearly from the InitialSpike rate back down to
      Combat/ManaEconomy.yaml's baseline over this status's full 10-second
      Duration -- a flat clock, not something play can accelerate or slow
      (Skill.Combat.Shaman.SunRecharge.yaml's own cooldown is the only
      Shaman lever that responds to play, and it's a separate system). This
      is why Skill.Combat.Shaman.MagicLeech.yaml's real cost is time-based:
      cast it in the first couple seconds and the spike absorbs nearly all
      of it; lean on it as the window closes and the decayed rate can't
      keep up, so the cost finally gets felt right as the crisis should be
      resolving.
  Elementalist:
    DecayShape: UsageBased
    Description: >
      Does NOT decay on a clock -- it decays specifically with
      Skill.Combat.Elementalist.RadiantMend.yaml's own diminishing Light-
      stack generation (see that skill's StackDecay). Leaning on Radiant
      Mend repeatedly is what erodes the burst, not time passing on its
      own: a player who barely uses it barely pays for it, a player who
      spams it for safety runs the burst down fast and hits Radiant Mend's
      rising Resource.Cost with a shrinking regen cushion underneath it.
      This reapplies the class's usual reaction-reward identity
      (Combat/ElementalConvergence.yaml StackReactionCount) to Crisis Mode
      itself: the burst is earned/spent through PLAY, not a countdown.
GameplayGoal: >
  Answers the FFXIV non-White-Mage-healer redundancy complaint directly: a
  DPS/support-flavored Healer (Elementalist, Shaman) does NOT carry a
  parallel full healing kit at all times -- most of its buttons are
  reused, not duplicated, and only take on their healing identity when the
  crisis actually demands it. Shaman's participation is its own paradigm,
  not a copy of Elementalist's: Leech Life -> Magic Leech is blood/essence-
  absorption healing that now benefits an ally too (not just the Shaman),
  Spirit Cleansing is a cleanse, and Necromancy is Shaman's own-named
  Resurrection (not a reuse of TidalRevival) -- consistent with Shaman
  protecting the party through its own bone/spirit tradition rather than a
  copy of Elementalist's water-themed toolkit.
NarrativeIntent: >
  Formerly named "Godly Triage Mode" -- renamed away from embellished,
  hype-flavored naming toward a plain mechanical description of what
  happens: the kit is overridden into triage mode, nothing more dramatic
  claimed than that. Commonly referred to in design docs as "Crisis Mode"
  -- a plain-language handle for "the status that swaps a Healer's skills
  at critical team HP / member deaths," used interchangeably with the
  Triage Override name throughout Combat/*.yaml and Skill.Combat.Elementalist/Shaman.* files.
