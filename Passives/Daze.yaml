Name: Daze
UE5_Context: GE_Daze_Base
PillarAffinity: RoleMechanic
Duration: 4.0
IsCleanseable: true
Stacking:
  IsStackable: false
  MaxStacks: 1
AudioTrigger: "SFX_Daze_Blinded"
VisualTrigger: "VFX_Light_Overexpose"
Effect:
  AccuracyReduction: 0.5
  MovementSlowPercent: 0.3
GameplayGoal: >
  Weaker than Stun (Passives/Stun.yaml) -- a blinding-light impairment, not
  a hard lockout. Reduces enemy accuracy/movement rather than freezing
  action entirely, matching a "holy blinding light" effect rather than a
  mechanical hard-stun.
NarrativeIntent: >
  Applied by Skill.Combat.Elementalist.BlindingFlare.yaml, a CC-only
  DelayedStatus flash kept deliberately separate from the heal-only
  Skill.Combat.Elementalist.EmergentLight.yaml -- see Combat/CCImmunity.yaml
  for the resistance rule that governs repeated Daze application.
