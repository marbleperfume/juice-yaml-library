PipelineID: DutySupport.Mercenary.Rank3
SequenceIndex: 0
QuestID: Quest.DutySupport.Mercenary.Rank3.Offer
StepType: QuestGiver
TargetNPCs:
  - NPC.Friendly.MalachiteCity.WardenColm
Action: Dialogue_Override
DialogueRef: Dialogue.DutySupport.Mercenary.Rank3.Offer
RequiresFlag: Quest.Test.Mercenary.Rank2.CurrentRole.Cleared   # symbolic: resolves to whichever Rank2 test the player's current Role actually cleared (Tank -> Rank2.Tank.Cleared, etc.), mirroring the SkillQuest.CurrentClass.AllCleared convention
Branches:
  - Condition: "PlayerRole == Tank"
    Effect: "OffersQuest(Quest.Test.Mercenary.Rank3.Tank)"
  - Condition: "PlayerRole == Healer"
    Effect: "InformsPlayer('Rank 3 Healer trial not yet designed -- see Ranks/Mercenary_Unlocks.yaml Rank3.TestQuest.Healer: null')"
  - Condition: "PlayerRole == DPS"
    Effect: "OffersQuest(Quest.Test.Mercenary.Rank3.DPS)"
NarrativeIntent: >
  Same reusable-front-door pattern as DutySupport.Mercenary.Rank2, one Seq
  later in rank. Tank and DPS now both resolve to real trials
  (Test.Mercenary.Rank3.Tank_Seq0.yaml / Rank3.DPS_Seq0.yaml); Healer stays
  an explicit stub since Ranks/Mercenary_Unlocks.yaml Rank3.TestQuest.Healer
  is still null -- the gap reads as "not yet built" rather than a bug.
