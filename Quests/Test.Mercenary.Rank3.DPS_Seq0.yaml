PipelineID: Test.Mercenary.Rank3.DPS
SequenceIndex: 0
QuestID: Quest.Test.Mercenary.Rank3.DPS
StepType: Custom
Role: DPS
TargetNPCs:
  - NPC.Boss.Test.MechaGolem
Action: Custom
RequiresFlag: Quest.Test.Mercenary.Rank2.DPS.Cleared
TestConfig:
  ForcedDoctrineLevel: Level3
  Checks:
    - RotationUptime
    - ClassMechanicUse
    - CastBarTiming
    - StabilityContestAvoidance   # Tag.Skill.Risky cast during Golem's cast = instant drop, same rule as Tank
    - MercRank2_3SkillUsageAtPunishWindows
  PunishTiming: >
    Periodic, not random -- the Golem interrupts the player's rotation on a
    predictable-but-punishing cadence at Level3, specifically so the test
    can't be solved by a pure "burst on cooldown" 2-minute rotation. The
    player must weave their Rank 2/3 utility skills in at the RIGHT moments
    rather than only when convenient.
  Constraints:
    NoUnfocusAccess: true
    NoPreemptiveCC: true
    LowerEffectiveHP: >
      A DPS cannot absorb Golem hits the way Tank/Healer can -- a hit that a
      Tank shrugs off or a Healer heals through can down a DPS outright, so
      a missed read at Rank3 is lethal, not just a damage-taken cost.
Reward:
  TitleID: null
  ItemID: null
  Copper: 0
  Reputation: null
NarrativeIntent: >
  Same problem as Rank 2, worse: NPC.Boss.Test.MechaGolem Doctrine Level3's
  StabilityContest and periodic interrupt cadence actively punish a pure
  damage-rotation approach. Without Unfocus or preemptive CC, and with a
  DPS's thinner effective HP, the test forces using the class's best Merc
  2/3 progression skills (interrupts, defensive utility) exactly when the
  Golem's punish window demands it -- not on a fixed timer, and not
  optional.
