NarrativeIntent: >
  Reusable conditional front door for the broad Mercenary Rank 2 test,
  administered by Warden Colm (NPCs/NPC.Friendly.MalachiteCity.WardenColm.yaml)
  as a permanent Malachite City town fixture rather than a per-role quest
  giver. This step does NOT alter Test.Mercenary.Rank2.Tank_Seq0.yaml,
  Rank2.Healer_Seq0.yaml, or Rank2.DPS_Seq0.yaml's own
  RequiresFlag/Reward/TestConfig -- it is purely a role-conditional router in
  front of them, using the existing Branches mechanism (see
  QuestCreator.pyw) rather than inventing a new one. All three Roles now
  resolve to a real trial (Ranks/Mercenary_Unlocks.yaml Rank2.TestQuest is
  fully populated).
