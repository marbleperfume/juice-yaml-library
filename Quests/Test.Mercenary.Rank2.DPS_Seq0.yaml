PipelineID: Test.Mercenary.Rank2.DPS
SequenceIndex: 0
QuestID: Quest.Test.Mercenary.Rank2.DPS
StepType: Custom
Role: DPS
TargetNPCs:
  - NPC.Boss.Test.MechaGolem
Action: Custom
RequiresFlag: SkillQuest.CurrentClass.AllCleared
TestConfig:
  ForcedDoctrineLevel: Level2
  Checks:
    - RotationUptime      # DPS RoleMechanic -- see Ranks/RoleMechanics.yaml DPS
    - ClassMechanicUse
    - CastBarTiming        # correctly react to whichever of the 3 random Golem casts occurs
  Constraints:
    NoUnfocusAccess: >
      DPS has no Tank-style RoleMechanic tool to blunt the Golem's
      escalated kit -- Focus consequences (Combat/AggroSystem.yaml
      FocusRedirectRule) land on them at full weight.
    NoPreemptiveCC: >
      Preemptive CC is a Strategy-rank Tactical item (Items/Item.Tactical.*.yaml),
      not a base DPS tool -- so pulling extra adds via AoE without one is a
      real risk, not a safe assumption.
Reward:
  TitleID: null
  ItemID: null
  Copper: 0
  Reputation: null
NarrativeIntent: >
  The most linear Rank 2 test by design: a clean, complete damage rotation
  plus correctly-timed interrupt/dodge cycles against NPC.Boss.Test.MechaGolem
  Doctrine Level2's randomized 3-skill cast pool, graded directly with no
  role safety net. Where Tank leans on Unfocus and Healer leans on
  DelayedStatus/Triage Override, DPS is tested on pure execution -- rotation
  uptime and cast-bar reads, nothing else absorbs a mistake.
