Key: Dialogue.DutySupport.Mercenary.Rank2.Offer
Scene: Warden Colm offers the Mercenary Rank 2 trial
Participants:
  - NPC.Friendly.MalachiteCity.WardenColm
  - Player
Lines:
  - Speaker: NPC.Friendly.MalachiteCity.WardenColm
    Text: >
      Every skill quest your current class offers is cleared. That's the
      only door I check. Whether you're ready is the golem's opinion, not
      mine.
    ExpressionTag: Expression.Flat.Unimpressed
    VOPath: ""
RoleVariants:
  Description: >
    Reusable-NPC pattern, same shape as an NPC's BanterSets keyed variants:
    the Warden's closing line depends on the player's current Role, decided
    by the same Branches this dialogue's quest step evaluates.
  Tank:
    Text: "Tank trial's up. Hold the line, use what you've earned, and don't let it out-think you."
    ExpressionTag: Expression.Flat.Unimpressed
  Healer:
    Text: "Healer trial's up. Most of it isn't about healing at all -- until suddenly it is. Don't miss the moment it does."
    ExpressionTag: Expression.Flat.Unimpressed
  DPS:
    Text: "Tank and Healer got role tools baked in for this. You don't. Rotation clean, reads clean -- that's the whole test."
    ExpressionTag: Expression.Flat.Unimpressed
NarrativeIntent: >
  One dialogue file serves every Role that walks up to Warden Colm --
  RoleVariants supplies the branch-specific line instead of authoring a
  separate dialogue per role/rank test.
