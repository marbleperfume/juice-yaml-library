Key: Dialogue.DutySupport.Mercenary.Rank3.Offer
Scene: Warden Colm offers the Mercenary Rank 3 trial
Participants:
  - NPC.Friendly.MalachiteCity.WardenColm
  - Player
Lines:
  - Speaker: NPC.Friendly.MalachiteCity.WardenColm
    Text: >
      You cleared Rank 2. This one's solo, and I won't be sending anyone in
      with you. It's built to interrupt you unless you can stop it from
      wanting to. Bring what you need -- items are allowed.
    ExpressionTag: Expression.Flat.Unimpressed
    VOPath: ""
RoleVariants:
  Description: Same reusable-NPC branch pattern as Dialogue.DutySupport.Mercenary.Rank2.Offer.
  Tank:
    Text: "You're the only role this is fair to right now. Use that."
    ExpressionTag: Expression.Flat.Unimpressed
  Healer:
    Text: "No Rank 3 trial built for Healer yet. Come back when there is one."
    ExpressionTag: Expression.Flat.Unimpressed
  DPS:
    Text: "It'll interrupt you on purpose, on a schedule, and you can't out-tank the mistake. Use what Rank 2 gave you or don't survive it."
    ExpressionTag: Expression.Flat.Unimpressed
NarrativeIntent: >
  Warden Colm's Tank line acknowledges, in-universe, the actual design
  reason tanks are the only easy Rank 3 (innate aggro/Focus management --
  see NPC.Boss.Test.MechaGolem Doctrine Level3 CastInterruption) without
  breaking the fourth wall.
