# ─────────────────────────────────────────────────────────────────────────────
# SECTION 19: DESIGN NOTES & OPEN QUESTIONS
# ─────────────────────────────────────────────────────────────────────────────

DesignNotes:
  CharmUI:
    Question: "How are multiple simultaneous Charm bonds displayed?"
    Options:
      - "Bond tethers: visible lines connecting Siren to each charmed target (color-coded by stage)"
      - "Overhead icons: Charm stage indicator above each charmed enemy (heart stages)"
      - "Peripheral timer arcs: curved bars at screen edge, one per bond, showing decay"
      - "Radial proximity indicator: ring around Siren showing charmed targets' positions"
    Recommendation: >
      Bond tethers (visible) + peripheral timer arcs (decay tracking).
      Tethers give immediate spatial awareness of who's bonded and at what stage.
      Timer arcs give precise decay info without looking at individual enemies.
      Combined: you FEEL the bonds spatially and track them numerically.

  AllyCharmVisibility:
    Question: "Should allies SEE their own Charm stacks from the Siren?"
    Options:
      - "Yes — buff icon showing stacks. Allies know they're bonded."
      - "No — hidden system. Allies don't know they're 'charmed' (creepy but thematic)."
      - "Partial — allies see a 'proximity healing' buff but not the stack count."
    Recommendation: >
      Partial. Allies see a "Siren's Grace" buff that indicates they're in
      healing range, with a potency indicator (faint/strong). They don't need
      to see exact stacks — that's information for the Siren's UI only.
      Thematically appropriate: you don't KNOW how charmed you are.

  StagePVPBalance:
    Question: "How does Charm work against player characters in PvP?"
    Recommendation: >
      Stage 1: Reduced targeting UI clarity (enemy Siren harder to click/tab-target).
      Stage 2: DISABLED in PvP (forced movement on players = grief potential).
      Stage 3: DISABLED in PvP (behavioral override on players = unacceptable).
      PvP Siren operates on Stage 1 deprioritization + drain damage only.
      CC component is replaced with damage amp (PvP drain crits instead of CC).

  MerryinWorldbuilding:
    Question: "What are Merryin like as a race?"
    DesignConstraints:
      - "Must have a unique vocal organ (biological lock)"
      - "Must be naturally social/proximity-based (matches range dependency)"
      - "Must have predatory element to their sociability (Charm isn't altruistic)"
      - "Must not be purely evil/villainous (players PLAY this race)"
    Recommendation: >
      Merryin are symbiotic predators. They form genuine emotional bonds with
      their communities (not evil), but those bonds serve a biological function
      (life-energy exchange). A Merryin who is isolated genuinely suffers
      (they NEED social proximity — it's not optional). Their Charm isn't
      malicious — it's how they connect. The predatory element is that the
      connection ALSO feeds them. Think: mutualistic parasite, not pure predator.

  TuningKnobs:
    CharmDecayRate: "Currently 4/6/8s per rank. Range 3-10s. Lower = harder maintenance."
    DrainTickPotency: "Currently 12/35/70 (tuned). Range ±20%. Directly affects healing output."
    StageThresholds: "Currently 3/6/10. Could reduce to 2/5/8 for faster staging."
    MaxDevotionTargets: "Currently 1. Could allow 2 at Rank 3 (massive risk increase)."
    ResonanceGenRate: "Currently 5/bond/3s. Range 3-8. Affects ability usage frequency."
    CharmRange: "Currently 20y enemy, 15y ally. Reducing = harder. Increasing = easier."
    JiltedFuryDuration: "Currently 8s +30% damage after break. Range 5-12s. Affects punishment severity."

  FutureDesignSpace:
    - "Rank 4 (if added): AoE Charm maintenance (refresh all bonds in range with 1 GCD — but weaker)"
    - "Duet mechanic: bond with another player healer for combined Charm economy"
    - "Environmental Charm: charm non-combat NPCs/fauna for utility effects (lore exploration)"
    - "Charm specialization traits: specialize in Stage 1 breadth vs Stage 3 depth"
    - "Cross-class interaction: Shaman hex + Siren Charm on same target = amplified drain"

  WhatSirenIsNOT:
    - "NOT a traditional healer who targets allies and casts heal spells"
    - "NOT a tank/frontliner (Stage 3 does NOT make you a tank — it puts danger next to you)"
    - "NOT viable in isolation (zero toolkit without nearby targets)"
    - "NOT a burst healer (stable sustain, not Elementalist-style triage spikes)"
    - "NOT a fixed-rotation class (adaptive or nothing)"
    - "NOT mana-gated (mana matters but Charm bond status matters MORE)"
    - "NOT alignment-dependent (no 2-min cycle, no party buff windows)"

  WhatSirenIS:
    - "A drain-bond sustain healer whose healing is a BYPRODUCT of enemy manipulation"
    - "A plate-spinning adaptive executor who never settles into a fixed sequence"
    - "A proximity-dependent social predator who thrives in crowded chaos"
    - "A class whose floor is VERY low (broken bonds = zero output) and ceiling is VERY high"
    - "A stable healer that rewards learning the adaptive rotation with consistent, excellent throughput"
    - "A risk/reward calculator (Stage 3 Devotion = power + danger, always)"
    - "The 'boyfriend/girlfriend healer' — your enemies love you to death (literally)"

