Definition:
  Class: Shaman
  Intent: >
    Copies Tree of Savior's Featherfoot to some degree -- bone helmet
    (Attire/BoneHelmet.yaml), Channeling Stick weapon
    (Items/Item.Equipment.Shaman.ChannelingStick.yaml). Core mechanic is
    consumable-gated: Monster Bones (Items/Item.Consumable.Bone.MonsterBone.yaml)
    fuel two distinct bone rites -- Bone Summon (defensive interrupt-catch
    into Spirit Channel burst) and Bone Pointing (raises a Floating Bone
    installation that animates Hex via needle strikes, the class's
    sustained "go-to" curse engine). The highest-damage tool (Spirit
    Channel) generates very high Focus, which forces the rest of the kit
    toward low-Focus DoT/leech/curse tools to avoid constant self-inflicted
    aggro.
  MainAttribute: MAGICCAPACITY
  Race: Soue   # see Races/Wanderers_Soue.yaml -- darker-skinned, isolative elves; the ONLY race that may take this class
  Role: Healer   # CORRECTED -- was mislabeled DPS. See RoleNote below: this is a control/CC-based Healer, not a direct-heal one
  Tier: Experienced   # gated by Merc Rank 2 + originating area, see Classes/Class_Prerequisites.yaml
  RoleNote: >
    Unusually CC-focused for what its kit LOOKS like (a ranged burst-damage
    silhouette) -- this is because it's a Healer sub-archetype, alongside
    Elementalist, but a second, distinct paradigm: where Elementalist heals
    directly (DelayedStatus barriers/HoTs, Triage Override hard-casts),
    Shaman protects the party mostly by locking threats down (Hex stacks,
    Bone Spirit's interrupt catch, curses) day-to-day. Its Triage Override
    kit is fully designed: Skill.Combat.Shaman.LeechLife.yaml converts to
    Skill.Combat.Shaman.MagicLeech.yaml (blood/essence absorption that
    heals BOTH the Shaman and a target ally for the same amount, more
    potent than Leech Life), Skill.Combat.Shaman.SpiritCleansing.yaml
    unlocks as a cleanse, and Skill.Combat.Shaman.Necromancy.yaml is
    Shaman's own-named Resurrection -- never a copy of Elementalist's
    water-themed toolkit, its own bone/spirit/blood tradition throughout.
ClassMechanic: BoneSummonCycle   # see Summons/Summon.Shaman.BoneSpirit.yaml + FloatingBone, Skills/Skill.Combat.Shaman.BoneSummon/SpiritChannel/BonePointing
ManaProfile:
  CostTier: Medium
  ManaflowSkill: Skill.Combat.Shaman.SunRecharge
  Note: >
    Bigger per-cast costs than Elementalist by design (see
    Combat/ManaEconomy.yaml, Combat/ManaflowSystem.yaml) -- Shaman leans on
    fewer, heavier-committed casts (channeling, Spirit Channel bursts)
    where a mid-cast mana failure would be especially deflating. Sun
    Recharge pays out on a COOLDOWN, not a reaction reward, so tracking its
    downtime (and weaving channels to accelerate it) is this class's core
    resource skill-check -- intentionally a higher-difficulty class where
    a weaker player visibly contributes less, same spirit as the FocusProfile
    note below. In Crisis Mode (Passives/TriageOverride.yaml), this
    identity carries over directly: CrisisManaBurst's regen spike decays
    on a flat clock (TimeBased), not on play, so
    Skill.Combat.Shaman.MagicLeech.yaml's real cost is about WHEN in the
    crisis window it's cast, not how it's cast.
FocusProfile:
  Level: High
  Note: >
    Spirit Channel alone generates ~8x the Focus of a comparable
    Elementalist damage skill (see Skill.Combat.Shaman.SpiritChannel.yaml
    FocusGeneration: 650 vs Skill.Combat.Elementalist.EmberLance's 80).
    This is the class's defining volatility -- high ceiling, high risk of
    self-inflicted aggro.
VolatilityCounter:
  Tools: [WitheringPoison, LifeLeechingCurse, LeechLife, BonePointing, CurseExplosion, BoneSpiritInterruptCatch]
  Note: >
    Unlike a Tank, none of these directly blunts an enemy's Doctrine kit --
    they let the Shaman deal consistent damage WITHOUT generating Focus in
    the first place, and the Bone Spirit's 1-target interrupt catch
    (Summons/Summon.Shaman.BoneSpirit.yaml) is a narrow, spendable
    counter-play tool, not a standing defense.
