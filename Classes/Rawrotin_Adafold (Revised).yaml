# ═══════════════════════════════════════════════════════════════════════════════
# Classes/Tank/Adafold_ShieldKnight.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# Adafold — "Shield Knight"
# Role: Tank (Force Targeting)
# Identity: "I physically cannot be bypassed. I am the doorway."
# Design Philosophy: The IMMOVABLE WALL. Enemies don't attack Adafold because
#   of a number — they attack Adafold because they literally cannot path around
#   the shield. In procgen corridors, Adafold IS the chokepoint.
#
# Reference Lineage:
#   - Paladin (FFXIV): sword/shield hybrid, self-healing, invuln, Sheltron
#   - Rodelero (ToS): shield-based strikes, stun, knockback
#   - Peltasta (ToS): Swash Buckling (aggro pull), High Guard, Shield Lob
#   - Swordsman (ToS): Bash, Concentrate, Pain Barrier
#
# Racial Affinity: Rawrotin (Linfree)
#   Rawrotin mark enemies and benefit from repeated strikes to the same mark
#   to eventually break through tougher foes. This IS Adafold's playstyle:
#   stand in the doorway, grind enemies down through sustained contact,
#   and protect your charges as a bodyguard.
#
# Tank Philosophy Contrast:
#   Adafold: "I physically block the path. Nothing gets past." (Force Targeting)
#   Madolt:  "I keep enemies stupid so they don't TRY to get past." (Unfocus)
#   These are DIFFERENT ANSWERS to the same problem, not interchangeable roles.
#   Adafold excels in corridors/chokepoints. Madolt excels in open arenas.
#
# Balance Ref: Combat/BalanceTargets.yaml
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Tank.Adafold

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1: CLASS IDENTITY
# ═══════════════════════════════════════════════════════════════════════════════

ClassIdentity:
  Name: Adafold
  Title: Shield Knight
  Role: Tank
  TankArchetype: Force Targeting  # Physical compulsion, spatial denial
  ExecutionArchetype: Control  # Spatial awareness, enemy manipulation, path denial
  InputModality: reactive_defensive  # Watching ENEMY pathing to intercept
  InformationPriority: enemy_pathing_and_strategy_rank
  Fantasy: >
    The immovable wall. You don't kill things fast — you outlast everything.
    Every hit absorbed fuels your strength. In a corridor, nothing passes you.
    In the open, your tethers and pins drag enemies back to your shield.
    Your party sees you as the anchor — always alive, always holding the line.
    You are a bodyguard. You physically stand between threats and your charges.

  DesignPillars:
    - "Defensive actions generate offensive resources (inverted economy)"
    - "Force Targeting = spatial denial, NOT numeric enmity"
    - "The shield IS a wall — physically block enemy pathing in corridors"
    - "Sustained uptime > all else (anti-burst, no fixed cadence)"
    - "Self-sufficient: solo in party splits, escort role, clears paths alone"
    - "Bodyguard fantasy: protect a charge by physically interposing"

  TankContrastWithMadolt: >
    Adafold and Madolt solve the same problem (keep enemies off squishies)
    through fundamentally different mechanics:
    - Adafold uses FORCE: physical compulsion, tethers, pins, body-blocking,
      path denial. Enemies attack Adafold because they CANNOT PATH AROUND.
    - Madolt uses UNFOCUS: AI suppression that reduces enemy Strategy Rank,
      making them too stupid to attempt flanking. Enemies attack Madolt
      because they've been mentally downgraded to "hit nearest target."
    In procgen maps: Adafold dominates corridors/chokepoints (one shield
    blocks the only path). Madolt dominates open arenas (can suppress 5
    flankers simultaneously where physical blocking is impossible).
    Both can solo. Adafold solos by outlasting. Madolt solos by killing fast.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1B: RACIAL AFFINITY — RAWROTIN
# ═══════════════════════════════════════════════════════════════════════════════

RacialAffinity:
  Race: Rawrotin
  ParentCategory: Linfree
  Subrace: Rawrotin
  LockType: semi_exclusive  # Rawrotin strongly associated, not hard-locked
  Narrative: >
    Rawrotin — wolf-like people ranging from Nyanto-esque dog-featured looks
    to outright werewolf forms. Tightly bound to Landwin society as bodyguards,
    caretakers, and package couriers. Unlike Nyanto they can mark enemies and
    benefit from repeated strikes to the same mark to eventually break through
    tougher foes; they're fast, but don't otherwise mimic Nyanto playstyle.
    There's a soft rivalry between the two subraces.

  MechanicalSynergy:
    MarkAndGrind: >
      Rawrotin's racial "mark + repeated strikes" maps directly to Adafold's
      sustained pressure gameplay. Consecrate marks a zone; combo GCDs land
      repeatedly on the same target; Bulwark Gauge builds through sustained
      contact. The longer Adafold engages a single target, the stronger the
      payoff — identical to Rawrotin mark stacking.
    BodyguardFantasy: >
      Rawrotin serve as bodyguards in Landwin society. Adafold's Force
      Targeting IS bodyguarding mechanized: physically interpose between
      threat and charge, tether threats that try to bypass, pin threats
      that reach the charge. The class fantasy and racial lore are the
      same sentence said two different ways.
    SpeedUtility: >
      Rawrotin are fast. Adafold has movement tools (Shield Rush, repositioning)
      that enable rapid corridor transitions and escort pacing. The speed
      isn't for chasing enemies — it's for getting INTO position before
      enemies reach the party.

  DesignNote: >
    Rawrotin players picking Adafold should feel like the class was MADE for
    them. The wolf-bodyguard protecting the pack, marking threats, grinding
    them down through relentless sustained pressure while the pack moves
    safely behind. Every mechanical system reinforces this fantasy.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: ROLE OBJECTIVE FUNCTION
# ═══════════════════════════════════════════════════════════════════════════════

RoleObjective:
  Type: maximize_dps_with_survival
  PrimaryMetric: potency_per_second
  SecondaryMetric: effective_hp_over_time  # Unique: Adafold optimizes UPTIME
  TertiaryMetric: force_targeting_uptime  # % of time enemies are path-denied
  Constraints:
    - "hp > 0 AT all_tankbuster_timestamps"
    - "mitigation_active AT all_tankbuster_timestamps"
    - "bulwark_gauge_never_overcaps (wasted defensive generation = wasted DPS)"
    - "force_tether_uptime > 80% on priority targets in multi-enemy pulls"
  SurvivalModel:
    TankbusterEvents: fight_specific[]
    MitigationPlan: "cooldown → event mapping (same as other tanks)"
    InvulnBudget: 1_per_fight
    CooldownStacking: [rampart_stance + sheltron + bastion_wall]
    UniqueAdvantage: >
      Bulwark Gauge passively generates while tanking, meaning Adafold has
      MORE mitigation available per minute than Madolt (who must attack to
      build gauge). This IS the survival advantage. Combined with Force
      Targeting keeping enemies physically unable to bypass, Adafold
      creates a self-reinforcing loop: take hits → build gauge → mitigate
      more → survive longer → take more hits → build more gauge.

  DPSTarget:
    RoleBaseline: 85%  # of DPS reference (from BalanceTargets)
    AdafoldSpecific: 82-85%  # Consistent, low variance
    # Madolt range: 80-87% (depends on stance execution)
    # Adafold range: 82-85% (consistent, less execution variance)
    # Result: Madolt has higher CEILING, Adafold has higher FLOOR and more uptime.
    # Over a full dungeon with deaths factored: roughly equal total contribution.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3: FORCE TARGETING SYSTEM
# ═══════════════════════════════════════════════════════════════════════════════

ForceTargeting:
  Name: "Force Targeting"
  Description: >
    Adafold's tank mechanic is PHYSICAL COMPULSION, not numeric enmity.
    Enemies don't attack Adafold because of a threat number — they attack
    because Adafold has physically denied them any other option.
    Force Targeting encompasses: tethers (forced pathing toward shield),
    pins (immobilize at Adafold's location), body-blocking (collision
    prevents passage), zone denial (Consecrate makes areas impassable),
    and knockback (re-route enemy pathing away from squishies).

  StrategyRankInteraction:
    Description: >
      Enemies have Strategy Rank (AI tier) that determines targeting behavior.
      Adafold's Force Targeting works REGARDLESS of Strategy Rank because it
      uses physical mechanics, not AI manipulation. A Rank 4 enemy that
      would normally set ambushes and coordinate flanks STILL can't walk
      through Adafold's body. The shield is a wall no matter how smart
      the enemy is.
    Ranks:
      Rank1: "Attack whoever's closest. Force Targeting almost unnecessary."
      Rank2: "Seek open path to casters. Adafold blocks the only path."
      Rank3: "Flank, coordinate, retreat when low. Adafold tethers flankers back."
      Rank4: "Set ambushes, call reinforcements. Adafold pins key targets, shields party."
    ScalingNote: >
      Higher Strategy Rank enemies make Adafold's job HARDER but never
      IRRELEVANT. A Rank 4 enemy might send 3 adds down different corridors
      while it attempts to bypass — Adafold must tether the boss while
      using Consecrate and knockback to handle adds. The skill expression
      is spatial multitasking, not pressing harder rotations.

  ForceTools:
    - Mechanic: "Body Block"
      Description: >
        Adafold has COLLISION with enemies while shield is raised. Standard
        MMO convention (players clip through mobs) is DISABLED for Adafold
        specifically. The shield physically prevents enemy movement through
        Adafold's hitbox. In a corridor, this alone is sufficient tanking.
      PassiveOrActive: passive (always on while shield is equipped)
      StrategyRankBypass: none  # Physical — cannot be outsmarted

    - Mechanic: "Force Tether (Shield Lob)"
      Description: >
        Ranged skill that attaches an invisible tether. Tethered enemy MUST
        path toward Adafold (cannot move away) for the duration. If the
        enemy attempts to move away, it is pulled back at 50% movement speed
        toward Adafold. Tether breaks at 25y distance or on expiry.
      Duration: 8s
      Range: 20y
      StrategyRankBypass: "Rank 3+ enemies break tether 2s faster (6s effective)"

    - Mechanic: "Pin (Shield Bash)"
      Description: >
        Melee stun that roots the target at Adafold's current position.
        Pinned enemies cannot move or act for the duration. Short duration
        but absolute — the enemy is STOPPED.
      Duration: 3s
      Range: melee
      StrategyRankBypass: "Rank 4 enemies have 50% stun resistance (1.5s effective)"

    - Mechanic: "Zone Denial (Consecrate)"
      Description: >
        Ground-targeted area that enemies avoid pathing through. Enemies
        already inside take damage and are slowed 40%. AI pathing treats
        Consecrate zones as walls for route calculation. Forces enemies
        to take longer paths — which Adafold controls.
      Duration: 15s
      Radius: 5y
      StrategyRankBypass: "Rank 4 enemies will path through if no alternative exists (still take damage/slow)"

    - Mechanic: "Knockback Reroute (Shooting Star)"
      Description: >
        Line attack that knocks enemies 5y backward. Used to push enemies
        OUT of pathways to squishies and back toward Adafold's controlled
        zone. Resets enemy pathing calculations (they re-evaluate route
        after displacement).
      Displacement: 5y
      StrategyRankBypass: "Bosses immune to knockback (use tether instead)"

  CorridorScenario: >
    Procgen dungeon: party hits a T-intersection. Left leads to objective,
    right has a pack of 6 enemies. Adafold steps into the right corridor
    mouth. Body Block prevents passage. Consecrate behind Adafold creates
    a second denial layer. Shield Lob tethers the ranged caster in the back.
    Party proceeds left safely. Adafold grinds the pack down solo, generating
    Bulwark Gauge the entire time, emerging at full gauge ready for the next
    encounter. THIS is the class fantasy.

  OpenAreaFallback: >
    In open areas without corridors, Adafold relies on Shield Lob tethers
    and Shooting Star knockbacks to funnel enemies toward the shield.
    Less efficient than corridor blocking — this is where Madolt's Unfocus
    suppression is the stronger pick. Party composition matters based on
    map topology.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4: CLASS MECHANIC — BULWARK GAUGE
# ═══════════════════════════════════════════════════════════════════════════════

ClassMechanic:
  Type: defensive_gauge_build
  Description: >
    Bulwark Gauge builds by RECEIVING and MITIGATING damage, not by attacking.
    This is the fundamental inversion from Madolt Warrior. The gauge rewards
    you for doing your job as a tank — holding the line and eating hits.
    Spending the gauge presents a constant decision: defense (Bastion Wall)
    or offense (Shield Cannon). Tank well = more gauge = more choices.
    The Rawrotin mark-and-grind identity lives here: sustained contact with
    enemies = sustained gauge generation = sustained power growth.

  Gauge:
    Name: Bulwark Gauge
    Max: 100
    Display: "Shield-shaped meter, fills from bottom to top with golden light"
    Overcap: "Blocked — gauge stops at 100. Visual/audio warning at 90."
    DecayOutOfCombat: "5 per second after 8s out of combat (30s to empty)"

  # ─────────────────────────────────────────────────────────────────────────
  # GAUGE GENERATION (Defensive — the core identity)
  # ─────────────────────────────────────────────────────────────────────────
  Generation:
    Sources:
      - source: "Blocked Attack (any)"
        amount: 8
        notes: >
          Primary generation. Each blocked hit = 8 gauge. At ~1 enemy auto
          per 3s against a single target: ~2.6 gauge/s passive. Against a
          5-pack in a corridor: ~13 gauge/s. Multi-enemy pulls are gauge-rich.
      - source: "Sheltron/Adamant Sheltron (guaranteed block window)"
        amount: "8-12 per blocked hit during duration (2-3 hits typical)"
        notes: "Sheltron guarantees blocks → guarantees gauge. Primary engine."
      - source: "Damage Taken (unblocked, after mitigation)"
        amount: 3
        notes: >
          Even unblocked hits generate SOME gauge. Getting hit is never
          fully wasted. Rewards staying in combat, penalizes nothing.
      - source: "Mitigation Cooldown Used (Rampart, Sentinel, etc.)"
        amount: 12
        notes: >
          Using a mitigation CD grants 12 gauge immediately. Rewards
          proactive defensive play. "I used Sentinel → I get gauge."
      - source: "Force Tether Active (per tick while enemy tethered)"
        amount: 2_per_3s
        notes: >
          Maintaining a tether generates slow passive gauge. The spatial
          effort of keeping enemies controlled IS gauge generation.

    GenerationMath:
      SingleTarget:
        EnemyAutoRate: "1 hit per 3.0s"
        BlockRate: "~60% base (gear + Sheltron windows)"
        GaugePerMinute_ST: "~48-60 (blocked) + 18-24 (unblocked) + tethers = ~75-90"
        TimeToFull_ST: "~70-80s from empty (solo against one enemy)"
      MultiTarget:
        Pack5_AutoRate: "~5 hits per 3.0s (staggered)"
        GaugePerMinute_5Pack: "~180-240 (blocked) + 30 (unblocked) = ~210-270"
        TimeToFull_5Pack: "~25-30s from empty"
      DesignIntent: >
        Multi-target scenarios (corridor holding) generate gauge 3-4x faster
        than single-target. This rewards Adafold's core fantasy: stand in the
        doorway, absorb everything, emerge overflowing with power.

    TimeToFirstSpend:
      BastionWallCost: 30
      ShieldCannonCost: 40
      FirstSpendScenario_Corridor: "~8-12s against a pack (fast)"
      FirstSpendScenario_Boss: "~24-30s against single target (slower)"
      # TARGET: 12-16s average (from BalanceTargets.yaml) ✓ PASSES
      # Corridor pulls hit target easily. Boss pulls are slightly slow but
      # Sheltron on first TB accelerates generation.

  # ─────────────────────────────────────────────────────────────────────────
  # GAUGE SPENDING (The Decision)
  # ─────────────────────────────────────────────────────────────────────────
  Spending:
    Description: >
      Every gauge spend is a CHOICE between defense and offense.
      There is no "correct" answer — it depends on the situation.
      Low HP + incoming TB? Bastion Wall. Safe and enemies in corridor?
      Shield Cannon for DPS. This decision IS the moment-to-moment gameplay.

    Spenders:
      - Name: "Bastion Wall"
        Cost: 30
        Type: defensive
        Effect: >
          Shield barrier absorbing damage equal to 20% of Adafold's max HP.
          Lasts 15s or until broken. While Bastion Wall holds, all blocked
          attacks generate +4 bonus gauge (12 per block instead of 8).
        Duration: 15s
        RankRequired: 1
        DesignNote: >
          The safe option. Costs 30 gauge, grants a shield that generates
          EXTRA gauge while active. Net cost is ~18-22 gauge (some refunded
          through enhanced blocking). Skilled players chain Bastion Wall
          into Shield Cannon: absorb → generate → dump offense.

      - Name: "Shield Cannon"
        Cost: 40
        Type: offensive
        Effect: >
          Fires the shield forward in a 15y line (returns immediately).
          Deals 350 potency physical damage to all enemies hit. Applies
          "Marked" debuff for 8s: all Adafold's subsequent hits deal +10%
          damage to marked targets.
        Potency: 350
        TargetType: line (15y)
        RankRequired: 1
        DesignNote: >
          The Rawrotin synergy skill. "Mark + repeated strikes" IS this:
          Shield Cannon marks, then combo GCDs benefit from the mark.
          350p + 8s of +10% on combos (~3-4 GCDs × 10-20p bonus = 380-430p
          effective value). Strong but requires follow-up to maximize.

      - Name: "Fortress Barrage"
        Cost: 60
        Type: offensive_defensive_hybrid
        Effect: >
          Channels for 3s (interruptible by taking a hit that would kill).
          Fires 5 shield projectiles in rapid succession. Each projectile:
          120p damage + 5y knockback on hit. After channel completes, grants
          "Fortified" buff: +20% damage reduction for 10s.
        TotalPotency: 600  # 5 × 120p
        Knockback: 5y_per_hit
        PostBuff: "20% DR for 10s"
        RankRequired: 2
        DesignNote: >
          The corridor-clearing ultimate spend. Fires down a hallway,
          knocking everything back while dealing heavy damage, then buffs
          defense for the follow-up. Expensive (60 gauge) but solves the
          "too many enemies in the corridor" problem with both damage and
          crowd control simultaneously.

      - Name: "Aegis Judgment"
        Cost: 75
        Type: offensive_ultimate
        Effect: >
          2.0s cast (full commitment). 700 potency magical damage in a 120°
          cone, 10y range. All enemies hit have their pathing HARD RESET to
          target Adafold for 15s (acts as a mass Force Tether). After cast,
          grants "Aegis Afterglow": all Bulwark Gauge generation doubled for
          20s.
        Potency: 700
        TargetType: cone (120°, 10y)
        ForceDuration: 15s  # Mass tether effect
        PostBuff: "2x gauge generation for 20s"
        Cooldown: 180s  # In addition to gauge cost
        RankRequired: 3
        DesignNote: >
          The "I need to hold THIS room" button. Mass Force Tether on
          everything hit + doubled gauge generation means Adafold becomes
          the absolute anchor for 20s. Use case: party split, Adafold solo,
          room full of enemies, need to hold them ALL. Not a "burst" — a
          CONTROL tool that happens to deal damage.
        BalanceValidation: "700p within ClassUltimate band (600-800p) ✓"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5: GCD SKILL ROSTER
# ═══════════════════════════════════════════════════════════════════════════════

Skills:
  GCD:
    # ─────────────────────────────────────────────────────────────────────────
    # CORE COMBO (Sword & Shield, physical damage)
    # ─────────────────────────────────────────────────────────────────────────
    CoreCombo:
      Description: >
        Three-hit sustained pressure combo. No burst finisher — each hit
        does meaningful work. The Rawrotin grind: repeated strikes to the
        same target, building Bulwark Gauge through sustained engagement.
        Every GCD in the combo contributes to Force Targeting maintenance
        by keeping Adafold in melee range (body-block active).

      - Id: stalwart_slash
        Name: Stalwart Slash
        Position: 1
        ActionType: GCD
        CastTime: instant
        Recast: 2.0s
        Potency: 100
        DamageType: physical
        TargetType: single (melee)
        ForceGenerated: 0  # Proximity = Force. Being in melee IS force.
        ResourceGrant: {bulwark_gauge: 0}  # Gauge from being HIT, not hitting
        Description: "Opening diagonal slash. Maintains melee contact."
        RankRequired: 1
        ComboFrom: null

      - Id: iron_cut
        Name: Iron Cut
        Position: 2
        ActionType: GCD
        CastTime: instant
        Recast: 2.0s
        Potency: 130
        DamageType: physical
        TargetType: single (melee)
        ComboBonus: "+30p (from Stalwart Slash)"
        ForceGenerated: 0
        ResourceGrant: {bulwark_gauge: 0}
        Description: "Heavy horizontal cut. Shield braces for counter."
        RankRequired: 1
        ComboFrom: stalwart_slash

      - Id: grinding_blow
        Name: Grinding Blow
        Position: 3
        ActionType: GCD
        CastTime: instant
        Recast: 2.0s
        Potency: 180
        DamageType: physical
        TargetType: single (melee)
        ComboBonus: "+50p (from Iron Cut)"
        ForceGenerated: 0
        ResourceGrant: {bulwark_gauge: 5}  # Small bonus for completing full combo
        AdditionalEffect:
          - "Extends 'Marked' debuff by 4s if active on target"
        Description: >
          Finishing overhead blow that grinds through defenses. Extends
          Shield Cannon's mark — rewarding sustained combo uptime on a
          single target. The Rawrotin mark-and-grind embodied.
        RankRequired: 1
        ComboFrom: iron_cut
        DesignNote: >
          The mark extension is the Rawrotin synergy: combo finisher
          refreshes the mark from Shield Cannon, enabling indefinite
          mark uptime on a target you're grinding down. Longer fights
          = more value. Anti-burst by design.

    # ─────────────────────────────────────────────────────────────────────────
    # AoE COMBO (Shield-based, for multi-target corridor packs)
    # ─────────────────────────────────────────────────────────────────────────
    AoECombo:
      Description: >
        Two-hit AoE combo for corridor packs. Lower per-target damage than
        ST combo but hits everything in front. Maintains body-block position
        (never requires repositioning to AoE).

      - Id: shield_swipe_gcd
        Name: Wide Guard
        Position: 1
        ActionType: GCD
        CastTime: instant
        Recast: 2.0s
        Potency: 80
        DamageType: physical
        TargetType: cone (120°, 5y)
        ForceGenerated: 0
        ResourceGrant: {bulwark_gauge: 0}
        Description: "Sweeps shield in a wide arc. Hits everything in front."
        RankRequired: 1
        ComboFrom: null

      - Id: shield_slam
        Name: Shield Slam
        Position: 2
        ActionType: GCD
        CastTime: instant
        Recast: 2.0s
        Potency: 120
        DamageType: physical
        TargetType: cone (120°, 5y)
        ComboBonus: "+40p (from Wide Guard)"
        ForceGenerated: 0
        ResourceGrant: {bulwark_gauge: 3}  # Per target hit (3 × 5 = 15 in a pack)
        AdditionalEffect:
          - "Generates 3 Bulwark Gauge per enemy hit (bonus for multi-target)"
        Description: >
          Slams shield into the ground, shockwave hits all enemies in cone.
          Gauge generation scales with enemy count — corridor packs fuel
          Adafold's power rapidly.
        RankRequired: 1
        ComboFrom: wide_guard
        DesignNote: >
          The per-target gauge generation makes AoE corridor tanking the
          gauge-rich scenario. 5 enemies × 3 gauge = 15 gauge per AoE
          finisher. Combined with blocked hits from all 5, the corridor
          fantasy generates gauge at 3-4x single-target rate.

    # ─────────────────────────────────────────────────────────────────────────
    # FORCE TARGETING GCDs (Utility — spatial control)
    # ─────────────────────────────────────────────────────────────────────────
    ForceTargetingGCDs:
      Description: >
        These GCDs are NOT part of the DPS combo. They sacrifice DPS output
        for spatial control. Using them means you're NOT hitting combo GCDs.
        The tradeoff: lose ~100-180p of damage to gain physical control of
        an enemy's position or pathing. Use when control > damage.

      - Id: shield_lob
        Name: Shield Lob
        ActionType: GCD
        CastTime: instant
        Recast: 2.0s
        Potency: 80
        DamageType: physical
        TargetType: single (ranged, 20y)
        AdditionalEffect:
          - "Applies 'Force Tether' to target for 8s"
          - "Tethered enemy MUST path toward Adafold (cannot move away)"
          - "If enemy attempts to move away: pulled at 50% speed toward Adafold"
          - "Tether breaks at 25y distance or on expiry"
        ForceGenerated: "Force Tether (physical mechanic, not numeric)"
        ResourceGrant: {bulwark_gauge: 0}
        Cooldown: 12s
        Description: >
          Hurls shield, attaching an energy tether. The target is physically
          compelled to path toward Adafold for the duration. The primary
          ranged Force Targeting tool.
        RankRequired: 1
        DesignNote: >
          THE core Force Targeting skill. Replaces traditional "ranged enmity"
          with physical compulsion. A Rank 3 enemy trying to flank gets
          Shield Lobbed and is dragged back toward the shield. DPS loss
          (80p vs 100-180p combo) is the cost of spatial control.

      - Id: shield_bash
        Name: Shield Bash
        ActionType: GCD
        CastTime: instant
        Recast: 2.0s
        Potency: 100
        DamageType: physical
        TargetType: single (melee)
        AdditionalEffect:
          - "Stuns target for 3s (pinned at current location)"
          - "Stunned enemy has collision disabled (party can pass through)"
          - "Rank 4 enemies: 50% stun resistance (1.5s effective)"
        ForceGenerated: "Pin (stun = physical immobilize)"
        ResourceGrant: {bulwark_gauge: 0}
        Cooldown: 20s
        Description: >
          Bashes shield into enemy, stunning and pinning them in place.
          The pinned enemy becomes scenery — party can walk past safely.
        RankRequired: 1
        DesignNote: >
          Interrupt + crowd control. Pin an enemy that reached a squishy,
          then drag it back with Shield Lob afterward. Combo: Bash (pin)
          → reposition → Lob (tether back to you). 20s CD prevents spam.

      - Id: shooting_star
        Name: Shooting Star
        ActionType: GCD
        CastTime: 1.5s
        Recast: 2.0s
        Potency: 150
        DamageType: physical
        TargetType: line (15y, piercing)
        AdditionalEffect:
          - "Knockback 5y on all targets hit (non-boss)"
          - "Forces pathing recalculation on all displaced enemies"
          - "Applies 'Off Balance' debuff: 10% increased damage taken for 5s"
        ForceGenerated: "Displacement (physical knockback resets AI pathing)"
        ResourceGrant: {bulwark_gauge: 0}
        Cooldown: 30s
        Description: >
          Launches the shield in a line, ricocheting through enemies.
          Displaces everything hit 5y backward and forces them to re-evaluate
          their route. Enemies knocked back toward Adafold's controlled zone
          must path through it again.
        RankRequired: 2
        DesignNote: >
          The reroute tool. Enemy got past you? Shooting Star knocks them
          back into your corridor. Also functions as AoE damage in packs.
          The 1.5s cast is the cost — you're committed during the throw.

    # ─────────────────────────────────────────────────────────────────────────
    # HOLY SKILLS (GCD, magic damage, ground-targeted)
    # ─────────────────────────────────────────────────────────────────────────
    HolySkills:
      Description: >
        Magic-damage GCDs. Adafold's secondary damage type and zone control.
        Consecrate creates zones enemies treat as impassable for AI pathing.
        Hallowed Blade provides self-sustain for solo escort scenarios.

      - Id: consecrate
        Name: Consecrate
        ActionType: GCD
        CastTime: 1.0s
        Recast: 2.0s
        Potency: 80  # per tick
        TickRate: 3.0s
        Duration: 15s (5 ticks total = 400p)
        DamageType: magical
        TargetType: circle (ground-targeted, 5y radius)
        TotalPotency: 400  # Over full duration
        AdditionalEffect:
          - "AI pathing treats zone as WALL for route calculation"
          - "Enemies inside are slowed 40% and take tick damage"
          - "Rank 4 enemies will path through if no alternative (still take slow)"
        ForceGenerated: "Zone Denial (creates impassable AI pathing wall)"
        ResourceGrant: {bulwark_gauge: 0}
        Cooldown: 30s
        Description: >
          Sanctifies the ground. Enemies treat the zone as impassable wall
          for pathing. Those already inside are slowed and damaged. Place
          behind your body-block position to create a double-layer denial.
        RankRequired: 1
        DesignNote: >
          The Rawrotin "mark the territory" skill. Consecrate marks a zone;
          enemies that path through it are slowed and damaged. Combined with
          body-block in a corridor: Adafold in front, Consecrate behind.
          Any enemy that somehow passes Adafold hits the slow zone and gets
          caught. ZONE MARKING = sustained territory control.

      - Id: hallowed_blade
        Name: Hallowed Blade
        ActionType: GCD
        CastTime: 1.0s
        Recast: 2.0s
        Potency: 130
        DamageType: magical
        TargetType: single (melee)
        AdditionalEffect:
          - "Restores HP equal to 50% of damage dealt (self-heal)"
        ForceGenerated: 0
        ResourceGrant: {bulwark_gauge: 0}
        Cooldown: 12s
        Description: "Channels holy energy through the blade. Damages and heals."
        RankRequired: 2
        DesignNote: >
          Self-sustain for solo escort. Not a DPS gain (130p < combo average)
          but keeps Adafold alive without healer attention. The "I operate
          solo in party splits" enabler. Rawrotin caretaker — taking care
          of yourself to keep protecting others.

    # ─────────────────────────────────────────────────────────────────────────
    # RANK 3 ULTIMATE (GCD, Class Ultimate)
    # ─────────────────────────────────────────────────────────────────────────
    Ultimate:
      - Id: aegis_judgment
        Name: Aegis Judgment
        ActionType: GCD
        CastTime: 2.0s  # Full GCD cast, commitment action
        Recast: 2.0s
        Potency: 700
        DamageType: magical
        TargetType: cone (120°, 10y)
        AdditionalEffect:
          - "All enemies hit: Force Tethered to Adafold for 15s (mass tether)"
          - "Grants 'Aegis Afterglow': Bulwark Gauge generation doubled for 20s"
        ForceGenerated: "Mass Force Tether (15s, all targets hit)"
        ResourceCost: {bulwark_gauge: 75}
        Cooldown: 180s
        Description: >
          Channels the accumulated power of the Bulwark into a radiant judgment.
          All enemies hit are Force Tethered for 15s — they MUST path toward
          Adafold regardless of Strategy Rank. The ultimate expression of
          "nothing gets past."
        RankRequired: 3
        BalanceValidation: "700p within ClassUltimate band (600-800p) ✓"
        DesignNote: >
          USE CASE driven: "Room full of enemies, I need to hold ALL of them."
          Not used on cooldown. Used when the situation demands mass control.
          180s CD + 75 gauge cost means 1-2 uses per boss, or saved for the
          dangerous room in a dungeon. Decision: "Is THIS the room?"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 6: oGCD SKILL ROSTER
# ═══════════════════════════════════════════════════════════════════════════════

  oGCD:
    # ─────────────────────────────────────────────────────────────────────────
    # DEFENSIVE oGCDs
    # ─────────────────────────────────────────────────────────────────────────
    Defensive:
      - Id: sheltron
        Name: Sheltron
        ActionType: oGCD
        AnimationLock: 0.6s
        Effect: >
          Grants "Block Stance" for 6s. All incoming physical attacks are
          blocked (100% block rate). Each block generates 8 Bulwark Gauge.
          Reduces incoming damage by 15% during duration.
        Duration: 6s
        DamageReduction: 15%
        BlockGuarantee: true
        Cooldown: 15s
        ResourceCost: none  # Free — this IS the primary defensive tool
        Potency: 0
        Description: "Raises shield into perfect guard position. Guarantees blocks."
        RankRequired: 1
        DesignNote: >
          Primary gauge engine. 15s CD = ~4 uses per minute. Each use
          generating 8 gauge per block (2-3 blocks per use = 16-24 gauge
          per Sheltron). Against corridor packs: massive gauge injection.

      - Id: sheltron_empowered
        Name: Adamant Sheltron
        ActionType: oGCD
        AnimationLock: 0.6s
        Effect: >
          Enhanced Sheltron. 8s duration. 20% damage reduction. Blocked hits
          generate 12 gauge (instead of 8). Grants "Adamant Resolve" buff:
          next attack within 8s has +50 potency.
        Duration: 8s
        DamageReduction: 20%
        BlockGuarantee: true
        BonusGaugePerBlock: 12
        Cooldown: 15s (replaces Sheltron at Rank 2)
        ResourceCost: none
        Potency: 0 (grants +50p to next attack)
        Description: "Perfected shield technique. Longer, stronger, rewards counterattack."
        RankRequired: 2
        Replaces: sheltron
        DesignNote: >
          The +50p counterattack rider adds offensive incentive to defensive
          play. Block → counter → combo seamlessly. Rawrotin: take the hit,
          then bite back harder.

      - Id: rampart_stance
        Name: Rampart Stance
        ActionType: oGCD
        AnimationLock: 0.6s
        Effect: "Reduces all incoming damage by 15% for 20s."
        Duration: 20s
        DamageReduction: 15%
        Cooldown: 90s
        ResourceCost: none
        ResourceGrant: {bulwark_gauge: 12}
        Potency: 0
        Description: "Settles into a fortified stance. Broad mitigation."
        RankRequired: 1
        DesignNote: "Shared tank role ability. Generic but essential."

      - Id: sentinel_guard
        Name: Sentinel Guard
        ActionType: oGCD
        AnimationLock: 0.6s
        Effect: "Reduces all incoming damage by 30% for 15s."
        Duration: 15s
        DamageReduction: 30%
        Cooldown: 120s
        ResourceCost: none
        ResourceGrant: {bulwark_gauge: 12}
        Potency: 0
        Description: "Calls upon the sentinel's oath. Heavy mitigation for major threats."
        RankRequired: 1
        DesignNote: "The 'big button' for planned tankbusters."

      - Id: divine_veil
        Name: Divine Veil
        ActionType: oGCD
        AnimationLock: 0.6s
        Effect: >
          Grants a shield to all party members within 15y equal to 10% of
          Adafold's max HP. Lasts 20s or until broken. Does NOT apply to self.
        Duration: 20s
        ShieldAmount: "10% of Adafold max HP (per party member)"
        Cooldown: 90s
        ResourceCost: none
        ResourceGrant: {bulwark_gauge: 12}
        Potency: 0
        TargetType: "party (AoE, excludes self)"
        Description: "Projects a barrier onto allies. Party-wide shield."
        RankRequired: 2
        DesignNote: >
          Party utility. Bodyguard protecting the whole pack. Does not
          protect self — you have your own tools. The party FEELS protected
          by having an Adafold/Rawrotin guarding them.

      - Id: hallowed_bulwark
        Name: Hallowed Bulwark
        ActionType: oGCD
        AnimationLock: 0.6s
        Effect: >
          Invulnerability for 8s. All incoming damage reduced to 0.
          During Hallowed Bulwark, Bulwark Gauge generates at 5x rate from
          all sources. After expiry, grants "Bulwark Overflow" for 10s:
          gauge generation +100% (2x normal).
        Duration: 8s
        Invulnerable: true
        Cooldown: 300s
        ResourceCost: none
        ResourceGrant: "5x generation during, 2x generation for 10s after"
        Potency: 0
        Description: >
          The ultimate defense. Becomes completely invulnerable. The shield
          absorbs EVERYTHING — and converts it ALL into Bulwark Gauge.
        RankRequired: 3
        DesignNote: >
          USE CASE: "I'm about to eat something that would kill me, AND I
          want to convert that into a massive gauge fill for the aftermath."
          A Rank 4 boss unleasching a 6-hit combo during Hallowed Bulwark
          fills gauge from 0 to 100+ easily. The counterattack IS the payoff.

    # ─────────────────────────────────────────────────────────────────────────
    # OFFENSIVE oGCDs
    # ─────────────────────────────────────────────────────────────────────────
    Offensive:
      - Id: shield_swipe_ogcd
        Name: Shield Swipe
        ActionType: oGCD
        AnimationLock: 0.6s
        Potency: 120
        DamageType: physical
        TargetType: single (melee)
        Cooldown: 25s
        ResourceCost: none
        Condition: "Usable only after a successful block within last 5s"
        Description: "Retaliatory shield strike after blocking. The counter-hit."
        RankRequired: 1
        DesignNote: >
          Proc-based oGCD. Block → counter. Simple, satisfying, and rewards
          the defensive playstyle. The Rawrotin bite-back after absorbing.

      - Id: spirits_within
        Name: Spirits Within
        ActionType: oGCD
        AnimationLock: 0.6s
        Potency: 150  # Scales inversely with HP: 100p at 50% HP, 200p at 100% HP
        PotencyScaling: "100 + (current_hp% × 100). Full HP = 200p. Half HP = 150p."
        DamageType: magical
        TargetType: single (melee)
        Cooldown: 30s
        ResourceCost: none
        Description: "Holy energy strike. Stronger the healthier you are."
        RankRequired: 1
        DesignNote: >
          Rewards staying at high HP — which is what Adafold DOES. The tank
          who outlasts everything benefits from being at full HP more often.
          Anti-synergy with greedy play (low HP = less damage from this).

      - Id: shield_rush
        Name: Shield Rush
        ActionType: oGCD
        AnimationLock: 0.8s  # Slightly longer — you're dashing
        Potency: 100
        DamageType: physical
        TargetType: single (gap closer, 20y dash)
        Cooldown: 30s
        ResourceCost: none
        AdditionalEffect:
          - "Dash to target, arriving with shield raised (body-block active)"
          - "Applies Force Tether for 5s on arrival (short, repositioning tether)"
          - "If target was moving away: interrupts their movement"
        Description: >
          Dashes to target with shield forward. Arrives body-blocking.
          The Rawrotin speed burst — not to flee, but to INTERCEPT.
        RankRequired: 2
        DesignNote: >
          Gap closer + immediate Force Tether. Enemy broke past the line?
          Shield Rush catches them, re-establishes body-block, tethers for
          5s while you reposition fully. The Rawrotin speed used defensively.

      - Id: intervene
        Name: Intervene
        ActionType: oGCD
        AnimationLock: 0.8s
        Potency: 0  # No damage — pure utility
        DamageType: null
        TargetType: "single (ally-targeted, 20y dash)"
        Cooldown: 20s
        Charges: 2
        ResourceCost: none
        AdditionalEffect:
          - "Dash to targeted ALLY, arriving between them and nearest enemy"
          - "Grants targeted ally a 10% HP shield for 10s"
          - "Body-block position established on arrival"
        Description: >
          Dashes to an ally, interposing between them and danger. The
          bodyguard skill. Rawrotin protecting their charge.
        RankRequired: 2
        DesignNote: >
          The signature bodyguard move. Ally is getting attacked → Intervene
          → arrive body-blocking → ally has a shield → you're now the wall.
          Two charges allows protecting two different allies in sequence during
          party split scenarios.

    # ─────────────────────────────────────────────────────────────────────────
    # PASSIVE TRAITS
    # ─────────────────────────────────────────────────────────────────────────
    Passives:
      - Id: iron_body
        Name: Iron Body
        Effect: >
          Adafold has COLLISION with enemies while shield is equipped.
          Enemies cannot path through Adafold's hitbox. This is the baseline
          Force Targeting mechanic — always active, no cost, no cooldown.
          In corridors narrower than Adafold's hitbox + shield width,
          passage is physically impossible.
        RankRequired: 1
        DesignNote: >
          THE defining passive. Other tanks do NOT have enemy collision.
          This single passive justifies Adafold's entire corridor identity.
          Implementation: enlarged hitbox collision while shield equipped,
          enemies treat as static obstacle for pathfinding.

      - Id: mark_of_the_guardian
        Name: Mark of the Guardian
        Effect: >
          Enemies that Adafold has hit with 3+ consecutive GCDs receive
          "Guardian's Mark" (visual indicator, no stack limit). Marked enemies
          deal 5% less damage to ALL targets EXCEPT Adafold. Resets if Adafold
          doesn't hit the enemy for 6s.
        Duration: "Persistent while maintained (refreshes per hit, drops after 6s)"
        RankRequired: 2
        DesignNote: >
          The Rawrotin mark-and-grind as a passive. Sustained combo pressure
          on a single target → marked → that enemy is weaker against your
          party but full strength against you. The bodyguard redirecting
          danger TOWARD themselves and AWAY from charges. Drops quickly if
          you swap targets — committed single-target grinding is rewarded.

      - Id: bulwark_mastery
        Name: Bulwark Mastery
        Effect: >
          Bulwark Gauge generation from blocks increased by 2 (8 → 10 base,
          12 → 14 during Adamant Sheltron). Additionally, Bastion Wall's
          shield HP increased by 5% of max HP.
        RankRequired: 3
        DesignNote: "Rank 3 passive scaling. More gauge from blocking, better shields."

      - Id: sentinel_instinct
        Name: Sentinel Instinct
        Effect: >
          When an enemy's Strategy Rank would cause it to target an ally
          within 15y of Adafold, Adafold receives a 1.5s visual warning
          indicator on that enemy (glowing outline). This gives Adafold
          time to Shield Lob (tether) or Shield Rush (intercept) before
          the enemy reaches the ally.
        RankRequired: 1
        DesignNote: >
          Information advantage. Adafold SEES when enemies are about to bypass.
          The warning window enables reactive Force Targeting. Without this,
          you'd need to predict. With it, you react. Reduces execution barrier
          while keeping the skill expression spatial.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 7: RANK PROGRESSION
# ═══════════════════════════════════════════════════════════════════════════════

RankProgression:
  Description: >
    Rank gates capability. Higher ranks unlock stronger tools but don't
    change the core gameplay loop. Rank 1 Adafold can body-block and combo.
    Rank 3 Adafold can body-block, combo, mass-tether, shield rush, and
    has passive gauge efficiency that makes the loop tighter.

  Rank1:
    Label: "Shield Initiate"
    Unlocks:
      - "Core Combo (Stalwart Slash → Iron Cut → Grinding Blow)"
      - "AoE Combo (Wide Guard → Shield Slam)"
      - "Shield Lob (Force Tether)"
      - "Shield Bash (Pin)"
      - "Consecrate (Zone Denial)"
      - "Sheltron"
      - "Rampart Stance / Sentinel Guard"
      - "Shield Swipe (oGCD counter)"
      - "Spirits Within"
      - "Bastion Wall (gauge spender - defense)"
      - "Shield Cannon (gauge spender - offense)"
      - "Iron Body (passive collision)"
      - "Sentinel Instinct (passive warning)"
    DPSProfile: "78-80% of DPS reference"
    SurvivalProfile: "High. Can hold corridors against Rank 1-2 enemies solo."
    GaugeAccess: "Bastion Wall (30) and Shield Cannon (40) only"

  Rank2:
    Label: "Shield Guardian"
    Unlocks:
      - "Adamant Sheltron (replaces Sheltron)"
      - "Hallowed Blade (self-heal GCD)"
      - "Shooting Star (knockback reroute)"
      - "Shield Rush (gap closer + tether)"
      - "Intervene (ally-dash bodyguard)"
      - "Divine Veil (party shield)"
      - "Fortress Barrage (gauge spender - hybrid)"
      - "Mark of the Guardian (passive mark debuff)"
    DPSProfile: "82-84% of DPS reference"
    SurvivalProfile: "Very High. Self-sustaining solo. Can escort NPCs through Rank 3 enemy zones."
    GaugeAccess: "All Rank 1 + Fortress Barrage (60)"

  Rank3:
    Label: "Shield Aegis"
    Unlocks:
      - "Aegis Judgment (ultimate - mass tether)"
      - "Hallowed Bulwark (invulnerability)"
      - "Bulwark Mastery (passive gauge efficiency)"
    DPSProfile: "83-85% of DPS reference"
    SurvivalProfile: "Extreme. Invuln available. Can solo-hold rooms against Rank 4 enemies."
    GaugeAccess: "All spenders including Aegis Judgment (75)"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 8: ROTATION DESIGN (USE-CASE DRIVEN)
# ═══════════════════════════════════════════════════════════════════════════════

RotationDesign:
  Philosophy: >
    There is NO fixed rotation. Adafold's GCD sequence is determined by
    SITUATION, not by timer alignment. The "rotation" is a decision tree:
    "Am I body-blocking successfully? → Combo for DPS. Did something get
    past? → Shield Lob/Rush to recover. Pack incoming? → AoE combo + 
    Consecrate placement. Need sustain? → Hallowed Blade."
    The skill expression is READING THE MAP and CHOOSING CORRECTLY.

  ScenarioFlows:
    CorridorHold:
      Description: "5-pack in a corridor. Adafold blocks the mouth."
      Flow:
        - "Position: Stand in corridor mouth (Iron Body blocks passage)"
        - "Opener: Consecrate behind self (second denial layer)"
        - "GCDs: AoE combo (Wide Guard → Shield Slam) for multi-target gauge"
        - "oGCDs: Sheltron on CD (guarantee blocks from all 5 = massive gauge)"
        - "Spend: Shield Cannon at 40 gauge (mark all enemies in line)"
        - "Maintain: AoE combo refreshes Shield Slam gauge-per-target"
        - "Emergency: Shield Bash if one enemy clips past edge"
      GaugePerMinute: "~210-270 (multi-target generation)"
      DPSOutput: "~72% of reference (AoE DPS, lower per-target)"
      SurvivalLoad: "Low — enemies can't flank, all damage is frontal"

    BossEncounter:
      Description: "Single boss, party behind. Corridor or open."
      Flow:
        - "Position: Between boss and party (body-block if corridor)"
        - "GCDs: ST combo (Stalwart → Iron Cut → Grinding Blow) for DPS"
        - "oGCDs: Sheltron before busters, Shield Swipe after blocks"
        - "Spend: Shield Cannon at 40 (mark boss → +10% on follow-up)"
        - "Sustain: Bastion Wall before major tankbusters"
        - "Hallowed Blade when HP drops below 60% (self-sustain solo)"
        - "Shield Lob: ONLY if boss attempts to target party member"
      GaugePerMinute: "~75-90 (single target generation)"
      DPSOutput: "~83-85% of reference (ST optimal)"
      SurvivalLoad: "Medium-High — all damage focused on you"

    PartySplit_Solo:
      Description: "Procgen split. Adafold alone in a wing."
      Flow:
        - "Clear trash: AoE combo in corridors, corridor-hold when overwhelmed"
        - "Self-sustain: Hallowed Blade between pulls, Bastion Wall during"
        - "Speed: Shield Rush to gap-close between packs"
        - "Objective: Reach the end of wing, clear path, survive without healer"
        - "Resource management: Don't overcap gauge, spend on Shield Cannon for speed"
      GaugePerMinute: "Variable (depends on pack density)"
      DPSOutput: "~75-80% of reference (survival GCDs reduce average)"
      SurvivalLoad: "High — no healer, must self-sustain entirely"

    EscortProtection:
      Description: "NPC or squishy ally escort through hostile territory."
      Flow:
        - "Position: Always between charge and threat direction"
        - "Intervene: Dash to charge if enemy bypasses"
        - "Shield Lob: Tether any enemy that targets charge"
        - "Consecrate: Place on side corridors to deny flank routes"
        - "Sentinel Instinct: Watch for warning indicators → react"
        - "Divine Veil: Pre-shield charge before dangerous rooms"
      GaugePerMinute: "~90-120 (enemies attacking YOU to get to charge)"
      DPSOutput: "~70-75% of reference (utility GCDs reduce DPS)"
      SurvivalLoad: "Medium — split attention between self and charge"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 9: DPS VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

DPSValidation:
  Methodology: >
    All DPS validation is against a SINGLE TARGET, FULL UPTIME scenario
    (standing training dummy equivalent). Real gameplay will have lower
    numbers due to utility GCD usage. This is the ceiling.

  STComboMath:
    ComboPotency: "100 + 130 + 180 = 410p per 3 GCDs"
    ComboTime: "6.0s (3 × 2.0s GCD)"
    ComboPPS: "68.3 potency per second (combo only)"
    oGCDContribution:
      ShieldSwipe: "120p / 25s = 4.8 PPS"
      SpiritsWithin: "200p / 30s = 6.7 PPS (at full HP)"
    GaugeSpender:
      ShieldCannonRate: "40 gauge every ~30-35s (ST generation pace)"
      ShieldCannonPPS: "350p / 32s = 10.9 PPS"
      MarkBonus: "+10% on 3-4 GCDs = +40-72p / 32s = 1.3-2.3 PPS"
    TotalST_PPS: "~92-94 PPS"
    # DPS reference = ~110 PPS (from BalanceTargets)
    # Adafold ST: 92-94 / 110 = 83.6-85.4% ✓ PASSES (target: 82-85%)

  AoEPackMath:
    Targets: 5
    AoEComboPotency: "80 + 120 = 200p per 2 GCDs per target"
    AoEComboTime: "4.0s (2 × 2.0s GCD)"
    AoETotalPerCycle: "200 × 5 = 1000p / 4.0s = 250 PPS (total across targets)"
    PerTargetPPS: "50 PPS per target (lower than ST — correct)"
    GaugeSpend_AoE:
      FortressBarrage: "600p total / ~20s cycle = 30 PPS added"
    DesignNote: "AoE DPS is lower per-target but gauge generation is 3-4x faster."

  ValidationChecklist:
    - "ST DPS: 83-85% of reference ✓"
    - "AoE DPS (per target): Lower than ST ✓ (50 vs 92 PPS)"
    - "AoE total DPS: Higher than ST ✓ (280 vs 94 PPS)"
    - "Time to first spend (corridor): 8-12s ✓"
    - "Time to first spend (boss): 24-30s ✓ (slightly slow, acceptable)"
    - "Gauge overcap risk: Low (two cheap spenders at 30/40) ✓"
    - "Self-sustain: Hallowed Blade + Bastion Wall enables solo play ✓"
    - "Force Targeting uptime: Body-block passive + 12s Shield Lob CD ✓"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 10: SURVIVAL VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

SurvivalValidation:
  MitigationBudget:
    Sheltron: "15% DR, 6-8s duration, 15s CD → 40-53% uptime"
    RampartStance: "15% DR, 20s duration, 90s CD → 22% uptime"
    SentinelGuard: "30% DR, 15s duration, 120s CD → 12.5% uptime"
    BastionWall: "20% max HP shield, gauge-gated (every ~30-35s in ST)"
    HallowedBulwark: "8s invuln, 300s CD → emergency use"
    AverageEffectiveDR: "~18-22% sustained across a full fight"

  SoloSurvivalLoop:
    Description: >
      Adafold solo in a party split. No healer. Must survive indefinitely.
    IncomingDamage: "~3-5% max HP per enemy auto (with mitigation active)"
    SelfHealing:
      HallowedBlade: "~3-4% max HP per use, 12s CD"
      BastionWall: "Absorbs ~20% max HP every ~30-35s (gauge pacing)"
    SurvivalDuration: >
      Against 2-3 enemies: Indefinite (self-healing + shields > income)
      Against 5+ enemies: 60-90s without external healing (corridor-hold)
      Against boss + adds: 45-60s solo (requires cooldown management)
    DesignNote: >
      Adafold survives LONGER solo than Madolt (who kills FASTER solo).
      Different solutions: Adafold outlasts, Madolt out-damages. Both
      viable in party splits, expressed differently.

  EffectiveHP:
    BaseHP: 100%
    WithBastionWall: 120% (20% shield)
    WithSheltron+Rampart: "100% base, 30% DR = effective 143% HP"
    WithHallowedBulwark: "Infinite for 8s"
    ComparedToMadolt: >
      Madolt has ~15% DR from Electron Guard + higher DPS ceiling.
      Adafold has ~18-22% average DR + self-healing + larger shield pool.
      Net: Adafold survives ~20-30% longer in sustained damage scenarios.
      Madolt survives better in short fights (kills before dying).

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 11: PROCGEN MAP INTERACTION
# ═══════════════════════════════════════════════════════════════════════════════

ProcgenInteraction:
  CorridorTanking:
    Description: >
      In procedurally generated maps, corridors are Adafold's domain.
      A standard corridor width of 3m with Adafold's enlarged collision
      hitbox (1.5m shield width) leaves <1m gap on each side — too narrow
      for standard humanoid enemies to path through.
    Effectiveness: "Near-perfect path denial in standard corridors"
    CounterScenario: "Wide corridors (4m+), flying enemies, teleporting enemies"
    CounterResponse: "Shield Lob tether + Consecrate on gaps"

  OpenAreaTanking:
    Description: >
      In open rooms, Adafold cannot body-block all paths. Must rely on
      Force Tether (Shield Lob) and Zone Denial (Consecrate) for control.
      Less efficient than corridor holding. This is Madolt's territory.
    Effectiveness: "Moderate — can control 1-2 enemies with tethers/pins"
    LimitationsVsMadolt: >
      Madolt can suppress 5 enemies' AI simultaneously in open space.
      Adafold can physically control 1-2 (tether + pin). In open arenas
      with 5+ enemies pathfinding around, Madolt is the stronger pick.
    WhenToPickAdafold: "Map has chokepoints, escort objectives, corridor-heavy layout"
    WhenToPickMadolt: "Map has open arenas, multiple simultaneous threats, no walls"

  PartySplitRole:
    Description: >
      When the party splits at a branch, Adafold takes the DEFENSIVE path:
      the route that requires holding a position, escorting an NPC, or
      clearing through enemies that must be tanked (not nuked).
    SoloCapability: "Full. Self-sustaining. Can complete objectives without healer."
    PartyContribution: "Clears the 'hard' path so DPS/healers can take the 'fast' path."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 12: DESIGN NOTES & ANTI-PATTERNS
# ═══════════════════════════════════════════════════════════════════════════════

DesignNotes:
  WhatAdafoldIsNOT:
    - "NOT a burst DPS tank (no burst windows, no cadence alignment)"
    - "NOT interchangeable with Madolt (different scenarios, different strengths)"
    - "NOT a healer replacement (self-sustain is for SOLO, not lazy healing)"
    - "NOT a DPS check answer (Madolt has higher ceiling for DPS races)"
    - "NOT a ranged tank (Force Targeting is physical/melee — you must BE there)"
    - "NOT reliant on party buffs (no timing alignment, no coordination windows)"

  WhatAdafoldIS:
    - "A spatial controller who happens to deal damage"
    - "A bodyguard who physically interposes between threat and charge"
    - "A corridor king who makes chokepoints into absolute walls"
    - "A self-sustaining solo operator for party splits"
    - "A Rawrotin wolf holding the line for the pack"
    - "A mark-and-grind fighter who gets stronger the longer engagement lasts"

  AntiPatterns:
    - Pattern: "Always using Shield Cannon over Bastion Wall"
      Problem: "Pure offense means you die in hard content. Gauge is a CHOICE."
      Fix: "Bastion Wall before tankbusters, Shield Cannon during safe windows."
    - Pattern: "Standing in the open trying to body-block"
      Problem: "Iron Body only blocks in corridors. Open space requires tethers."
      Fix: "Use Shield Lob/Consecrate in open areas. Reposition to chokepoints."
    - Pattern: "Never using Hallowed Blade (always combo for DPS)"
      Problem: "In solo scenarios, you will die without self-healing."
      Fix: "Hallowed Blade is a DPS loss but a survival gain. Triage correctly."
    - Pattern: "Holding Aegis Judgment for 'the perfect moment'"
      Problem: "Gauge spent on AJ is gauge NOT spent on Shield Cannon/Bastion."
      Fix: "Use AJ when you NEED mass control, not when it would be 'optimal.'"
    - Pattern: "Ignoring Sentinel Instinct warnings"
      Problem: "Enemy bypasses you. Ally dies. Your fault."
      Fix: "React to glow warnings with Shield Lob/Rush within 1.5s window."

  RawrotinFantasyValidation:
    - "Mark enemies through sustained contact ✓ (Guardian's Mark passive)"
    - "Benefit from repeated strikes ✓ (Grinding Blow extends mark, Shield Cannon mark)"
    - "Break through tougher foes ✓ (sustained DPS over time, not burst)"
    - "Bodyguard identity ✓ (Intervene, Force Tether, body-block)"
    - "Fast ✓ (Shield Rush, Rawrotin speed for INTERCEPTION not escape)"
    - "Bound to Landwin society ✓ (protector role, community anchor)"

