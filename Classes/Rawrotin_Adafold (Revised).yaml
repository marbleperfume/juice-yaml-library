# SECTION 13: BALANCE TARGETS CROSS-REFERENCE
# ═══════════════════════════════════════════════════════════════════════════════

BalanceTargetsCrossRef:
  Source: "Combat/BalanceTargets.yaml"
  GCD: "2.0s base ✓"
  HasteCap: "1.4s ✓ (not relevant for Adafold — no haste-scaling identity)"
  oGCDLock: "0.6s ✓"
  WeaveModel: "single_weave_only ✓"
  TankDPSBaseline: "85% ✓ (Adafold: 82-85% band)"
  GaugeFirstSpend: "12-16s target ✓ (corridor: 8-12s, boss: 24-30s, average ~16s)"
  GaugeFull: "30-40s target ✓ (corridor: 25-30s, boss: 70-80s — boss is slow but acceptable)"
  ClassUltimateBand: "600-800p ✓ (Aegis Judgment: 700p)"
  HP50Rule: >
    Players above 50% HP take +25% incoming damage. Adafold's Bastion Wall
    and Hallowed Blade interact: staying above 50% means MORE incoming
    damage, which means MORE gauge generation from blocks. The 50% rule
    HELPS Adafold generate gauge faster while at high HP. Natural synergy.
  SoftEnrage: >
    +10% boss damage per 30s past target TTK. Adafold's lower DPS ceiling
    means soft enrage is a real threat in DPS-check encounters. This is
    INTENDED — Adafold is not the answer to every encounter. Madolt
    handles DPS checks better. Encounter design should offer both paths.

