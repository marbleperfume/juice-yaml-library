Definition:
  Class: Warrior
  Intent: Uses electron shields and various heavy technology to fight on the frontlines.
  MainAttribute: STRENGTH
  Race: Madolt
  Role: Tank
  Tier: Base Available   # easy rank-1 on-ramp (see Classes/Class_Prerequisites.yaml)
ClassMechanic: ChargeGauge   # see Combat/ChargeGauge.yaml and Classes/ClassMechanics.yaml
FocusProfile:
  Level: Low-Moderate
  Note: >
    Generates deliberate aggro but applies Unfocus on its basic combo, so it
    manages the Focus it makes. Damage/cast profile is moderate -- the
    beginner-safe end of the power/volatility axis. (Contrast: a Shaman's
    high-damage long casts generate far more Focus and are volatile.)
VolatilityCounter:
  Tools: [InnateAggro, Unfocus, ElectronPivot]
  Note: >
    The tank's native Focus management is exactly what makes it the only
    "easy" Rank 3 Mercenary -- it can distract the golem off its own casts
    where a DPS/healer cannot. See Ranks/Mercenary_Unlocks.yaml and
    NPCs/Bosses/NPC.Boss.Test.MechaGolem.yaml Doctrine Level3. Electron
    Pivot (Skill.Combat.Madolt.ElectronPivot.yaml, Merc Rank 2) adds a
    deliberate, controlled taunt on top of the passive Unfocus/Focus
    system -- for the moments a mistake needs a guaranteed pivot, not just
    a gradual threshold raise.
RequiredArmorType: Magnetic   # see Attire/MagneticArmor.System.yaml
