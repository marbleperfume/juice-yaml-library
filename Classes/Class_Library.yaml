# Classes are sideways VARIETY, not a vertical power ladder. Tiers reflect how
# hard a class's rank-1 is to pick up (and thus what Mercenary rank gates
# access), NOT how strong it is -- see Classes/Class_Prerequisites.yaml.
# A stronger class simply trades breadth for a narrow, more volatile specialty
# (paid in Focus), so it runs into difficulties a Base Available class avoids.
Base Available:      # easy rank-1 on-ramp, no Merc gate
  - Adafold (Shield Knight)
  - Warrior
  - Rogue
  - Archer
  - Elementalist
  - Body Specialist
Experienced:         # harder rank-1, gated behind Mercenary Rank 2 + originating area
  - Lancer
  - Dancer
  - Nightmare
  - Machinist
  - Summoner
  - Samurai
  - Ninja
  - Magiknight / Fencer
  - Monster Eater / Specialist
Special:             # hardest rank-1 ("almost a different game"), gated behind Mercenary Rank 3 + originating area
  - Dracomancer
  - Tribalist
  - Magical Girl
  - Calvary
  - Beast Master
