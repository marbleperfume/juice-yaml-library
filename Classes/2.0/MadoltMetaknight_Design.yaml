# Classes/Frontliner/MadoltMetaknight_Design.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# MADOLT METAKNIGHT (Madolt) — Electrical Discharge / AI Suppression Frontliner
# ═══════════════════════════════════════════════════════════════════════════════
#
# Lineage: Armored Core energy shields, MH Charge Blade, Sekiro deflect,
#   LoL Skarner pull, Titanfall electric smoke, For Honor parry
#
# Core identity: "The vortex that swallows enemies and lobotomizes them."
#   Adabold:       "I physically block the path." (corridor king / DEFENSE)
#   Metaknight:    "I keep enemies stupid." (arena king / suppression)
#   Siegebreaker:  "I walk THROUGH enemies." (siege king / offense)
#
# References:
#   - Combat/BalanceTargets.yaml (potency bands, GCD, role baselines)
#   - DESIGN_OVERRIDE.md (§3b, §3c, §3d, §5, §6, §9, §12, §25)
# Authority: DESIGN_OVERRIDE.md > BalanceTargets.yaml > this file > LLM.md
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Frontliner.MadoltMetaknight.Design

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1: CLASS IDENTITY
# ═══════════════════════════════════════════════════════════════════════════════

Identity:
  Name: Madolt Metaknight
  PreviousName: Madolt Warrior
  Role: Frontliner
  SubRole: Offensive Frontliner (AI Suppression / Electrical Discharge)
  DamageType: electrical
  Weapon: engineered_blade_plus_electron_guard
  ExecutionArchetype: Field Management + Reaction-Based
  ExecutionTier: Experienced
  # 10-12 abilities, field upkeep, parry timing, gauge economy.

  Description: >
    Madolt engineer-knight who harnesses electrical discharge through crafted
    equipment. Creates an electromagnetic vortex that PULLS enemies inward
    while SUPPRESSING their AI. "Frontliner" NOT "Tank" — damage-first,
    survives by killing enemies inside the field and parrying everything else.

  CoreFantasy: >
    Your Electron Guard hums with stored charge. Enemies drift toward you
    against their will, their tactics dissolving as they enter your field.
    Inside your vortex, they forget how to flank, forget how to coordinate.
    You don't block the path — you make enemies too stupid to FIND the path.

  InputModality:
    PrimaryFocus: parry_timing_reaction
    SecondaryFocus: charge_gauge_economy
    TertiaryFocus: field_radius_positioning
    DecisionType: reactive_timing_plus_field_management

  StatPriority:
    Primary: NTU    # 16 — highest reaction speed, parry window generous
    Secondary: DEX  # 14 — precision, discharge accuracy
    Tertiary: CRAFT # 12 — equipment construction/maintenance
    DumpStat: MAG   # No magical abilities — this is ENGINEERING

  DesignStatement: >
    The SUPPRESSION frontliner. "How do I make every enemy near me forget
    their plan?" Success = enemies cluster around Metaknight attacking
    mindlessly. Failure = field drops, enemies regain intelligence, backline
    gets flanked.

  SkillExpressionAxis: >
    Rewards TIMING and FIELD AWARENESS:
    - When to parry? (reaction to attack tells)
    - When to discharge vs hold for suppression threshold?
    - Where to position the vortex for maximum capture?
    - When to cycle stance for gauge conservation?

  FailureStates:
    MissedParry: {Cost: "0.6s lockout, eat full damage, no gauge reward.", Severity: HIGH}
    GaugeStarved: {Cost: "No discharge, no field pulse. Basic attacks only.", Severity: HIGH}
    FieldMisposition: {Cost: "Enemies outside 8y. Unfocus inactive. They path to casters.", Severity: HIGH}
    OverDischarge: {Cost: "Gauge emptied. Suppression weakened. Vulnerable.", Severity: MODERATE}

  SingleLimitation: >
    FIELD RADIUS. Everything operates within 8y. Enemies OUTSIDE 8y are
    unaffected — full intelligence, free to path. Ranged enemies at 10y+
    ignore the vortex entirely.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: RACIAL LOCK — MADOLT
# ═══════════════════════════════════════════════════════════════════════════════

RacialLock:
  Race: Madolt
  ParentCategory: Landwin
  Enforcement: cultural_lock
  Tradition: engineering_tradition

  LockJustification: >
    Madolt electrical engineering discipline — the Electron Guard is a
    MANUFACTURED device requiring Madolt fabrication knowledge. Culturally
    exclusive: schematics are guild secrets, passed apprentice-to-journeyman.
    NTU 16 makes them BETTER at Voltaic Parry, but the core lock is
    construction/maintenance knowledge.

  TeachableInTheory: >
    Non-Madolt COULD use a stolen Electron Guard but couldn't REPAIR, TUNE,
    or BUILD a replacement. Class degrades without engineering knowledge.

  RacialSynergy:
    - "NTU 16 = fastest reaction speed → Voltaic Parry window is GENEROUS"
    - "DEX 14 = precision → EC Weapon Discharge accuracy, blade finesse"
    - "CRAFT 12 = they BUILT the Electron Guard. Their engineering."
    - "Tech culture = class IS craftsmanship made combat-ready"
    - "Engineering mindset = field management is INTUITIVE (managing systems)"
    - "Guild tradition = schematics don't leak to other races"

  RacialStats:
    NTU: 16
    DEX: 14
    CRAFT: 12

  SizeModel:
    CharacterSize: Medium
    ElectronGuard: >
      Shield/generator hybrid on off-arm. Circular electromagnetic emitter
      with capacitor banks, discharge vents, charge indicators. Doubles as
      parry surface AND field projector.
    WeaponIdentity: >
      Engineered Blade = damage. Electron Guard = class identity. ALL
      identity abilities channel through the Guard. Gear progression =
      Guard quality (capacitor efficiency, field stability, charge rate).

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3: ROLE OBJECTIVE FUNCTION
# ═══════════════════════════════════════════════════════════════════════════════

RoleObjective:
  Type: maximize_kill_speed_while_suppressing_enemy_AI
  PrimaryMetric: potency_per_second
  SecondaryMetric: unfocus_uptime_on_SR2_plus_enemies
  TertiaryMetric: enemy_capture_rate_within_field

  DPSTarget:
    Baseline: "80-87% of DPS reference"
    # Per BalanceTargets: Frontliner 80-87%.
    ParryPerfect: "87% (every parry → free Voltaic Counter GCDs)"
    ParryAverage: "82-83% (missed parries, lockouts, less Counter output)"

  SurvivalModel:
    Philosophy: >
      Voltaic Parry (100% negation on success) + field sustain (enemies too
      stupid to focus burst). Self-sustaining at SR1-2 without healer.
    TankbusterResponse: "Voltaic Parry. Success = negated + HP back. Failure = full damage + lockout."
    InvulnBudget: "0. Parry is frame-window mitigation, not invulnerability."
    SelfSustain: "~2.5% HP/s via parry (5% restore, avg 1 parry/4s active combat)"

  HealerCannotReplace: >
    Healer cannot suppress enemy AI. Without Unfocus, SR2+ enemies path to
    casters. Value is PREVENTION OF FLANKING, not HP management.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4: CLASS MECHANIC — ELECTRON GUARD / CAPACITOR SYSTEM
# ═══════════════════════════════════════════════════════════════════════════════

CapacitorSystem:
  Name: "Electron Guard / Charge Gauge"
  Type: active_gauge_resource_system

  CorePrinciple: >
    Electron Guard stores electrical energy as Charge. ALL identity abilities
    cost Charge — no long CDs. Charge builds through combat engagement.
    The system rewards ACTIVE fighting: passive play = no Charge = no identity.

  ChargeGauge:
    Type: gauge (0-100)
    Generation:
      - "Melee GCD landed: +7/hit"
      - "Hit received (any): +5/hit"
      - "Successful Voltaic Parry: +15"
      - "Enemy enters field (first time per engagement): +3"
      - "Passive (in combat): +2/s"
    Decay: "Out of combat 8s: reset. No in-combat decay."
    OvercapWarning: "Coils glow blue-white at 80+. Stops at 100, generation wasted."
    FirstSpend: "~12-14s (EC Weapon Discharge costs 25)"
    FullGauge: "~32-38s realistic"

  # ─────────────────────────────────────────────────────────────────────────
  # ELECTRON GUARD STANCE (CAPACITOR PULL)
  # ─────────────────────────────────────────────────────────────────────────

  ElectronGuardStance:
    Type: stance_toggle
    GaugeCost: "4/s sustained"
    Effect:
      - "Electromagnetic field within 8y radius"
      - "Enemies within radius pulled toward Metaknight at 1.5y/s"
      - "Affected enemies cannot sprint while inside field"
      - "Boss enemies: 0.5y/s (drift, not lock)"
    SRScaling:
      SR1: "Pull redundant (enemies attack closest anyway). Accelerates contact."
      SR2: "Core use case — enemies trying to path around are dragged back."
      SR3: "Enemies CAN dash/teleport to escape (costs them a CD)."
      SR4: "Enemies recognize field, RETREAT before entering. Must close distance."
    TradeOff: >
      4/s is expensive. 25s max from full gauge. Must toggle: activate when
      enemies are in range, deactivate to rebuild. Decision: field uptime vs
      gauge for discharges.

  # ─────────────────────────────────────────────────────────────────────────
  # DISCHARGE ABILITIES
  # ─────────────────────────────────────────────────────────────────────────

  Abilities:
    ECWeaponDischarge:
      Type: GCD (melee, single target)
      GaugeCost: 25
      Potency: 280
      Effect: "Channel stored charge through blade. Electrical burst."
      CritCondition: "Crits on >50% HP targets (§9)"

    ECShieldDischarge:
      Type: GCD (PBAoE, 6y radius)
      GaugeCost: 35
      Potency: 180 (per target)
      Effect: "Pulse electrical energy from Guard. Damages all in 6y."
      CritCondition: "Crits if 3+ enemies hit simultaneously"
      DesignNote: "The PAYOFF for Capacitor Pull — cluster them, then pulse."

    VoltaicCounter:
      Type: GCD (melee, CONDITIONAL — requires successful parry)
      GaugeCost: 0  # FREE
      Potency: 220
      Window: "3.0s after successful Voltaic Parry"
      Effect: "Lightning-charged riposte. Free GCD."
      CritCondition: "Always crits (parry success = conditional crit, §12)"

    FieldOverload:
      Type: GCD (PBAoE, 8y radius)
      GaugeCost: 50
      Potency: 350 (per target)
      Effect: "Massive field pulse. All in 8y take damage + 2s slow (40%)."
      CritCondition: "Crits if Electron Guard Stance active 5+ continuous seconds"
      DesignNote: "Big spend. 50 gauge = half bar. Use at peak vortex capture."

    BasicCombo:
      Type: "GCD chain (3 hits: 100p → 120p → 150p)"
      GaugeCost: 0
      GaugeGenerated: "+7/hit (21 total chain)"
      CritCondition: "Third hit crits on enemies below 50% HP (execute pressure)"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5: CLASS MECHANIC — UNFOCUS / AI SUPPRESSION
# ═══════════════════════════════════════════════════════════════════════════════

UnfocusSystem:
  Name: "Unfocus / AI Suppression"
  Type: area_suppression_field

  CorePrinciple: >
    Reduces enemy Strategy Rank by up to 2 tiers while near Metaknight.
    NOT a debuff ON the enemy — AREA SUPPRESSION. Leave the area, regain
    intelligence immediately. "Stupid zone."

  Mechanic:
    Radius: "8y (same as Capacitor Pull — overlapping fields)"
    Suppression: "Up to -2 Strategy Rank"
    Application: >
      Passive aura while Electron Guard Stance active. SR3 → SR1. SR4 → SR2.
    Duration: "Instant removal on leaving radius. No linger."
    Scaling:
      BaseAura: "-1 SR (always while stance on)"
      EnhancedAura: "-2 SR (while Charge Gauge above 50)"
    GaugeTension: >
      Spending gauge below 50 = suppression weakens to -1. Creates core
      decision: discharge for damage vs hold for suppression.

  WhyItMatters:
    SR1: "IRRELEVANT. Enemies already dumb. Metaknight is pure DPS here."
    SR2: "Team utility — without it, enemies path to casters."
    SR3: "LOAD-BEARING. Without it, enemies flank, coordinate, retreat."
    SR4: "Even suppressed to SR2, still dangerous. Full toolkit needed."

  VsAdabold: >
    Adabold: "I physically block you" (geometry). REACTIVE.
    Metaknight: "I make you too stupid to TRY" (suppression). PROACTIVE.

  VortexCombo: >
    Capacitor Pull + Unfocus = the VORTEX. Pull enemies in, suppress AI,
    discharge for damage while they cluster mindlessly. The identity moment.

  NotADebuff: >
    CRITICAL: Zone property, not target status. Enemy pulled 12y away by
    another player IMMEDIATELY regains full SR. Nothing "on" them to dispel.

  Limitations:
    - "Only 8y radius — outside = fully intelligent"
    - "Requires Electron Guard Stance active (4/s gauge)"
    - "Enhanced (-2) requires 50+ gauge (competes with spending)"
    - "Ranged enemies at 10y+ unaffected"
    - "Boss enemies may have SR floor (min SR2 in suppression)"
    - "Does NOT reduce damage/accuracy — stupid, not weak"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 6: VOLTAIC PARRY — SKILL EXPRESSION TOOL
# ═══════════════════════════════════════════════════════════════════════════════

VoltaicParry:
  Type: oGCD (reactive, 0.3s animation lock)
  GaugeCost: 0
  Window: 0.75s  # LoL reaction standard (tentative, per BalanceTargets)

  CorePrinciple: >
    THE skill expression for Metaknight. Timing-based, not rotation-based.
    Where player mastery separates good from great.

  OnSuccess:
    DamageNegated: "100%"
    HPRestored: "5% max HP"
    GaugeGenerated: 15
    EnablesVoltaicCounter: "3.0s window for free 220p crit GCD"
    UnfocusBoost: "+1 additional SR suppression for 4s (can briefly reach -3)"

  OnFailure:
    RecoveryLock: "0.6s (cannot act)"
    DamageTaken: "Normal (no mitigation)"
    GaugeGenerated: 0

  ScalingWithContent:
    SR1: "Not needed. Optional optimization for gauge/counter."
    SR2: "Primary survival when solo. Must parry heavy hits."
    SR3: "Mandatory. Miss = rapid HP loss → death."
    SR4: "Enemies vary timing to bait failures. Pattern-reading required."

  RacialAdvantage: >
    NTU 16 makes 0.75s feel like ~0.9s subjectively. Other races would
    find the same window punishing. WHY the class developed among Madolt.

  ComparisonToAdaboldBlock: >
    Adabold block: passive 50% DR, always on in stance, low ceiling.
    Metaknight parry: active 100% negation, 0.75s window, high ceiling.
    Safe vs skilled — the frontliner archetype split.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 7: ROTATION PHILOSOPHY
# ═══════════════════════════════════════════════════════════════════════════════

RotationDesign:
  Philosophy: >
    NO fixed rotation. FIELD MANAGEMENT + REACTION. The "rotation" emerges
    from combat state, not memorization.

  DecisionFramework:
    Priority1: "Heavy hit incoming? → Voltaic Parry"
    Priority2: "Parry success? → Voltaic Counter (don't waste 3s window)"
    Priority3: "3+ enemies in field? → EC Shield Discharge / Field Overload"
    Priority4: "Priority target >50% HP? → EC Weapon Discharge"
    Priority5: "Gauge above 80? → Spend to avoid overcap"
    Priority6: "Gauge below 30? → Drop stance, combo to rebuild"
    Priority7: "Enemies approaching outside field? → Reposition"

  GaugeTension: >
    Core loop: Gauge above 50 = enhanced Unfocus (-2 SR). Spending below
    50 = weakened suppression. Oscillate: spend to ~50, rebuild to 80, repeat.
    Exception: Field Overload at 100 = accept temporary weak suppression for burst.

  ExampleSequence_SR2:
    Context: "4 enemies: 2 melee on Metaknight, 2 pathing past"
    Sequence: >
      Stance ON → drift inward → Basic 1-2 → [tell] → Parry (success) →
      Counter → Basic 3 (crit) → [4 in 6y] → Shield Discharge (180p×4) →
      Basic 1 → [heavy] → Parry → Counter → repeat
    GaugeFlow: "60 → +15 parry → +21 combo → -35 discharge → +15 parry = 76"
    Note: "Gauge-positive when parrying well. Gauge-negative when missing."

  NoRotationStatement: >
    No opener. No burst window. No 2-min alignment. Fight attack patterns
    dictate parry timing. Enemy count dictates AoE. Gauge state dictates
    hold vs spend. Two identical fights play differently.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 8: ANTI-PATTERNS
# ═══════════════════════════════════════════════════════════════════════════════

AntiPatterns:
  - Pattern: "Enmity table / threat generation"
    Fix: "NO enmity table. Unfocus + Pull are FIELD effects, not aggro."
    Severity: CRITICAL

  - Pattern: "2-minute burst alignment"
    Fix: "Charge Gauge spends when optimal. No timer."
    Severity: CRITICAL

  - Pattern: "Long CDs (90s+) on identity skills"
    Fix: "All gauge-gated. §25 compliant."
    Severity: CRITICAL

  - Pattern: "Crit as RNG"
    Fix: "Conditional: Counter=parry, Weapon=>50%HP, Shield=3+targets, Overload=5s stance"
    Severity: CRITICAL

  - Pattern: "Traditional tank (absorb for party)"
    Fix: "Damage-first. Survive by killing + parrying."
    Severity: CRITICAL

  - Pattern: "Unfocus as debuff on enemies"
    Fix: "Area suppression. Zone property. Leave = full SR."
    Severity: CRITICAL

  - Pattern: "Invulnerability button"
    Fix: "Parry is 0.75s window. Miss = eat hit."
    Severity: HIGH

  - Pattern: "SPD = movement speed"
    Fix: "NTU = reaction/processing. All classes run same base speed."
    Severity: HIGH

  - Pattern: "AI manipulation via taunt"
    Fix: "Unfocus makes enemies DUMBER, not REDIRECTED. They attack closest because they forgot better."
    Severity: HIGH

  - Pattern: "Passive suppression (exist = suppress)"
    Fix: "Requires Stance active (4/s cost). Drop stance = instant end."
    Severity: MEDIUM

  - Pattern: "Unlimited vortex uptime"
    Fix: "4/s gauge. 25s max from full. Must cycle."
    Severity: MEDIUM

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 9: ITEM BASELINE
# ═══════════════════════════════════════════════════════════════════════════════

ItemBaseline:
  Philosophy: >
    Without Metaknight: party uses consumables for temporary CC and burst AoE.
    NO item creates sustained AI suppression or persistent pull.

  Replaces:
    - Item: "Stasis Grenade"
      Function: "3y radius, 3s slow, 45s CD"
      WhyClassBetter: "Capacitor Pull is continuous 1.5y/s, 8y, gauge-sustained."

    - Item: "Confuser Beacon"
      Function: "5y, 4s random targeting, 90s CD, SR2+ resists"
      WhyClassBetter: "Unfocus is permanent while stance active, -2 SR, no resist, 8y."

    - Item: "EMP Capsule"
      Function: "4y burst, 200p, 60s CD"
      WhyClassBetter: "EC Shield Discharge = 180p/target, 35 gauge (spammable), 6y."

    - Item: "Focus Disruptor"
      Function: "Single target, -1 SR, 8s, 120s CD"
      WhyClassBetter: "Unfocus = -2 SR, AoE 8y, indefinite, no CD."

    - Item: "Stimpack (Reaction Booster)"
      Function: "+0.2s parry window, 30s, 180s CD"
      WhyClassBetter: "NTU 16 = permanent reaction advantage."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 10: §25 COMPLIANCE
# ═══════════════════════════════════════════════════════════════════════════════

Section25:
  Rule: "No CDs 90s+ on identity skills. Gate via Charge Gauge."
  Implementation:
    GaugeGated: "Every identity ability costs gauge. No CD beyond GCD recast."
    Costs:
      ElectronGuardStance: "4/s"
      ECWeaponDischarge: 25
      ECShieldDischarge: 35
      VoltaicCounter: "0 (free, parry-conditional)"
      FieldOverload: 50
      VoltaicParry: "0 (free oGCD, risk-gated)"
      BasicCombo: "0 (free, generates +7/hit)"
    SpamPermitted: "If gauge exists, discharge back-to-back. Gauge IS the limiter."
    NoCD_Exceptions: "Voltaic Parry (free, risk/timing gated). Basic combo (free, generates)."

  GaugeEconomy:
    MaxGauge: 100
    FieldDrain: "4/s (25s from full)"
    GenerationRate: "~7-9/GCD + 15/parry + 2/s passive"
    NetFlow_StanceActive: "+3/s if landing combos+parries. -2/s if only drain+passive."
    DesignIntent: >
      Active fighting sustains field indefinitely. Passive holding bleeds
      gauge. MUST fight to maintain vortex.

  TensionDesign: >
    Gauge = PERMISSION + TENSION. High (50+) = better suppression, overcap risk.
    Low (<30) = must drop stance. Mid (30-50) = discharge ok, base suppression.
    Decision frequency: every 2-4 seconds.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 11: DESIGN NOTES
# ═══════════════════════════════════════════════════════════════════════════════

DesignNotes:
  IdentitySummary: >
    Metaknight is the PROACTIVE suppression frontliner. Adabold responds to
    enemy decisions (reactive geometry). Metaknight prevents intelligent
    decisions from forming (proactive lobotomy). Vortex + unfocus = enemies
    never GET the chance to flank.

  WhyRename: >
    "Madolt Warrior" generic. "Metaknight" = meta (transcendent) + knight.
    Engineer who transcended swordsmanship through technology. Electrical knight.

  DesignPillars:
    Pillar1: "Vortex fantasy — pull in, make stupid, kill"
    Pillar2: "Skill expression via parry — timing, not rotation"
    Pillar3: "Gauge tension — spend for damage vs hold for suppression"
    Pillar4: "Engineering identity — equipment IS the class"
    Pillar5: "Proactive — set field BEFORE danger arrives"

  BalanceKnobs:
    - "Pull speed (1.5y/s)"
    - "Unfocus radius (8y)"
    - "Stance drain (4/s)"
    - "Parry window (0.75s)"
    - "Enhanced Unfocus threshold (50 gauge)"
    - "Field Overload cost (50)"

  CritSystem:
    ZeroRNG: true
    Reference: "DESIGN_OVERRIDE.md §12"
    Conditions:
      VoltaicCounter: "Always crits (requires parry success)"
      ECWeaponDischarge: ">50% HP targets (§9)"
      ECShieldDischarge: "3+ enemies hit"
      FieldOverload: "5+ seconds stance uptime"
      BasicCombo_3rd: "Below 50% HP target (execute)"

  StrategyRankScaling:
    SR1: {Difficulty: TRIVIAL, UnfocusValue: ZERO, Note: "Pure DPS mode."}
    SR2: {Difficulty: MODERATE, UnfocusValue: HIGH, Note: "Identity starts."}
    SR3: {Difficulty: HIGH, UnfocusValue: CRITICAL, Note: "Parry mandatory."}
    SR4: {Difficulty: VERY_HIGH, UnfocusValue: CRITICAL, Note: "Enemies avoid field. Must chase."}

  ProcgenInteraction:
    BestIn: "Open arenas (8y field covers space, no walls needed)"
    GoodIn: "Intersections (captures from multiple vectors)"
    AdequateIn: "Corridors (enemies funnel anyway, less differentiated from Adabold)"
    IdealComp: "Metaknight + melee DPS (both benefit from clustered suppressed enemies)"
    Nightmare: "Solo vs ranged (they stay outside 8y)"

  NTUClarification:
    Rule: "NTU ≠ movement speed. NTU = reaction/processing."
    NTU16_Does: ["Parry feels generous", "Fast animation recovery", "GCD haste (base ~1.82s)"]
    NTU16_DoesNOT: ["Run speed", "Pull speed", "Discharge animation speed"]

  ContrastTable:
    Adabold: {Method: "Geometry", Strength: "All ranks, corridors", Weakness: "Open arenas, multi-angle", Identity: "I block the path."}
    MadoltMetaknight: {Method: "AI suppression + pull", Strength: "Scales with rank, arenas, parry ceiling", Weakness: "SR1 wasted, ranged enemies", Identity: "I make the path irrelevant."}
    Siegebreaker: {Method: "Offensive pressure", Strength: "Highest DPS, breakthrough", Weakness: "Can't protect if bypassed", Identity: "I remove the problem."}

  SimulationTargets:
    gauge_first_spend: "12-14s"
    gauge_full: "32-38s"
    dps_output: "82-87% (parry-dependent)"
    survival_solo_SR2: "Indefinite with competent parry"
    unfocus_uptime_SR3: "60-75%"
    overcap_rate: "<10% optimal"

