# ═══════════════════════════════════════════════════════════════════════════════════
# BALANCE TARGETS
# ═══════════════════════════════════════════════════════════════════════════════════

balance_targets:
  reference: "Generic Experienced-tier DPS = 100%. Healer baseline = 65% (triage) / 80% (free DPS)."

  healing_output_by_state:
    # State                    | HPS % of Max | Condition
    resonant_saturated:         [115, 125]     # 4+ uninterrupted heals, Hydration 80+
    warm_saturated:             [95, 105]      # Standard healing, Hydration 80+
    warm_damp:                  [80, 90]       # Standard healing, Hydration 40-79
    cold_saturated:             [70, 80]       # Post-dive, Hydration 80+ (hidden tax)
    cold_parched:               [45, 55]       # Post-dive, Hydration 15-39 (double penalty)
    cold_desiccated:            [28, 35]       # Post-dive, Hydration 0-14 (crisis state)

  dps_output_by_mode:
    # Mode                     | % of DPS Ref | Duration   | Intent
    heal_only:                  [3, 8]         # Indefinite | Pressure Wave only. Role-focused.
    balanced_play:              [45, 55]       # Sustained  | Target gameplay. 1-2 dives/30s.
    aggressive_play:            [65, 75]       # Sustained  | Maximum dive uptime. Low healing.
    free_dps_mode:              [78, 82]       # Easy content | Zero healing needed. Full dive rotation.
    maelstrom_burst:            [150, 180]     # 4-6s window | All-in commit. Party unhealed.

  encounter_averaged:
    expert_play: [62, 68]    # 65% baseline met. Healing + damage optimized. Near-zero deaths.
    average_play: [50, 58]   # Some overcautious healing, some overdiving. Occasional party deaths.
    poor_play: [35, 45]      # Constant Cold state, dehydrated, party dying. Or: never diving, underperforming DPS.

  hps_targets:
    sustained_single_target: "250-350p per GCD (Keening Pulse level)"
    sustained_aoe: "200-280p per GCD per ally hit (Tidal Hymn level)"
    burst_aoe: "400-500p single cast (Depths Call)"
    note: "Healer HPS must sustain party through Rank 2 content. Must NOT sustain through Rank 4 without perfect play."

# ═══════════════════════════════════════════════════════════════════════════════════
# MATCHUP SCENARIOS
# ═══════════════════════════════════════════════════════════════════════════════════

matchup_scenarios:

  # ─────────────────────────────────────────────────────────────────────────────
  scenario_sr1:
    name: "SR1 — Trash Corridor (Standard Land)"
    strategy_rank: 1
    environment: "Dry dungeon corridor. No water terrain. Indoor."
    party: "Frontliner + DPS + Wavecaller"
    enemies: "3-5 trash mobs. Attack closest. No tactics."
    duration: "5-8s (full party TTK target)"

    wavecaller_behavior:
      optimal: >
        Free DPS mode. Party takes minimal damage. Frontliner holds aggro trivially.
        Dive every pack. Breach-strike-splash. Party never drops below 80%.
        Tidemark once for Hydration maintenance. Keening Pulse between packs.
      healing_demand: "Minimal — Keening Pulse (8s CD) covers all needs"
      dive_frequency: "Every pack (1-2 per 20s)"
      hydration_management: "Tidemark once per 2-3 packs. Never reaches Parched."

    expected_output:
      dps_contribution: "~75-80% of reference"
      hps_required: "~150p per 10s (trivial)"
      hydration_at_end: "60-80 (manageable with Tidemark)"

    pass_criteria:
      - "Wavecaller achieves ≥70% DPS output"
      - "Party never drops below 60% HP"
      - "Hydration never drops below 40 (Parched)"
      - "Encounters complete within TTK target (5-8s)"
    fail_if:
      - "Wavecaller unable to dive (resource starved) — BALANCE ISSUE"
      - "Party dies despite low enemy output — HPS TOO LOW"
      - "Hydration reaches critical on dry map within 2 encounters — DRAIN TOO FAST"

  # ─────────────────────────────────────────────────────────────────────────────
  scenario_sr2:
    name: "SR2 — Dungeon Elite (Mixed Terrain)"
    strategy_rank: 2
    environment: "Cave with intermittent water pools (25% floor coverage). Some LoS blockers."
    party: "Frontliner + DPS + Wavecaller"
    enemies: "1 elite + 2 trash. Elite seeks shortest path to squishies."
    duration: "20-30s (elite TTK target)"

    wavecaller_behavior:
      optimal: >
        Balanced play. Heal frontliner through elite attacks. Identify safe dive
        windows (when elite is locked on frontliner). Use water pools for Hydration.
        Shattercroon on elite casts. 1-2 dive cycles during fight.
        Position near water pool for passive Hydration regen.
      healing_demand: "Moderate — Tidal Hymn sustains, Depths Call if spike damage"
      dive_frequency: "1-2 per encounter (when frontliner has elite controlled)"
      hydration_management: "Water pool proximity handles passive. Dives supplement."
      interrupt_usage: "Shattercroon 2-4 times per elite (every dangerous cast)"

    expected_output:
      dps_contribution: "~50-60% of reference"
      hps_required: "~200-250p sustained, 400p+ burst on spikes"
      hydration_at_end: "70-90 (water pools available)"

    pass_criteria:
      - "Wavecaller maintains 50-60% DPS while keeping party alive"
      - "Frontliner never drops below 30% HP (healing adequate)"
      - "Elite is interrupted on at least 2 dangerous casts"
      - "Dive windows correctly identified (party stable during absence)"
      - "Hydration maintained at Damp or above"
    fail_if:
      - "Frontliner dies because Wavecaller dove at wrong time — CORRECT (punishment working)"
      - "Wavecaller cannot contribute ANY damage — DIVE NEVER SAFE (encounter design issue)"
      - "Shattercroon insufficient for cast prevention — CD TOO LONG (5s should be enough)"
      - "Healing output inadequate even without diving — BASE HPS TOO LOW"

  # ─────────────────────────────────────────────────────────────────────────────
  scenario_sr3:
    name: "SR3 — Boss with Phases (Indoor, Dry)"
    strategy_rank: 3
    environment: "Boss arena. No water terrain. Dry. Indoor. Enemies flank and coordinate."
    party: "Frontliner + DPS + Wavecaller"
    enemies: "Boss + 2 adds that spawn at 50% boss HP. Boss targets installations, flanks."
    duration: "2-3 minutes (dungeon boss TTK)"

    wavecaller_behavior:
      optimal: >
        Phase 1 (100-50%): Heal-primary with opportunistic dives during safe windows.
        Tidemark on cooldown for Hydration (no water terrain). 2-3 dive cycles.
        Phase 2 (50%-adds): Heavy healing. Adds pressure party. Minimize diving.
        Shattercroon on add casts. Depths Call on party-wide damage.
        DPS check moment: Maelstrom Entry on boss during add CC window (party stun).
        Post-Maelstrom: Walk back, rebuild Resonance, heavy heal phase.
      healing_demand: "High sustained (Phase 2). Moderate (Phase 1). Spike on transitions."
      dive_frequency: "Phase 1: 2-3 dives. Phase 2: 0-1 dives. DPS check: 1 Maelstrom."
      hydration_management: "CRITICAL — no water terrain. Tidemark every 12s. Dives help (+25 each)."
      interrupt_usage: "4-8 Shattercroons across fight (boss + adds)"

    expected_output:
      dps_contribution: "~45-55% of reference (averaged over fight)"
      hps_required: "~250p sustained, 500p spike (Depths Call handles)"
      hydration_at_end: "30-50 (dry map — Tidemark + dives barely maintain Damp)"

    pass_criteria:
      - "Boss dies within TTK window (2-3 min) with Wavecaller contributing 45-55% DPS"
      - "Party survives Phase 2 add pressure (healing adequate under sustained damage)"
      - "Hydration never reaches Desiccated (0-14) — Tidemark + dives sufficient"
      - "Maelstrom Entry timed correctly (DPS check met, party survives absence)"
      - "Post-Maelstrom recovery completes before next damage spike"
      - "Wavecaller correctly shifts to heal-priority during Phase 2"
    fail_if:
      - "Hydration reaches Desiccated on dry map — TIDEMARK INSUFFICIENT (buff Tidemark or drain rate)"
      - "Maelstrom Entry never viable (party cannot survive 10s without heals) — ENCOUNTER NEEDS SAFE WINDOW"
      - "DPS contribution too low (boss doesn't die in time) — DIVE DAMAGE TOO LOW"
      - "Party wipes during Phase 2 (HPS inadequate) — BASE HEALING TOO WEAK"

  # ─────────────────────────────────────────────────────────────────────────────
  scenario_aquatic:
    name: "Aquatic Environment — Jumper Homeland Dungeon"
    strategy_rank: 2
    environment: "Coastal cave. 60% water terrain. Submerged sections. Rain weather active."
    party: "Frontliner + DPS + Wavecaller"
    enemies: "2 elites (aquatic). Enemies also benefit from water (faster)."
    duration: "30-45s (2 elites)"

    wavecaller_behavior:
      optimal: >
        THRIVING. Hydration maxed from environment. Full Saturated throughout.
        Aggressive diving — full healing potency regardless. Water proximity
        accelerates Pressure Charge regen (+50%). Rain provides +3/10s Hydration.
        Maximum dive frequency. Party healed at 100% potency even during Cold.
        Underwater sections: can submerge for instant full Hydration.
      healing_demand: "Moderate (enemies also faster in water — deal more DPS)"
      dive_frequency: "3-4 per encounter (Pressure regen accelerated)"
      hydration_management: "Automatic — environment maintains Saturated"
      unique_advantage: "Full Saturated = 100% healing even at Cold state. Effectively removes Cold tax."

    expected_output:
      dps_contribution: "~70-80% of reference (maximum dive uptime, rapid regen)"
      hps_required: "~200-250p sustained (enemies also empowered)"
      hydration_at_end: "95-100 (Saturated — environment maintains)"

    pass_criteria:
      - "Wavecaller achieves 70-80% DPS (significant aquatic advantage)"
      - "Pressure Charge regen noticeably faster (+50% from water proximity)"
      - "Hydration management is trivial (environment handles it)"
      - "Aquatic enemies are ALSO buffed (fight isn't trivially easy)"
      - "Net advantage: ~15-20% more effective than dry land equivalent"
      - "Does not feel like 'easy mode' — enemies compensate with speed"
    fail_if:
      - "Wavecaller too dominant in aquatic (>90% DPS — exceeds healer role boundary)"
      - "Aquatic enemies not threatening enough (no healing needed = just a DPS)"
      - "Advantage too small to notice (<5% improvement over dry) — WATER BONUSES TOO WEAK"
      - "Advantage too large (>30% improvement) — WATER BONUSES NEED NERF"

# ═══════════════════════════════════════════════════════════════════════════════════
# SYSTEM INTERACTIONS
# ═══════════════════════════════════════════════════════════════════════════════════

system_interactions:

  strategy_rank:
    sr1:
      portal_exploit: "Enemies never follow through portals. Free aggression."
      healing_demand: "Trivial. Wavecaller is functionally a DPS with panic heal."
      interrupt_value: "Low (enemies rarely cast meaningful abilities)."
    sr2:
      portal_exploit: "Enemies do NOT follow through portals."
      healing_demand: "Moderate. Must heal consistently. Dive windows exist."
      interrupt_value: "Moderate (elites have dangerous casts worth interrupting)."
    sr3:
      portal_exploit: "Enemies SOMETIMES follow through portals (SR3 awareness)."
      healing_demand: "High. Limited dive windows. Healing primary."
      interrupt_value: "High (boss coordination requires interrupt discipline)."
    sr4:
      portal_exploit: "Enemies ALWAYS follow through portals. Portal = liability."
      healing_demand: "Extreme. Diving is a LUXURY, not a baseline."
      interrupt_value: "Critical (multiple casters requiring triage of interrupts)."

  above_50_rule:
    interaction: >
      Wavecaller dives enemies >50% HP for +25% damage + Breaching Strike crit.
      This rewards EARLY aggression. Once enemy drops <50%, switch targets or
      stay for Geyser Burst execute. Two distinct power windows.
    healer_implication: >
      Wavecaller should NOT top party to full HP (>50% HP = +25% incoming damage).
      Optimal: heal TO 50-60%, then stop. Over-healing is counterproductive.
      This aligns with dive windows: heal to stable → dive → heal to stable → dive.

  over_50_player_hp:
    interaction: >
      Party members above 50% HP take +25% incoming damage. Wavecaller must heal
      TO 50%, not to full. Over-healing actively endangers allies. Creates natural
      "healing done, can dive now" signal: party at 50-55% = safe to stop healing.

  procgen_maps:
    water_frequency:
      jumper_regions: "40-60% water terrain"
      generic_dungeons: "10-25% water terrain"
      minimum_guarantee: "≥1 water feature per dungeon floor"
    advantage_delta:
      dry_map: "Base performance. Tidemark handles Hydration. Harder but viable."
      mixed_map: "Comfortable. Water pools for positioning advantage."
      wet_map: "Thriving. Maximum dive frequency. ~15-20% more effective."
    map_seed_impact: "High-water = Wavecaller-favored. Dry = neutral (not crippled)."

  aquatic_terrain_table:
    # Parameter              | Dry Land       | Water Proximity (5m) | Submerged
    hydration_drain:          ["-5/10s combat", "+2/5s regen",        "+15/s regen"]
    pressure_regen:           ["12s per charge","9s per charge (+50%)","6s per charge"]
    healing_potency:          ["Hydration-dependent", "Stable high", "Always Saturated"]
    movement_speed:           ["Hydration-dependent", "Normal",       "+10% swim speed"]
    portal_generation:        ["Normal",        "Normal",             "Enhanced (glands saturated)"]
    enemy_portal_follow:      ["SR-dependent",  "SR-dependent",       "Enemies may not follow underwater"]

