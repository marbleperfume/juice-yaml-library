# PASS/FAIL VALIDATION CHECKS
# ═══════════════════════════════════════════════════════════════════════════════════

validation_checks:

  identity:
    VAL-ID-01: {check: "Aggressive healer tension present", status: "PASS", note: "Push/pull between dive DPS and heal role is structural, not incidental."}
    VAL-ID-02: {check: "Dolphin/orca identity (no siren)", status: "PASS", note: "All terminology audited. Zero banned terms in ability names/descriptions."}
    VAL-ID-03: {check: "Biological lock justified (4 organs)", status: "PASS", note: "Vocal apparatus + portal glands + aquatic body + hydration dependence."}
    VAL-ID-04: {check: "Harpoon weapon coherent", status: "PASS", note: "Harpoon used in melee dive sequences. Aquatic hunter identity."}
    VAL-ID-05: {check: "NOT siren, NOT Jaguar, NOT Sage", status: "PASS", note: "Anti-patterns explicitly exclude all three archetypes."}
    VAL-ID-06: {check: "Healer cannot replace frontline", status: "PASS", note: "No sustained mitigation, no aggro tools, fragile in melee."}

  mechanical:
    VAL-MC-01: {check: "§25 CD compliance (no CD ≥ 90s)", status: "PASS", note: "Max CD = 45s (Maelstrom Entry). All identity gating via resources."}
    VAL-MC-02: {check: "No 2-minute burst cycle", status: "PASS", note: "All dive timing contextual. No fixed cadence."}
    VAL-MC-03: {check: "Crit is conditional (zero RNG)", status: "PASS", note: "Breaching Strike (>50% HP), Geyser Burst (2s post-dive), Maelstrom (>50%)."}
    VAL-MC-04: {check: "GCD 2.0s base / 1.4s cap", status: "PASS", note: "All GCDs conform. Cast times noted where applicable."}
    VAL-MC-05: {check: "Single-weave only", status: "PASS", note: "All sequences single-weave. Harmonic Wash has NO weave window (2.0s cast)."}
    VAL-MC-06: {check: "Zero Freecure / zero RNG procs", status: "PASS", note: "All generation deterministic. Pressure = passive + active. Hydration = physics."}
    VAL-MC-07: {check: "Items define baseline (class replaces)", status: "PASS", note: "7 items replaced. Documented in Design file."}

  balance:
    VAL-BL-01: {check: "Healer DPS at 65% during triage", status: "PASS (qual)", note: "50-55% during active healing with dives. 65% with optimal windows."}
    VAL-BL-02: {check: "Healer DPS at 80% in easy content", status: "PASS (qual)", note: "78-82% achievable with full dive uptime."}
    VAL-BL-03: {check: "HPS adequate for Rank 2 sustained", status: "PASS (qual)", note: "240p AoE per GCD (Tidal Hymn) sustains SR2 damage."}
    VAL-BL-04: {check: "Cannot solo-sustain through SR4", status: "PASS", note: "SR4 damage exceeds single-healer throughput. Party must mitigate."}
    VAL-BL-05: {check: "Potencies within BalanceTargets bands", status: "PASS (qual)", note: "Heal GCD: 240p (band 200-300). Ultimate: 700p (band 600-800)."}
    VAL-BL-06: {check: "Aquatic advantage 15-20% (not dominant)", status: "PASS (qual)", note: "Water proximity = +50% Pressure regen + Hydration maintenance."}

  party_role:
    VAL-PR-01: {check: "Clear role (healer with DPS windows)", status: "PASS"}
    VAL-PR-02: {check: "Not redundant with other healers", status: "PASS", note: "Unique: aggressive + interrupt + LoS-penetrating. No other healer dives."}
    VAL-PR-03: {check: "Party survives Wavecaller dive", status: "CONDITIONAL", note: "Depends on dive timing. Correct timing = safe. Wrong = deaths."}
    VAL-PR-04: {check: "Benefits from coordination", status: "PASS", note: "Frontliner holding aggro = free dive window. Spiritcaller water = Hydration."}
    VAL-PR-05: {check: "Cannot self-sufficient solo", status: "PASS", note: "No Stage 3 CC, fragile in melee, needs frontline."}

  content_design:
    VAL-CD-01: {check: "Encounters include DPS check windows", status: "REQUIREMENT (pending)", note: "Without DPS windows, diving is never correct."}
    VAL-CD-02: {check: "Water terrain available on most maps", status: "REQUIREMENT (pending)", note: "Min 1 water feature/floor. Tidemark backup on dry maps."}
    VAL-CD-03: {check: "SR3+ portals exploitable by enemies", status: "REQUIREMENT (pending)", note: "Enemies follow portals at SR3+. Creates dive cost."}
    VAL-CD-04: {check: "Boss phases give recovery time post-Maelstrom", status: "REQUIREMENT (pending)", note: "22s portal lockout needs boss downtime or transition."}

  section_25:
    VAL-25-01: {check: "No ability CD ≥ 90s", status: "PASS", note: "Max = 45s (Maelstrom Entry)."}
    VAL-25-02: {check: "Identity gating via resource not timers", status: "PASS", note: "Pressure Charge, Hydration Gauge, Vocal Resonance."}
    VAL-25-03: {check: "No long-CD converted to shorter without compensation", status: "PASS", note: "All resource gates provide DECISIONS, not just waits."}

  summary:
    total: 24
    pass: 17
    pass_qualitative: 5
    conditional: 1
    requirements_pending: 4
    fail: 0

# ═══════════════════════════════════════════════════════════════════════════════════
# WEAKNESS BUDGET
# ═══════════════════════════════════════════════════════════════════════════════════

weakness_budget:
  description: >
    Every class must have clear, exploitable weaknesses. Wavecaller's weaknesses
    are structural (emerge from core mechanic), not arbitrary debuffs.

  structural_weaknesses:
    - weakness: "Healing absence during dive"
      severity: "HIGH"
      exploitable_by: "Enemies with party-wide damage during dive windows"
      counterplay: "Correct dive timing, pre-dive Resonant Shield, Depths Between passive"
      cannot_be_removed: true

    - weakness: "Dehydration on dry land"
      severity: "MEDIUM"
      exploitable_by: "Dry environments, anti-water mechanics, extended land combat"
      counterplay: "Tidemark (12s CD, +30), diving for transit rehydration"
      cannot_be_removed: true

    - weakness: "Cold Resonance after dive"
      severity: "MEDIUM"
      exploitable_by: "Spike damage immediately after dive return (heals at 70%)"
      counterplay: "Pre-dive healing to build buffer, Keening Pulse for instant spot-heal"
      cannot_be_removed: true

    - weakness: "Shared offense/defense resource pool"
      severity: "HIGH"
      exploitable_by: "Sustained aggression that depletes both escape AND future dive capacity"
      counterplay: "Conservative play (only dive with 2+ Charges), Breaching Strike refund"
      cannot_be_removed: true

    - weakness: "No Stage 3 CC"
      severity: "MEDIUM"
      exploitable_by: "Enemies that require hard CC to stop (unstoppable chargers)"
      counterplay: "Party dependency — need frontliner or Grappler for disables"
      cannot_be_removed: true

    - weakness: "Portal can be followed by enemies (SR3+)"
      severity: "LOW-MEDIUM (SR-dependent)"
      exploitable_by: "Smart enemies diving the portal back to Wavecaller's healspot"
      counterplay: "Awareness of SR level, portal positioning, team blocking entry"
      cannot_be_removed: true

  what_wavecaller_is_NOT_weak_to:
    - "Silence/anti-magic — biological vocalization, not spellcasting"
    - "LoS denial — sound propagates through 1 wall at 70%"
    - "Single-target pressure on self — can portal away (if Charges available)"
    - "Mana/resource starvation — Pressure regenerates passively"

# ═══════════════════════════════════════════════════════════════════════════════════
# TERRAIN INTERACTION
# ═══════════════════════════════════════════════════════════════════════════════════

terrain_interaction:
  water_terrain:
    proximity_5m:
      hydration: "+2 per 5s"
      pressure_regen: "+50% speed"
      healing: "No direct bonus (Hydration maintained = stable potency)"
    submerged:
      hydration: "+15/s (instant saturation)"
      pressure_regen: "+100% speed (6s per Charge)"
      healing: "Full Saturated maintained indefinitely"
      movement: "+10% swim speed (aquatic biology)"

  created_terrain:
    tidemark_puddle:
      size: "3m radius"
      duration: "8s"
      effects: "1% HP/s HoT (allies), counts as water for proximity bonuses"
    undertow_slam_puddle:
      size: "5m radius"
      duration: "2s"
      effects: "-20% enemy speed (difficult terrain), counts as water for Hydration"

  weather:
    rain:
      hydration: "+3 per 10s (passive supplement)"
      effect: "Reduces dry-map penalty. Makes Tidemark less urgent."
    drought:
      hydration: "Additional -2 per 10s drain"
      effect: "Worst-case scenario. Forces more frequent Tidemark/diving."

  terrain_strategy: >
    Wavecaller should position near water when possible. Created puddles (Tidemark,
    Undertow Slam) serve as positioning anchors. In dry environments, Tidemark
    becomes mandatory maintenance. Expert play: create puddle near healing position,
    stand in it for passive Hydration, dive from stable base.

# ═══════════════════════════════════════════════════════════════════════════════════
# MATCHUP ANALYSIS (PARTY SYNERGIES & COUNTERS)
# ═══════════════════════════════════════════════════════════════════════════════════

matchup_analysis:

  party_synergies:
    with_spiritcaller:
      synergy: "STRONG"
      description: "Water Slime provides +1/5s Hydration proximity. Slime heals while Wavecaller dives. Double healer coverage."
      combined_advantage: "Wavecaller can dive more freely (Slime covers healing gap). Hydration maintained passively."

    with_frontliner_madolt:
      synergy: "STANDARD"
      description: "Madolt holds aggro. Wavecaller heals + dives when Madolt has target locked."
      combined_advantage: "Clear dive windows when Madolt parries (enemy in recovery). Standard healer-tank pair."

    with_frontliner_grappler:
      synergy: "STRONG"
      description: "Grappler pins target (Stage 3 CC). Wavecaller dives pinned target for free damage."
      combined_advantage: "Pinned enemy = guaranteed safe dive (can't fight back). Maximum aggression window."

    with_reaver:
      synergy: "MODERATE"
      description: "Reaver pursues isolated target. Wavecaller heals party while Reaver self-sustains."
      combined_advantage: "Wavecaller doesn't need to heal Reaver during pursuit. Frees dive windows."
      note: "Wavecaller's water puddles don't directly help Reaver (Reaver has own water bonuses)."

    with_shaman:
      synergy: "MODERATE"
      description: "Shaman slows enable easier dive targeting. Bone Spirit handles persistent interrupts (Wavecaller covers reactive)."
      combined_advantage: "Split interrupt duty. Shaman CC creates safe dive windows."

  countered_by:
    sustained_party_damage:
      threat: "HIGH"
      description: "Constant party-wide damage prevents diving. Wavecaller trapped in heal-only mode."
      wavecaller_response: "Accept reduced DPS. Wait for momentary dips. Use Tidemark for maintenance."

    anti_melee_mechanics:
      threat: "MEDIUM"
      description: "Boss AoEs around self, ground hazards in melee range."
      wavecaller_response: "Cannot dive during anti-melee phases. Must contribute via Pressure Wave (weak)."

    enemy_backline_pressure:
      threat: "MEDIUM"
      description: "Enemies targeting Wavecaller's heal position forces movement (breaks Resonance)."
      wavecaller_response: "Shattercroon interrupt, Resonant Shield self, or portal AWAY (defensive dive)."

    dry_environments:
      threat: "LOW-MEDIUM"
      description: "No water terrain. Hydration maintenance solely via Tidemark + dives."
      wavecaller_response: "Tidemark every 12s. Dives become dual-purpose (damage + hydration)."

    portal_followers_sr3_plus:
      threat: "LOW-MEDIUM"
      description: "Smart enemies follow through lingering portal to Wavecaller's safe position."
      wavecaller_response: "Position awareness. Don't create portal exit near party backline."

# ═══════════════════════════════════════════════════════════════════════════════════
# CONSTRAINTS & INVARIANTS
# ═══════════════════════════════════════════════════════════════════════════════════

constraints:

  hard_invariants:
    INV-01: "Sound = healing. Water = damage. Never swap delivery functions."
    INV-02: "Heal and damage require DIFFERENT positions. Cannot optimize both."
    INV-03: "Healers CANNOT replace the frontline. No exceptions."
    INV-04: "Zero RNG. All crits conditional. All generation deterministic."
    INV-05: "No siren terminology. Dolphin/orca identity always."
    INV-06: "Dehydration = SLOWED, never ROOTED. Always functional."
    INV-07: "Portal dive = safe for Wavecaller. Risk is on TEAM, not self."
    INV-08: "No 2-minute burst cycle. No fixed cadence. Contextual only."

  soft_constraints:
    # ID   | Parameter              | Current  | Flex Range   | Rationale
    CON-01: ["Hydration drain (combat)", "-5/10s", "-3 to -7/10s", "Must feel urgent without being oppressive"]
    CON-02: ["Portal rehydration", "+25 each", "+20 to +30", "Must reward diving without making Hydration trivial"]
    CON-03: ["Pressure Charge max", "4", "3-5", "2 cycles minimum from full. More = less tension."]
    CON-04: ["Pressure regen rate", "12s", "10-15s", "Too fast = infinite mobility. Too slow = never dive."]
    CON-05: ["Cold potency penalty", "70%", "60-80%", "Must be felt (not trivial) but not crippling"]
    CON-06: ["Sound LoS penetration", "70% / 1 wall", "50-80% / 1-2 walls", "Full penetration trivializes position"]
    CON-07: ["Maelstrom CD", "45s", "30-60s", "Must feel available but not spammable"]
    CON-08: ["Shattercroon CD", "5s", "4-6s", "Faster than Shaman (10s) but not every GCD"]

  boundary_conditions:
    - {condition: "Wavecaller never dives (pure healer)", outcome: "Hydration drains to Parched in ~80s. Healing degrades. Biology FORCES diving."}
    - {condition: "Wavecaller never heals (pure DPS)", outcome: "Party dies within 10-15s under SR2+ pressure. Role failure."}
    - {condition: "Dry map, no water, extended fight", outcome: "Tidemark every 12s + dive rehydration maintains Damp. Tight but viable."}
    - {condition: "Aquatic map, full water access", outcome: "~15-20% more effective. Comfortable. Not game-breaking."}
    - {condition: "Maelstrom Entry + target survives", outcome: "22s with no portals. Walk back. Cold healing. Maximum vulnerability. Punishment for misjudgment."}
    - {condition: "All Pressure Charges spent, enemy alive", outcome: "Walk out of melee. Cold + potentially Parched. Dangerous but recoverable in 12s."}

# ═══════════════════════════════════════════════════════════════════════════════════
# TUNING LEVERS
# ═══════════════════════════════════════════════════════════════════════════════════

tuning_levers:
  if_too_strong:
    - "Increase Hydration drain rate (land penalty harsher)"
    - "Reduce Tidemark restore (30 → 20)"
    - "Increase Cold penalty (70% → 60%)"
    - "Reduce Breaching Strike refund (0.25 → 0.15)"
    - "Increase Pressure Charge regen time (12s → 15s)"
    - "Reduce sound LoS penetration (70% → 50%)"

  if_too_weak:
    - "Reduce Hydration drain rate (-5/10s → -3/10s)"
    - "Increase portal rehydration (+25 → +30)"
    - "Reduce Cold penalty (70% → 80%)"
    - "Add Hydration bonus from Rain weather (+3 → +5/10s)"
    - "Reduce Pressure Charge regen (12s → 10s)"
    - "Increase Echoing Impact heal (30% → 40% Keening Pulse)"

  if_never_diving:
    - "Increase Hydration drain to force more transit"
    - "Add DPS check encounters that require healer damage"
    - "Make Resonant state build SLOWER (require diving breaks for reset)"
    - "Add environmental triggers that reward portal use"

  if_always_diving:
    - "Increase Cold penalty (longer rebuild time)"
    - "Reduce Pressure Charge max (4 → 3)"
    - "Increase party damage in content (healing demand forces restraint)"
    - "Make Depths Call even stronger (reward staying to cast)"

