integration_tests:
  - "Wavecaller+Spiritcaller: Slime Hydration bonus value check (meaningful but not free)"
  - "Wavecaller+Reaver: Reaver self-sustains during pursuit → frees Wavecaller to dive"
  - "Wavecaller+Grappler: Pin duration ≥ 2 GCDs for meaningful dive window"
  - "Wavecaller+Madolt: Parry recovery frames = safe dive signal"
  - "Wavecaller vs SR4 portal-followers: defensive portal use viable"
  - "Wavecaller on dry map: 3-minute boss without reaching Desiccated"
  - "2×Wavecaller party: does one dive while other heals (alternating coverage)"
  - "Wavecaller + over-50% HP rule: does not over-heal party above safe threshold"

