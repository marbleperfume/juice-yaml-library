# SECTION 2: MATCHUP SCENARIOS
# ═══════════════════════════════════════════════════════════════════════════════════

matchup_scenarios:

  SR1_corridor:
    geometry: "3y-wide corridor, walls both sides"
    enemies: "3× trash (attack closest)"
    party: "Adabold + 1 caster"
    flow: "Iron Body ON → Consecrate → combo. Enemies walk into zone + wall."
    results:
      backline_damage: "0%"
      pin_rate: "100% (walls guaranteed)"
      pps: "~138 (AoE zone + contacts)"
      gauge: "Net positive (blocks > spend)"
    verdict: "PASS — trivial. Force Targeting overkill. Identity not fully engaged."

  SR2_flanker:
    geometry: "T-junction. Main corridor + side passage to caster."
    enemies: "2× frontal + 1× flanker using side passage"
    party: "Adabold + 1 caster (8y behind)"
    flow: >
      [Sentinel 1.5s warning] → Lob flanker (crit) → Pull (oGCD, 4y) →
      Star toward wall (crit near ally) → Bash Pin (crit)
    gauge: "Start 60, spend 70, deficit -10. Rebuild next."
    results:
      backline_damage: "0%"
      tether_uptime: "Established GCD 1, maintained"
      pin_rate: "100% (Star → wall setup)"
      sentinel_used: "1.5s warning sufficient for Lob at 15-20y"
    verdict: "PASS — core identity scenario. Gauge-negative = intended pressure."
    skill_expression: "Lob timing, Pull vs Dash choice, Star direction."

  SR3_coordinated:
    geometry: "Open room, 3 entry points (N/E/S), center pillar"
    enemies: "5× coordinated: 2 from N, 1 from E, 2 from S"
    party: "Adabold + caster + DPS + healer (clustered)"
    flow: >
      [AMBUSH 2.5s] → Dash to S (rear, priority) → Iron Body face S →
      Consecrate on E chokepoint → ACCEPT N pair reaches DPS (DPS handles) →
      Pivot after S resolved.
    gauge: "Full → 97 spent → empty. 4-6s rebuild."
    results:
      backline_damage: "30-40% of potential (E leaks through Consecrate)"
      triage_quality: "Player choice = which vector leaks. Situational."
      survival: "All alive (healer covers leak)"
    verdict: "CONDITIONAL PASS — cannot solo 3 vectors. Limitation intentional."
    weakness_exposed: "Multi-angle = designed failure. 1 tether, 1 body, 1 facing."

  procgen_split:
    geometry: "Narrow branch corridor (4y), 60m, no healer"
    enemies: "4× trash (paired) + 1 elite at end"
    party: "Adabold + 1 caster (sub-group)"
    flow: "Trash: Iron Body + Consecrate + combo. Elite: full Tether→Pin cycle."
    results:
      self_sustain: "Indefinite at SR2 (2-2.5%/s vs incoming after DR)"
      caster_damage: "0% (corridor = impassable)"
      elite_kill_time: "45-60s (BalanceTargets Solo TTK)"
      hp_at_finish: "40-55% (stable equilibrium)"
    verdict: "PASS — core escort fantasy. Solo-viable at SR2. Corridor king."

