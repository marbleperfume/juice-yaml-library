# SECTION 6: WEAKNESS BUDGET
# ═══════════════════════════════════════════════════════════════════════════════════

weakness_budget:
  philosophy: "Weaknesses are structural and CANNOT be specced away."

  weaknesses:
    multi_angle:
      severity: "PRIMARY"
      description: "1 body, 1 tether, 1 facing (120°). 3+ vectors = leaks."
      exposed_at: "SR3+ coordinated assaults, 3+ entry open rooms"
      mitigation: "Consecrate one, body another. Third leaks."
      unfixable: true
      target: "Protection drops to 60-70% at 3+ angles"

    ranged_beyond_tether:
      severity: "HIGH"
      description: "Tether max 20y. Enemies at >20y = untouchable."
      exposed_at: "Open arenas, elevated positions, archer enemies"
      mitigation: "Close distance or party handles ranged."
      unfixable: true
      target: "0% force targeting on targets >20y"

    no_aoe:
      severity: "MODERATE"
      description: "Single-target focused. Only AoE: Consecrate (ground) + Iron Body contact."
      exposed_at: "6+ spread enemies in open space"
      mitigation: "Consecrate + corridor funneling"
      unfixable: true
      target: "AoE contribution ~40% of dedicated AoE DPS"

    gauge_depletion:
      severity: "MODERATE"
      description: "Full sequence (118) > cap (100). Sustained burst = empty in 8-10s."
      exposed_at: "SR3-4 multi-wave, back-to-back demands"
      mitigation: "Smart prioritization. Iron Body blocks generate."
      unfixable: true
      target: "4-6s vulnerability windows 1-2× per 30s at SR3+"

    separation_from_protectee:
      severity: "HIGH"
      description: "Sentinel warns 1.5s. SPD 14 covers 8-10y. Beyond 12y = cannot intercept."
      exposed_at: "Party spread, caster wanders, Adabold overextends"
      mitigation: "Tether Dash (6y). But requires correct tether target."
      unfixable: true
      target: "Protection = 0% when protectee >12y away"

    open_arena_drop:
      severity: "MODERATE"
      description: "No guaranteed Pins (no walls). Consecrate walked around. Flanks exposed."
      exposed_at: "Boss arenas, wide chambers"
      mitigation: "Star creates wall proximity. Pillar exploitation."
      unfixable: true
      target: "PPS -15-20%. Pin rate 40-60% (vs 80-100% corridor)."

  summary: {total: 6, primary: 1, high: 2, moderate: 3, removable: 0}

