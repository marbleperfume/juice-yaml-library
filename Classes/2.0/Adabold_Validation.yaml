# SECTION 1: BALANCE TARGETS
# ═══════════════════════════════════════════════════════════════════════════════════

balance_targets:
  reference: "Generic Experienced-tier DPS = 100%"

  dps_band: [82, 85]  # Frontliner role: 80-87%. Adabold specific: consistent floor.
  pps_by_rank:
    rank_1: {optimal: 107, realistic: 82}
    rank_2: {optimal: 115, realistic: 87}
    rank_3: {optimal: 130, realistic: 95}
  deductions: "-15% reposition, -10% missed crits, -5% gauge starve"

  gcd_timing:
    base: "2.0s"
    spd_14: "~1.85s"
    cap: "1.4s"
    weave: "Single-weave only (0.6s lock, 0.3s Iron Body)"

  racial_stats: {SPD: 14, STR: 11}

  shield_gauge:
    cap: "80 (R1) / 100 (R2+)"
    gen_rate: "~9-12/s engaged"
    sustain_spend: "~8-10/s"
    burst_spend: "40-50 in 4s (rebuild required)"
    first_spend: "8-10s"
    full_gauge: "30-35s"
    recovery_empty: "4-6s to Lob threshold"
    budget_16s: {gen: 80, spend: 78, net: "+2 (barely sustainable)"}

  self_sustain:
    rate: "~2-2.5% HP/s"
    sources: "Pack Fang mark heal (1-1.7%/s) + block recovery (1%/hit)"
    solo: {SR1: "Unkillable", SR2: "Viable", SR3: "Needs healer", SR4: "Healer required"}

  mitigation:
    iron_body_frontal: "50% DR (120° arc) — 55% R3"
    shield_passive: "15% frontal (always)"
    combined: "~57% (multiplicative)"
    flanked: "0%"
    invuln: "NONE. Never immune."

