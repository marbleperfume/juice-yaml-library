# SECTION 5: FORCE TARGETING VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════════

force_targeting_validation:
  core_claim: >
    Works REGARDLESS of Strategy Rank. Operates on PHYSICS (collision,
    displacement, zone), not COGNITION (AI priority, enmity). A Rank 4
    genius cannot walk through a wall or resist a 6y knockback.

  sr_proof:
    SR1: {method: "Proximity (closest)", tools: "Exist", difficulty: "TRIVIAL"}
    SR2: {method: "Iron Body (impassable) + Consecrate + Pull", tools: "3-4 skills", difficulty: "MODERATE"}
    SR3: {method: "Full toolkit cycling, prioritize angles", tools: "All", difficulty: "HIGH"}
    SR4: {method: "Sentinel AMBUSH + pre-Consecrate + instant Dash", tools: "Everything simultaneously", difficulty: "VERY HIGH"}

  vs_madolt_unfocus:
    madolt: "AI suppression. Enemies FORGET to flank. Cognitive. Fails vs SR4 immune."
    adabold: "Physical blockade. Enemies CANNOT flank. Geometric. Fails vs multi-angle."
    overlap: "ZERO. Different problem spaces. Complementary in same party."

  critical_distinctions:
    - "NO enmity table. No threat value."
    - "NO taunt. No provoke. No 'attack me' button."
    - "NO AI manipulation. That's Madolt."
    - "YES collision. YES displacement. YES slow zone. YES physical tether."
    - "FORCE = physical force applied to enemy body. Not 'forced' via AI."

  why_physical_not_cognitive:
    - "Iron Body: enemy pathing engine treats Adabold as impassable terrain"
    - "Tether Pull: 4-5y displacement toward self (physics)"
    - "Shooting Star: 6y knockback in chosen direction (physics)"
    - "Shield Bash: 3y knockback or Pin (physics)"
    - "Consecrate: 30-40% slow zone (physics)"
    - "None of these interact with AI priority tables"

