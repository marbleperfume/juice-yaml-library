# ═══════════════════════════════════════════════════════════════════════════════
# ADABOLD (Rawrotin) — Force Targeting Frontliner [SKILLS]
# ═══════════════════════════════════════════════════════════════════════════════
#
# 11 abilities. Reactive positional kit — moderate APM, high decision density.
# §25 APPLIED: ALL identity skills gauge-gated. No cooldowns beyond GCD recast.
#
# References:
#   - Adabold_Design.yaml (identity, Force Targeting, resource system)
#   - Combat/BalanceTargets.yaml (potency targets, GCD timing)
#   - DESIGN_OVERRIDE.md §9, §12, §25
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Frontliner.Adabold.Skills

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1: KIT OVERVIEW
# ═══════════════════════════════════════════════════════════════════════════════

KitOverview:
  TotalAbilities: 11
  GCDCount: 7  # Basic ×3 (combo), Shield Lob, Shield Bash, Consecrate, Shooting Star
  oGCDCount: 3  # Iron Body (toggle), Tether Pull, Tether Dash
  PassiveCount: 1  # Sentinel Instinct
  ExecutionTier: Experienced
  GCD: "2.0s base → ~1.85s (SPD 14) → cap 1.4s"
  WeaveModel: single_weave_only
  AnimationLock: "0.6s standard / 0.3s for Iron Body toggle"
  ResourceInteraction:
    ShieldGauge: "Generated by attacks/blocking. Spent by all identity skills."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: GCD ABILITIES — BASIC COMBO (free, generates gauge)
# ═══════════════════════════════════════════════════════════════════════════════

BasicCombo:

  PackStrike:
    Name: "Pack Strike"
    ID: ADA_GCD_01
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 100
    Range: "3y melee"
    Targets: 1
    GaugeCost: 0
    GaugeGenerated: 6
    ComboPosition: 1
    CritCondition: "None (filler)"
    SRInteraction: "SR1 primary action → SR3+ rare (constant repositioning)"
    RankProgression:
      Rank1: "100p, +6 gauge"
      Rank3: "Applies [Rawrotin Mark] on hit"

  FangFollow:
    Name: "Fang Follow"
    ID: ADA_GCD_02
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 120 (60 uncombo)
    Range: "3y melee"
    Targets: 1
    GaugeCost: 0
    GaugeGenerated: 6
    ComboPosition: 2
    ComboFrom: PackStrike
    ComboWindow: 8s
    CritCondition: "None"
    RankProgression:
      Rank1: "120p, +6 gauge"
      Rank3: "Refreshes [Rawrotin Mark]"

  PackFang:
    Name: "Pack Fang"
    ID: ADA_GCD_03
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 160 (80 uncombo)
    Range: "3y melee"
    Targets: 1
    GaugeCost: 0
    GaugeGenerated: "+8 (16 on Marked target)"
    ComboPosition: 3
    ComboFrom: FangFollow
    SelfHeal: "3% max HP on Marked target (4% R2, 5% R3)"
    CritCondition: "Crits on Marked target (racial synergy — 1.4×)"
    SRInteraction: "SR1 always completes → SR4 rare completion = massive reward"
    RankProgression:
      Rank1: "160p, +16 on mark, heal 3%, crit on mark"
      Rank2: "Heal → 4%"
      Rank3: "Heal → 5%. Mark consume grants [Pack Vigor]: +5% dmg 6s."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3: GCD ABILITIES — IDENTITY SKILLS (gauge-gated)
# ═══════════════════════════════════════════════════════════════════════════════

IdentityGCDs:

  ShieldLob:
    Name: "Shield Lob"
    ID: ADA_GCD_04
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 120
    Range: "15y (R1) / 20y (R2+)"
    Targets: 1
    GaugeCost: 20
    Duration: "Establishes Force Tether (persistent, 1 max)"
    CritCondition: "Crits on >50% HP targets (§9 — 1.4×)"
    Effect:
      - "Establishes Force Tether (+10% dmg from Adabold on tethered)"
      - "Shield absent 1.5s (no Iron Body DR during gap)"
      - "Replaces existing tether"
    Enables: "Tether Pull, Tether Dash"
    SRInteraction: "SR1 opener → SR3+ timing gap exploitation by enemies"
    RankProgression:
      Rank1: "120p, 15y, tether"
      Rank2: "Range → 20y, tether break → 20y"
      Rank3: "On crit: [Exposed Flank] +5% from ALL sources, 6s"

  ShieldBash:
    Name: "Shield Bash"
    ID: ADA_GCD_05
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: "150 (200 on Pin)"
    Range: "3y melee"
    Targets: 1
    GaugeCost: 15
    CCComponent:
      Normal: "3y knockback toward nearest wall"
      Pin: "1.5s immobilize (wall within 4y behind target)"
      MassGate: "Boss immune to displacement, damage applies"
    CritCondition: "Always crits on Pin (positional wall-splat — 1.4× on 200p)"
    SRInteraction: "SR1 free Pins → SR3+ enemies avoid walls, requires Star setup"
    ComboReceivesFrom: "Shooting Star, Tether Pull (position near wall)"
    RankProgression:
      Rank1: "150/200p, Pin 1.5s"
      Rank2: "No change"
      Rank3: "Pin → 2.0s. Pin grants +10 bonus gauge."

  Consecrate:
    Name: "Consecrate"
    ID: ADA_GCD_06
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: "80/tick (3s interval, 12s duration = 320p total)"
    Range: "Self (ground at cast position)"
    Radius: "4y (R1) / 5y (R2+)"
    Targets: "All enemies in zone"
    GaugeCost: 30
    SlowEffect: "30% move reduction (40% R3)"
    CritCondition: "Ticks crit vs >50% HP enemies (§9 — 1.4× per tick)"
    Effect:
      - "Hostile zone persists after Adabold moves"
      - "Allies unaffected"
      - "Stacks with second Consecrate (60 gauge total)"
    SRInteraction: "SR1 free damage → SR2 forces pathing around → SR4 enemies wait for expiry"
    RankProgression:
      Rank1: "80p/tick, 4y, 30% slow"
      Rank2: "Radius → 5y"
      Rank3: "Slow → 40%. Exiting: 20% slow lingers 3s."

  ShootingStar:
    Name: "Shooting Star"
    ID: ADA_GCD_07
    ActionType: GCD
    CastTime: Instant
    Recast: "2.0s base"
    Potency: 180
    Range: "3y melee"
    Targets: 1
    GaugeCost: 25
    KnockbackDistance: "6y in PLAYER-CHOSEN direction"
    CCComponent:
      Effect: "6y directional knockback (player aims)"
      MassGate: "Boss: reduced to 2y"
    CritCondition: "Crits if target within 4y of protected ally (proximity — 1.4×)"
    DualPurpose:
      Emergency: "Punt enemy away from ally (crits)"
      Setup: "Punt into wall → Shield Bash Pin"
    BreadAndButter: "Star (180/252 crit) → Bash Pin (280 crit) = 460-532p in 2 GCDs"
    SRInteraction: "SR1 overkill → SR2 primary tool → SR4 split-second punt vs setup decision"
    RankProgression:
      Rank1: "180p, 6y KB"
      Rank2: "No change"
      Rank3: "On crit: [Rush] — next GCD has 0 gauge cost."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4: oGCD ABILITIES
# ═══════════════════════════════════════════════════════════════════════════════

oGCDAbilities:

  IronBody:
    Name: "Iron Body"
    ID: ADA_OGCD_01
    ActionType: oGCD (stance toggle)
    CastTime: Instant
    AnimationLock: "0.3s (fast toggle via SPD 14)"
    Recast: "None (toggle)"
    ContactPotency: "60p per collision (72p R2)"
    Range: Self
    GaugeCost: "3/s sustained"
    GaugeGenerated: "+5 per hit blocked"
    CritCondition: "Contact crits if enemy was sprinting (momentum)"
    Effect:
      - "Adabold becomes impassable terrain for enemy pathing"
      - "Frontal 120°: 50% physical DR (55% R3)"
      - "Movement speed 50% while active"
      - "Blocking generates gauge (+5/hit)"
    TradeOff: "Half speed = hold, not chase. Toggle rhythm = intercept→plant→release→reposition"
    DrainMath: "100 gauge ÷ 3/s = 33s max. Typical 4-6s bursts = 12-18 gauge."
    SRInteraction: "SR1 stand and tank → SR2 toggle rhythm → SR4 sub-second toggles for individual blocks"
    RankProgression:
      Rank1: "50% DR, 60p contact, +5/block"
      Rank2: "Contact → 72p"
      Rank3: "DR → 55%. Blocked crits: +8 gauge."

  TetherPull:
    Name: "Tether Pull"
    ID: ADA_OGCD_02
    ActionType: oGCD
    CastTime: Instant
    AnimationLock: "0.6s"
    Recast: "None (§25 gauge-gated)"
    Potency: 0
    Range: "Tether range (15-20y)"
    Targets: 1 (tethered only)
    GaugeCost: 10
    Requirement: "Active Force Tether"
    PullDistance: "4y toward Adabold (5y R3)"
    MassGate: "Heavy/Boss: 2y"
    CritCondition: "N/A (no damage)"
    SRInteraction: "SR1 unused → SR2 pull flankers → SR4 constant micro-pulls"
    RankProgression:
      Rank1: "4y pull, 10 gauge"
      Rank3: "5y pull. Applies 1s 20% slow."

  TetherDash:
    Name: "Tether Dash"
    ID: ADA_OGCD_03
    ActionType: oGCD
    CastTime: Instant
    AnimationLock: "0.6s"
    Recast: "None (§25 gauge-gated)"
    Potency: 80
    Range: "Tether range (15-20y)"
    Targets: 1 (tethered only)
    GaugeCost: 15
    Requirement: "Active Force Tether"
    DashDistance: "Up to 6y toward tethered target"
    CritCondition: "Crits on >50% HP target (§9 — 1.4×)"
    Effect:
      - "Dash to tethered target (ignores pathing during)"
      - "80p arrival damage"
      - "Positions Adabold between target and nearest ally"
    SRInteraction: "SR1 gap closer → SR2 intercept tool → SR4 constant dashing between threats"
    RankProgression:
      Rank1: "80p, 15 gauge, 6y"
      Rank3: "Arrival grants [Fortified]: +15% DR 2s."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5: PASSIVE — SENTINEL INSTINCT
# ═══════════════════════════════════════════════════════════════════════════════

Passive:

  SentinelInstinct:
    Name: "Sentinel Instinct"
    ID: ADA_PASSIVE_01
    ActionType: Passive (always on, no cost)
    Potency: 0
    Range: "Unlimited"
    GaugeCost: 0
    Source: "Rawrotin pack-bond awareness (racial, unteachable)"
    Effect:
      - "1.5s warning before enemy reaches ally"
      - "2.0s if triggering enemy is tethered"
      - "Directional indicator + ally ID + enemy ID"
    Limitation: "Warning ONLY. No auto-intercept. Player must physically respond."
    SRInteraction:
      SR1: "Rarely triggers (enemies attack closest)"
      SR2: "Primary value — warns when flankers find open paths"
      SR3: "Frequent, simultaneous warnings = prioritize"
      SR4: "[AMBUSH] notation for coordinated multi-angle"
    RankProgression:
      Rank1: "1.5s / 2.0s tethered"
      Rank2: "1.75s / 2.25s tethered"
      Rank3: "2.5s for coordinated (3+) same-vector threats"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 6: SHIELD GAUGE ECONOMY
# ═══════════════════════════════════════════════════════════════════════════════

ShieldGauge:
  Type: "0-100 gauge"
  Cap: "80 (R1) / 100 (R2+)"

  Generation:
    Passive: "+2/s in combat"
    BasicGCD: "+6/hit"
    PackFang_Marked: "+16 total"
    Block_IronBody: "+5/hit blocked"
    TetheredHit: "+4/hit received from tethered"
    Pin_Rank3: "+10 on Pin"

  Costs: {IronBody: "3/s", ShieldLob: 20, TetherPull: 10, TetherDash: 15, ShieldBash: 15, Consecrate: 30, ShootingStar: 25}
  FullSequenceCost: "~118 (exceeds cap = must prioritize)"

  Timing:
    FirstSpend: "8-10s (Lob at 20 gauge)"
    FullGauge: "30-35s"
    RecoveryFromEmpty: "4-6s to Lob threshold"

  SustainRate: "Generation ~9-12/s engaged. Spend ~8-10/s sustainable. Burst 40-50 in 4s = rebuild required."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 7: COMBO & CHAIN RELATIONSHIPS
# ═══════════════════════════════════════════════════════════════════════════════

ComboRelationships:

  BasicChain: {Seq: "Strike→Follow→Fang", Potency: "380p (444 w/crit)", Purpose: "Gauge gen + heal"}
  WallSplat: {Seq: "Shooting Star → Shield Bash Pin", Cost: "40 gauge", Potency: "460-532p / 2 GCDs"}
  TetherSetup: {Seq: "Lob → Pull → Bash Pin", Cost: "45 gauge", Potency: "400-448p / 2 GCD + 1 oGCD"}
  Intercept: {Seq: "[Sentinel] → Tether Dash → Iron Body → Bash", Cost: "~36 gauge", Potency: "290-340p"}
  CorridorLock: {Seq: "Consecrate → Iron Body (hold in zone)", Cost: "30 + 3/s", Effect: "Zone + contact + DR"}
  DoubleZone: {Seq: "Consecrate × 2", Cost: "60 gauge", Effect: "160p/tick (devastating but all-in)"}

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 8: RANK PROGRESSION SUMMARY
# ═══════════════════════════════════════════════════════════════════════════════

RankProgression:

  Philosophy: "Full kit from Rank 1. Higher ranks = wider scope, stronger payoffs, no new buttons."

  Rank1:
    GaugeCap: 80
    TetherRange: 15y
    ConsecrateRadius: 4y
    PinDuration: 1.5s
    Content: "Normal dungeons, open world"

  Rank2:
    GaugeCap: 100
    TetherRange: 20y
    ConsecrateRadius: 5y
    PPS_Gain: "+5-8%"
    Upgrades: "Gauge cap↑, tether range↑, zone radius↑, Iron Body contact +20%, heal +1%, Sentinel +0.25s"

  Rank3:
    PPS_Gain: "+10-15% over R2"
    Traits:
      PackResonance: "+5% dmg if ally within 12y"
      TerritorialConsecrate: "40% slow + 3s linger on exit"
      ReinforcedTether: "Break → 25y. Pull → 5y."
      ExtendedPin: "2.0s + 10 bonus gauge"
      Rush: "Star crit → next GCD free"
      PackVigor: "Pack Fang on mark → +5% dmg 6s"
      FortifiedArrival: "Tether Dash → +15% DR 2s"
      ExposedFlank: "Lob crit → target +5% from all, 6s"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 9: POTENCY VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

PotencyValidation:
  Target: "82-85% of DPS reference (~82-85 PPS at 100p = BaseFiller)"

  Rank1_Optimal:
    Loop: "3×combo + Lob + 3×combo + Star + Bash = 9 GCDs"
    BasePotency: "1260p + oGCD contacts/dash ~200p = 1460p"
    WithCrits: "~1788p (Pin crit, Lob crit, Fang crit, Star crit)"
    PerGCD: "~199p optimal"
    PPS_Optimal: "~107 (unrealistically perfect)"

  RealityDeductions:
    Repositioning: "-15% (movement, toggling)"
    MissedCrits: "-10% (no wall available, target <50%)"
    GaugeStarvation: "-5%"
    RealisticPPS: "107 × 0.85 × 0.90 × 0.95 = ~82 PPS ✓"

  Rank2_PPS: "~87"
  Rank3_PPS: "~95"

  GaugeBudget_16s:
    Generated: "~80 (passive 32 + basics 30 + blocks 10 + mark 8)"
    Spent: "~78 (Lob 20 + Star 25 + Bash 15 + IronBody 18)"
    Balance: "+2 (barely sustainable — high-intensity forces rebuild)"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 10: DPS ROTATION EXAMPLES
# ═══════════════════════════════════════════════════════════════════════════════

RotationExamples:
  Statement: "NO fixed rotation. Enemy behavior dictates priority."

  SR1_Corridor:
    Context: "3 trash in corridor. Low pressure. Gauge 40."
    Flow: "Iron Body ON → Combo×3 → Consecrate → Combo×3 → Bash"
    PPS: "~138 total (AoE trash — zone + contacts)"
    Feel: "Relaxed. Stand in corridor, combo, zone ticks. Enemies melt."

  SR2_Flanker:
    Context: "2 on Adabold, 1 flanking caster 12y away. Gauge 60."
    Flow: "Lob flanker (crit) → Pull (oGCD) → Combo → Iron Body → Pack Fang (heal) → [Sentinel!] → Star flanker (crit, near ally) → Bash Pin (crit)"
    GaugeSpent: 70
    PPS: "~92 (burst — identity skills crit heavily)"
    Feel: "Active. Reacting to threat, punishing with wall-splat. Gauge drains — rebuild next."

  Adaptation: >
    Same buttons, different ORDER. SR1 = lazy combo + zone. SR2 = Lob → Pull
    → Punt → Pin. Kit doesn't change — PRIORITY changes with enemy behavior.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 11: FRONTLINE SURVIVAL TOOLS
# ═══════════════════════════════════════════════════════════════════════════════

SurvivalTools:
  Philosophy: "Survive by CHOOSING which hits to take (frontal=halved). Position IS mitigation."

  Mitigation:
    IronBody_Frontal: "50% DR (120° arc)"
    ShieldPassive: "15% DR frontal (always, shield equipped)"
    Combined_Frontal: "~57% (multiplicative)"
    Flanked: "0%. Full damage. Face threats."
    R3_FortifiedArrival: "+15% DR 2s on Tether Dash"

  SelfHealing:
    PackFang_OnMark: "3-5% HP every 3 GCDs (~1-1.7% HP/s)"
    BlockRecovery: "1% HP per blocked hit"
    Total: "~2-2.5% HP/s sustained"

  SoloViability:
    SR1: "Exceeds incoming. Effectively unkillable."
    SR2: "Matches incoming with good frontal play. Solo-viable."
    SR3: "Insufficient vs multiple. Healer supplements."
    SR4: "Healer required. Self-sustain buys 8-12s independence."

  OverFiftyHP_Synergy: >
    Adabold WANTS 40-50% HP. Frontal hits (DR'd) drop into safe zone.
    Self-heal keeps AT 50%, not above. Natural equilibrium. Don't top Adabold.

  EmptyGauge: "Basic combo still heals + generates. Weakened 4-6s, not helpless."
  Surrounded: "Iron Body ON, face largest threat. Back exposed = critical failure."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 12: §25 COMPLIANCE AUDIT
# ═══════════════════════════════════════════════════════════════════════════════

Section25Audit:
  Rule: "No CDs ≥90s on identity skills. Gate via Shield Gauge."

  CooldownInventory:
    PackStrike: {cd: "GCD (2.0s)", status: "COMPLIANT"}
    FangFollow: {cd: "GCD", status: "COMPLIANT"}
    PackFang: {cd: "GCD", status: "COMPLIANT"}
    ShieldLob: {cd: "GCD", gate: "20 gauge", status: "§25 COMPLIANT"}
    ShieldBash: {cd: "GCD", gate: "15 gauge", status: "§25 COMPLIANT"}
    Consecrate: {cd: "GCD", gate: "30 gauge", status: "§25 COMPLIANT"}
    ShootingStar: {cd: "GCD", gate: "25 gauge", status: "§25 COMPLIANT"}
    IronBody: {cd: "None", gate: "3/s gauge", status: "§25 COMPLIANT"}
    TetherPull: {cd: "None", gate: "10 gauge + tether", status: "§25 COMPLIANT"}
    TetherDash: {cd: "None", gate: "15 gauge + tether", status: "§25 COMPLIANT"}
    SentinelInstinct: {cd: "N/A", gate: "None (passive)", status: "COMPLIANT"}

  LongestCD: "GCD recast (2.0s). No ability exceeds."
  DeadWindows: "4-6s at empty gauge. Weakened but functional (combo still works)."
  DesignedCompliant: "Built §25-native. No fix needed (unlike Siegebreaker Flare/Brace)."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 13: DECISION TREE
# ═══════════════════════════════════════════════════════════════════════════════

DecisionTree:
  Priority:
    1: "Ally threatened NOW? → Shooting Star (punt) OR Tether Dash (intercept)"
    2: "No tether on biggest threat? → Shield Lob"
    3: "Predictable enemy path? → Consecrate on chokepoint"
    4: "Enemy near wall? → Shield Bash (free Pin crit)"
    5: "Enemy NOT near wall? → Shooting Star toward wall → Bash next"
    6: "Low gauge, no threat? → Basic combo (rebuild)"
    7: "Enemies frontal? → Iron Body + combo (DR + gen + heal)"
  NoSequence: "Decision quality is the ceiling, not execution speed."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 14: CRIT SYSTEM
# ═══════════════════════════════════════════════════════════════════════════════

CritSystem:
  ZeroRNG: true
  Multiplier: 1.4×

  Conditions:
    PackFang: "Target has Rawrotin Mark (racial)"
    ShieldLob: "Target >50% HP (§9)"
    ShieldBash_Pin: "Wall-splat achieved (positional)"
    ShootingStar: "Target within 4y of ally (proximity)"
    Consecrate: "Enemy >50% HP in zone (§9)"
    IronBody_Contact: "Enemy sprinting on collision (momentum)"
    TetherDash: "Target >50% HP (§9)"

  Note: "Crits reward positioning. Lazy play = 0 crits. Perfect geometry = ~40% hit rate."

