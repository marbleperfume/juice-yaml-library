# Classes/DPS/Strix_Design.yaml

# ═══════════════════════════════════════════════════════════════════════════════

# STRIX (Talon) — Altitude Dive-Bomber DPS | DESIGN SPECIFICATION

# ═══════════════════════════════════════════════════════════════════════════════

#

# Design lineage:

#   EDF Wing Diver: aerial combat class, sustained flight as engagement mode

#   Yu-Gi-Oh Raidraptors: aggressive energy-driven aerial predator (XYZ overlay → altitude stacks)

#   Monster Hunter Insect Glaive: air-to-ground commitment, vault → plunge cycle

#   Dragoon (FFXIV): jump commitment, fixed trajectory, landing vulnerability

#   Peregrine Falcon: terminal velocity dive → maximum kinetic force at impact

#   Birds of Prey: circling → reading → committing → striking → escaping

#

# Core identity: "Pre-calculation dive bomber"

#   Altitude is the PRIMARY RESOURCE. Time airborne = time LOADING the next

#   attack. The skill is in the READ: what to hit, from what angle, at what

#   altitude, with what timing. Once committed, trajectory is FIXED. Cannot

#   abort. Cannot redirect. Must be RIGHT before commit.

#

# Fantasy: The raptor that drops from the sky like a missile.

#   Circle above → see everything → choose perfect moment → fold wings and

#   DROP → fixed-trajectory kinetic strike → massive damage at impact → then

#   grounded: fragile, fast, weapon-dangerous until re-ascend.

#

# Flight distinction from Colony (Harvester):

#   Colony flight = UTILITY (scouting, positioning, seed-drops, pollen clouds).

#   Strix flight = PREDATORY (altitude as weapon charge, dive as delivery).

#   Colony = hummingbird. Strix = peregrine falcon.

#

# References:

#   - Combat/BalanceTargets.yaml

#   - Combat/AggroSystem.yaml

#   - Combat/ClassMechanicModuleDesign.md

#   - Classes/Support/Colony_Complete.yaml

# ═══════════════════════════════════════════════════════════════════════════════



Key: Classes.DPS.Strix



# ─────────────────────────────────────────────────────────────────────────────

# SECTION 1: CLASS IDENTITY

# ─────────────────────────────────────────────────────────────────────────────



Identity:

  Name: Strix

  AlternateName: Talon

  Role: DPS

  SubRole: Burst DPS (Dive-Commit)

  DamageType: physical_kinetic + elemental_weapon

  ExecutionArchetype: Pre-Calculation Commitment

  ExecutionTier: Experienced

  # Justified: continuous altitude management, pre-calculation mental load,

  # fixed trajectory = zero error correction, ground weapon expression,

  # state transitions requiring mode awareness, party coordination.



  Description: >

    A Featherin aerial predator treating altitude as weapon charge. Reads the

    battlefield from sustained flight, selects optimal targets, calculates AoE

    coverage, commits to fixed-trajectory dive converting altitude into kinetic

    force. Higher altitude = more devastating impact. Trajectory CANNOT be

    altered post-commit. On ground: weaker but NOT helpless via elemental/poison

    weapons, low hops, wall-jumps, SPD 15 escape velocity. Fantasy: UNTOUCHABLE

    when moving (evasion frames in dashes), DEVASTATING when diving, FRAGILE

    when stationary.



  CoreFantasy: >

    You are the raptor circling above. Everything below is your target selection

    screen. You see clustered enemies, exposed flanks, perfect AoE angles that

    ground fighters cannot perceive. Choose moment. Commit. HIT like a kinetic

    missile. Then grounded: fast, evasive, lethal with poisoned blades, eager to

    return skyward. NEVER a sitting duck — always untouchable (airborne/dashing)

    or devastatingly committed (diving). Vulnerable ONLY if you STOP MOVING.



  InputModality:

    PrimaryFocus: battlefield_geometry_from_altitude

    SecondaryFocus: altitude_gauge_and_dive_trajectory_preview

    TertiaryFocus: ground_weapon_element_status_and_evasion_cooldowns

    DecisionType: pre_calculation_commitment

    # All decisions front-loaded BEFORE the action. Execution = one button →

    # committed → resolved. Contrast: Siren (adaptive), Madolt (reactive).



  StatPriority:

    Primary: DEX   # dive accuracy, weapon precision, Exploit bonus scaling (purely offensive)

    Secondary: SPD # i-frame duration, dash CD, dash distance, GCD haste, evasion (differential model)

    Tertiary: NTU  # battlefield reading, dive timing intuition

    DumpStat: STR  # STR 6 (racial). Damage from MOMENTUM (dive) + WEAPON PROPERTIES (ground).

    # Hollow bones = flight capable, CANNOT generate physical force via muscle.

    # Dive = kinetic (altitude → velocity). Ground = weapon enchantments.



  DesignStatement: >

    DPS that rewards THINKING before acting. Front-loads ALL skill expression

    into decision phase. Dive is one button — mastery is choosing WHEN, WHERE,

    FROM WHAT HEIGHT. Best players read the battlefield best, not highest APM.

    Ground state ensures not one-trick: caves/corridors force weapon-based play

    that is WEAKER but FUNCTIONAL. Must master BOTH modes.



  FailureStates:

    BadDive:

      Cause: "Committed on wrong target, bad angle, or into danger zone"

      Cost: "Dive damage wasted. Grounded in bad position."

      Recovery: "Survive ground time (8-12s) via SPD 15 and dashes."

      Severity: HIGH

    GroundedTooLong:

      Cause: "Failed re-ascend (interrupted, no stamina, cave)"

      Cost: "DPS drops to ~55% of aerial cycle."

      Recovery: "Wall-jumps/hops for partial altitude. Find re-ascend window."

      Severity: MODERATE

    CeilingLocked:

      Cause: "Low ceiling removes high-altitude option"

      Cost: "Limited to shallow dives + ground combos."

      Recovery: "Adapt to low-ceiling mode. Find open areas."

      Severity: MODERATE  # Intentional environmental weakness

    PredictedDive:

      Cause: "Rank 3+ enemies read dive commit and move/shield/counter"

      Cost: "Dive hits empty ground. Full commitment wasted."

      Recovery: "Party CC/root before dive, or feint dives."

      Severity: "HIGH vs smart enemies → LOW with coordination"

    StationaryOnGround:

      Cause: "Stopped moving (stunned, rooted, paralysis)"

      Cost: "Fragile body + no evasion = rapid death."

      Recovery: "Don't stop. Dash. Wall-jump. Re-ascend. Motion = life."

      Severity: CRITICAL



# ─────────────────────────────────────────────────────────────────────────────

# SECTION 2: RACIAL LOCK — FEATHERIN

# ─────────────────────────────────────────────────────────────────────────────



RacialLock:

  Race: Featherin

  Enforcement: hard_lock

  BiologicalLock: wings_and_flight

  LockJustification: >

    Requires TRUE FLIGHT — sustained powered flight allowing hovering, altitude

    adjustment, high-speed diving. Requires wing anatomy (hollow bones for

    mass:lift, flight muscles for sustained lift, wing structure for powered

    flight AND controlled dive, aerial physiology for sustained altitude).

    No wings = no Strix. Period.

  NPCException: >

    Non-Featherin "aerial" NPCs use magical flight (hover/levitation). Provides

    POSITION but not KINETIC DIVE — magic flight doesn't generate mass×velocity²

    for lethal dive damage. Biological dive requires wing-folding aerodynamics

    and hollow-bone mass optimization only Featherin possess.

  RacialSynergy:

    - "TRUE FLIGHT — sustained powered flight allows persistent altitude as resource"

    - "Hollow bones — light for flight, fragile to justify glass-cannon identity"

    - "SPD 15 — light body = fast ground movement = escape velocity"

    - "STR 6 — MUST rely on momentum (dive) and weapon properties (ground)"

    - "Wing-fold aerodynamics — controlled dive trajectory at terminal velocity"

    - "Aerial vision — physiological far-sight (wider FOV, distance acuity)"

    - "Predator instinct — lore justification for dive trajectory preview UI"



# ─────────────────────────────────────────────────────────────────────────────

# SECTION 3: ROLE OBJECTIVE FUNCTION

# ─────────────────────────────────────────────────────────────────────────────



RoleObjective:

  Type: burst_dps_through_altitude_commitment

  PrimaryMetric: damage_per_dive_cycle

  SecondaryMetric: dive_accuracy_and_aoe_coverage

  TertiaryMetric: ground_state_sustained_dps



  Constraints:

    - "total_DPS >= DPS_reference × 0.95 in open sky"

    - "total_DPS >= DPS_reference × 0.60 in ground-locked state"

    - "dive_commit_accuracy >= 80% at Experienced tier"

    - "ground_uptime minimized — re-ascend ASAP after each dive"

    - "NO fixed rotation cadence — dive when READ is right, not on timer"



  DPSModel:

    OptimalCycle: >

      Ascend (2-4s) → Read (variable) → Commit Dive (instant, trajectory locked)

      → Dive Travel (0.5-1.5s) → Impact (burst resolves) → Ground Recovery

      (6-10s, weapon combos + evasion) → Re-Ascend (2s cast) → Repeat.

      Full cycle: 12-18s depending on altitude and ground recovery.

    GroundStateDPS: "55-60% of full-cycle DPS. Real output via elemental/poison weapons, not zero."

    DiveBurstDPS: "Front-loaded single hit. 500-700p at max altitude (ClassUltimate band) + 60% AoE splash."



  TargetDPS:

    FullCycle_OpenSky: "100% of DPS reference"

    PartialCeiling: "80-85% of DPS reference"

    GroundLocked: "55-60% of DPS reference (intentional weakness)"



# ─────────────────────────────────────────────────────────────────────────────

# SECTION 4: CLASS MECHANIC — ALTITUDE SYSTEM

# ─────────────────────────────────────────────────────────────────────────────



ClassMechanic:

  Type: continuous_resource_with_state_transitions

  Name: "Altitude Gauge"

  Description: >

    Continuous resource 0-100 representing height above battlefield. Higher =

    more potential energy = more devastating dives. Builds during ascent, holds

    during hover, CONVERTS INTO DAMAGE during dives. Creates three states:

    Aerial (above 0, building/holding), Dive (committed, descending, trajectory

    fixed), Ground (0 altitude, weapon-based combat).



  AltitudeGauge:

    Range: "0-100 AU (Altitude Units — abstract, not meters)"

    DisplayType: vertical_bar  # fills upward to feel like height

    BuildRate: "10 AU/s during powered ascent (costs Wing Stamina)"

    DiveConversion: "Altitude consumed → Dive Potency"



  AltitudeStates:

    Ground:

      Range: "0 AU"

      Movement: "Full ground (SPD 15). Weapon combos, low hops (10 AU), wall-jumps."

      DiveAvailable: false

      Vulnerability: "Standard — must use dashes for i-frames"



    LowAltitude:

      Range: "1-30 AU"

      Movement: "Aerial horizontal flight"

      DiveAvailable: true  # But weak — low altitude = low damage

      Vulnerability: "Reduced — safe from melee, exposed to ranged/anti-air"



    MidAltitude:

      Range: "31-70 AU"

      Movement: "Standard aerial combat altitude"

      DiveAvailable: true

      Vulnerability: "Low — only dedicated anti-air reaches"

      Description: "Primary combat altitude. Most dives launch from here."



    HighAltitude:

      Range: "71-100 AU"

      Movement: "Maximum altitude — slow horizontal, maximum vision"

      DiveAvailable: true

      Vulnerability: "Minimal — almost nothing reaches. Wing Stamina drains fast."

      Description: "Maximum burst dives. Expensive to maintain. Get up, READ, commit, dive."



  WingStamina:

    Maximum: 100

    Role: "FLIGHT ECONOMY resource (not damage resource). Empty = forced landing."

    DrainRates:

      Ascent: "8/s (most expensive)"

      Hover: "3/s (moderate)"

      HighAltitude_Bonus: "+3/s above 70 AU (thin air penalty)"

      GlideDown: "0/s (free)"

      Dive: "0/s (gravity does the work)"

    RegenRates:

      Grounded: "12/s (full regen)"

      Descent: "6/s (regen starts on commit downward — dive IS recovery)"

      InCombat_Ground: "10/s (slightly reduced)"

    EmptyPenalty: "Must land. Cannot hover/ascend. Grounded until 30+ stamina."

    DesignPhilosophy: >

      Prevents infinite airtime. Forces air/ground cycling. Ground weapon

      gameplay exists BECAUSE Wing Stamina forces landing. Without it, optimal

      play = "never land" which removes half the class.



  DiveSystem:

    Name: "Raptor Dive"

    Description: >

      Core class-defining action. From altitude ≥10 AU, commits to fixed-trajectory

      dive converting ALL altitude into kinetic force at impact. Trajectory LOCKED

      on commit — cannot abort, redirect, or modify.

    CommitCondition: "Altitude >= 10 AU AND Wing Stamina > 0 AND valid target"

    TrajectoryLock: "Direction, angle, landing point FIXED. Target can dodge by moving after commit."

    TravelTime:

      FromLowAlt: "0.4s (nearly instant, low damage)"

      FromMidAlt: "0.8s (standard)"

      FromHighAlt: "1.2s (longest — highest damage, most dodge time for target)"

      Tradeoff: "Higher altitude = more damage but more travel time = more dodge opportunity"

    ImpactMechanics:

      PrimaryTarget: "Full potency at impact center"

      AoESplash: "60% potency in 4m radius"

      GroundEffect: "Impact crater persists 6s — 30% slow in radius"

      SelfEffect: "GROUNDED at impact. Cannot re-ascend for Grounded Duration (6/5/4s by Rank)."



  DiveFormula:

    BasePotency: 150

    AltitudeScaling: "+(AU × 5) potency"

    # 10AU=200p | 30AU=300p | 50AU=400p | 70AU=500p | 100AU=650p

    MomentumNote: "MOMENTUM damage, not STR. Altitude → acceleration → kinetic energy. STR irrelevant."

    ExploitCondition: "Exploit bonus vs fresh target (predator opener thematic)"



# ─────────────────────────────────────────────────────────────────────────────

# SECTION 5: CLASS-SPECIFIC SYSTEMS

# ─────────────────────────────────────────────────────────────────────────────



GroundState:

  Philosophy: >

    Different class expression — weaker but FUNCTIONAL. Uses elemental/poison

    weapons because STR 6 = no meaningful physical force. Weapon COMPENSATES.

    Maintains altitude THEME via low hops, wall-jumps, short glides.



  WeaponSystem:

    Name: "Storm Talons"

    Type: dual_short_blades_clawed

    Description: >

      Raptor-talon curved blades. Negligible physical damage (STR 6). ALL ground

      damage from WEAPON PROPERTIES: elemental infusions (wind/lightning) activate

      on contact regardless of swing force. Strix TOUCHES and weapon does the rest.

    ElementalIdentity:

      Primary: wind_lightning

      Secondary: poison_neurotoxin

      Thematic: "Wind/lightning = aerial predator. Poison = efficiency over brute force."

      MechanicalRoles:

        Wind: "Bonus vs airborne. Extends glide. Enhances dash speed."

        Lightning: "Primary ground DPS. Arcs to nearby targets. Stuns on Exploit trigger."

        Poison: "DoT stacking. Hit-and-leave damage while re-ascending."



    InfusionCycling:

      Name: "Stormweave"

      Description: "Toggle between Wind-infused and Lightning-infused (oGCD, no CD)."

      WindState: "Faster attacks (+15%), longer dash, more evasive. Lower per-hit, higher sustained."

      LightningState: "Arc damage (30% to nearby), stun on Exploit trigger. Higher per-hit, burst windows."



    PoisonCoating:

      Name: "Neurotoxin Sheath"

      Description: "Buff (oGCD). Each weapon hit applies 1 stack. 5 max. Ticks damage + utility debuff."

      DesignRole: >

        Bridges dive cycles. Land → slash (3 stacks) → re-ascend → poison ticks

        12s while rebuilding altitude → dive → repeat. Hit-and-run predator pattern.



  GroundMovement:

    LowHop: "Thermal Kick — 10 AU micro-jump, 1.2s airtime, 1 aerial action. Dodge ground AoE."

    WallJump: "Crag Launch — off wall at 45°, reach 20 AU, 1.5s. Indoor substitute for full ascent."

    ShortGlide: "Windcoast — horizontal glide from any 5+ AU. 3s, 120% speed. Thrown weapons only."



  GroundCombatIdentity:

    PowerLevel: "55-60% of full aerial cycle DPS"

    Fantasy: "Raptor on ground — still fast, still venomous, still dangerous. Not in its element."

    Strengths: ["i-frame dashes", "poison DoT persists after re-ascend", "lightning arcs", "SPD 15", "partial altitude via hops"]

    Weaknesses: ["no burst without altitude", "no large AoE", "fragile HP", "STR 6 = elements only"]



# ─────────────────────────────────────────────────────────────────────────────



EvasionSystem:

  Philosophy: >

    "Fragile but UNTOUCHABLE when moving." NOT chance-based. Dashes provide

    GUARANTEED i-frames — IMMUNE during dash. Player FEELS untouchable because

    they ARE. Getting hit = you FAILED to dash. The dash IS the defense.



  CorePrinciple:

    Name: "Kinetic Invulnerability"

    Rule: "ALL dashes grant guaranteed i-frames. IMMUNE during dash. 100%. Always."

    StatInteraction:

      SPD: "ALL evasion scaling. i-frame duration (0.3s → 0.5s), dash CD (4s → 2.5s), dash distance (6m → 10m)"

      DEX: "Does NOT affect evasion. Purely offensive (dive accuracy, weapon precision, Exploit bonus)."

      DesignNote: >
      EVA as a separate stat is REMOVED. Speed is the sole evasion stat per
      Base_Attributes.yaml tenets. The differential model (attacker Accuracy vs
      defender Evasion from Speed) governs miss rates. DEX stays purely offensive.

    GearProgression: >

      Fresh: 0.3s i-frames, 4s CD, 6m. Must be precise.

      BiS: 0.5s i-frames, 2.5s CD, 10m dash. Feels untouchable = endgame fantasy.
      All evasion scaling from SPD investment. DEX goes into dive/weapon damage.



  AerialEvasion:

    PassiveBonus: "Above 30 AU: differential evasion formula grants +25% miss rate vs ground attackers (Speed advantage at altitude vs attacker accuracy at range — deterministic output, NOT RNG)"

    BarrelRoll: "Replaces ground dashes while airborne. Lateral i-frame dodge. Costs 3 Wing Stamina."



# ─────────────────────────────────────────────────────────────────────────────



BarrierSystem:

  Philosophy: >

    Emergency backup, NOT the plan. ONE free pass before death (hollow bones).

    "I made a mistake, barrier catches it. Now MOVE or die."



  Featherward:

    Name: "Featherward"

    Type: barrier_with_dr_bonus

    BarrierHP: "20% of max HP"

    BonusDR: "25% DR while barrier active"

    RefreshCondition: "Fully refreshes on ascend above 30 AU"

    BreakPenalty: "3s vulnerability (no barrier, no DR, cannot refresh)"

    DesignNote: >

      Replaced Feathercloak (physical absorption) — conflicted with evasion

      fantasy. Refresh-on-ascend reinforces altitude cycle reward: "go up =

      get barrier back = safe again."



# ─────────────────────────────────────────────────────────────────────────────



RecoverySystem:

  Philosophy: >

    Recovery begins the MOMENT Strix commits downward — during descent itself.

    The DESCENT IS recovery. Dive cycle naturally includes healing. No "land and

    wait" downtime. Highest-skill players chain dives rapidly because each dive

    is ALSO healing them.



  DescentRegen:

    Name: "Thermal Recovery"

    Trigger: "Any downward movement (dive, glide-down, hop landing)"

    Rate: "3% max HP/s during descent"

    GroundContinuation: "Continues 4s after landing (tapering 3% → 2% → 1% → 0%)"

    GlideDescent: "Half rate (1.5%/s) during passive glide-down"

    AscendCancellation: "Stops immediately on upward movement"

    CoreCycle: "Up = spend. Down = recover. Satisfying rhythm."



  SurvivabilityProfile:

    HPPool: "70% of standard DPS HP (hollow bones)"

    BaseDefense: "Lowest physical defense in game"

    EffectiveHP: >

      Competitive survivability via: Featherward (20% shield + 25% DR),

      guaranteed i-frame dashes, descent regen, altitude removing from damage

      sources, SPD 15 outrunning. Skilled Strix takes LESS total damage than

      high-HP classes. When damage DOES connect, it hurts.

    Profile: "Binary: dodge everything (fine) or take it (probably dead)."



# ─────────────────────────────────────────────────────────────────────────────



SystemRuleIntegration:

  HP50Rule:

    Description: "Enemies >50% HP take +25% from dive attacks. Predator OPENER thematic."

    Implications:

      - "First dive on fresh target = strongest (100% HP = bonus active)"

      - "Strix EXCELS during add phases (fresh targets = bonus on each)"

      - "Optimal: always dive highest-HP enemy"

      - "Natural front-loading matches encounter design"



  ExploitConditions:

    SystemRule: "NOT RNG. Positional/conditional."

    StrixSpecific:

      DiveExploit_Opener: "Exploit bonus vs fresh target (predator opener — first engagement)"

      GroundExploit_Rear: "Exploit from behind target (rear positional — Dex scales this)"

      AerialExploit_Marked: "Exploit on Raptor Marked targets (player-inflicted condition)"

      GroundExploit_Poisoned: "Exploit at 5 Neurotoxin stacks (element-inflicted condition)"

    SkillGap: "Skilled = ~70% Exploit uptime. Unskilled = ~20%. ~20% DPS gap from system mastery."



# ─────────────────────────────────────────────────────────────────────────────



HarvesterFlightDifferentiation:

  Context: "Both Strix (Featherin) and Colony (Flutter Harvester) fly. MUST be distinct."

  KeyDifferences:

    - "Strix: altitude = damage scaling. Colony: altitude = deployment angle."

    - "Strix: dive = COMMITMENT (grounded after). Colony: land/takeoff = FREE."

    - "Strix: flight EXPENSIVE (stamina drains). Colony: flight CHEAP."

    - "Strix: ground = WEAKNESS. Colony: ground = NEUTRAL."

    - "Strix: aerial actions SETUP dive. Colony: aerial actions ARE output."

    - "Strix = peregrine falcon (soars to kill). Colony = hummingbird (hovers to support)."



# ─────────────────────────────────────────────────────────────────────────────

# SECTION 6: RANK PROGRESSION (Design-Level)

# ─────────────────────────────────────────────────────────────────────────────



RankProgression:

  Philosophy: >

    Rank unlocks DIVE VARIANTS and REDUCES GROUND VULNERABILITY TIME.

    Core loop (ascend → read → commit → recover) IDENTICAL across ranks.

    Margins and options improve.



  Rank1:

    Name: "Fledgling Talon"

    GroundedDuration: "6s"

    DiveTypes: "Raptor Dive only"

    DesignIntent: "Full cycle with ONE dive type. Decision = when/where, not which. Simple but deep."



  Rank2:

    Name: "Proven Talon"

    GroundedDuration: "5s"

    NewDiveTypes: "Piercing Plunge (ST boss-killer), Scatterfall (wide AoE pack-killer)"

    NewTools: "Dive Accelerant (+30% next dive), Feint Dive (AI manipulation)"

    DesignIntent: "Adds DIVE CHOICE to pre-calculation. Which dive + when/where."



  Rank3:

    Name: "Apex Talon"

    GroundedDuration: "4s"

    NewTools: "Terminal Velocity (×7 AU scaling, 12s)"

    NewPassives:

      - "Predator Instinct: see enemy HP%/buffs without targeting while >50 AU"

      - "Thermal Mastery: descent regen → 4%/s (from 3%)"

      - "Dive Tempo: ground combo completion reduces remaining ground time by 1s"

    DesignIntent: "Rapid cycling. Ground = brief pause, not vulnerability window."



# ─────────────────────────────────────────────────────────────────────────────

# SECTION 7: ROTATION PHILOSOPHY

# ─────────────────────────────────────────────────────────────────────────────



RotationPhilosophy:

  Statement: >

    NO fixed rotation. NO repeating button sequence. The "rotation" is the

    DIVE CYCLE — a loop governed by altitude, Wing Stamina, and battlefield

    state. Each cycle differs because the READ differs.

    1. Airborne? → Read, mark target, prep dive.

    2. READ right? → Commit (choose dive type).

    3. Grounded? → Weapon combos, poison, dash-evade, find re-ascend window.

    4. Can re-ascend? → Lift Off. Repeat.



  CycleTiming:

    Optimal: "12-15s (fast reader, efficient ground)"

    Standard: "15-18s (comfortable)"

    Slow: "18-22s (cautious, extra hover for safety)"

    Note: "Variance acceptable. Cautious = fewer dives but better accuracy. Aggressive = more dives, more risk."



  DecisionTree:

    AerialPhase:

      Entry: "Re-ascend → 30 AU"

      Actions: "Climb altitude. Mark target. Apply aerial debuffs. Check positioning. COMMIT or WAIT."

      Exit: "Commit dive"

      Duration: "4-8s (2-4 aerial GCDs)"



    DivePhase:

      Entry: "Committed — trajectory locked"

      Actions: "NOTHING can change. Descent regen active. Stamina recovering."

      Exit: "Impact"

      Duration: "0.4-1.2s"



    GroundPhase:

      Entry: "Impact → Grounded Duration begins"

      Actions: "Neurotoxin Sheath → weapon combo → DASH threats → Lift Off when duration expires"

      Exit: "Lift Off → 30 AU"

      Duration: "6-10s"



  NoBurstCadence: >

    NO 2-minute burst window. Terminal Velocity (120s) used SITUATIONALLY.

    Dive Accelerant (45s) used when READ demands it. Damage output consistent

    per dive cycle — variance is in cycle speed and accuracy, not buff alignment.



# ─────────────────────────────────────────────────────────────────────────────

# SECTION 8: ANTI-PATTERNS

# ─────────────────────────────────────────────────────────────────────────────



AntiPatterns:

  - Pattern: "Hovering indefinitely without committing"

    Why: "Drains stamina without dealing damage. 2-4 GCDs max before commit or descend-reset."



  - Pattern: "Diving without marking"

    Why: "Loses +10% potency AND trajectory preview. One GCD cost. Always mark."



  - Pattern: "Staying grounded voluntarily"

    Why: "Ground = 55-60% DPS. Every second past Grounded Duration is wasted output."



  - Pattern: "Fixed-cadence diving (every 15s exactly)"

    Why: "Cycle is READ-DEPENDENT, not timer-dependent. Variable timing = correct."



  - Pattern: "Ignoring ground poison"

    Why: "Poison bridges dive cycles. EVERY ground phase needs Neurotoxin + weapon hits."



  - Pattern: "Using Featherward as tanking tool"

    Why: "Barrier = emergency backup. Dodge FIRST. Barrier catches FAILURES."



  - Pattern: "2-minute burst alignment"

    Why: "Terminal Velocity is situational, not on a timer. No burst-window mentality."



  - Pattern: "Scatterfall on single targets"

    Why: "Lower per-target than Raptor Dive. Single target = Piercing Plunge. Scatterfall = 3+ only."



  - Pattern: "RNG proc expectations"

    Why: "ZERO random procs. Everything conditional (HP%, positional, marked, poisoned)."



# ─────────────────────────────────────────────────────────────────────────────

# SECTION 8b: ITEM BASELINE — WHAT THIS CLASS REPLACES

# ─────────────────────────────────────────────────────────────────────────────



ItemBaseline:

  Philosophy: >

    A party without a Strix relies on consumables for one-shot AoE, brief

    elevation, or reconnaissance. NO item sustains a character in the air for

    extended periods allowing continuous battlefield reading + dive selection.

    Items are reactive (throw NOW). The Strix is proactive (read → calculate →

    commit → devastate).



  Replaces:

    - Item: "Upheaval Flask"

      Function: "AoE eruption (3m radius, launches enemies airborne 1.5s)"

      WhyClassBetter: >

        Fixed damage, launches enemies UP not player going DOWN, 1.5s window

        doesn't scale with setup time, no pre-calculation phase.



    - Item: "Brineshelf Compound"

      Function: "Creates 2m×2m elevated platform (1.5m high)"

      WhyClassBetter: >

        Static, 3s delay, only 1.5m (not true flight), no dive capability,

        exposes to anti-air without escape route.



    - Item: "Springboard Disc"

      Function: "Launch 6m up + 4m directional — vertical mobility"

      WhyClassBetter: >

        Fixed point (must return to disc), doesn't sustain in air, no hover

        for reading, immediate descent. Strix STAYS at altitude.



    - Item: "Charcoal Pine Bundle"

      Function: "Thrown fire projectile — ranged poke for melee"

      WhyClassBetter: >

        Fixed damage, no AoE, no pre-calculation reward, single use.

        Strix dive IS the ranged-into-melee attack but AoE + altitude-scaled.



    - Item: "Aerial Vantage Scope"

      Function: "10s bird's-eye enemy reveal on HUD"

      WhyClassBetter: >

        10s only, only INFORMATION (no damage), requires stopping, doesn't

        enable engagement from the information. Strix sees AND strikes.



    - Item: "Gravwell Orb"

      Function: "Clusters enemies (4m pull, 3s) — set up AoE"

      WhyClassBetter: >

        3s clustering only, requires separate damage action, ground-level throw.

        Strix pre-calculation INCLUDES target clustering into dive path.



    - Item: "Concussion Charge"

      Function: "90° cone blast, 6m range, pushes 4m"

      WhyClassBetter: >

        2s delay, ground-level, fixed direction. Strix hits from ABOVE with

        kinetic mass × velocity — fundamentally different damage profile.



  ClassAdvantage: >

    Persistent altitude as a strategic resource. No item sustains flight for

    continuous reading + optimal timing. Items provide one-shot AoE or brief

    elevation. Strix provides ONGOING aerial dominance. Pre-calculation phase

    is exclusive: damage scales from altitude × mass × velocity, exceeding any

    thrown consumable. SPD 15 means even grounded, Strix escapes back to air

    faster than enemies can punish.



