    - {condition: "Desert, Slime 25y", outcome: "~8s to danger (fast drain)."}
    - {condition: "3× Flash Command in 5s", outcome: "45 Moisture gone. DR collapse."}
    - {condition: "Convergence → exit into AoE", outcome: "0 Moisture + damage = death unless planned."}

