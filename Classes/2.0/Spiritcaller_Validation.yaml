# ═══════════════════════════════════════════════════════════════════════════════
# DUAL-ENTITY EFFICIENCY ANALYSIS
# ═══════════════════════════════════════════════════════════════════════════════

dual_entity_efficiency:
  core_question: "Can Drakol maintain full DPS while directing Slime heals?"
  answer: "YES with SR-dependent attention tax."

  attention_tax:
    # SR    | DPS Loss | Cause
    sr1:     ["0-3%",   "Slime on Follow. Autonomous."]
    sr2:     ["5-12%",  "2-4 repositions/min. Brief decision pauses."]
    sr3:     ["12-20%", "8-12 repos/min. Flash Commands. Active monitoring."]
    sr4:     ["15-25%", "Constant micro. Every GCD includes positioning decision."]

  why_loss_is_small:
    - "Commands are oGCD (0.3s). Never clip GCD."
    - "Combo deliberately simple (3-hit). No execution bandwidth needed."
    - "Loss manifests as missed positionals, not dropped GCDs."

  why_loss_exists:
    - "Delayed positional crits (watching gauge instead of enemy rear)"
    - "Suboptimal combo choice (attention elsewhere)"
    - "Melee disengagement for distance adjustment"
    - "Cast-time skills skipped to weave Slime commands"
    - "Decision fatigue in extended encounters"

  optimal_attention_cycle:
    pattern: "GCD → 0.3s command weave → check Moisture → GCD → evaluate → GCD → redirect if needed"
    repos_per_min: "8-12 during active healing"
    mode_switches_per_encounter: "3-5"

# ═══════════════════════════════════════════════════════════════════════════════
# WEAKNESS BUDGET
# ═══════════════════════════════════════════════════════════════════════════════

weakness_budget:

  fire_and_heat:
    severity: "HIGH"
    mechanism: "Desert/volcanic: -3 to -4 additional Moisture/3s"
    impact: "Safe window shrinks 12s→7-8s. Puddles evaporate 50% faster."
    slime: "UNAFFECTED (invulnerable spirit). Only Drakol skin dries."
    counterplay: "Stay near water sources. Shorter extension distances. Puddle self-anchoring."

  anti_magic_environments:
    severity: "LOW-MODERATE"
    mechanism: "Anti-magic fields suppress magical effects"
    slime_status: "Spirit NOT disabled (no HP to drain). Movement unaffected. Moisture gen unaffected."
    suppressed: "Slime healing/damage -50% in field. Water GCD skills fully suppressed in zone."
    intact: "Moisture gauge (biological). Melee combo. Slime movement."
    counterplay: "Position Slime outside field edge. Pre-place puddles. Physical combo only inside."

  forced_separation:
    severity: "CRITICAL"
    mechanism: "Mechanic forces 40y+ distance or prevents recall"
    impact: "Doubled drain (-10/3s). Desiccated in ~10s from full. Death probable if sustained 15s."
    counterplay: "Pre-bank to 100. Scale Hardening. Brine Armor. Stand in puddle (+4/3s offset)."
    design_intent: "THE primary encounter counter. Requires planning. Catches unprepared players."

  multi_burst_heal_demand:
    severity: "MODERATE-HIGH"
    mechanism: "3+ allies need immediate heals, spread beyond 8y radius"
    impact: "Slime covers 1-2 clusters only. No GCD backup heal exists."
    counterplay: "Flash Command rapid-fire (15 Moisture each). Torrent Wave (15y line). Convergence if central."
    design_intent: "Weakness vs Elementalist (targeted heals anywhere). SC answers with planning not reaction."

  melee_disengagement:
    severity: "MODERATE"
    mechanism: "Knockback / forced movement out of 4y range"
    impact: "DPS drops to 25-35% (Torrent Lance at 15 Moisture each). Healing UNAFFECTED."
    counterplay: "Tidal Rush (gap close, 10 Moisture). Skewering Dive (15y lunge). Accept 1-2 ranged GCDs."

