# SPIRITCALLER (Tidebinder) — Validation & Balance Specification
# ═══════════════════════════════════════════════════════════════════════════════

header:
  class_name: "Spiritcaller"
  alternate_name: "Tidebinder"
  file_scope: "Balance targets, matchup scenarios, pass/fail checks, §25 compliance, dual-entity efficiency"
  design_authority: "Spiritcaller_Design.yaml"
  skills_authority: "Spiritcaller_Skills.yaml"
  last_updated: "2026-07-14"
  validation_status: "Qualitative Complete — Awaiting Layer 1 Numerical Pass"
  racial_lock: "Lower Drakol (Biological)"
  execution_tier: "Experienced"
  role: "Healer (Sustain / Positional / Dual-Entity)"

# ═══════════════════════════════════════════════════════════════════════════════
# BALANCE TARGETS
# ═══════════════════════════════════════════════════════════════════════════════

balance_targets:
  reference: "BalanceTargets.yaml — Healer baseline 65%, PureDPS mode 80%"

  dps_by_mode:
    # Mode                         | % of DPS Ref | Condition
    healing_active_slime_far:       [53, 58]       # Slime 20-30y, attention split
    healing_passive_slime_near:     [60, 67]       # Slime <15y on Follow, full melee
    pure_dps_slime_damage:          [68, 75]       # Slime Damage mode, full combo
    convergence_window:             [80, 90]       # 15s merge (free water + amp)
    forced_ranged_only:             [25, 35]       # Torrent Lance spam (costly)

  encounter_averaged:
    perfect_play: [63, 68]   # Full melee uptime, optimal pulsing
    average_play: [55, 62]   # Some Moisture mistakes, delayed recalls
    poor_play:    [40, 50]   # Frequent Desiccated, Slime idle

  healing_throughput_pct_party_hp_per_min:
    slime_passive_nearby:     50   # Heal mode, close, unmodified
    slime_repositioned:       80   # Sent to damaged allies, Surge windows
    extreme_sacrifice:        110  # Full Moisture sacrifice, Surge + Swell spam
    convergence_burst:        140  # Merge window only (15s cap)
    note: "Throughput >80% costs personal DR. 110% = Desiccated imminent."

  timing:
    gcd_base: 2.0s
    gcd_haste_cap: 1.4s
    ogcd_lock: 0.6s
    slime_command_lock: 0.3s
    weave_model: single_weave_only

  moisture_economy:
    full_recharge: "~20s (Slime 0-10y, net +6-7/3s)"
    full_recharge_intensity: "~13s (hard content +50% gen)"
    depletion_distance: "~30s (Slime 30y+, no skills)"
    depletion_aggressive: "~15s (Slime far + water spam)"
    safe_extension: "~12s at 80 before danger zone (40)"
    convergence_cycle: "30-45s normal, 20-30s hard content"

  potency_bands:
    melee_combo_avg: "~143p/GCD (100→130→200 / 3)"
    slime_heal_per_sec: "50-67 (150-200p / 3s)"
    slime_damage_per_sec: "17-23 (50-70p / 3s)"
    swell_burst: 350
    convergence_total: "600-700p equiv over 15s"

  hard_caps:
    - "DPS (Drakol + Slime) ≤ 75% of pure DPS reference"
    - "Healing throughput ≤ 120% of Elementalist baseline"
    - "Moisture DR + class DR ≤ 35% total (20% + 10% Scale Hardening = 30% max)"

# ═══════════════════════════════════════════════════════════════════════════════
# MATCHUP SCENARIOS
# ═══════════════════════════════════════════════════════════════════════════════

matchup_scenarios:

  sr1_dungeon_clustered:
    name: "SR1 — Party Clustered, Simple Healing"
    party_spread: "10-15y cluster"
    enemy_behavior: "Attack nearest. No tactics."
    healing_pressure: "Low (2-3% party HP/3s)"
    spiritcaller_play:
      slime: "Heal mode, center of cluster. Follow Ally. Nearly autonomous."
      drakol: "Full melee combo. Undertow Slam for puddles. Depth Pressure on CD."
      moisture: "Saturated 75-90. No drain."
    expected:
      dps: "68-75% ref (pure DPS mode)"
      healing: "50% HP/min passive (sufficient)"
      deaths: 0
    pass_criteria:
      - "Party HP ≥ 60% at all times"
      - "Moisture ≥ 60 for >90% of combat"
      - "GCD timeline = 100% damage (zero GCD heals)"
    validation: "Comfort zone. No tension. Confirms floor."

  sr2_party_split:
    name: "SR2 — Party Split 25y, Slime Must Choose"
    party_spread: "25-30y between groups"
    enemy_behavior: "Path to casters. Flanking."
    healing_pressure: "Group A taking 5-8% HP/3s without heals"
    spiritcaller_play:
      optimal: "Pulse pattern — send 6-9s (2-3 ticks, 300-600p) → recall → regen 4-6s → repeat"
      moisture_timeline: "80→55 (9s extend) → recall+15=70 → regen→80 (6s) → repeat"
      emergency: "Flash Command (15 Moisture) for instant delivery if Group A critical"
    expected:
      dps: "55-62% ref (attention split)"
      healing: "60-70% HP/min on Group A (intermittent)"
      moisture_avg: "55-75 (oscillating)"
      deaths: "0-1"
    pass_criteria:
      - "Moisture never reaches 0 during normal oscillation"
      - "Group A receives healing ≥ 50% of combat duration"
      - "Drakol survives drain windows without external healing"
      - "DPS ≥ 53% reference"
    validation: "THE core tension scenario. Oscillation pattern = intended gameplay."

  sr3_enemies_exploit_separation:
    name: "SR3 — Intelligent Enemies Target Drakol During Deployment"
    enemy_behavior: "Boss AoE displaces allies from Slime. Adds target Drakol."
    healing_pressure: "High (8-12% party HP/3s)"
    spiritcaller_play:
      slime: "Unpredictable positioning. Flash Command to dodge boss knockback timing."
      survival: "Scale Hardening for adds. Brine Armor when Moisture ≥60. Time extensions to add downtime."
      moisture: "Hovering 50-70 (lean). Convergence for transitions."
    expected:
      dps: "48-55% ref (survival + repositioning)"
      healing: "75-85% HP/min (Surge windows)"
      moisture_avg: "45-65 (lean)"
      deaths: "0-1 (Moisture mismanagement = death)"
    pass_criteria:
      - "Drakol survives ≥80% of encounter"
      - "Healing meets encounter check (no party wipe)"
      - "Flash Command used ≥2 times reactively"
      - "Convergence used ≥1 during transition"
      - "Moisture never flatlines at 0 for >6s"
    validation: "Confirms Slime invulnerability ≠ free pass. Enemies exploit DRAKOL vulnerability."

  aquatic_environment:
    name: "Aquatic — Slime at Full Power, Environmental Advantage"
    environment: "Underwater (Moisture locked 100) or flooded (+6/3s)"
    spiritcaller_play:
      slime: "Permanent max-range deployment. No recall needed."
      drakol: "Full melee + water skills without DR penalty."
      attention: "Reduced — no Moisture monitoring. Focus on positioning optimization."
    expected:
      dps: "75-85% ref (ceiling case)"
      healing: "90-100% HP/min (permanent Surge-eligible)"
      moisture: "95-100"
      deaths: 0
    pass_criteria:
      - "DPS ≤ 85% reference (healer cap holds even in ideal conditions)"
      - "Healing ≤ 120% of Elementalist (hard cap)"
      - "Advantage = COMFORT not POWER (removes tension, doesn't break caps)"
    validation: "Removes tension, not skill. Caps still hold. Vacation scenario."

