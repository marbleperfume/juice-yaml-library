system_interactions:

  strategy_rank_scaling:
    sr1: {enemy: "Ignore Slime. Attack nearest.", sc_difficulty: "Trivial"}
    sr2: {enemy: "Path to casters. Ignore Slime.", sc_difficulty: "Low-Moderate"}
