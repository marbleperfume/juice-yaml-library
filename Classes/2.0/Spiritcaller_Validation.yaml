  soft_constraints:
    CON-01: ["Leash distance",        "20-30y",  "15-35y"]
    CON-02: ["DR per Moisture point",  "0.2%",   "0.15-0.25%"]
    CON-03: ["Heal tick rate",         "3s",     "2.5-4s"]
    CON-04: ["Swell Burst CD",         "5s",     "4-8s"]
