  Siegebreaker:
    Subtype: "Crane / Battering Ram"
    Strengths: [unstoppable_advance, throws_enemies, breaks_fortifications, linear_clear]
    Weaknesses: [directional_only, sidestep_ignored, no_area_denial, no_vertical]
