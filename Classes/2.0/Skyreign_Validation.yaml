# SECTION 5: CHAIN REACTION AUDIT (§28)
# ═══════════════════════════════════════════════════════════════════════════

ChainReactionAudit:

  Rule: >
    §28: Chain Reactions ≠ crits. Overlapping terrain + BL reactions = chain
    reactions (separate bonus damage event). Must NOT be labeled CritCondition.

  FlaggedInstances:

    Flag_01:
      File: Skyreign_Skills_Draconite.yaml
      Location: "BlackLightning.CritCondition"
      Current: "Trigger: Reaction triggered (external element contact) → 1.5x DoT tick"
      Issue: "BL reaction IS a chain reaction (§28), mislabeled as CritCondition"
      ShouldBe: "ChainReaction section — bonus damage event, not crit multiplier"

    Flag_02:
      File: Skyreign_Skills_Dragonguard.yaml
      Location: "BreathTerrainLine.CritCondition"
      Current: "Enemy standing IN existing terrain when new line crosses it"
      Issue: "Overlapping terrain = chain reaction (§28), not positional crit"
      ShouldBe: "ChainReaction — overlap produces separate elemental burst"

    Flag_03:
      File: Skyreign_Design.yaml
      Location: "CritSystem.Conditions.Draconite_BlackLightning"
      Current: "Reaction triggered (external element contact)"
      Issue: "Design file lists chain reaction under CritSystem heading"
      ShouldBe: "Separate ChainReactions section in Design file"
      Severity: HIGH (Design = higher authority)

    Flag_04:
      File: Skyreign_Skills_Draconite.yaml
      Location: "CritConditions summary block"
      Current: "BlackLightning: {Trigger: Reaction fires, Multiplier: 1.5x}"
      Issue: "Consolidated crit table includes reaction (same as Flag_01)"

  CorrectCrits: >
    All other CritConditions are TRUE crits: mid-action interrupt, >50%HP,
    cone center, from behind, 2+ enemies, full combo, groggy. These stay.

  Action: "Future correction pass on 4 instances. Do NOT modify source files here."
  InstancesTotal: 4 | Severity: {HIGH: 1, MODERATE: 3}

