# ═══════════════════════════════════════════════════════════════════════════════════
# TYPICAL COMBAT SEQUENCES (NOT ROTATIONS — contextual examples)
# ═══════════════════════════════════════════════════════════════════════════════════

combat_sequences:
  note: "These are EXAMPLES, not rotations. Correct sequence depends on encounter state."

  safe_healing_mode:
    description: "Party under pressure. Stay at range. Maximize throughput."
    sequence:
      - "Tidal Hymn (GCD) — AoE heal, build Resonance"
      - "Keening Pulse (oGCD) — spot heal lowest"
      - "Tidal Hymn (GCD) — now at Warm (100%)"
      - "Shattercroon (oGCD) — interrupt enemy cast"
      - "Harmonic Wash (GCD) — heavy AoE, no weave"
      - "Tidal Hymn (GCD) — maintain Warm/push Resonant"
    output: "~1200p healing over 8s. Zero damage. Full commitment to role."

  breach_strike_splash:
    description: "Party stable. One dive cycle. In and out."
    sequence:
      - "Rift Dive (GCD, -1 Pressure) — 250p damage, +25 Hydration"
      - "Geyser Burst (oGCD) — 280p, crit if within 2s"
      - "Breaching Strike (GCD) — 180p, +0.25 Pressure, crit if >50%"
      - "Return Tide (oGCD, -1 Pressure) — escape, +25 Hydration"
      - "Tidal Hymn (GCD) — resume healing (Cold = 70%)"
      - "Keening Pulse (oGCD) — spot heal"
    output: "~710p+ damage in 4s, +50 Hydration. 2 Pressure spent. Cold tax on return."
    time_away: "~4s (2 GCDs in melee)"

  extended_aggression:
    description: "DPS check phase. Push damage. Accept healing debt."
    sequence:
      - "Rift Dive (GCD, -1) — 250p + knockback"
      - "Geyser Burst (oGCD) — 280p crit"
      - "Breaching Strike (GCD) — 180p crit (>50%), +0.25"
      - "Pressure Wave (cannot — in melee. Skip.)"
