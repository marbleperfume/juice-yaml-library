# SOUND / HEALING ABILITIES (8 abilities)
# ═══════════════════════════════════════════════════════════════════════════════════

sound_healing:

  - name: "Tidal Hymn"
    delivery: Sound
    type: GCD
    classification: Heal
    school: MED
    cast_time: "1.5s channel (2 ticks)"
    gcd: "2.0s base"
    weave_window: "0.5s (tight — prefer not to weave)"
    range: "20m radius, omnidirectional"
    los_required: "No — 70% potency through 1 wall"
    potency: "120p per tick × 2 = 240p total (AoE)"
    hydration_scaling: "Potency × (Hydration%/100). At 80+: full. At 40: 85%. At 15: 65%."
    cooldown: "None (GCD-gated)"
    resonance_interaction: "Builds toward Warm/Resonant. Warm = 100% potency. Resonant = 120% + 5m radius."
    item_replaced: "Healing Specter"
    decision: "1.5s immobility. Safe at range. Dangerous in contested space. Weave slot is tight."
    notes: "Primary healing GCD. What you SHOULD be pressing. Stationary — moving cancels."
    # Typed effects per Schemas/EffectTypes.yaml (worked-example migration —
    # legacy fields above retained; typed form below is the canonical mechanics)
    ScalingStat: Med
    Effects:
      - Type: HoT
        Potency: 120
        Ticks: 2
        Duration: "1.5s channel"
        Targeting: Area_Circle
        Range: "20m radius, omnidirectional"
        Condition: "Potency × (Hydration%/100); Resonance state scales further (Warm 100%, Resonant 120% + 5m radius)"
        Flavor: "A sung tide — healing carried on sound, washing over everyone in earshot, walls be damned (70% through 1 wall)."

  - name: "Keening Pulse"
    delivery: Sound
    type: oGCD
    classification: Heal
    school: MED
    cast_time: "Instant"
    animation_lock: "0.6s"
    range: "25m, single-target (auto-targets lowest-HP ally)"
    los_required: "No — omnidirectional"
    potency: "300p (single-target)"
    hydration_scaling: "Same as Tidal Hymn"
    cooldown: "8s"
    resonance_interaction: "Counts toward Resonance build (is vocalization)"
    item_replaced: "Rejuvenation Flask"
    decision: "Burns your one oGCD slot. Heal before dive, or save slot for Geyser Burst after?"
    notes: "Emergency oGCD heal. Last heal before committing to dive."

  - name: "Harmonic Wash"
    delivery: Sound
    type: GCD
    classification: Heal
    school: MED
    cast_time: "2.0s (full GCD cast — NO weave window)"
    gcd: "2.0s base"
    weave_window: "NONE (2.0s cast = clips into next GCD)"
    range: "25m, 8m radius centered on densest ally cluster"
    los_required: "No — full power through LoS"
    potency: "350p (AoE — strongest GCD AoE heal)"
    hydration_scaling: "Same as Tidal Hymn"
    cooldown: "None (GCD-gated)"
    resonance_interaction: "Builds Resonance. At Resonant: 420p + 13m radius."
    item_replaced: "Rejuvenation Flask (AoE variant)"
    decision: "Maximum throughput but costs ALL action economy. No oGCD weave. Commits you fully to healing."
    notes: "Heavy AoE heal. Says 'I am a healer right now, not a diver.'"

  - name: "Resonant Shield"
    delivery: Sound
    type: oGCD
    classification: Utility
    cast_time: "Instant"
    animation_lock: "0.6s"
    range: "25m, single-target"
    effect: "Absorbs damage equal to 15% Wavecaller max HP. 8s duration. One active at a time."
    cooldown: "15s"
    item_replaced: "Hardshell Powder"
    decision: "Shield tank for buster, or shield SELF to enable safe diving? Selfless vs selfish."
    notes: "The 'permission to be aggressive' button when used on self."

  - name: "Shattercroon"
    delivery: Sound
    type: oGCD
    classification: CC
    cc_stage: "Stage 2 (Interrupt)"
    cast_time: "Instant"
    animation_lock: "0.6s"
    range: "20m"
    los_required: "No — sound propagates"
    effect: "Interrupts one enemy. 1.5s lockout on interrupted ability."
    cooldown: "5s"
    crit_condition: "N/A (CC ability)"
    item_replaced: "Stupor Bell"
    vs_shaman: "FASTER (5s vs 10s). ACTIVE (costs attention). LESS PERSISTENT (no set-and-forget)."
    decision: "Which cast to interrupt? Can't stop everything. Prioritization IS the skill."
    notes: "Fastest reactive interrupt in game. 5s CD, 20m, no LoS. Healer identity tool."

  - name: "Undertow Lullaby"
    delivery: Sound
    type: GCD
    classification: CC_Heal
    cc_stage: "Stage 1 (Slow — -30% movement, 6s)"
    cast_time: "1.5s"
    gcd: "2.0s base"
    weave_window: "0.5s (tight)"
    range: "10m cone"
    effect: "Slows all enemies in cone -30% for 6s AND heals all allies in same cone for light potency."
    potency_heal: "100p (allies in cone)"
    potency_damage: "0 (pure CC + heal)"
    cooldown: "None (GCD-gated)"
    item_replaced: "Thickglass Flask"
    decision: "Cone requires facing enemies — turning away from retreating allies. Efficient but directional."
    notes: "Same sound wave does both CC and heal. Positioning-dependent."

  - name: "Depths Call"
    delivery: Sound
    type: GCD
    classification: BigHeal
    school: MED
    cast_time: "2.5s (LONG — NO weave, NO movement, NO interruption tolerance)"
    gcd: "2.0s base (but cast exceeds GCD — clips next)"
    weave_window: "NONE"
    range: "30m radius, ALL allies regardless of LoS"
    los_required: "No — full propagation through all obstacles"
    potency: "500p (party-wide — strongest single heal in kit)"
    hydration_scaling: "Same as Tidal Hymn"
    cooldown: "20s"
    resonance_interaction: "Builds Resonance (counts as 2 consecutive heals due to power)"
    item_replaced: "Mega Elixir"
    decision: "2.5s total immobility. Suicidal in melee. Strongest heal at safe range. Anti-dive by design."
    notes: "Emergency party heal. DEMANDS you stay at range. 20s CD is longest fixed CD on heals."

  - name: "Tidemark"
    delivery: Sound/Water
    type: GCD
    classification: Heal_Utility
    school: MED
    cast_time: "Instant"
    gcd: "2.0s base"
    weave_window: "Full (instant GCD = 1.4s weave window)"
    range: "Self + 3m radius puddle"
    effect: "Self-drench: +30 Hydration. Creates 3m water puddle (8s). Allies in puddle get 1% HP/s HoT."
    hydration_restore: 30
    cooldown: "12s internal CD (occupies a GCD)"
    item_replaced: "N/A (unique maintenance tool)"
    decision: "Costs a full GCD for maintenance. Essential on dry maps, skippable near water."
    notes: "Hydration management + party terrain creation. Map awareness determines value."

# ═══════════════════════════════════════════════════════════════════════════════════
# WATER / DAMAGE ABILITIES (7 abilities)
# ═══════════════════════════════════════════════════════════════════════════════════

water_damage:

  - name: "Rift Dive"
    delivery: Water
    type: GCD
    classification: Damage_Mobility
    cast_time: "Instant (committed movement animation ~0.8s)"
    gcd: "2.0s base"
    weave_window: "Full (instant GCD — can weave Geyser Burst on landing)"
    range: "30m targeted (dive to target location)"
    effect: >
      Generate portal → dive → emerge at target dealing heavy physical impact damage
      in 3m radius. Now IN MELEE with harpoon ready. Portal lingers 2.5s.
    potency: "250p (emergence impact, 3m AoE)"
    above_50_bonus: "+25% = 312p against targets >50% HP"
    cc_stage: "Stage 1 (2m knockback on emergence)"
    cooldown: "GCD (resource-gated)"
    pressure_cost: 1
    hydration_restore: 25
    crit_condition: "None on entry. Enables Geyser Burst crit within 2s."
    item_replaced: "Flashstep Cartridge"
    risk_profile: >
      NOT EXTREME RISK. Dive itself is safe. The "risk" is team HP dropping while
      you DPS. Not personal death — THEIR deaths through healing absence.
    decision: "Every dive = 'My party can survive X seconds without me.' Wrong = they die. Right = enemy dies."
    notes: "Primary gap-close + damage opener + rehydration. The ability that CALLS to you."

  - name: "Breaching Strike"
    delivery: Water/Physical
    type: GCD
    classification: Damage
    weapon: Harpoon
    cast_time: "Instant"
    gcd: "2.0s base"
    weave_window: "Full"
    range: "0-3m (melee, polearm reach)"
    effect: "Harpoon thrust enhanced by portal momentum. Single target physical damage."
    potency: "180p (single-target, melee)"
    above_50_bonus: "+25% = 225p against targets >50% HP"
    crit_condition: "Conditional crit if target above 50% HP (guaranteed crit on >50% HP targets)"
    cooldown: "None (GCD-gated)"
    pressure_refund: 0.25
    item_replaced: "Concussion Charge"
    decision: "Each strike in melee = GCD not healing. But refunds resource for future dives. How greedy?"
    notes: "Harpoon filler. Rewards aggression with resource. 'One more hit' temptation."

  - name: "Undertow Slam"
    delivery: Water
    type: GCD
    classification: Damage_AoE
    cast_time: "Instant"
    gcd: "2.0s base"
    weave_window: "Full"
    range: "0-5m (melee AoE)"
    effect: "Ground-pound via harpoon butt-spike. 5m radius AoE. Leaves 2s water puddle (-20% enemy speed)."
    potency: "130p (AoE, 5m radius)"
    cc_stage: "Stage 1 (slow via difficult terrain)"
    cooldown: "None (GCD-gated)"
    pressure_refund: 0
    hydration_note: "Puddle counts as water terrain for Hydration proximity bonus"
    item_replaced: "Upheaval Flask"
    decision: "AoE damage + terrain creation vs Breaching Strike refund. Efficiency vs output."
    notes: "AoE melee option. No refund = punishes staying surrounded. Creates water terrain."

  - name: "Return Tide"
    delivery: Water
    type: oGCD
    classification: Mobility
    cast_time: "Instant"
    animation_lock: "0.6s"
    range: "Returns to within 5m of last entry point"
    effect: "Generate return portal → dive back. The escape. The 'splash back' in breach-strike-splash."
    cooldown: "4s"
    pressure_cost: 1
    hydration_restore: 25
    item_replaced: "Retrograde Bead"
    decision: >
      Same resource as Rift Dive. Every return = future dive NOT taken.
      Full breach-strike-splash cycle costs 2 Charges. SAFETY vs FUTURE AGGRESSION.
    notes: "Critical tension: dive costs 1, return costs 1. Being aggressive is EXPENSIVE."

  - name: "Geyser Burst"
    delivery: Water
    type: oGCD
    classification: Damage
    cast_time: "Instant"
    animation_lock: "0.6s"
    range: "3m (melee only)"
    effect: "Water jet through harpoon tip. High single-target physical damage."
    potency: "280p"
    execute_bonus: "+40% below 30% HP = 392p"
    above_50_bonus: "+25% on base = 350p (before execute check)"
    crit_condition: "Conditional crit within 2s of Rift Dive emergence (momentum crit)"
    cooldown: "12s"
    pressure_cost: 0
    item_replaced: "Charcoal Pine Bundle"
    decision: "Only in melee. Execute bonus = reason to dive 'one more time.' Worth it if target dies."
    notes: "Execute tool. The ability that makes you stay when you should leave."

  - name: "Pressure Wave"
    delivery: Water
    type: oGCD
    classification: Damage_Ranged
    cast_time: "Instant"
    animation_lock: "0.6s"
    range: "15m"
    effect: "Compressed water bolt. Low-moderate damage. Only ranged damage tool."
    potency: "100p"
    above_50_bonus: "+25% = 125p"
    crit_condition: "None (deliberately weak — no crit opportunity)"
    cooldown: "8s"
    pressure_cost: 0
    item_replaced: "Charcoal Pine Bundle (ranged variant)"
    decision: "Low damage from safety highlights the opportunity cost of NOT diving."
    notes: "Token ranged damage. Maintains dive incentive by being visibly inferior."

  - name: "Maelstrom Entry"
    delivery: Water
    type: GCD
    classification: Damage_Ultimate
    cast_time: "Instant (multi-hit animation ~4s — committed)"
    gcd: "2.0s base (locks player for full animation)"
    weave_window: "None during animation"
    range: "Same target or up to 3 targets within 8m"
    effect: >
      Triple-portal chain dive. Three sequential emergence impacts + harpoon slams.
      Massive cumulative physical damage. After: 0 Pressure Charges, 10s gland
      lockout (no Pressure generation). +75 Hydration (3 × 25).
    potency: "700p total (3 × ~233p emergence hits — CLASS ULTIMATE band)"
    above_50_bonus: "+25% per hit on >50% targets = 875p potential"
    cc_stage: "Stage 1 (3 × 2m displacement)"
    cooldown: "45s"
    pressure_cost: 3
    hydration_restore: 75
    post_lockout: "10s gland lockout → 12s first Charge regen = 22s minimum to next portal"
    risk_profile: >
      Risk is NOT personal death — risk is 10+ seconds of ZERO healing for party.
      If team survives that long, it's the highest damage available.
    decision: "Ultimate commitment. 22s minimum until next portal. Party gets ZERO heals for 10s+."
    notes: "Class ultimate. Consequence is on your team, not yourself. Use when kill is GUARANTEED."

# ═══════════════════════════════════════════════════════════════════════════════════
# HYBRID / TRANSITION ABILITIES (2 passives)
# ═══════════════════════════════════════════════════════════════════════════════════

hybrid_transition:

  - name: "Echoing Impact"
    type: Passive
    classification: Heal_Bridge
    trigger: "On Rift Dive hitting an enemy"
    effect: >
      Shockwave carries residual healing frequency. Allies within 8m of emergence
      receive small heal (~30% of Keening Pulse potency).
    potency: "~90p (AoE around emergence point, 8m)"
    decision: "Dive near wounded allies for splash-heal, or dive highest-value target regardless of ally proximity?"
    notes: "Bridge passive. Does NOT eliminate tension — tiny bonus on dives already planned."

  - name: "Depths Between"
    type: Passive
    classification: Heal_QoL
    trigger: "Any portal transit (Rift Dive, Return Tide, Maelstrom Entry)"
    effect: >
      During portal transit, voice resonates through water creating 1s healing pulse
      reaching allies within 15m of BOTH entry AND exit points.
    potency: "~60p (20% of Keening Pulse, very low — allies near both portals)"
    notes: "QoL passive. Prevents diving from being COMPLETELY zero-healing. Does not make diving safe."

