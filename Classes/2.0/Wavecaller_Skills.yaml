# ═══════════════════════════════════════════════════════════════════════════════════
# CRIT CONDITIONS (ZERO RNG — ALL CONDITIONAL)
# ═══════════════════════════════════════════════════════════════════════════════════

crit_conditions:
  rule: "Crit is NEVER random. All crit is positional or conditional."
  conditions:
    - ability: "Breaching Strike"
      condition: "Target above 50% HP"
      logic: "Synergizes with >50% HP bonus rule. Early dives crit. Late dives don't."

    - ability: "Geyser Burst"
      condition: "Within 2s of Rift Dive emergence"
      logic: "Momentum crit — rewards immediate follow-up. Loses crit if you hesitate."

    - ability: "Maelstrom Entry (each hit)"
      condition: "Each emergence hit: target above 50% HP"
      logic: "Same as Breaching Strike. Triple-dive into healthy target = triple crit potential."

  no_crit_abilities:
    - "Tidal Hymn (heals don't crit — consistent throughput)"
    - "Keening Pulse (heal — no crit)"
    - "Harmonic Wash (heal — no crit)"
    - "Depths Call (heal — no crit)"
    - "Rift Dive emergence (entry damage — no crit, enables crit on follow-up)"
    - "Pressure Wave (deliberately weak — no reward)"
    - "Undertow Slam (AoE — no crit, creates terrain instead)"

# ═══════════════════════════════════════════════════════════════════════════════════
# >50% HP ENEMY RULE INTEGRATION
# ═══════════════════════════════════════════════════════════════════════════════════

above_50_rule_integration:
  global_rule: "+25% damage to enemies above 50% HP"
  wavecaller_synergy: >
    Wavecaller's dive pattern naturally targets healthy enemies (early pressure).
    The +25% bonus rewards EARLY dives when enemies are fresh. Late dives (execute
    range) get Geyser Burst's +40% instead. Two distinct reward windows.

  affected_abilities:
    - "Rift Dive: 250p → 312p vs >50%"
    - "Breaching Strike: 180p → 225p vs >50% (PLUS guaranteed crit = ~337p)"
    - "Geyser Burst: 280p → 350p vs >50% (OR 392p below 30% — mutually exclusive)"
    - "Maelstrom Entry: 700p → 875p vs >50%"
    - "Pressure Wave: 100p → 125p vs >50%"
    - "Undertow Slam: 130p → 162p vs >50%"

  tactical_implication: >
    Wavecaller should prioritize diving healthy enemies (>50% = +25% + guaranteed
    Breaching Strike crit). Once enemy drops below 50%, crit disappears but execute
    tools (Geyser Burst +40%) activate. Two distinct power spikes at different HP%.

