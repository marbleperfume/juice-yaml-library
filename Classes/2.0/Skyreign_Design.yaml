# Classes/Frontliner_DPS/Skyreign_Design.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# SKYREIGN (HBD) — Form-Cycling Frontliner/DPS [DESIGN HALF]
# ═══════════════════════════════════════════════════════════════════════════════
#
# Lineage: MH Magnamalo (commit-and-punish), DOS2 Lizard (breath terrain),
#   League Shyvana (form concept NOT execution), HotS Deathwing (presence),
#   AQ Draconian (fast hybrid)
#
# Core identity: "Your body IS the weapon — wings, claws, breath organ."
#   Dragon:      "Everything burns if you don't move." (juggernaut / support fire)
#   Dragonguard: "I fight where I land." (fast hybrid / DEFAULT form)
#   Draconite:   "Already gone." (mobile safety / rDPS enabler)
#
# References:
#   - Combat/BalanceTargets.yaml (potency bands, GCD, role baselines)
#   - DESIGN_OVERRIDE.md (§3b, §5, §9, §12, §25)
# Authority: DESIGN_OVERRIDE.md > BalanceTargets.yaml > this file > LLM.md
# ═══════════════════════════════════════════════════════════════════════════════

Key: Classes.Frontliner_DPS.Skyreign.Design

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1: CLASS IDENTITY
# ═══════════════════════════════════════════════════════════════════════════════

Identity:
  Name: Skyreign
  Race: HBD (dragonkin)
  Role: Frontliner/DPS (form-dependent)
  SubRoles:
    Dragon: Frontline Utility (juggernaut, supporting fire, displacement)
    Dragonguard: Committed Melee (breath terrain, cleave, fodder/elite specialist)
    Draconite: Mobile Safety (speed, Black Lightning rDPS, least personal damage)
  DamageType: mixed (physical claw/tail + magical breath)
  Weapon: biological (wings, claws, breath organ, tail)
  ExecutionArchetype: Form-Cycle Timing
  ExecutionTier: Special
  # SPECIAL tier — DPS split logic justifies. Available at R1 as if Base
  # (complexity absent until R2+). Restricted once form-cycling mastery demanded.

  Description: >
    HBD dragonkin whose body IS the class. Three forms = three combat modes
    of one creature. The cycle between forms IS the rotation. Timing of
    transformation is the decision space, not button sequences.

  CoreFantasy: >
    You are the dragon. Wings carry you, claws rend, breath organ charges
    fire. At R1 you rain destruction on helpless enemies. At R2+ you become
    the terror that scatters enemies into your team's kill zones.

  InputModality:
    PrimaryFocus: form_timing_decisions
    SecondaryFocus: breath_gauge_management (form-local)
    TertiaryFocus: safety_vs_commitment (Draconite speed vs Dragonguard damage)
    DecisionType: commitment_timing

  StatPriority:
    Primary: MAGICCAP  # 18 — breath potency ceiling
    Secondary: MAG     # 15 — breath base, magic projectiles
    Tertiary: STR      # 15 — claw damage, tail strikes

  FailureStates:
    WrongForm: {Cost: "Dragon vs mobile enemies = wasted CDs, breath misses.", Severity: HIGH}
    BreathLostToSwap: {Cost: "Gauge resets on swap. Charge time wasted.", Severity: HIGH}
    DragonCDsUnready: {Cost: "Enter Dragon with nothing available = dead weight.", Severity: MODERATE}
    StackDecay: {Cost: "Full disengage loses Draconite stacks.", Severity: MODERATE}
    SuperArmorTrap: {Cost: "Dragon stays IN AoE/trap. No knockback escape.", Severity: HIGH}

  SingleLimitation: >
    FORM-LOCAL BREATH GAUGE. Swapping resets charge progress. Cannot bank
    power across forms — must COMMIT long enough to deliver.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: RACIAL LOCK — HBD (BIOLOGICAL)
# ═══════════════════════════════════════════════════════════════════════════════

RacialLock:
  Race: HBD
  ParentCategory: Dragonkin
  Enforcement: biological_lock
  Trait: draconic_physiology

  LockJustification: >
    Body IS class. Wings = Dragon flight. Claws = Draconite weapons.
    Breath organ = shared resource. No other race has these structures.
    Cannot be taught — born with it or not.

  RacialSynergy:
    - "Wings = Dragon flight + Dragonguard hawk-dive"
    - "Claws = Draconite weapon (biological, NOT gauntlets)"
    - "Breath organ = shared gauge system"
    - "Tail = Draconite strikes + Dragon stabilization"
    - "MAGICCAP 18 = highest magic ceiling, breath potency"
    - "MAG 15 + STR 15 = balanced hybrid"

  RacialStats: {MAGICCAP: 18, MAG: 15, STR: 15}

  SizeModel:
    Dragon: Large (aerial, committed movement, big hitbox)
    Dragonguard: Medium-Large (grounded, wings folded)
    Draconite: Medium (crouched, compact, claw-forward)
    ClawDistinction: >
      HBD have ACTUAL CLAWS (racial weapon). Midnights have human hands +
      gauntlets/anklets. NOT the same. HBD claws = bone-and-keratin grown
      from fingers. No equipment slot — they ARE the weapon.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3: ROLE OBJECTIVE & FRONTLINE IDENTITY
# ═══════════════════════════════════════════════════════════════════════════════

RoleObjective:
  Type: form_dependent_split
  DPSTarget:
    Dragon: "75-80% of DPS ref (frontline utility tax)"
    Dragonguard: "95-102% of DPS ref (committed melee, cleave, highest personal output)"
    Draconite: "70-78% personal DPS ref + rDPS contribution via Black Lightning reactions"
    Blended: "~88-92% effective over full encounter (personal + rDPS)"

  DPSPhilosophy: >
    Dragonguard is THE damage form. Broader swings, committed breath, cleave.
    Draconite trades personal damage for SAFETY (speed, evasion) and rDPS
    (Black Lightning enables team chain reactions). This tradeoff is
    frontline-specific narrowing — would be much stronger than other classes
    if Draconite also dealt full damage while being that mobile.

  HealerCannotReplace: >
    Dragon displaces enemies off fortified positions through brute force.
    Same utility as stealth flanker but done via facetank. Healer cannot
    force enemy repositioning. Dragon enables team advance.

FrontlineIdentity:
  CoreRule: >
    Frontliners survive and force enemy movement. Healers CANNOT replace
    facetanking and route coverage.

  FrontlineSubtypes:
    PinpointDefense:
      Classes: [Adabold, Madolt Metaknight]
      Identity: >
        Stationary defense priority. Hold a position, block a corridor,
        deny passage. The enemy comes to THEM or gets forced onto them.
        Strength = nothing passes. Weakness = can't cover wide areas.
      Adabold: "Force Targeting — physically compel enemies onto self. Corridor king."
      Metaknight: "Unfocus + Capacitor Pull — suppress AI + drag enemies into kill field. Arena king."

    CropdusterSpaceControl:
      Classes: [Skyreign]
      Identity: >
        Mobile space control. Covers AREA through movement — flies over,
        denies zones with breath terrain, displaces enemies off positions,
        suppresses with fire. A cropduster (because it flies). Does not
        HOLD ground — DENIES ground by passing over it.
      Strength: "Area coverage, multi-Z suppression, forcing enemy scatter."
      Weakness: "Cannot hold a single point indefinitely (decay DR, no stable defense)."
      DragonRole: "Facetank through, displace off turrets/vantage, suppress with fire, enable team."
      R2_Evolution: >
        Supporting fire. Enemies flee → easy targets for stealth/mobile classes.
        Dragon ENABLES team movement, not solo kills.

    CraneBatteringRam:
      Classes: [Siegebreaker]
      Identity: >
        Linear committed advance. Picks things up and throws them (crane)
        + unstoppable forward momentum (battering ram). Does not hold ground
        OR deny area — MOVES THROUGH and displaces everything in the path.
        What was behind Siegebreaker is now safe. What was in front is scattered.
      Strength: "CC immunity, unstoppable advance, throws enemies out of position entirely."
      Weakness: "Directional commitment. Cannot reverse. Enemies that sidestep are ignored."
      Crane: "Grabs enemies (STR 18 + exoskeleton) and THROWS them — repositioning tool for the team."
      BatteringRam: "Momentum build → anything in the line gets carried or shattered. Doors, barricades, enemies."

  PartySpeedBuffs: "IGNORED on Dragon form. Heals/barriers work."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4: DRAGON FORM (aerial predator / juggernaut / supporting fire)
# ═══════════════════════════════════════════════════════════════════════════════

Dragon:
  Fantasy: "Big, scary, raining fire. Juggernaut destroying everything."

  Movement: >
    Committed straight lines. Longer distance = more enemy reaction time.
    Close/initial engagement = maximum devastation. Far approach = scatter.

  AltitudeCoverage: >
    Hits across Z-levels — breath/napalm covers multiple altitudes per pass.
    NOT limited to one plane.

  SuperArmor:
    Effect: "Immune to ragdoll/knockback (Rocksteady Mantle)"
    Cost: "Stays IN AoE instead of knocked clear. Big hitbox eats everything."
    Utility: >
      Forces enemies off positions by facetanking through and displacing THEM.
      Team utility = stealth flanking via brute force.

  Abilities:
    SmokeBreath:
      Type: GCD (cone, 12y)
      Effect: "Accuracy debuff + Suffocation (coughing interrupts actions)"
      Role: "Setup tool."
      CritCondition: "Target mid-action when interrupted"

    MagicArtillery:
      Type: GCD (ranged, 20y, multi-target)
      Potency: "60-80p per projectile"
      Effect: "Ice missiles — low individual damage suppressive fire"
      Role: "Permanent magic projectiles. Pew pew pressure into breath payoff."

    NapalmBreath:
      Type: GCD (charged, cone/line, multi-Z)
      Effect: "Area denial terrain + direct damage. THE PAYOFF."
      GaugeReq: "50%+ for partial, 100% for full"
      CritCondition: "Direct hit (cone center, not edge)"

    DragonRejuvenation:
      Type: oGCD (self)
      Effect: "Crystallize — DECAYING damage reduction + self-heal. Locks offensive actions."
      Role: "Push-through survival when Dragon cannot evade (super armor keeps you IN damage)."
      Gate: "Short CD (10-15s). Decaying DR = repeated use gives diminishing value."
      DecayModel: >
        Duration-based decay (NOT repetitive-use penalty). DR starts high
        (e.g. 50%) and falls toward 0% over 4-5s. Player pushes THROUGH
        the damage zone during the strong portion, then must be CLEAR or
        swap forms before DR expires. Cannot sit and hold like Electron Guard.
      DesignStandard: >
        Electron Guard (Metaknight): CONSISTENCY gate — gauge drain prevents
        indefinite hold. Sustained, stable DR while active.
        Dragon Rejuvenation (Skyreign): DECAY gate — benefit diminishes over
        duration. Burst of safety that forces continued movement.
        Both prevent "I sit here forever." Different mechanisms.
      AntiIdentityCrisis: >
        Skyreign prefers offensive positioning and active adjustment. It
        CANNOT be a stable standalone "sit here" class or it invalidates
        Adabold and Metaknight. Decaying DR enforces this — you MUST leave.

  CooldownModel: >
    Skills have CDs refreshed ONLY by stack system from other forms.
    NOT refreshed by time alone.

  R1: "Enemies DON'T MOVE. Full power fantasy. Everything dies."
  R2_Plus: >
    Enemies run on sight. Supporting fire — fleeing enemies = easy team
    targets. Cannot deal damage unless enemies are immobile (CC'd, cornered, R1).

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5: DRAGONGUARD FORM (committed melee — THE DEFAULT)
# ═══════════════════════════════════════════════════════════════════════════════

Dragonguard:
  Fantasy: "AQ Draconian committed hybrid. Where you LIVE most of the time."
  Role: >
    HIGHEST personal DPS form. Broader swings with cleave, committed breath
    attacks, stronger basic game plans. Fodder specialist, elite/miniboss
    specialist (especially ones that spawn adds — cleave matters). The form
    where you COMMIT and are rewarded for it.

  BreathTerrain: "DOS2 lizard — fire/ice/poison ground placement. Line in front. Persistent."

  Abilities:
    HawkDive:
      Type: GCD (aerial dash → ground impact)
      Effect: "Dash → impact first enemy → small AoE knockup (Zac E style)"
      FollowUp: "Charge breath while enemies recover from knockup"
      CDNote: "Much lower CD than Dragon aerial movement, fewer targets, MORE commit"

    BreathTerrainLine:
      Type: GCD (line AoE, ground-persistent 8-10s)
      Effect: "Lay breath element as terrain. Zone denial + DoT for crossers."
      Commit: "Long startup animation, broad coverage, punished if whiffed on mobile targets."

    CleaveCombo:
      Type: GCD combo (3-hit, wide arcs)
      Effect: "Broad wing/claw sweeps. Hits multiple targets per swing. Primary DPS."
      Commit: "Wider arcs = longer recovery frames. Punished by flanking enemies."

  StackGeneration: "Each GCD landed builds stacks toward Dragon CD refresh."
  BreathChargeRate: "Moderate — via combat (hitting and being hit)"
  Tradeoff: "Highest damage, most commitment per action. Wrong form when you need to LEAVE."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 6: DRACONITE FORM (mobile safety + rDPS enabler)
# ═══════════════════════════════════════════════════════════════════════════════

Draconite:
  Fantasy: "Speed, evasion, Black Lightning debuff application, team enabler."
  Role: >
    SAFEST form. Highest speed, least personal damage. Black Lightning debuff
    allows DPS teammates to chain react and add rDPS. This is a
    frontline-specific narrowing: would be much stronger than other classes
    if Draconite also dealt full damage while being this mobile.
    The CONVENIENCE form — you go here when pressure demands mobility.

  Abilities:
    BlackLightning:
      Type: GCD (applied DoT)
      Effect: "Low personal damage DoT. Does NOTHING special alone."
      ReactionRule: >
        ONLY reacts when EXTERNAL element source touches DoT'd target.
        Draconite ALONE cannot trigger. Needs team or form swap.
      Sources: ["Teammate elemental spell", "Item/flask/bomb", "Dragonguard breath terrain", "Environmental hazard"]
      rDPS: >
        Black Lightning's VALUE is enabling teammates. The Skyreign's personal
        DPS drops, but party-wide DPS rises through chain reactions. Skyreign
        is SETTING UP, not executing.

    ClawCombo:
      Type: GCD combo (4-5 hit, narrow)
      Effect: "Fast narrow claw strikes + tail sweeps. Lower potency per hit than Dragonguard cleave."
      Mobility: "Short recovery frames. Can reposition between hits. Never locked in place."

  EvasionStat:
    Rule: >
      Draconite form grants PASSIVE evasion stat bonus. Not a skill, not
      an active — baked into the form itself. The other two forms do NOT
      share this. Dragon is super-armored (stays in damage). Dragonguard
      commits to wide arcs (recovery frames = vulnerable). Draconite is
      FAST and DODGES as a baseline property.
    Implementation: "+EVA% while in Draconite form (flat bonus, always on)"
    WhyNotASkill: >
      Survival skills are bloat for an offense-oriented class unless they
      have a linked cause (unavoidable damage, animation interruption).
      Draconite's survival IS the evasion stat — no button needed.
      The form swap IS the defensive decision.

  KitingModel: >
    CAN kite and maintain stacks — hitting while moving = fine. Stacks
    decay ONLY on full combat disengage (stop hitting entirely).

  BestFor: "When you need to MOVE. Pressure situations, mobile targets, tight spaces, retreating."
  Tradeoff: >
    Lowest personal damage of all three forms. Compensated by rDPS from
    Black Lightning AND by not dying. The decision: stay in Dragonguard
    (higher DPS, risk getting hit) or swap Draconite (safe, enable team,
    lower personal output)?
  BossNote: >
    On bosses: maintain Black Lightning, kite safely, let team react off it.
    Swap Dragon during groggy/downed state (free damage, immobile target).
    Swap Dragonguard when openings are read.

  BreathChargeRate: "Combo-hit only (must be attacking, no passive charge)"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 7: BREATH SYSTEM (shared resource, form-local gauge)
# ═══════════════════════════════════════════════════════════════════════════════

BreathSystem:
  Type: gauge (0-100, form-local, resets on swap)

  BreathPrep:
    Activation: oGCD
    Effect: "SLOWS user (NOT root) + locks melee until gauge passes 50%"
    Tell: "Audible/visible rev. Sound-based trigger."
    EnemyReaction: "SR2+ enemies hear, react (scatter/interrupt/dodge)"

  ChargeRates:
    Dragon: "Fast passive (charges while flying, no action required)"
    Dragonguard: "Moderate via combat (hitting and being hit)"
    Draconite: "Combo-hit only (must be attacking — no passive)"

  Delivery:
    Dragon: "AoE (multi-Z cone/napalm)"
    Dragonguard: "Path terrain (line in front, persistent)"
    Draconite: "Black Lightning (DoT + reaction proxy)"

  FormLocal: >
    Resets on swap. Cannot bank across forms. 80% charge lost if you swap =
    real cost. This + CD system = why you commit to forms.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 8: FORM SWAP SYSTEM (anti-Jayce/Elise/Nidalee)
# ═══════════════════════════════════════════════════════════════════════════════

FormSwap:
  Cost: "FREE (no resource, no CD on swap itself)"

  AntiSpam:
    DragonCDs: "Refreshed ONLY by stacks earned in other forms"
    BreathReset: "Gauge resets on swap"
    Result: "Ping-pong = lost breath progress + unready Dragon CDs"

  StackSystem:
    Sources:
      - "Combo hits in Dragonguard/Draconite (each GCD landed)"
      - "Receiving damage (passive, small per hit)"
    Purpose: "Refresh Dragon skill cooldowns"
    R1_Floor: "Facetank with healer = stacks from damage received"
    R3_Evolution: "Facetank = suicide (traps). Must earn via active combat."

  TheCycle: >
    Dragon (spend CDs) → other forms (earn stacks + charge breath) →
    stacks refresh Dragon CDs → re-enter Dragon. Phase length = encounter.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 9: VULNERABILITY (STATED ONCE)
# ═══════════════════════════════════════════════════════════════════════════════

Vulnerability:
  Dragon: "MOST vulnerable — super armor keeps you IN AoE. Big hitbox eats everything."
  Dragonguard: "Standard melee durability."
  Draconite: "Agile, hardest to hit, standard melee risk if caught."

  HPModel: >
    Higher max HP (HBD racial) = healer needs sustained throughput OR
    Dragon Rejuvenation (decaying DR: push through damage, cannot hold).
    Draconite evasion stat = passive survivability without skill budget.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 10: RANK SCALING
# ═══════════════════════════════════════════════════════════════════════════════

StrategyRankScaling:
  CoreStatement: "Available at R1 as Base. Complexity in CONTENT, not controls."

  Ranks:
    R1:
      Behavior: "Enemies don't move. Full power fantasy. Dragon everything."
      Difficulty: TRIVIAL
    R2:
      Behavior: "Enemies scatter on Dragon approach. Must Smoke first or use corridors."
      Note: "Supporting fire emerges. Form swapping begins."
      Difficulty: MODERATE
    R3:
      Behavior: "Traps exist. Super armor = stay in trap. Facetank = suicide."
      Note: "Dragon situational. Full form cycling required."
      Difficulty: HIGH
    R4:
      Behavior: "Enemies recognize ALL tells. Dragon usable only during groggy/perfect corridors."
      Note: "Form timing = THE skill expression."
      Difficulty: VERY_HIGH

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 11: ROTATION PHILOSOPHY
# ═══════════════════════════════════════════════════════════════════════════════

RotationDesign:
  Philosophy: >
    Form cycling IS the rotation. Timing is the decision. No fixed pattern —
    correct form depends on enemy behavior, geometry, team comp, encounter phase.

  DecisionFramework:
    Priority1: "Boss downed/groggy? → Dragon (free damage, immobile target)"
    Priority2: "Corridor geometry? → Dragon (enemies trapped)"
    Priority3: "Taking pressure / need to survive? → Draconite (safety + rDPS while mobile)"
    Priority4: "Fodder/elites/adds spawning? → Dragonguard (cleave, committed damage)"
    Priority5: "General dungeon? → Dragonguard (default — highest DPS)"
    Priority6: "Need area denial? → Dragonguard breath terrain"
    Priority7: "Team needs setup? → Dragon Smoke Breath OR Draconite Black Lightning"

  WithinForm:
    Dragon: "Smoke → artillery suppression → charged breath (payoff)"
    Dragonguard: "Hawk-dive knockup → cleave combo (punish recovery) → breath terrain → zone"
    Draconite: "Black Lightning → fast claw combo → reposition → reapply → enable team"

  NoRotationStatement: >
    No opener. No burst phase. No 2-min cycle. Encounter dictates form.
    Skilled = right form right time. R1 unskilled = stay Dragon (works fine).

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 12: ITEM BASELINE
# ═══════════════════════════════════════════════════════════════════════════════

ItemBaseline:
  Philosophy: "Skyreign provides PERMANENT, STRONGER, MULTI-Z versions of consumables."

  Replaces:
    - Item: "Napalm/Fire Flasks"
      WhyClassBetter: "Dragon breath: permanent, stronger, multi-Z coverage"

    - Item: "Smoke Bombs"
      WhyClassBetter: "Smoke Breath: adds Suffocation interrupt bonus, reusable via gauge"

    - Item: "Siege/Anti-Fortification Charges"
      WhyClassBetter: "Dragon artillery + super armor displacement: continuous, mobile"

    - Item: "Mass Fear/Scatter Tools"
      WhyClassBetter: "Dragon presence at R2+: passive, repeatable, no consumable"

    - Item: "Elemental Terrain Items"
      WhyClassBetter: "Dragonguard breath terrain: larger, reusable, tactical placement"

    - Item: "Magic Projectile Wands/Scrolls"
      WhyClassBetter: "Dragon ice missiles: permanent, spammable, no charge limit"

    - Item: "Anti-Air Deterrents"
      WhyClassBetter: "Dragon IS aerial dominance. Enemies need deterrents FROM you."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 13: CRIT SYSTEM
# ═══════════════════════════════════════════════════════════════════════════════

CritSystem:
  ZeroRNG: true
  Reference: "DESIGN_OVERRIDE.md §12"

  Conditions:
    Dragon_NapalmBreath: "Direct hit (cone center)"
    Dragon_SmokeBreath: "Target mid-action when interrupted"
    Dragon_Artillery: "Target >50% HP (§9 synergy)"
    Dragonguard_HawkDive: "Target >50% HP (§9)"
    Dragonguard_PostKnockup: "First melee GCD after successful knockup"
    Draconite_BlackLightning: "Reaction triggered (external element contact)"
    Draconite_ComboFinal: "Full combo completed without dropping"
    AllForms_Groggy: "Any attack vs downed/groggy/CC'd target"

  DesignNote: "Crits reward timing and form commitment. Lazy play = 0 crits."

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 14: >50% HP ENEMY RULE INTEGRATION
# ═══════════════════════════════════════════════════════════════════════════════

OverFiftyRule:
  Reference: "§9 — Enemies above 50% HP take +25% incoming damage"

  Synergy:
    Dragon_Opening: "Initial pass vs full-HP groups = +25% devastation. First pass shreds."
    Artillery_Crit: "Crit condition tied to >50% HP = suppressive fire hits hardest early."
    HawkDive_Crit: "§9 synergy — gap closer crits on healthy targets."
    NaturalCycle: >
      Dragon opens (+25% AoE on fresh enemies) → enemies drop below 50% →
      Draconite finishes (consistent DPS regardless of threshold).
      Form-cycle pressure built into the HP rule.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 15: §25 COMPLIANCE
# ═══════════════════════════════════════════════════════════════════════════════

Section25:
  Rule: "No CDs 90s+ on identity skills."

  Implementation:
    DragonCDs: >
      10-20s base. Refreshed by GAMEPLAY (stacks from combat). Active player
      refreshes in 8-12s. Passive player waits full timer.
    BreathGauge: "Always accessible. Form-local. Prep oGCD (no CD)."
    FormSwap: "Free. No CD."
    Identity: "Form cycle + breath always present regardless of CD state."

  DragonRejuvenation: >
    RESOLVED. Short CD (10-15s), decaying DR (duration-based). §25 compliant.
    Gate is NOT cooldown length — gate is that Dragon form cannot evade
    (super armor = stays in damage), so the skill has a LINKED CAUSE.

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 16: ANTI-PATTERNS
# ═══════════════════════════════════════════════════════════════════════════════

AntiPatterns:
  - Pattern: "Shyvana (transform = stat stick, one form strictly better)"
    Fix: "Each form has distinct role. Dragon situational, not universally better."
    Severity: CRITICAL

  - Pattern: "Deathwing (cool 5s, boring 55s, massive CD gate)"
    Fix: "Swap free. Dragon limited by CD readiness not timer. Other forms are FUN."
    Severity: CRITICAL

  - Pattern: "Nidalee/Jayce/Elise (0-cost ping-pong)"
    Fix: "Breath resets + stack system = real swap cost via lost progress."
    Severity: CRITICAL

  - Pattern: "Always-Dragon (one form dominant)"
    Fix: "R2+ enemies scatter. CDs exhaust. Must cycle."
    Severity: CRITICAL

  - Pattern: "Dragon as turret (hover stationary)"
    Fix: "Dragon MOVES in committed lines. Can't redirect mid-flight."
    Severity: HIGH

  - Pattern: "Satisfying elemental rotation in Dragon"
    Fix: "Pew pew suppression → charged breath PAYOFF. Not a caster rotation."
    Severity: HIGH

  - Pattern: "Crit as RNG"
    Fix: "Conditional: direct hit, groggy, post-knockup, reaction trigger, >50%HP."
    Severity: CRITICAL

  - Pattern: "2-minute burst alignment"
    Fix: "Stacks earned through combat, not on a clock."
    Severity: CRITICAL

  - Pattern: "Enmity table"
    Fix: "Dragon forces movement via PHYSICS (displacement, area denial)."
    Severity: CRITICAL

  - Pattern: "Long CDs (90s+) on identity"
    Fix: "10-20s base, stack-refreshed. §25 compliant."
    Severity: CRITICAL

