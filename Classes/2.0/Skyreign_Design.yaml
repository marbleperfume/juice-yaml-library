DesignNotes:
  FormCycleAsRotation: >
    "Rotation" = macro form-timing, not button sequence within forms. Within-form
    micro is simple. COMPLEXITY lives in transitions.

  R1_PowerFantasy: >
    Deliberately overpowered-FEELING at R1 (enemies cooperate). Restriction:
    class cannot progress past rank where form-cycling mastery mandatory.

  TeamSynergy_BlackLightning: >
    Reaction system = natural team hooks without coordination. Any teammate
    element near DoT'd target triggers. No communication required.

  DragonAsDeployment: >
    Dragon = "deploying limited resource." Enter, spend CDs, return to earn
    more. Not maintained — VISITED for payoff.

