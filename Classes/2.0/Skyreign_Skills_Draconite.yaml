  - {Pattern: "Draconite as DPS form", Fix: "Half damage vs Dragonguard. NOT for killing.", Severity: CRITICAL}
  - {Pattern: "Evasion as a button", Fix: "Passive stat. No button. Form swap = defense.", Severity: CRITICAL}
  - {Pattern: "Crit via RNG", Fix: "Conditional only. §12.", Severity: CRITICAL}
  - {Pattern: "Burst window alignment", Fix: "No burst. Flat pressure. Gauge is organic.", Severity: HIGH}
  - {Pattern: "Passive breath charge", Fix: "Combo-hit ONLY. Slowest of all forms.", Severity: HIGH}
  - {Pattern: "Draconite as boss-killer", Fix: "DPS phases = Dragon/Dragonguard. Draconite for danger only.", Severity: HIGH}
  - {Pattern: "Adding defensive skills", Fix: "EVA passive IS defense. No parry/block/DR.", Severity: CRITICAL}
  - {Pattern: "BL stacking intensity", Fix: "Single instance, refreshes duration.", Severity: MODERATE}

