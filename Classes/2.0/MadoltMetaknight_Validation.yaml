# SECTION 5: UNFOCUS VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

unfocus_validation:
  core_type: "AREA SUPPRESSION FIELD — zone property, NOT debuff"

  type_checks:
    VAL-UNF-01:
      check: "Unfocus is AREA, not debuff"
      proof: "No status icon on enemies. No duration. No dispel. Zone property."
      status: "PASS"
    VAL-UNF-02:
      check: "Enemies regain intelligence IMMEDIATELY on leaving"
      proof: "Exit 8y → full SR. Zero linger. Zero transition period."
      status: "PASS"
    VAL-UNF-03:
      check: "Reduces SR by 1-2 sustained (not more)"
      proof: "Base -1 (stance). Enhanced -2 (gauge ≥50). Max -3 = 4s post-parry spike ONLY."
      status: "PASS"
    VAL-UNF-04:
      check: "Interaction with Capacitor Pull (vortex combo)"
      proof: "Both share 8y radius. Pull drags INTO suppress zone. Combo = cluster + lobotomize."
      status: "PASS"
    VAL-UNF-05:
      check: "Pulled + suppressed = vortex identity"
      proof: "SR2 flanker at 6y: pulled 1.5y/s → 4s → arrives → suppressed to SR0 → forgets caster"
      status: "PASS"

  not_a_debuff:
    - "Zone centered on Metaknight. Moves with him."
    - "Instant removal on exit. Nothing 'on' enemy to cleanse."
    - "Cannot be dispelled or resisted."
    - "Doesn't reduce damage/accuracy — stupid, not weak."
    - "Ally pulling enemy OUT of field = instant intelligence recovery."

  sr_behavior:
    SR1_in_field: "→SR0. No change (already dumb). Irrelevant."
    SR2_in_field: "→SR0/SR1. Stop pathfinding to casters. Attack closest. CRITICAL."
    SR3_in_field: "→SR1/SR2. Stop flanking/retreating. Major degradation."
    SR4_in_field: "→SR2 (floor). Simplified patterns. Still dangerous."
    boss_floor: "Minimum SR2 under suppression."

  gauge_tension:
    above_50: "-2 SR (hold = team utility)"
    below_50: "-1 SR (spend = weaker control)"
    decision: "Every discharge below 50 weakens suppression temporarily. Core tension."

