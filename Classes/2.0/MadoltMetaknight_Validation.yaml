# SECTION 6: WEAKNESS BUDGET
# ═══════════════════════════════════════════════════════════════════════════════

weakness_budget:
  philosophy: "Structural. Cannot be specced away."

  weaknesses:
    ranged_beyond_8y:
      severity: "PRIMARY"
      description: "Ranged enemies at 10y+ unaffected. 0% pull, 0% suppress."
      exposed_at: "Archers, elevated casters, snipers"
      mitigation: "Mag-Dash (12y). But field re-centers on self, not on them."
      unfixable: true

    multi_angle_beyond_field:
      severity: "HIGH"
      description: "Field centered on SELF. Enemies entering from 4+ angles at >8y cannot all be captured."
      exposed_at: "Open arenas, multiple spawn points beyond 8y"
      mitigation: "Mag-Dash repositions. Leaves previous position uncontrolled."
      unfixable: true

    gauge_depletion:
      severity: "HIGH"
      description: "4/s drain. Without parry, net +0.5/s. Extended stance → empty → ALL effects cease."
      exposed_at: "No-parry pressure, ranged enemies, kiting"
      mitigation: "Drop stance 5-7s to rebuild. Gap = zero control."
      unfixable: true

    parry_dependent_survival:
      severity: "HIGH"
      description: "10% passive DR only. Miss parry at SR3+ = full damage + 0.6s lockout. Chain misses = death."
      exposed_at: "SR3+ (2-2.5s attack frequency). <50% parry = dies in ~12s."
      mitigation: "Healer covers. Mag-Dash disengage."
      unfixable: true

    no_party_healing:
      severity: "MODERATE"
      description: "Zero ally healing. Terminal Edge is self only. Prevention model not cure model."
      exposed_at: "DPS takes unavoidable damage. No spot-heal available."
      mitigation: "Unfocus prevents the damage (enemies forget allies). Not a fix for existing HP loss."
      unfixable: true

    field_drop_vulnerability:
      severity: "MODERATE"
      description: "Stance OFF = ALL effects instant-cease. No residual. 5-8s rebuild windows."
      exposed_at: "Post-heavy-spend. Gauge empty after Overload."
      mitigation: "Time stance-off during low-threat. Position allies safe first."
      unfixable: true

  summary: {total: 6, primary: 1, high: 3, moderate: 2, removable: 0}

