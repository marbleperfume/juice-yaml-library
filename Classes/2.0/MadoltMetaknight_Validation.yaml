# SECTION 7: FRONTLINE COMPARISON
# ═══════════════════════════════════════════════════════════════════════════════

frontline_comparison:

  metaknight:
    sentence: "I keep enemies stupid."
    archetype: "Arena king / SUPPRESSION / PROACTIVE controller"
    mechanism: "Unfocus (AI suppress) + Capacitor Pull (suction)"
    timing: "PROACTIVE — field created BEFORE threats form"
    best: "Open arenas, SR2-3 packs, boss mechanic reduction"
    worst: "Ranged >8y, field rebuild gaps, single target"
    dps: [80, 87]
    survival: "Parry-dependent (high ceiling, low floor)"

  adabold:
    sentence: "I physically block the path."
    archetype: "Corridor king / DEFENSE / REACTIVE blocker"
    mechanism: "Force Targeting (geometry, displacement, zone)"
    timing: "REACTIVE — intercept after enemies commit"
    best: "Corridors, escort splits, single-vector"
    worst: "Open arenas, multi-angle 3+, ranged >20y"
    dps: [82, 85]
    survival: "Iron Body 50% DR (consistent, low variance)"

  siegebreaker:
    sentence: "I walk THROUGH enemies."
    archetype: "Siege king / OFFENSE / COMMITTED charger"
    mechanism: "Momentum (charge, CC immunity, kill-on-advance)"
    timing: "COMMITTED — choose direction, go, deal with aftermath"
    best: "Multi-wave siege, formations, breakthrough"
    worst: "Single HP-sponge, tight spaces, flanks during commit"
    dps: [83, 87]
    survival: "CC immune during charge (zero after)"

  archetype_distinctions:
    proactive_vs_reactive: "Metaknight creates field BEFORE threats. Adabold intercepts AFTER they commit."
    stationary_vs_mobile: "Metaknight holds position (vortex center). Siegebreaker abandons position (charges)."
    cognitive_vs_geometric: "Metaknight manipulates AI. Adabold manipulates physics. Zero overlap."

  scenario_matrix:
    open_arena:        {best: "Metaknight", why: "No walls. Suppress keeps adds dumb."}
    narrow_corridor:   {best: "Adabold", why: "Iron Body fills. Pins guaranteed."}
    siege_waves:       {best: "Siegebreaker", why: "Charges through. Kills on advance."}
    sr2_flankers:      {best: "Metaknight", why: "Vortex captures. Suppress removes paths."}
    escort_split:      {best: "Adabold", why: "Self-sustains corridor. Geometry locks."}
    sr4_boss:          {best: "Metaknight", why: "SR4→SR2 = fewer complex patterns."}
    single_flanker:    {best: "Adabold", why: "Tether+Dash+Sentinel precision."}

  overlap_check:
    metaknight_vs_adabold: "ZERO. Cognition vs geometry. Complementary."
    metaknight_vs_siegebreaker: "MINIMAL. Station vs advance. Non-competing."
    adabold_vs_siegebreaker: "ZERO. Contain vs break-through. Opposite."

