# SECTION 1: BALANCE TARGETS
# ═══════════════════════════════════════════════════════════════════════════════

balance_targets:
  reference: "Generic Experienced-tier DPS = 100%"
  dps_band: [80, 87]  # Frontliner 80-87%. Metaknight high variance (parry skill).
  pps_by_rank:
    rank_1: {optimal: 100, realistic: 82, floor: 73}
    rank_2: {optimal: 108, realistic: 87, floor: 78}
    rank_3: {optimal: 115, realistic: 95, floor: 85}
  deductions: "-8% stance, -12% missed parries, -5% reposition, -5% suppression hold"
  gcd_timing: {base: "2.0s", cap: "1.4s", weave: "Single-weave (0.6s / 0.3s Parry+Stance)"}
  racial_stats: {NTU: 16, DEX: 14, CRAFT: 12}

  charge_gauge:
    cap: 100
    gen_rate_engaged: "~11.5/s active (7/GCD + 5/hit + 15/parry + 2/s)"
    stance_drain: "4/s"
    net_parrying: "+1.7/s (sustainable)"
    net_no_parry: "+0.5/s (marginal)"
    net_stance_off: "+7/s (rapid rebuild)"
    first_spend: "12-14s"
    full_gauge: "32-38s"
    recovery_empty: "5-7s to 25g"
    suppression_threshold: "≥50 = -2 SR | <50 = -1 SR"

  voltaic_parry_impact:
    window: "0.75s (NTU 16 perceives ~0.9s)"
    rates: {expert: "85-90%", average: "70-75%", learning: "50-60%"}
    pps_spread: {at_85: "~87", at_70: "~82", at_50: "~75"}
    value_per_parry: "+420p (308p counter + 15g + 5%HP)"
    cost_per_miss: "-247p (lockout + missed counter)"
    breakeven: "37%"

  self_sustain:
    with_parry: "~2.5-3% HP/s"
    without_parry: "~0.8% HP/s"
    solo: {SR1: "Trivial", SR2: "Viable", SR3: "Tight", SR4: "Healer required"}

  mitigation:
    parry: "100% (0.75s window)"
    passive: "10% DR frontal"
    invuln: "0 — no invulnerability"

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: MATCHUP SCENARIOS
# ═══════════════════════════════════════════════════════════════════════════════

matchup_scenarios:

  SR1_cluster:
    geometry: "Open, 3-5 SR1 melee trash converging"
    party: "Metaknight + caster + DPS"
    flow: >
      Stance ON optional. Combo → Parry → Counter → Shield Discharge (3+ crit)
      → Overload. Unfocus IRRELEVANT (SR1 already dumb). Pure DPS mode.
    results:
      unfocus_value: "0%"
      pull_value: "Marginal (accelerates contact ~1-2s)"
      pps: "~95"
      gauge: "Net positive. No suppression threshold concern."
    verdict: "PASS — identity not fully engaged. Operates as pure DPS."

  SR2_flankers:
    geometry: "Room. Caster 10y behind. 4 enemies: 2 frontal, 2 flanking."
    party: "Metaknight + caster"
    flow: >
      Stance ON (55g) → Pull drags flankers back (1.5y/s, no sprint) →
      Unfocus suppresses to SR0/SR1 → forget caster → attack Metaknight →
      Parry → Counter → Shield Discharge (4 targets, crit 252p×4) →
      Terminal Edge (heal). VORTEX COMBO: Pull + Suppress = cluster + lobotomize.
    results:
      backline_damage: "0%"
      unfocus_uptime: "100% while gauge ≥50"
      vortex: "Flankers captured in 4s. Identity moment delivered."
      pps: "~82"
      gauge: "55→45 (dips below 50 briefly = -1 SR for ~4s). Intended tension."
    verdict: "PASS — core identity. Vortex engaged."

  SR3_coordinated:
    geometry: "Open arena. 5× SR3 enemies (flank, retreat, coordinate)."
    party: "Full party"
    flow: >
      Stance ON → SR3 enemies RECOGNIZE field → 2 retreat before entering →
      3 commit → Mag-Dash closes on retreater → Unfocus suppresses 3 inside
      to SR1 → Parry (MUST succeed, 2-2.5s frequency) → Counter → Overload
      (50g, empties gauge) → suppression weakens → stance OFF 5s → rebuild.
    results:
      enemies_suppressed: "3/5 (60%)"
      parry_requirement: "Mandatory survival"
      backline_leakage: "15-25% (retreaters reach caster before re-engaged)"
      pps: "~78"
    verdict: "CONDITIONAL PASS — SR3+ enemies choose to avoid field. Designed limitation."

  boss_single_target:
    geometry: "Arena. 1× Boss (SR4, floor SR2 under suppression)."
    party: "Full party"
    flow: >
      Stance ON → Pull = 0.5y/s drift (positional only) → Unfocus SR4→SR2
      (mechanic complexity reduced) → Parry is PRIMARY survival (1.5-2s
      frequency) → combo → EC Weapon (crit >50% HP) → Parry → Counter → cycle.
    results:
      pull_effect: "0.5y/s drift. Positional. Not controlling."
      unfocus_value: "HIGH — fewer complex boss patterns at SR2"
      parry_criticality: "Miss = 8-12% HP + lockout. Miss 2 consecutive = danger."
      pps: "~80 (no cluster payoffs, stance drain)"
    verdict: "PASS — parry defines boss. Unfocus = team value via mechanic reduction."

