  class_name: "Madolt Metaknight"
  race: "Madolt (cultural lock — engineering guild tradition)"
  role: "Frontliner (Offensive — Unfocus / AI Suppression + Suction)"
  execution_tier: "Experienced"
  design_authority: "MadoltMetaknight_Design.yaml"
  skills_authority: "MadoltMetaknight_Skills.yaml"
  last_updated: "2026-07-14"
  validation_status: "Qualitative Complete — Awaiting Layer 1 Numerical Pass"

