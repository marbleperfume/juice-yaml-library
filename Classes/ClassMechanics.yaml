Key: Classes.ClassMechanics
Description: >
  ClassMechanic = a per-Class GAUGE plus the special interactions built on
  top of it -- the class's own path to its single most important
  offensive/defensive/utility tool (Madolt Warrior's Charge Gauge culminating
  in EC Shield Discharge's block-burst is the clean example). Distinct from
  the shared per-Role RoleMechanic (Ranks/RoleMechanics.yaml), which is about
  ROLE EXECUTION (aggro-holding, healing/support, damage uptime), not gauge
  management. A class occupying a Healer role slot still has its own
  ClassMechanic separate from its Healer RoleMechanic -- e.g. Elementalist's
  ElementalConvergence stacks (cross-element chain reactions) are orthogonal
  to its DelayedStatus-driven Healer RoleMechanic kit.
Adafold (Shield Knight):
  MechanicName: Bulwark Gauge
  Definition: >
    PLACEHOLDER. Builds by blocking/mitigating incoming hits; spent on a
    strong defensive cooldown. Distinct from the shared Tank RoleMechanic
    (Focus/Aggro/Unfocus, which every Tank class participates in) --
    Bulwark Gauge is what makes Adafold specifically different from
    another Tank class.
Warrior:
  MechanicName: Charge Gauge
  Definition: >
    The Madolt Warrior's ClassMechanic. Generated by the basic combo and AoE
    (which also apply Unfocus for the shared Tank RoleMechanic), spent on the
    EC Weapon Discharge (ranged) and EC Shield Discharge (needs Electron Guard
    stance, strongest). The full contract -- generation, spenders, the stance,
    and the Mercenary-rank discharge threshold ladder (50% baseline -> 75%
    charged at Rank 3) -- lives in Combat/ChargeGauge.yaml.
Elementalist:
  MechanicName: Elemental Convergence
  Definition: >
    Five independent per-element stack counters (Fire/Water/Wind/Earth/
    Light), built by casting that element's skills. Any pool can be
    CONSUMED on ANY cast (not only that element's own skills) to apply that
    element's fixed universal modifier -- Wind grants AoE, Fire adds bonus
    damage, Water applies Slow, Earth applies Stone Coffin, Light amplifies
    a shield/barrier -- a cross-element chain reaction, not a same-element
    finisher. Light is the one Healer-support-only job in that list (see
    Combat/ElementalConvergence.yaml UniversalStackModifiers); everything
    else is DPS/CC-flavored. Full contract in Combat/ElementalConvergence.yaml.
    Deliberately separate from its Healer RoleMechanic kit
    (Combat/DelayedStatus.yaml barriers/regen + Passives/TriageOverride.yaml)
    the same way Adafold's Bulwark Gauge is separate from the shared Tank
    RoleMechanic -- though Skill.Combat.Elementalist.RadiantMend.yaml and
    Skill.Combat.Elementalist.EarthBreak.yaml straddle both, building
    Convergence stacks while also carrying a Healer RoleMechanic tag.
Shaman:
  MechanicName: Bone Summon Cycle
  Definition: >
    Consumable-gated, not a numeric gauge: Item.Consumable.Bone.MonsterBone.yaml
    fuels TWO distinct rites. Skill.Combat.Shaman.BoneSummon.yaml raises
    Summons/Summon.Shaman.BoneSpirit.yaml -- a narrow 1-target interrupt-
    catch tool that Skill.Combat.Shaman.SpiritChannel.yaml can instead spend
    for high-Focus burst damage (the class's path to its strongest
    offensive tool, same shape as Madolt Warrior's Charge Gauge culminating
    in EC Shield Discharge, just itemized instead of numeric). Separately,
    Skill.Combat.Shaman.BonePointing.yaml raises
    Summons/Summon.Shaman.FloatingBone.yaml, an installation that animates
    Passives/Hex.yaml via repeated needle strikes -- Featherfoot-inspired
    (Tree of Savior), the class's sustained "go-to" curse engine that other
    curse skills (Skill.Combat.Shaman.CurseExplosion.yaml) synergize with.
