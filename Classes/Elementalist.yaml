Definition:
  Class: Elementalist
  Intent: >
    Amendment of FFXIV's Conjurer + Thaumaturge lineage -- genuinely uses
    all four elements (Fire, Water, Wind, Earth) rather than specializing
    into one. Functions as this game's Healer sub-archetype (see
    Ranks/RoleMechanics.yaml Healer): a DPS/support kit day-to-day, whose
    entire offensive half converts to hard-cast healing via
    Passives/TriageOverride.yaml only at genuine party crisis.
  MainAttribute: MAGICCAPACITY
  Race: null   # not race-restricted, unlike Madolt-specific classes
  Role: Healer
  Tier: Base Available
ClassMechanic: ElementalConvergence   # see Combat/ElementalConvergence.yaml
ManaProfile:
  CostTier: Low
  ManaflowSkill: Skill.Combat.Elementalist.ElementRecharge
  Note: >
    Low mana cost across the kit on purpose -- APM needs to stay high on a
    lower-GCD stacking rotation even at Mercenary Rank 3, so individual
    casts can't be expensive. Element Recharge's payout scales with
    Combat/ElementalConvergence.yaml's StackReactionCount, so mana sustain
    is a direct reward for playing the cross-element reaction game rather
    than same-skill spam. See Combat/ManaEconomy.yaml and
    Combat/ManaflowSystem.yaml for the shared caster mana rules this sits
    on top of. In Crisis Mode (Passives/TriageOverride.yaml), this
    identity carries over directly: CrisisManaBurst's regen spike decays
    with Skill.Combat.Elementalist.RadiantMend.yaml's own usage, not a
    clock -- sustain during a crisis is still something the player earns
    through play, same as day-to-day.
FocusProfile:
  Level: Low
  Note: >
    Low damage output relative to a high-Focus class like Shaman, so it
    generates little enemy Focus -- the safety comes from not being a
    threat in the first place, not from an active mitigation tool. Its
    "safety tools" are Water Barrier / Emergent Light rather than Focus
    avoidance.
VolatilityCounter:
  Tools: [WaterBarrier, TidalMending, EmergentLight, BlindingFlare]
WeaponRestriction:
  AllowedWeapons: [Wand, Staff]
  Note: >
    Deliberately only two weapon types (see
    Combat/ElementalConvergence.yaml WeaponRestriction) -- avoids Guild
    Wars 2's Elementalist problem, where the class juggles a full weapon-kit
    identity on top of its elemental-attunement system.
