Key: Combat.ChargeGauge
Description: >
  The Madolt Warrior ClassMechanic (the sibling of Adafold's Bulwark Gauge in
  Classes/ClassMechanics.yaml). Charge Gauge is generated by the basic combo
  and AoE, and spent on the EC discharges. This file is the canonical
  contract for gauge generation, the spenders, the Electron Guard stance, and
  the rank-scoped discharge threshold ladder.
Generation:
  Source: "Basic combo (Voltstep Thrust / Arc Rend / Grounding Drive) and Arc Sweep"
  PerCombo: "~60 over one full 3-hit combo (10 / 20 / 30)"
  Buff: "Overcharge (Lv 6) temporarily multiplies generation x1.5"
Max: 100
Spenders:
  - Skill.Combat.Madolt.ECWeaponDischarge     # ranged, 50 cost
  - Skill.Combat.Madolt.ECShieldDischarge      # strongest, 100 cost, needs Electron Guard stance
  - Skill.Combat.Madolt.OverloadThrust         # Rank 2 aggressive GCD, 50 cost
  - Skill.Combat.Madolt.ArcDetonation          # Rank 2 aggressive AoE, 60 cost
  - Skill.Combat.Madolt.ECWeaponDischargeControl  # Rank 3, 75 cost
  - Skill.Combat.Madolt.ArcOverload            # Rank 3, 75 cost
ElectronGuard:
  Skill: Skill.Combat.Madolt.ElectronGuard
  Note: >
    Defensive stance, NOT an enmity stance (the class holds aggro innately).
    Drains gauge while active, immensely reduces damage taken, and gates EC
    Shield Discharge.
DischargeThresholdLadder:
  Description: >
    EC Weapon Discharge can only be fired at a minimum gauge threshold. The
    threshold and the "charged" upgrade are scoped to Mercenary rank -- rank
    grants the CAPABILITY, gear/skills carry the numbers (see
    Ranks/Mercenary_Unlocks.yaml PotencyRule).
  MercRank1_2:
    Threshold: 50            # standard shot, Skill.Combat.Madolt.ECWeaponDischarge
  MercRank3:
    Threshold: 75            # charged control shot, Skill.Combat.Madolt.ECWeaponDischargeControl
    Note: "Flashier, harder-hitting, longer interruptible cast, high Focus, needs a Stun setup."
SelfLimiting: >
  Aggressive GCDs (Overload Thrust, Arc Detonation, and the Rank 3 charged
  discharges) have no cooldown -- they are limited by (1) sharing this gauge
  with the baseline discharges (opportunity cost) and (2) the Focus their
  damage generates, which makes their long interruptible casts likelier to be
  interrupted the more they are used. An interrupted aggressive cast forfeits
  its gauge cost.
