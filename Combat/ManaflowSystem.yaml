Key: Combat.ManaflowSystem
Description: >
  Every caster class (Combat/ManaEconomy.yaml CasterDefinition: MainAttribute
  MAGICCAPACITY) gets exactly one Manaflow skill, unique per class:
  Elementalist gets Skill.Combat.Elementalist.ElementRecharge.yaml, Shaman
  gets Skill.Combat.Shaman.SunRecharge.yaml. A Manaflow skill never occupies
  its own hotbar slot and is never chosen directly -- it exists purely as
  the auto-swap target below.
Trigger: >
  If the player presses a button for a skill that is otherwise fully legal
  right now (off cooldown, valid target, MaxCharges available) but the
  caster's CURRENT mana is below that skill's Resource.Cost, the game
  silently substitutes the class's Manaflow skill for that press instead of
  eating the input and doing nothing. The swap takes on the pressed skill's
  slot/timing for that one press; the effect that actually resolves is the
  Manaflow skill's mana-restore, not the original skill's damage/heal/CC.
NotAWorkaroundForStatus: >
  This system answers ONE failure mode only: "I can't afford this," never
  "I'm not allowed to act." A skill blocked by a negative status condition
  (Stun, Paralysis, Silence, or any other CC that prevents casting) is NOT
  eligible for the swap -- a Stunned caster stays Stunned and gets nothing,
  the same as anyone else. Manaflow never bypasses CC; it only ever answers
  a mana shortfall.
WhyUniquePerClass: >
  Manaflow is deliberately not one shared "recover mana" button -- its own
  restore formula IS each class's cost-cycle identity (see each class's
  ManaProfile in Classes/Elementalist.yaml / Classes/Shaman.yaml). A shared
  skill would flatten Elementalist's low-cost/high-APM/reaction-rewarding
  identity and Shaman's medium-cost/cooldown-awareness identity into the
  same button, erasing the exact distinction Combat/ManaEconomy.yaml's
  CostTier is there to create.
SkillFileContract: >
  A class's Manaflow skill file always carries Resource: {Type: None, Cost: 0}
  (it never costs mana itself -- it exists to generate it) and
  Tag.Mechanic.Manaflow, so it's identifiable generically without hardcoding
  a per-class list anywhere else.
