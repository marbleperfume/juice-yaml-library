Key: Combat.CCImmunity
Description: >
  Shared diminishing-returns contract for all crowd-control statuses (Stun,
  Daze, Slow-as-CC, etc.), so no class can chain the SAME CC type into a
  permanent lock, and repeated use of one type doesn't quietly go dead from
  escalating resistance either. Applies to any skill that declares a
  CCImmunityRef (worked examples: Skill.Combat.Elementalist.BlindingFlare,
  Skill.Combat.Elementalist.CycloneLock).
Mechanism:
  ResistanceStack: >
    Landing a CC of a given Type on a target grants that target a
    resistance stack of the SAME Type. Each stack reduces the next
    same-Type CC's duration; at MaxStacks the target is briefly IMMUNE to
    that Type entirely.
  MaxStacks: 3
  DurationReductionPerStack: 0.33
  ImmunityWindowSeconds: 8   # after MaxStacks is reached
  DecayWindowSeconds: 15     # stacks fall off if no same-Type CC lands again within this window
  PerTypeIndependence: >
    Resistance is tracked PER CC TYPE (Stun vs Daze vs Slow-as-CC are
    independent counters) -- this is what "layered CC" means: alternating
    types keeps pressure on without ever hitting one type's immunity
    window, whereas spamming a single type burns out fast.
DesignIntent: >
  Directly answers "newer skills should focus on better stack management
  and layered CC casting with better gaps between CC downtime" -- a
  higher-level kit is expected to carry more than one CC Type specifically
  so it can rotate through this system instead of fighting it. A kit with
  only one CC type will visibly run into its own immunity window; that is
  the intended lesson, not a bug to route around.
CommitmentExemption:
  Description: >
    A CC applied by a skill with a genuinely long, committed cast (chant/
    dance-style animation, not a quick tap) is EXEMPT from this entire
    resistance system -- it always lands at full duration. The long cast
    is already the cost: real tempo loss and real interruption risk before
    the CC ever applies. Stacking diminishing returns on TOP of that would
    punish the class twice for the same commitment. Worked example:
    Passives/Hex.yaml's Slow (arrives only after Skill.Combat.Shaman.BonePointing.yaml's
    installation ramps up multiple needle-strike ticks -- the ramp-up IS
    the commitment, not a single long cast).
  Qualifying: >
    A skill qualifies by carrying Tag.Mechanic.LongCommitment (not by cast
    time alone -- the tag is the deliberate, authored signal). As a rough
    guideline, this means a real hard-cast (no MaxCharges banking, no
    IsOGCD) meaningfully longer than a normal GCD, not a 1s tap dressed up
    with the tag to dodge the resistance system.
  ForwardCompat: >
    Written generically on purpose: any future class built around slow,
    ritualistic commitment (chants, dances -- e.g. a hypothetical Miko-style
    class) should reach for this same exemption rather than reinventing it.
    The principle is "don't punish a class for the way it exists" -- a kit
    whose entire identity is long committed casts shouldn't ALSO eat CC
    resistance on top of the interruption risk it already carries.
