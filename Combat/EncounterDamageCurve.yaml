Key: Combat.EncounterDamageCurve
Description: >
  Global encounter pacing rule that front-loads damage by enemy HP%. Its
  purpose is to keep low-rank players COMPARABLE (see
  Ranks/Mercenary_Unlocks.yaml PotencyRule): the opening is fast and forgiving
  where every rank performs alike, and the hard back half slows down where
  higher-rank control matters but absolute rank gaps stay small.
Rule:
  AboveHalfHealth:
    Condition: "target HP > 50%"
    DamageTakenModifier: 1.25   # target takes +25% damage
    Effect: "Fast, forgiving opening; ranks perform alike"
  AtOrBelowHalfHealth:
    Condition: "target HP <= 50%"
    DamageTakenModifier: 1.0
    Effect: "Slower, harder phases; higher-rank control (interrupts/stuns) matters, but low absolute numbers keep rank gaps small"
Rationale: >
  Modeled outcome (placeholder): Rank 1 ~7% behind Rank 2 above 50% HP, ~11%
  behind below 50% -- comparable throughout, so a Rank 1 player is never
  alienated. First half goes easier/faster; the second half is much slower.
AppliesTo: AllEncounters
