Key: Combat.ElementalConvergence
Description: >
  The Elementalist's ClassMechanic. Amends FFXIV's Conjurer + Thaumaturge
  lineage into one class that genuinely uses all four elements (Fire,
  Water, Wind, Earth), but deliberately avoids Guild Wars 2's Elementalist
  problem -- that class demands tracking 4 full attunement bars (20 skills)
  to feel complete. Here the system stays simple: cast an element's skills
  to build that element's stack counter, then CONSUME a stack pool (any
  pool, on any cast -- not only that element's own skills) to apply that
  element's fixed universal modifier to whatever is being cast. This is the
  cross-element chain reaction -- e.g. holding Water stacks from healing
  and then consuming them on an attack cast to also Slow the target.
Elements: [Fire, Water, Wind, Earth, Light]
StackRule:
  PerElementCounter: true    # five independent counters, not one shared gauge
  StackPerCast: 1
  ConsumeThreshold: 5        # minimum stacks of a pool required to consume it
  DecayOnElementSwitch: >
    Casting a different element's skill does not reset the other counters,
    but does not advance them either -- committing to one element in
    sequence is what's rewarded, not required exclusively.
UniversalStackModifiers:
  Description: >
    Fixed, one job per element -- no combo matrix to memorize. Consuming a
    pool applies ONLY its own modifier to the current cast; it never stacks
    two different elements' modifiers onto the same cast (kept
    single-purpose per Combat/DelayedStatus.yaml's AuthoringLesson). Light
    is the one exception to "DPS/CC job": its modifier is a support
    amplifier, not damage or control, which is why it's the only element
    that can show up in the Healer RoleMechanic kit at all (see
    HealingElementRule).
  Wind: "Converts the cast from single-target to AoE. Worked example: Skill.Combat.Elementalist.CycloneLock."
  Fire: "Adds bonus damage to the cast. Worked example: Skill.Combat.Elementalist.EmberLance consuming its own built stacks."
  Water: "Applies Slow to the struck target(s), independent of whatever the cast's own effect is."
  Earth: "Applies Stone Coffin (Passives/StoneCoffin.yaml) -- a strong temporary root/imprison CC. Worked example: Skill.Combat.Elementalist.StoneCoffin."
  Light: "Amplifies a shield/barrier application on the current cast -- Healer-support-only job, never a DPS/CC effect. Worked example: Skill.Combat.Elementalist.WaterBarrier consuming built Light stacks (fed by Skill.Combat.Elementalist.RadiantMend.yaml) to strengthen the barrier."
RadiantMendException: >
  Skill.Combat.Elementalist.RadiantMend.yaml carries one narrow, self-scoped
  exception to the "one fixed modifier per element" rule above: it defines
  its OWN bonuses for consuming Water or Earth (see that file's
  ReactiveConsumption), because neither Water's Slow nor Earth's Stone
  Coffin make sense applied to an ally-target heal. Scoped to that single
  skill only -- this is not a second combo matrix to memorize, just one
  named exception where the universal jobs above genuinely don't fit.
HealingElementRule: >
  Healing-flavored effects belong ONLY to Water and Light -- Fire's
  identity is purely "extra damage" and never produces a heal. This is why
  Passives/TriageOverride.yaml's kit conversion reroutes EmberLance (Fire)
  into Skill.Combat.Elementalist.TidalSurge (Water), NOT a same-element
  Fire "heal" (an earlier draft mistakenly did this and has been retired).
  Water healing (WaterBarrier, TidalMending, TidalSurge) is designed to be
  potent and CONSISTENT -- built to get the party OUT of Triage Override.
  Light healing/CC (EmergentLight, BlindingFlare) is EMERGENCY-flavored --
  amplified specifically during the crisis window itself.
StackReactionCount: >
  A separate counter from the four per-element stack pools above: it
  increments by 1 every time ANY pool is CONSUMED (a genuine cross-element
  reaction -- e.g. Skill.Combat.Elementalist.CycloneLock spending built Wind
  stacks, Skill.Combat.Elementalist.StoneCoffin spending Earth), and resets
  to 0 when Skill.Combat.Elementalist.ElementRecharge.yaml is cast. This is
  the input to Element Recharge's mana-restore formula (see
  Combat/ManaEconomy.yaml and Combat/ManaflowSystem.yaml). Repeatedly
  casting the same element's skill WITHOUT ever consuming a pool grows that
  element's stack counter but does NOT grow StackReactionCount, so it does
  not help Element Recharge's payout -- this is what makes the reward land
  on actually playing the cross-element chain-reaction game the mechanic is
  built around, not on same-skill spam.
WeaponRestriction:
  Description: >
    Elementalist may only equip a Wand or a Staff (see
    Items/Item.Equipment.Elementalist.Wand.yaml /
    Item.Equipment.Elementalist.Staff.yaml) -- the second half of avoiding
    GW2's problem, where the class also has to juggle multiple weapon-kit
    identities on top of the attunement system. One axis of choice, not two.
  Wand: "Magic-based, faster auto-attack tempo -- consistent uptime playstyle."
  Staff: "Slightly higher Atk, no auto-attack advantage -- rewards a pure skill-cast playstyle with more per-cast output."
