Key: Combat.ManaSustainModel
Description: >
  The quantitative pass behind Combat/ManaEconomy.yaml and
  Combat/ManaflowSystem.yaml -- those two files state the RULES (pool size,
  regen rates, the auto-swap contract) qualitatively; this file does the
  arithmetic those rules imply, using the Resource.Cost numbers actually
  authored on every Elementalist/Shaman skill file, and treats the result
  as a real constraint on those numbers, not just flavor text. Method:
  Quantitative -> Qualitative -> Quantitative -- the class kits were
  authored qualitatively first (a shape, a set of intents), so this file
  is the return trip: derive the numbers the existing qualitative shape
  implies, check whether the currently-authored placeholders actually
  produce that shape, and correct the ones that don't (see
  Skill.Combat.Elementalist.ElementRecharge.yaml and
  Skill.Combat.Shaman.SunRecharge.yaml change history). Every number below
  is computed from other PLACEHOLDER numbers, so it is itself a
  placeholder -- but it is a computed one, checkable and re-derivable, not
  a guess.
CentralFormula:
  Statement: >
    CurrentMana(t) = MaxMana(MAGICCAPACITY) + Integral[SustainRate(t) *
    Multiplier(t)] dt - Integral[Cost(t)] dt, where MaxMana =
    MAGICCAPACITY * 100 (Combat/ManaEconomy.yaml PoolConversion),
    SustainRate is the passive regen tick plus whatever a class mechanic
    (Manaflow, stack reactions) is actively contributing at that instant,
    Multiplier is a temporary scalar like Passives/TriageOverride.yaml
    CrisisManaBurst's initial spike, and Cost is whatever Resource.Cost the
    player is actually spending by casting on cooldown.
  Consequence: >
    Under naive play (casting whatever's ready, the Rank 1 default -- see
    CadenceBaseline), Cost(t) summed over a real rotation OUTPACES
    SustainRate(t)'s passive component by a wide margin (see
    PerClassBurnRate) -- by design. A character WILL run dry casting
    normally. The class mechanic (Element Recharge's reaction payout, Sun
    Recharge's cooldown payout) is the only thing that meaningfully closes
    that gap in combat; passive regen alone does not, and is not meant to
    (Combat/ManaEconomy.yaml already states this, this file quantifies how
    true it is). Out of combat, the flat 5%-of-max tick is intentionally
    the ONLY lever, and closes the gap completely on a fixed clock
    regardless of pool size (see OutOfCombatRefill).
CadenceBaseline:
  GCDLength: "2.5 seconds"
  Source: >
    Every filler-tier skill across both classes (EmberLance, EarthBreak,
    WitheringPoison/LifeLeechingCurse's underlying cast rhythm, RadiantMend)
    shares a 2.0s CastTime / 2.5s RecastTime shape -- treated here as the
    project's de facto standard GCD.
  Rank1NaiveCadence: >
    "Casting skills when instantly ready" (see Ranks/Mercenary_Unlocks.yaml
    PotencyRule) means one cast every 2.5s with no deliberate
    resource-holding -- 24 casts/minute. This is the cadence modeled below.
    A Rank 2+ player who plays the SAME way (cast-on-cooldown, no stack
    management, no Sun Recharge timing) gets the SAME mana outcome as a
    Rank 1 player -- rank does not change the math, only skill expression
    does, which is the point: sustain is a play-quality axis, not a
    rank-gated one.
DPSCurveBiasCorrection: >
  SUPERSEDES this file's original RotationWeightingAssumption (a flat 70/30
  filler/"rest of kit" blend). That blend was a DPS-curve bias: it treated
  utility skills (shields, CC, proactive heals) as if they fired on the
  same guaranteed clock as damage filler. They don't -- utility is a
  determined NEED (see Combat/UtilityCostModel.yaml EffectiveHP), not a
  rotation slot. If the target is already dead, a CC skill that was never
  needed cost nothing; baking its Resource.Cost into a per-GCD average
  that determines "how long until this character goes dry" overstates the
  real constraint. PerClassBurnRate below is now computed from DPS-loop
  skills ONLY (Combat/UtilityCostModel.yaml ClassificationRule: no
  RoleMechanic, no Tag.Mechanic.CC). GeneralUtility and MercRank2Utility
  costs moved to UtilityCostBudget below, priced per-event instead of
  blended in.
PerClassBurnRateMethodology:
  Elementalist:
    DPSLoopSkills: "EmberLance (60), EarthBreak (60) -- the ONLY two skills with no RoleMechanic and no CC tag. Every other Elementalist skill is General or MercRank2 Utility (see UtilityCostBudget) or the named RadiantMend exception."
    Allocation: "All 24 GCDs/min go to this pair (interchangeable at equal cost) -- there is no other guaranteed-damage skill in the kit."
    AvgCostPerGCD: 60.0
  Shaman:
    DPSLoopSkills: "WitheringPoison(90,CD3), LifeLeechingCurse(90,CD3), BonePointing(60,CD20), CurseExplosion(150,CD15), BoneSummon(40,CD5)+SpiritChannel(220,CD2.5, paired) -- ALL of Shaman's normal-mode kit except LeechLife (GeneralUtility, RoleMechanic: Healer). Unlike Elementalist, Shaman's kit is almost entirely damage-flavored day-to-day; it currently has no MercRank2Utility (CC) skill at all (flagged in Combat/UtilityCostModel.yaml as a real asymmetry)."
    Allocation: >
      Priority-filled by each skill's own cadence within the shared 24
      GCD/min budget: BonePointing 3/min (60/20), CurseExplosion 4/min
      (60/15), BoneSummon+SpiritChannel paired at an assumed sustainable 6
      pairs/min (12 GCDs), leaving 5 GCDs/min split evenly between
      WitheringPoison/LifeLeechingCurse filler.
    AvgCostPerGCD: 116.25
EncounterLengthPrinciple:
  LongForm:
    Definition: >
      This project's default combat shape -- interaction sustained past 60
      seconds, matching the currently-authored boss ExpectedDurationMinutes
      range (NPC.Boss.Galactos/GoblinVanguard 3.0, MechaGolem 4.0, Nekrath
      6.0, ColossusPrime 7.0 -- see NPCs/Bosses/*.yaml). NOT a fixed-length
      target -- the point is that cost design has to hold up whether a
      given pull runs 3 minutes or 10, and dungeon trash CHAINS multiple
      short pulls back-to-back without a full rest between them, which
      approximates the same sustained-drain problem as one long boss fight
      (see ShortFormPrinciple's chaining note). This is why the model below
      is built per-GCD/per-minute, not per-encounter -- it has to
      generalize across whatever length actually happens.
    Contrast: >
      Explicitly named against short-cycle action games (e.g. Wuthering
      Waves) where most fodder dies inside a single repeating ~60s
      rotation loop and resource systems barely have to survive past one
      loop. This project's classes are NOT built around that assumption.
  ShortForm:
    Definition: "A single fodder pull, under 60 seconds, low enough enemy HP that the fight ends before sustain design would ever matter on its own."
    SeeShortFormPrinciple: true
PerClassBurnRate:
  Elementalist: "60.0 mana/GCD * 24 GCD/min = 1440 mana/min (24.0 mana/sec) -- DPS-loop only, down from the old blended 1608, since utility no longer inflates it"
  Shaman: "116.25 mana/GCD * 24 GCD/min = 2790 mana/min (46.5 mana/sec) -- DPS-loop only, UP from the old blended 2347, because Shaman's real routine kit (SpiritChannel/CurseExplosion/BonePointing) is mostly damage, not occasional utility, and the old blend badly underweighted it"
  PassiveRegenComparison: >
    Combat/ManaEconomy.yaml's in-combat passive tick is 1 mana/5s = 12
    mana/min for EITHER class -- under 1% of either burn rate. Confirms
    the passive tick is correctly negligible in combat; it is not doing
    real work here, Manaflow is.
UtilityCostBudget:
  Description: >
    Priced per-event, NOT blended into PerClassBurnRate -- add these on
    top only for the casts a given encounter actually calls for (see
    Combat/UtilityCostModel.yaml). Zero events means zero cost, exactly.
  Elementalist:
    GeneralUtility: "WaterBarrier(50), TidalMending(50), EmergentLight(100) -- avg 66.7/cast, spent proactively per party-sustain need, not per GCD"
    MercRank2Utility: "StoneCoffin(130), CycloneLock(90), BlindingFlare(80) -- avg 100/cast, spent ONLY when a specific mechanic actually calls for CC. A pull with zero CC-need spends zero here, full stop."
    RadiantMendException: "Modeled separately (see Skill.Combat.Elementalist.RadiantMend.yaml CostEscalation) -- a reactive panic-heal answering an EffectiveHP shortfall directly, not a flat per-event cost."
  Shaman:
    GeneralUtility: "LeechLife(110) -- spent per self/ally-sustain need"
    MercRank2Utility: "None authored in normal-mode kit -- see Combat/UtilityCostModel.yaml's asymmetry callout"
NaiveTimeToEmpty:
  Description: >
    Time to drain a FULL pool to zero under naive cast-on-cooldown play,
    ignoring the negligible passive tick (see PassiveRegenComparison) and
    before any Manaflow proc has had a chance to fire. This is the RAMP,
    not the steady state -- see SteadyStateEquilibrium for what happens
    after a character first goes empty.
  Shaman:
    Note: "Race-locked to Soue (Races/Wanderers_Soue.yaml MAGICCAPACITY: 14), pool is always 1400."
    TimeToEmpty: "1400 / 2790 min = 30.1 seconds -- faster than the old (incorrect) 35.8s estimate, since the corrected burn rate is higher"
  Elementalist:
    Note: "Race: null (Classes/Elementalist.yaml) -- pool varies with player race choice. Three representative points across the current Races/*.yaml range:"
    Wyrpincers: "MAGICCAPACITY 4, pool 400 -> 16.7s to empty"
    Soue: "MAGICCAPACITY 14, pool 1400 -> 58.3s to empty"
    HeavenlyBlackDrakols: "MAGICCAPACITY 18, pool 1800 -> 75.0s to empty"
    Implication: >
      Race choice alone swings an Elementalist's naive sustain window by
      4.5x (16.7s to 75.0s) -- same ratio as before, just longer in
      absolute terms now that DPS-loop burn is correctly lower. Still a
      real, currently-unaddressed balance spread -- flagging it again here
      rather than fixing it, same as Combat/ManaEconomy.yaml's earlier
      CrossoverCaveat: a numeric tuning call on the Races/*.yaml
      MAGICCAPACITY band, not something this file resolves unilaterally.
SteadyStateEquilibrium:
  Description: >
    Once a character first goes empty, EVERY subsequent unaffordable press
    auto-swaps to Manaflow (Combat/ManaflowSystem.yaml), which restores
    mana, letting real casts resume until the pool drains again -- an
    oscillation, not a flatline. The number that matters isn't "time to
    empty" (that's a one-time ramp), it's the STEADY-STATE "Manaflow tax":
    what fraction of GCDs, in the long run, get eaten by a Manaflow proc
    instead of a real skill.
  Elementalist:
    Mechanism: "Reaction-driven (Combat/ElementalConvergence.yaml StackReactionCount) -- see Skill.Combat.Elementalist.ElementRecharge.yaml for the corrected formula."
    ByStackReactionCountAtTrigger:
      "0 (never reacts, pure filler spam)": "restores 10% of pool -> burns down in 2.3 GCDs -> Manaflow tax ~30.0% of GCDs"
      "1 (one genuine reaction banked)": "restores 30% -> 7.0 GCDs -> tax ~12.5%"
      "3 (actively chaining)": "restores 70% -> 16.3 GCDs -> tax ~5.8%"
      "5 (ReactionNormalizer, excellent chaining)": "restores 100%, full refill -> tax ~4.1%, floor set by the 1 Manaflow GCD itself"
    Reading: >
      Barely moved from the pre-correction figures (32.4/13.8/6.4/4.6% ->
      30.0/12.5/5.8/4.1%) -- Elementalist's DPS-loop burn only dropped
      modestly (67 -> 60/GCD) since its filler was already close to its
      whole guaranteed rotation. Still a wide, smoothly graded spread from
      "rough but playable" to "barely felt" as reaction play improves.
  Shaman:
    Mechanism: "Cooldown-driven (Skill.Combat.Shaman.SunRecharge.yaml), accelerated 3x while channeling."
    ByChannelFrequencyC:
      "C=0 (never channels)": "effective cooldown 30s, 2 uses/min, 1440 mana/min restored (FlatAmount 720) -> 51.6% coverage of the 2790/min corrected burn"
      "C=0.4 (realistic channel-leaning rotation)": "effective cooldown 16.7s, 3.6 uses/min, 2592 mana/min -> 92.9% coverage"
      "C=0.7 (aggressive channel-weaving)": "effective cooldown 12.5s, 4.8 uses/min, 3456 mana/min -> 123.9% coverage -- net-positive, this player effectively stops running dry"
    Reading: >
      Retuned TWICE now: 300 (original) -> 600 (first correction, against
      the still-biased 2347/min burn) -> 720 (this correction, against the
      DPS-loop-only 2790/min burn -- Shaman's real routine kit turned out
      to be MORE damage-dense than the original blend assumed, not less,
      once utility stopped inflating the denominator it was never really
      part of). 720 reproduces roughly the same coverage SHAPE as the
      previous 600-against-2347 pass (~93%/52% at C=0.4/C=0) purely
      because both the numerator and denominator moved together -- a
      useful sanity check that the retuning logic is consistent, not a
      coincidence.
OutOfCombatRefill:
  Rate: "5% of MaxMana per 5 seconds, flat (Combat/ManaEconomy.yaml)"
  TimeToFullFromEmpty: "20 ticks * 5s = 100 seconds, for ANY pool size -- this rate is expressed as a percent of max, so time-to-full is pool-size-independent by construction."
  Reading: "A flat ~100s full-refill floor between pulls is the number to check against actual dungeon pacing (travel time, trash-to-boss gaps) once that pacing is authored -- currently nothing in Ranks/ or Quests/ specifies inter-pull downtime to compare against."
ShortFormPrinciple:
  SingleFodderPullExample: >
    A representative single trash pull lasting ~8 GCDs (20 seconds) costs
    an Elementalist ~480 mana (8 * 60, DPS-loop only -- CC utility is
    extra ONLY if that pull actually needs crowd control, per
    Combat/UtilityCostModel.yaml) and a Shaman ~930 mana (8 * 116.25) --
    well under either class's smallest realistic pool. This is why
    short-form fights (under 60s, low enough HP that they end before
    sustain matters) don't need dedicated sustain design at all: the
    starting pool alone comfortably covers one.
  ChainingCaveat: >
    The real risk isn't one fodder pull, it's CHAINING several back-to-back
    without a full out-of-combat rest (per the "smaller encounters...stack
    up on bigger pulls in dungeons" design principle) -- three such pulls
    in a row (24 GCDs, ~60s of combined combat time) approximates the same
    cumulative drain as one long-form encounter's opening minute, and
    should be evaluated with the SAME long-form model above, not treated
    as automatically safe just because each individual pull is short.
OpenQuestionsForPlaytesting:
  - "Shaman's BoneSummon+SpiritChannel 'sustainable 6 pairs/min' allocation (PerClassBurnRateMethodology) is asserted, not derived from an actual summon-uptime sim -- the single input most likely to move Shaman's burn number if it's wrong."
  - "Combat/UtilityCostModel.yaml's GeneralUtility/MercRank2Utility split assumes utility casts are genuinely optional per-encounter -- if real dungeon pacing calls for near-constant CC/shielding anyway (e.g. add-heavy pulls), the event-priced budget should be re-examined against actual pull design once that's authored, not assumed low-frequency by default."
  - "Shaman's ChannelFrequencyC is a free variable standing in for 'how often does this Shaman actually channel' -- needs a real rotation (or the eventual Quest.Test.Mercenary Healer test) to pin down a realistic value instead of the 0/0.4/0.7 spread used here."
  - "Elementalist's per-trigger StackReactionCount at the moment Manaflow fires is asserted (0/1/3/5), not derived from how quickly a player can actually land ConsumeThreshold-gated reactions inside a burn-down window."
  - "Race MAGICCAPACITY placeholders (Races/*.yaml) were set before this model existed and were not derived from it -- the Elementalist 4.5x race-choice swing (NaiveTimeToEmpty) is the clearest sign that band needs a second pass now that there's a formula to check it against."
