Key: Combat.DelayedStatus
Description: >
  General status-effect category that answers "how does proactive
  role-support play work without a verbal handshake or a repetitive cast
  cycle." A DelayedStatus is ARMED (cast once), enters a visually telegraphed
  PENDING state, and auto-resolves on its own declared trigger condition --
  no second button press, no out-of-band tank/healer agreement (e.g. "I'll
  hold mitigation, you intend to Holy-cycle until stuns run out"), and no
  back-to-back recast loop required to keep it relevant.
Mechanism:
  Arm: "Cast the skill -- this applies the PENDING status, not the resolved effect."
  VisualIndicator: >
    A persistent, player-visible marker (aura/icon on the target or self)
    showing the status is armed and waiting. This IS the handshake -- other
    players read the state off the world, not off party chat.
  TriggerCondition: "Declared per-skill (HP threshold crossed, incoming hit, ally death-flag, incoming enemy interrupt, etc.)."
  AutoResolve: "Fires automatically the instant TriggerCondition is met. No further player input."
Contrast:
  NotAHandshake: >
    Unlike a verbal agreement ("hold mitigation, I'm about to Holy-cycle"),
    the trigger is systemic and observable via the visual indicator alone.
  NotARepeatedCastCycle: >
    Unlike mashing a heal on cooldown, arming a DelayedStatus is a single
    proactive action. The player spends the rest of their time on other
    tools (barriers, buffs, slow regen, weak attack variants) while it waits
    -- this is what gives a support-flavored Healer sub-archetype (see
    Ranks/RoleMechanics.yaml Healer) an actual flowchart instead of a Cure
    1/2 loop.
WorkedExamples:
  - Skill.Combat.Elementalist.WaterBarrier
  - Skill.Combat.Elementalist.TidalMending
  - Skill.Combat.Elementalist.EmergentLight   # arm-then-flash: heal ONLY
  - Skill.Combat.Elementalist.BlindingFlare   # arm-then-flash: CC ONLY -- deliberately a separate skill from EmergentLight, see AuthoringLesson
  - Skill.Combat.Shaman.CurseExplosion        # arm-on-ENEMY-then-detonate: the pattern also works as a delayed offensive DoT trigger, not just ally-side support
AuthoringLesson: >
  Do not bundle a CC application and a reward-type effect (heal, buff, big
  damage) into the SAME DelayedStatus skill just because they share an
  arm-then-resolve shape. Emergent Light originally did both (heal + Daze)
  and that was a mistake: a CC wants tuning around encounter pacing/gaps
  (see Combat/CCImmunity.yaml), a heal wants tuning against sustained-HoT
  frequency (TidalMending) -- one shared cooldown can't serve both without
  either the CC getting used "for the stun" regardless of heal need, or the
  heal's frequency quietly making the HoT pointless. Split into
  EmergentLight (heal only) and BlindingFlare (CC only) instead. New
  DelayedStatus skills should keep to ONE effect category.
PassiveListenerPattern:
  Description: >
    A DelayedStatus can be armed on something OTHER than a party member.
    Now built as a worked example: a Shaman's Bone Spirit
    (Summons/Summon.Shaman.BoneSpirit.yaml) carries an armed status that
    "listens" for an incoming enemy interrupt and redirects it onto the
    Spirit instead of the caster -- the "counter the counter" mechanic
    referenced in Classes/Class_Prerequisites.yaml's Experienced-tier
    volatility discussion. Capped at one target per summon (see
    Classes/Shaman.yaml).
RoleMechanicTie: >
  For the Healer role, DelayedStatus is the mechanical backbone of the
  RoleMechanic (see Ranks/RoleMechanics.yaml Healer) -- it is what lets a
  DPS/support sub-archetype class (Elementalist, Shaman) function as a
  Healer without ever becoming a repetitive heal-cast loop.
WhyDelayedNotInstant: >
  DelayedStatus is a context of INTENTIONAL, visible CC/effect that
  everyone in the party can see coming -- this is the point, not a side
  effect. FFXIV's Holy resolves immediately on cast, which means other
  players have no warning it's about to happen: they can misread it as an
  active threat and react to it (e.g. a Tank panic-using a mitigation
  cooldown that wasn't needed), or fail to notice it mattered at all until
  after the fact. A visible pending indicator turns "something just
  happened" into "something is about to happen, and I can see it" --
  removing the false-alarm/wasted-reaction failure mode entirely. Worked
  example: Skill.Combat.Shaman.BonePointing.yaml is fully visible (the
  Floating Bone installation itself, plus its needle-strike ticks) and
  additionally delays its Slow specifically to 3+ Hex stacks
  (Passives/Hex.yaml) rather than applying it on the first hit -- compliant
  with this principle twice over.
