Key: Combat.UtilityCostModel
Description: >
  Corrects a DPS-curve bias in the original Combat/ManaSustainModel.yaml:
  that model's burn-rate math blended utility skills (shields, CC,
  proactive heals) into the same flat per-GCD average as pure damage
  filler, which silently assumes utility gets cast on a clock. It doesn't
  -- utility is a NEED, not a rotation slot. If the target is already dead,
  a CC skill that was never cast cost nothing; its Resource.Cost is
  irrelevant the instant the situation that would have justified it stops
  existing. This file defines the trigger condition for that need
  (EffectiveHP) and separates utility into two kinds with different
  mana-model treatment, then Combat/ManaSustainModel.yaml consumes both as
  event-priced budgets instead of blending them into the DPS-loop average.
EffectiveHP:
  Definition: "EffectiveHP = HP * (1 / (1 - DamageReductionPercent)) -- how much raw incoming damage the current mitigation stack lets a target absorb before HP actually runs out."
  UtilityTriggerCondition: >
    Utility (a shield, a CC application, a burst heal, an interrupt) is a
    DETERMINED NEED precisely when projected incoming damage over the next
    few seconds would drop EffectiveHP below a safe floor -- never on a
    fixed schedule. An encounter where EffectiveHP never gets close to that
    floor (over-mitigated, or the target simply dies before it matters)
    never actually calls for the utility skill that exists to answer it,
    and its cost should not be counted as if it did.
  ExistingLeversInThisProject: >
    Passives/Unfocus.yaml (reduces an enemy's escalated-kit potency, a
    party-wide EffectiveHP lever), Skill.Combat.Elementalist.EarthenArmor.yaml
    (a literal flat EffectiveHP buffer), Skill.Combat.Elementalist.WaterBarrier.yaml
    (a percent-of-max-HP buffer) all already function as EffectiveHP levers
    without previously being named as one.
FFXIVReferencePattern: >
  Grounding example (not a literal spec to copy): FFXIV answers an
  EffectiveHP shortfall with tank mitigation timed to specific casts,
  healer burst-heal options that let a tank's HP dip lower than the raw
  number would survive unassisted, White Mage's Holy as the ONE tool that
  can stun an entire room of adds temporarily, and otherwise a DPS or Tank
  oGCD Stun that delays an enemy's next hit by a flat window (3s for DPS,
  5s for Tank, per that game's role split) -- used to ease pressure on the
  tank, free the healer to spend a GCD on something other than a heal,
  prevent "tank kiting" (moving to dodge melee autos, which drags the
  enemy's hitbox in ways that break stationary DPS or melee snapshot AoE),
  and sometimes delay or avoid a tank needing to burn an invulnerability
  entirely. This project's Passives/Stun.yaml (PillarAffinity: Mercenary)
  and the Rank 2 Tank test's CastBarTiming check ("must correctly react to
  whichever of the 3 random Golem casts occurs" --
  Quests/Test.Mercenary.Rank2.Tank_Seq0.yaml) already implement the SAME
  underlying intent through different specifics -- reacting correctly to a
  specific, randomly-selected mechanic rather than a role-differentiated
  flat damage-delay window. The intent transfers even where the numbers
  don't.
UtilityCategories:
  GeneralUtility:
    Definition: >
      PROACTIVE, routine, tied to steady-state party-sustain needs rather
      than a specific scripted mechanic -- what Ranks/RoleMechanics.yaml's
      Healer section already calls "the efficient choice while the team is
      stable." Predictable enough that a rough per-encounter budget is a
      reasonable modeling approximation, unlike MercRank2Utility below.
    WorkedExamples: >
      Skill.Combat.Elementalist.WaterBarrier.yaml, Skill.Combat.Elementalist.TidalMending.yaml,
      Skill.Combat.Elementalist.EmergentLight.yaml, Skill.Combat.Shaman.LeechLife.yaml
      -- all carry RoleMechanic: Healer and no Tag.Mechanic.CC (see
      ClassificationRule).
  MercRank2Utility:
    Definition: >
      REACTIVE, tied to a SPECIFIC situation that only fires if the
      encounter's escalated kit actually presents it -- genuinely
      conditional, in the same sense a Doctrine Level2/3 mechanic is
      conditional on rank/content tier (Ranks/Rank_System.yaml
      DoctrineResolution). If the mechanic never fires, or the target dies
      before it would have mattered, this cost is exactly zero for that
      encounter -- not a small number, an absent one.
    WorkedExamples: >
      Skill.Combat.Elementalist.StoneCoffin.yaml, Skill.Combat.Elementalist.CycloneLock.yaml,
      Skill.Combat.Elementalist.BlindingFlare.yaml -- all carry
      Tag.Mechanic.CC (see ClassificationRule). Shaman currently has NO
      normal-mode equivalent -- its only conditional tools
      (Skill.Combat.Shaman.SpiritCleansing.yaml, MagicLeech, Necromancy)
      live entirely inside Passives/TriageOverride.yaml's crisis gate, not
      in day-to-day play. Flagging this asymmetry rather than inventing a
      skill to fill it -- a real gap if Shaman is meant to carry its own
      answer to a Rank 2+ reactive-CC check the way Elementalist can.
  NamedException:
    RadiantMend: >
      Skill.Combat.Elementalist.RadiantMend.yaml carries RoleMechanic:
      Healer with no CC tag, which would put it in GeneralUtility by the
      rule below -- but its escalating cost/diminishing-stack curve
      (Combat/ElementalConvergence.yaml) makes it behave nothing like a
      flat routine cost. Modeled as its own third case in
      Combat/ManaSustainModel.yaml (a reactive panic-heal answering an
      EffectiveHP shortfall directly, priced by how hard it's leaned on in
      the moment), not blended into either bucket.
ClassificationRule: >
  Derived from tags already on file, no new fields needed: a skill
  carrying Tag.Mechanic.CC is MercRank2Utility; a skill carrying
  RoleMechanic: Healer without that CC tag is GeneralUtility; everything
  else is DPS-loop (Combat/ManaSustainModel.yaml's PerClassBurnRate).
  RadiantMend is the one named exception above.
ModelingConsequence: >
  Combat/ManaSustainModel.yaml's PerClassBurnRate (the number that answers
  "how long until this character goes dry") is now computed from DPS-loop
  skills ONLY. GeneralUtility and MercRank2Utility costs are tracked
  separately as event-priced budgets (Combat/ManaSustainModel.yaml
  UtilityCostBudget) -- added on top ONLY for the GeneralUtility casts and
  MercRank2 mechanic-answers a given encounter actually calls for, never
  assumed as background rotation noise the way the corrected model's
  predecessor implicitly did.
