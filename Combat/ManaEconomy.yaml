Key: Combat.ManaEconomy
Description: >
  The shared mana contract every class sits on top of, regardless of
  whether it spends mana at all. Distinct from Combat/ManaflowSystem.yaml,
  which is the caster-only auto-swap skill built ON TOP of the regen rule
  below -- this file is just the pool size and the passive tick.
PoolConversion: >
  MaxMana = MAGICCAPACITY * 100 (see Attributes/attributes.json). 1
  MAGICCAPACITY point is always worth exactly 100 mana, in every formula
  that references "points" anywhere in this system (Combat/ManaEconomy.yaml,
  Combat/ManaflowSystem.yaml, and the two Manaflow skills).
CasterDefinition: >
  A "caster" is any class whose Classes/<Class>.yaml Definition.MainAttribute
  is MAGICCAPACITY (currently Elementalist, Shaman). Every other class
  (Madolt Warrior, and anything else authored later with a different
  MainAttribute) is a non-caster for this system, full stop -- there is no
  partial/hybrid caster status.
PassiveRegen:
  NonCaster:
    RatePerTick: "5% of MaxMana per 5 seconds"
    Note: >
      Applies unconditionally, in and out of combat alike. Non-caster kits
      aren't expected to spend mana under the current skill set at all
      (every Madolt Warrior skill sits at Resource.Cost: 0), so this rate
      mostly matters if a future non-caster skill ever taxes mana.
  Caster:
    InCombat:
      RatePerTick: "1 mana flat per 5 seconds"
      Note: >
        A raw mana amount, NOT a MAGICCAPACITY point -- 1 MAGICCAPACITY
        point is worth 100 mana (PoolConversion above), so stating this
        tick as "1 point" would have made it 100x too generous and
        quietly erased mana as a real constraint (a caster could nearly
        idle-regen through most fights). 1 raw mana per 5 seconds is
        deliberately close to negligible: the passive tick is not meant
        to keep a caster's kit fed through a real encounter at all --
        Combat/ManaflowSystem.yaml and Passives/TriageOverride.yaml's
        CrisisManaBurst are the actual in-combat mana sources.
    OutOfCombat:
      RatePerTick: "5% of MaxMana per 5 seconds"
      Note: >
        Switches to the same rate non-casters get everywhere -- full
        recovery mode between pulls. Unlike the in-combat 1-mana trickle,
        this is unambiguously the faster rate at every pool size (5% of
        even the smallest current MAGICCAPACITY pool dwarfs a flat 1),
        so "regen speeds up once the fight ends" reads as intended with
        no crossover caveat needed.
TerminologyRule: >
  Never describe a regen tick or a skill's Resource.Cost using the word
  "point" unless it is literally counting MAGICCAPACITY attribute points
  (each worth 100 mana, per PoolConversion). Regen ticks and skill costs
  are always stated in raw mana so the two units never get conflated again.
ManaflowCrossRef: Combat/ManaflowSystem.yaml
