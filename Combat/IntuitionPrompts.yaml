Key: Combat.IntuitionPrompts
Description: >
  The gameplay contract behind the NTU (Intuition) base attribute
  (Attributes/attributes.json). NTU governs a scripted "correct response"
  highlight system: during an encounter, the game can surface which of the
  player's available buttons is the objectively right call right now, and
  let the player choose to take it or not. This is a deliberate middle
  ground between two failure modes seen elsewhere: a character that never
  reacts on the player's behalf despite having every in-fiction reason to
  (FFXIV and similar), and a full auto-battle system that removes the
  player's hand from the fight entirely. This is not the game for either
  extreme.
WhatItIsNot: >
  IntuitionPrompts never presses the button for the player and never
  removes a button from their control. It only changes what the player
  SEES: a highlight, a UI cue, a moment of "your character has clocked
  this." The player can ignore the prompt and take a worse action anyway --
  the highlight is information, not input.
Availability:
  Gate: "Mercenary Rank 2+ (see Ranks/Mercenary_Unlocks.yaml)"
  Note: >
    Rank 1 play gets no prompts at all -- the raw, unassisted read is the
    baseline experience. Rank 2 is where the character has earned enough
    field experience (in-fiction) to start flagging the correct call, and
    Rank 3 should widen the range of situations it can flag, not just the
    accuracy of a single flag. Exact per-rank scope is TBD; this file is
    the contract to extend when that's authored.
NTUScaling: >
  Higher NTU should widen WHEN a correct-response prompt can trigger
  (more situations qualify) and/or shorten the reaction window needed to
  use it, not change whether the underlying "correct response" exists.
  The correct response itself is authored per-encounter (a Doctrine-level
  scripted read, akin to RankProfile.Doctrine in NPC boss files), not
  computed from NTU -- NTU only controls the player's access to seeing it
  in time.
DesignIntent: >
  Answers the specific complaint that games let a character have all the
  narrative competence in the world (reflexes, trained instinct, whatever
  the fiction claims) and still never act on it for the player. Letting
  NTU highlight the correct button is the middle path: it respects the
  character's competence without taking the fight out of the player's
  hands. Should read as "your character noticed," not "your character
  handled it."
