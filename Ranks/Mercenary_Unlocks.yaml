Key: Ranks.Mercenary
Scope: Account
Description: >
  Horizontal progression, optional by design. Mercenary rank NEVER adds
  potency -- it adds kit breadth (skills, classes) and decides how much of
  the kit survives an Area-Stage down-sync (SyncRetention). This is the
  level-desync answer: a synced Rank 3 player keeps their utility toolkit,
  a Rank 1 player fights near the local floor.
SkillQuestGate: >
  Before the broad Rank2/Rank3 TestQuest unlocks, the player must clear
  every available skill quest (mini rank-test) for skills NOT granted by
  their CURRENT class's normal level-up schema (worked example:
  Skills/Shield_Bash.yaml, via Quest.SkillQuest.Adafold.ShieldBash). This is
  evaluated per-class -- switch class, and the gate re-evaluates against
  that class's own skill quests. "Reach the height of the current class"
  means every such skill quest for that class is cleared, not overall
  account completion.
ClassAdvancement: >
  Promoted and Special class access is NOT listed flatly under each rank's
  Unlocks below -- see Classes/Class_Prerequisites.yaml. Summary: Promoted
  requires a Base class at a level threshold + a Role Quest + Mercenary
  Rank2. Special is a SEPARATE track (not built on Promoted) requiring a
  Base class at a level threshold + a dedicated Special Quest + Mercenary
  Rank3.
Rank1:
  SyncRetention: 0.25
  Unlocks: {Skills: [], Classes: []}
Rank2:
  TestQuest:
    Tank: Quest.Test.Mercenary.Rank2.Tank
    Healer: Quest.Test.Mercenary.Rank2.Healer
    DPS: Quest.Test.Mercenary.Rank2.DPS   # linear rotation + interrupt-cycle check, no Unfocus/preemptive-CC safety net -- see Ranks/RoleMechanics.yaml DPS
  SyncRetention: 0.5
  Unlocks: {Skills: [], Classes: []}   # Promoted classes gated via Classes/Class_Prerequisites.yaml instead
Rank3:
  TestQuest:
    Tank: Quest.Test.Mercenary.Rank3.Tank
    Healer: null   # TBD -- not yet authored
    DPS: Quest.Test.Mercenary.Rank3.DPS   # same gap as Rank2 but worse: periodic (not random) punish timing, thinner effective HP
  SyncRetention: 0.75
  Unlocks: {Skills: [], Classes: []}   # Special classes gated via Classes/Class_Prerequisites.yaml instead
PotencyRule: >
  (Formerly "NoPotencyRule" -- the "no potency" wording was a deliberate
  exaggeration.) Rank and gear MAY add potency; the real constraint is that
  no MAJOR DPS swing may decide an encounter. Higher ranks earn damage through
  OPPORTUNITY, not flat power -- longer-cast, risk-gated, conditional skills
  hit harder but carry no guarantee (variance, not a stat bump). A Rank 1
  player stays COMPARABLE in raw damage and must never feel underwhelmed;
  higher ranks win on consistency, control (interrupts/stuns), and capturing
  openings. Rank unlocks grant CAPABILITY, gear carries the NUMBERS: ranking
  up with a placeholder weapon adds zero potency; the payoff only exists when
  a rank capability (e.g. Bonus Strike) meets a stable special weapon.
  Encounter damage is front-loaded by enemy HP% (see
  Combat/EncounterDamageCurve.yaml): a target above 50% HP takes +25% (fast,
  forgiving opening, all ranks alike); at/below 50% HP damage returns to
  baseline (slower, harder phases where higher-rank control matters but
  absolute rank gaps stay small).
RacialSummonException: >
  Summons count as "extra buttons" and are normally gated the same as
  Skills/Classes above -- EXCEPT summons with a RacialAttachment field (see
  Ranks/Rank_System.yaml RacialSummonExemption), which bypass this gate
  entirely. Worked example: Summons/Water_Slime.yaml.
