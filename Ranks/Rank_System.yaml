Key: System.RankPipeline
Description: >
  Canonical contract for the three-pillar rank system. Enemies never read raw
  player progression (level, logs, gear, tests) -- they read a resolved
  snapshot. Everything upstream of the snapshot can change without touching a
  single enemy file.

Snapshot:
  ResolvedOn: AreaEnter          # "Area-Staged": recomputed every subzone entry
  Fields:
    Adventurer: {Range: [1, 3], Scope: Subzone}   # widens to Region via Zone_Library RankEscalation
    Mercenary:  {Range: [1, 3], Scope: Account}
    Strategy:   {Range: [1, 3], Scope: Account}

DefaultingRule: >
  Enemy RankProfile: Mercenary.Rank1 and Doctrine.Level1 are REQUIRED (the
  default pattern every player can meet). Rank2/Rank3 and Level2/Level3 are
  OPTIONAL; a missing tier inherits the tier below it. Project_Validator
  enforces the required tiers.

DoctrineResolution:
  Description: >
    How an enemy's Doctrine tier resolves against a party. Content type AND
    difficulty variant decide the rule -- not a single per-enemy field, since
    the same enemy can appear in open world and in a dungeon. Replaces the
    old flat "PartyResolution: Lowest" (which let a Rank 1 suppress Rank 2
    enemy logic). Governing principle: stepping into a higher content
    category is opting into being outscaled; the open world is the one
    protective default.
  OpenWorld: {Mode: Lowest}                 # protects mixed/learning play
  InstancedQuest: {Mode: Highest}           # incl. MSQ-equivalents; soloed => your own rank
  Dungeon:
    Normal: {Mode: Highest}
    Hard: {Mode: Highest, MinDoctrine: Level2}     # floored, can exceed
  Trial:
    Normal: {Mode: Highest}
    Hard: {Mode: Highest, MinDoctrine: Level2}
    Extreme: {Mode: Fixed, FixedDoctrine: Level3}  # party-independent gate
  Raid:
    Normal: {Mode: Highest}
    Savage: {Mode: Fixed, FixedDoctrine: Level3}
  AreaContentGate: >
    Access to a rank-gated advancement is additionally tied to its OWN
    originating area's completion (Reaper-needs-Endwalker style) -- unrelated
    areas are irrelevant. See Classes/Class_Prerequisites.yaml.

NamingSplit:
  PlayerFacing: Strategy         # item gate + progression indicator
  EnemyFacing: Doctrine          # AI pattern decider + kit unlock tiers

GearSync: >
  Items gated by Adventurer rank stay equipped everywhere; their effective
  stats sync down to the local subzone's rank ceiling on Area-Stage. Gating
  is acquisition-side; play-side is sync, not stripping (FFXIV level-sync
  analog).

NoFeedbackRule: >
  Gear NEVER contributes to rank computation. Rank gates gear; gear feeding
  rank would be a feedback loop.

KnowledgeCheckRule: >
  Any Doctrine mechanic that expects out-of-encounter knowledge must be
  declared under KnowledgeChecks with a LoreSource reference, so "learnable
  in-game" is the authored default and external-knowledge checks are a
  visible, deliberate choice.

RacialSummonExemption: >
  A Summon with a RacialAttachment field (RaceKey + MercStratExempt: true,
  see Summons/*.yaml) bypasses Mercenary/Strategy rank gating entirely, even
  though summons normally count as "extra buttons" gated the same as
  Skills/Classes under Ranks/Mercenary_Unlocks.yaml and
  Ranks/Strategy_Unlocks.yaml. Rationale: it's not an earned tool, it's part
  of the race's baseline identity -- gating it behind account-progression
  rank would contradict it being racially innate. Worked example:
  Summons/Water_Slime.yaml (Lower Drakols).
