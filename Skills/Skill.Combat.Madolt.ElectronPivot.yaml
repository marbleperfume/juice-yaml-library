Key: Skill.Combat.Madolt.ElectronPivot
Name: Electron Pivot
Intent: >
  A deliberate, controlled taunt -- reintroduces real "force a retarget"
  logic that the baseline Lv1-30 kit intentionally omitted (no Provoke
  slot), but earned at Rank 2 like Circuit Break/Grounding Counter rather
  than handed out at level up. Purpose: when an ally makes a positioning/
  mechanic mistake and is about to eat a hard-hitting incoming attack, the
  Tank can PIVOT the enemy's attention onto themselves to intercept it --
  Electron Shield tech reframed as an emergency defensive tool, not a
  primary threat-management button. Unlike the passive Aggro formula
  (Combat/AggroSystem.yaml), this is a GUARANTEED instant retarget onto the
  caster, bypassing the normal Proximity+Focus blend for this one
  deliberate cast -- a real taunt, not a probabilistic nudge. The controls
  that keep it from being spammable are a long cooldown and the Rank 2
  skill-quest gate, not a numbers-based safety net -- this is not
  engineered against a player deliberately withholding it to grief a
  teammate; that's a trust problem, not a math problem.
ActionType: Ability
Tags:
  - Skill.Type.Ability
  - Skill.Role.Tank
  - Tag.Class.Warrior
  - Tag.Mechanic.Taunt
Acquisition:
  Method: SkillQuest
  SkillQuestRef: Quest.SkillQuest.Madolt.ElectronPivot
  MercenaryRankTier: 2
RoleMechanic: Tank
ClassMechanic: null
BaseState:
  Animation: Anim_Madolt_ElectronPivot
  VFX: VFX_EC_ShieldPivotFlash
  IsOGCD: true
  CanCastWhileMoving: true
Mechanics:
  Targeting: Target
  Potency: 0
  Range: 25     # deliberately ranged -- the Tank doesn't need to already be in melee to intercept a hit aimed at someone else
  CastTime: 0
  RecastTime: 30
  MaxCharges: 1
Effect:
  ForcedRetarget: true
  Note: "Guaranteed instant retarget onto the caster -- bypasses FocusRedirectRule's normal formula for this one cast."
FocusGeneration: 500   # still contributes to the caster's ongoing Aggro score after the forced retarget resolves, so subsequent normal checks reflect it
Resource:
  Type: None
  Cost: 0
ClassRestrictions:
  - Warrior
