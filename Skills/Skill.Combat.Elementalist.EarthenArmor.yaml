Key: Skill.Combat.Elementalist.EarthenArmor
Name: Earthen Armor
Intent: >
  The defense-equivalent counterpart Skill.Combat.Elementalist.EarthBreak.yaml
  converts to while Passives/TriageOverride.yaml (Crisis Mode) is active --
  Earth's control/defense identity (already established by
  Skill.Combat.Elementalist.StoneCoffin.yaml's root/imprison) made explicit
  as a party-wide buff instead of a single-target CC. Grants everyone
  nearby a flat damage-block shield (a hard cap, NOT a percent-of-max-HP
  shield like Skill.Combat.Elementalist.WaterBarrier.yaml) -- Earth's
  defense identity bleeding into a genuinely party-wide crisis tool the way
  Water's healing identity already does via Tidal Surge. Reacts to
  consumed Earth stacks the same way any other Elementalist skill can (see
  StackConsumption) -- boosts the block cap further AND, uniquely, negates
  overflow damage from any single non-oneshot hit that exceeds the cap,
  rather than letting the excess through. Scripted "must-kill" oneshot
  mechanics are explicitly exempted from that overflow negation -- Crisis
  Mode is meant to make the party hard to kill by attrition, not to
  trivialize an encounter's actual kill mechanic.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Elementalist
  - Tag.Element.Earth
Acquisition:
  Method: KitConversion
  ConvertsFrom: Skill.Combat.Elementalist.EarthBreak
  Note: "Not independently acquired -- exists only as Earth Break's Triage Override (Crisis Mode) state."
RoleMechanic: Healer
ClassMechanic: ElementalConvergence
BaseState:
  Animation: Anim_Elementalist_EarthenArmor
  VFX: VFX_Earth_ArmorBloom
  IsOGCD: false
  CanCastWhileMoving: false
Mechanics:
  Targeting: Area_PartyWide
  Potency: 0
  Range: 30
  CastTime: 1.5
  RecastTime: 8
  MaxCharges: 1
Effect:
  AlliesInRadius:
    ShieldFlatAmount: 600   # PLACEHOLDER -- "up to X damage blocked," a hard cap rather than a percent; needs a simulated pass
DurationSeconds: 15   # PLACEHOLDER -- shield persists/absorbs until this expires or the cap is spent, whichever first
StackConsumption:
  ConsumesElement: Earth
  Minimum: 5   # Combat/ElementalConvergence.yaml ConsumeThreshold
  Effect: >
    ShieldFlatAmount rises by 50% for this cast (PLACEHOLDER), AND grants
    OverflowNegation: a single hit that exceeds the boosted cap has its
    excess voided entirely rather than applied, UNLESS the hit carries
    Tag.Mechanic.Oneshot (a scripted must-kill mechanic is never softened
    by this -- see Combat/EncounterDamageCurve.yaml for how encounter
    damage is already authored around HP thresholds).
GaugeGeneration: 15   # unchanged from Earth Break -- still builds Earth, now while converted
Resource:
  Type: None
  Cost: 0   # Exempt: only exists as Earth Break's Triage Override KitConversion state -- see Combat/ManaflowSystem.yaml's crisis-exempt rule
ClassRestrictions:
  - Elementalist
