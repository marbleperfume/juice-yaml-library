Key: Skill.Combat.Madolt.ConcussiveBash
Name: Concussive Bash
Intent: >
  EC-shield bash that stuns (FFXIV Low Blow analog). This is the Madolt
  Warrior's only baseline hard crowd control, and it becomes load-bearing at
  Rank 3: the charged EC Weapon Discharge (Control) typically needs a Stun
  window to land safely, and Concussive Bash is that setup.
