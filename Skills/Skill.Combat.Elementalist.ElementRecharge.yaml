Key: Skill.Combat.Elementalist.ElementRecharge
Name: Element Recharge
Intent: >
  Elementalist's Manaflow skill (Combat/ManaflowSystem.yaml) -- never slotted
  or chosen directly, it auto-swaps in for any button the player presses
  that they can't currently afford on mana alone (not blocked by a status).
  Its restore formula deliberately rewards the class's own mechanic: the
  more genuine cross-element reactions (Combat/ElementalConvergence.yaml
  StackReactionCount) landed since the last recharge, the bigger the
  payout, especially when cast near-empty. A player who just spams one
  element's skill without ever consuming a pool gets only the flat floor
  every time -- Elementalist is a LOW-cost class overall (see
  Classes/Elementalist.yaml ManaProfile), but that low cost is earned by
  playing the reaction game, not assumed for free. Quantitatively (see
  Combat/ManaSustainModel.yaml): 0 banked reactions costs ~32% of GCDs to
  Manaflow while empty-cycling, 1 reaction drops that to ~14%, 3 reactions
  to ~6%, and 5 reactions (ReactionNormalizer below) caps out at a full
  refill -- a real, felt difference across the skill range, not a rounding
  error.
ActionType: Ability
Tags:
  - Skill.Type.Ability
  - Tag.Class.Elementalist
  - Tag.Mechanic.Manaflow
Acquisition:
  Method: Innate
  Note: "Granted automatically to every Elementalist -- never independently learned or slotted, see Combat/ManaflowSystem.yaml SkillFileContract."
RoleMechanic: null
ClassMechanic: ElementalConvergence
BaseState:
  Animation: Anim_Elementalist_ElementRecharge
  VFX: VFX_Convergence_FourColorPulse
  IsOGCD: true
  CanCastWhileMoving: true
  Note: "Inherits the cast/recast timing of whichever skill it swapped in for -- it has no independent timing of its own."
Mechanics:
  Targeting: Self
  Potency: 0
  Range: 0
  CastTime: 0
  RecastTime: 0
  MaxCharges: 1
ManaRestoreFormula:
  Description: >
    RestoredMana = MIN(MaxMana, (BaseRestorePercent * MaxMana) +
    (PercentManaMissing * MaxMana * (StackReactionCount / ReactionNormalizer))).
    Resets Combat/ElementalConvergence.yaml StackReactionCount to 0 on use.
    CORRECTED per Combat/ManaSustainModel.yaml's quantitative pass -- the
    original formula multiplied PercentManaMissing * StackReactionCount
    directly against MaxMana with no normalizer, so even a single banked
    reaction (StackReactionCount: 1) at high PercentManaMissing could
    restore MORE than 100% of MaxMana in one press. ReactionNormalizer=5
    reuses Combat/ElementalConvergence.yaml's existing ConsumeThreshold
    constant on purpose: landing 5 genuine reactions before running dry
    is what earns a full top-up, a clean number the player already knows
    from the consume-a-pool rule itself, not a new one to learn.
  BaseRestorePercent: 0.10   # PLACEHOLDER -- flat floor, always granted regardless of play quality; needs a simulated pass
  PercentManaMissing: "(MaxMana - CurrentMana) / MaxMana"
  StackReactionCount: "Combat/ElementalConvergence.yaml StackReactionCount at the moment of cast"
  ReactionNormalizer: 5   # matches Combat/ElementalConvergence.yaml StackRule.ConsumeThreshold
GaugeGeneration: 0
FocusGeneration: 0   # a resource-management press, not player damage -- shouldn't move enemy attention
Resource:
  Type: None
  Cost: 0
ClassRestrictions:
  - Elementalist
