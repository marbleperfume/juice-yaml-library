Key: Skill.Combat.Elementalist.TidalSurge
Name: Tidal Surge
Intent: >
  Water-element hard-cast heal -- the healing-equivalent counterpart
  Skill.Combat.Elementalist.EmberLance converts to while
  Passives/TriageOverride.yaml is active (see its ConversionMap). Fire
  never carries a healing function (see Combat/ElementalConvergence.yaml
  HealingElementRule), so the conversion crosses element into Water rather
  than staying Fire -- an earlier draft ("Ember Mend") wrongly kept it
  Fire-tagged and has been retired. Designed to be potent and CONSISTENT,
  the tool that gets the party back OUT of Triage Override, in contrast to
  Light's EMERGENCY-flavored Emergent Light.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Elementalist
  - Tag.Element.Water
Acquisition:
  Method: KitConversion
  ConvertsFrom: Skill.Combat.Elementalist.EmberLance
  Note: "Not independently acquired -- exists only as EmberLance's Triage Override state."
RoleMechanic: Healer
ClassMechanic: ElementalConvergence
BaseState:
  Animation: Anim_Elementalist_TidalSurge
  VFX: VFX_Water_SurgeWave
  IsOGCD: false
  CanCastWhileMoving: false
Mechanics:
  Targeting: Target
  Potency: 480        # deliberately strong hard-cast -- more than Tidal Mending's per-tick HoT, at the cost of a full GCD commitment. PLACEHOLDER pending a simulated pass.
  Range: 25
  CastTime: 2.0
  RecastTime: 2.5
  MaxCharges: 1
GaugeGeneration: 15   # unchanged from EmberLance -- still builds ElementalConvergence, now toward the Water pool instead of Fire while converted
Resource:
  Type: None
  Cost: 0   # Exempt: only exists as EmberLance's Triage Override KitConversion state -- see Combat/ManaflowSystem.yaml's crisis-exempt rule (double-gating an already crisis-only heal is the failure mode being avoided)
ClassRestrictions:
  - Elementalist
