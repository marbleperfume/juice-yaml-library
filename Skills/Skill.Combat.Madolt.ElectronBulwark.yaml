Key: Skill.Combat.Madolt.ElectronBulwark
Name: Electron Bulwark
Intent: >
  Rank 3 true invulnerability (full damage immunity, ~6s, long cooldown). It
  must be true immunity, NOT mitigation, because its skill-quest test is the
  guaranteed-death mechanic: a "mathed lethal" that scales its hit count to
  defeat any mitigation (see NPC.Boss.Test.MechaGolem Doctrine Level3
  GuaranteedLethal). The lesson is that losing is not always obvious --
  some mechanics are unsurvivable by defense/timing and only invuln answers.
ActionType: Ability
Tags:
  - Skill.Type.Ability
  - Skill.Role.Tank
  - Tag.Class.Warrior
  - Tag.Mechanic.Invulnerability
Acquisition:
  Method: SkillQuest
  SkillQuestRef: Quest.SkillQuest.Madolt.ElectronBulwark
  MercenaryRankTier: 3
  Note: >
    The quest provisionally grants the skill, then requires demonstrating
    correct use against the GuaranteedLethal mechanic to unlock it properly
    -- resolving the chicken-and-egg (you don't need it BEFORE its own test).
RoleMechanic: Tank
ClassMechanic: null
BaseState:
  Animation: Anim_Madolt_Bulwark
  VFX: VFX_EC_FullField
  IsOGCD: true
  CanCastWhileMoving: true
Mechanics:
  Targeting: Self
  Potency: 0
  Range: 0
  CastTime: 0
  RecastTime: 240
  MaxCharges: 1
Effect:
  Invulnerability: true      # true damage immunity, not mitigation
  DurationSeconds: 6
Resource:
