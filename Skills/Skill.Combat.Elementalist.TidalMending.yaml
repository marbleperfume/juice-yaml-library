Key: Skill.Combat.Elementalist.TidalMending
Name: Tidal Mending
Intent: >
  RoleMechanic worked example (Healer): the "slow regen" tool. Ticks a
  modest heal-over-time immediately, but ALSO carries a DelayedStatus
  component -- if the target's HP crosses below 50% while it's still
  active, the remaining ticks upgrade to a stronger potency automatically.
  Rewards applying it proactively, before it's urgently needed.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Elementalist
  - Tag.Element.Water
Acquisition:
  Method: LevelUp
  AcquiredLevel: 14
RoleMechanic: Healer
ClassMechanic: ElementalConvergence
BaseState:
  Animation: Anim_Elementalist_TidalMending
  VFX: VFX_Water_SlowRegen
  IsOGCD: false
  CanCastWhileMoving: true
Mechanics:
  Targeting: Target
  Potency: 60      # per tick, baseline
  Range: 20
  CastTime: 1.5
  RecastTime: 3
  MaxCharges: 1
DelayedStatus:
  VisualIndicator: "Faint tide-mark glyph on the target while pending upgrade"
  TriggerCondition: "TargetHP crosses below 50% while active"
  Effect:
    UpgradedTickPotencyMultiplier: 2.0
DurationSeconds: 18
Resource:
  Type: Mana
  Cost: 50   # PLACEHOLDER -- Low CostTier, kept cheap given the 3s recast HoT-application cadence
ClassRestrictions:
  - Elementalist
