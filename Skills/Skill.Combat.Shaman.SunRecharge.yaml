Key: Skill.Combat.Shaman.SunRecharge
Name: Sun Recharge
Intent: >
  Shaman's Manaflow skill (Combat/ManaflowSystem.yaml) -- canopy-lifestyle
  flavor (see the dark-skinned canopy-dweller branch in
  Races/Wanderers_Soue.yaml). Never slotted or chosen directly, it auto-swaps
  in for any button the player presses that they can't currently afford on
  mana alone (not blocked by a status). Unlike Element Recharge's reaction-
  fed formula, Sun Recharge is COOLDOWN-gated: it comes back on its own
  timer and pays out a bigger flat chunk per use, matching Shaman's MEDIUM
  cost tier (see Classes/Shaman.yaml ManaProfile) -- fewer, heavier spends
  need a bigger refill, not a trickle. While the Shaman is genuinely
  channeling (Tag.Mechanic.Channeled, e.g.
  Skill.Combat.Shaman.SpiritChannel.yaml), Sun Recharge's own remaining
  cooldown drains at an accelerated rate. Timing a channel around Sun
  Recharge's downtime is this class's core resource skill-check -- a
  weaker player who doesn't track it will visibly run drier over a fight
  than one who does, which is the intended lesson (see Classes/Shaman.yaml
  RoleNote on this being a deliberately higher-difficulty class).
ActionType: Ability
Tags:
  - Skill.Type.Ability
  - Tag.Class.Shaman
  - Tag.Mechanic.Manaflow
Acquisition:
  Method: Innate
  Note: "Granted automatically to every Shaman -- never independently learned or slotted, see Combat/ManaflowSystem.yaml SkillFileContract."
RoleMechanic: null
ClassMechanic: BoneSummonCycle
BaseState:
  Animation: Anim_Shaman_SunRecharge
  VFX: VFX_Sun_CanopyBeam
  IsOGCD: true
  CanCastWhileMoving: true
  Note: "Inherits the cast/recast timing of whichever skill it swapped in for at the moment of the swap; its own RecastTime below governs when it's next AVAILABLE to swap in for, not a per-press cast time."
Mechanics:
  Targeting: Self
  Potency: 0
  Range: 0
  CastTime: 0
  RecastTime: 30   # PLACEHOLDER base cooldown -- needs a simulated pass like every other new-kit number this session
  MaxCharges: 1
CooldownAcceleration:
  WhileChanneling: >
    Sun Recharge's remaining cooldown drains at 3x the normal rate (PLACEHOLDER
    multiplier) for the duration of any Tag.Mechanic.Channeled cast the
    Shaman is performing -- rewards weaving a channel specifically to
    shorten the wait for the next Sun Recharge, rather than treating
    channels and Sun Recharge as unrelated systems.
ManaRestore:
  FlatAmount: 720   # PLACEHOLDER, retuned AGAIN per Combat/ManaSustainModel.yaml's DPS-curve-bias correction -- Shaman's real DPS-loop burn (~2790/min) is higher than the original blended estimate (~2347/min) once SpiritChannel/CurseExplosion/BonePointing are correctly counted as routine damage rather than occasional utility (see Combat/UtilityCostModel.yaml). 720 targets ~93% coverage at a realistic 40% channel-frequency, ~52% disengaged -- same shape as the previous 600 retune, rebased onto the corrected burn number
GaugeGeneration: 0
FocusGeneration: 0
Resource:
  Type: None
  Cost: 0
ClassRestrictions:
  - Shaman
