Key: Skill.Combat.Elementalist.TidalRevival
Name: Tidal Revival
Intent: >
  Resurrection skill, deliberately NOT available outside a genuine crisis --
  it only becomes castable while Passives/TriageOverride.yaml is active (see
  its UnlocksSkills). Reinforces that reviving a party member is an
  emergency-triage action, not a routine utility button.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Elementalist
  - Tag.Mechanic.Resurrection
Acquisition:
  Method: MercenaryRankUnlock
  MercenaryRankTier: 2
  Note: "Learned at Merc Rank 2, but locked out of casting entirely unless Triage Override is active -- a hard gate, not a cooldown."
RoleMechanic: Healer
ClassMechanic: null
BaseState:
  Animation: Anim_Elementalist_TidalRevival
  VFX: VFX_Water_RevivalSurge
  IsOGCD: false
  CanCastWhileMoving: false
Mechanics:
  Targeting: Target
  Potency: 0
  Range: 20
  CastTime: 5.0
  RecastTime: 300
  MaxCharges: 1
Requires:
  Status: Triage Override
  HardGate: true   # not merely boosted by the status -- unusable at all without it
Effect:
  Revive: true
  ReviveHPPercent: 35
Resource:
  Type: None
  Cost: 0   # Exempt: hard-gated behind Triage Override (Requires.HardGate) plus a 300s recast -- already scarce enough that a mana cost would only double-punish the exact moment a revive is needed, see Combat/ManaflowSystem.yaml's crisis-exempt rule
ClassRestrictions:
  - Elementalist
