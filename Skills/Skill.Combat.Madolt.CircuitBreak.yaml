Key: Skill.Combat.Madolt.CircuitBreak
Name: Circuit Break
Intent: >
  Rank 2 cast-response tool -- the interrupt the baseline kit deliberately
  lacks (see Classes/Madolt_Warrior.yaml: no baseline interrupt, cast-response
  is earned at Rank 2). Interrupts an enemy action and applies Unfocus on
  hit, so interrupting also blunts the target's next Doctrine skill.
ActionType: Ability
Tags:
  - Skill.Type.Ability
  - Skill.Role.Tank
  - Tag.Class.Warrior
  - Tag.Mechanic.Interrupt
Acquisition:
  Method: SkillQuest
  SkillQuestRef: Quest.SkillQuest.Madolt.CircuitBreak
  MercenaryRankTier: 2
  Note: >
    Not in the level-up schema. Earned via an offense-favored perform-to-
    unlock test (must interrupt a live cast in-window). Clearing every such
    Rank 2 skill quest gates the broad Mercenary Rank 2 test
    (Ranks/Mercenary_Unlocks.yaml SkillQuestGate).
RoleMechanic: Tank
ClassMechanic: null
BaseState:
  Animation: Anim_Madolt_CircuitBreak
  VFX: VFX_EC_Interrupt
  IsOGCD: true
  CanCastWhileMoving: true
Mechanics:
  Targeting: Target
  Potency: 0
  Range: 5
  CastTime: 0
  RecastTime: 30
  MaxCharges: 1
Resource:
