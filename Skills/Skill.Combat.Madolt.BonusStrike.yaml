Key: Skill.Combat.Madolt.BonusStrike
Name: Bonus Strike
Intent: >
  Rank 2 passive CAPABILITY (not a button). A stable EC weapon/shield's
  discharges gain a secondary strike -- this is the rank half of the
  "rank = capability, gear = numbers" split (see Ranks/Mercenary_Unlocks.yaml
  PotencyRule). With a scaling or placeholder weapon it does nothing; the
  payoff only exists when the capability meets a stable special weapon
  (Items/Item.Equipment.Madolt.ECWeapon.Stable.yaml).
ActionType: Passive
Tags:
  - Skill.Type.Passive
  - Skill.Role.Tank
  - Tag.Class.Warrior
Acquisition:
  Method: MercenaryRankUnlock
  MercenaryRankTier: 2
  Note: >
    No skill quest -- granted on reaching Mercenary Rank 2. Ranking up alone
    adds no potency; the secondary strike only fires when a stable special
    weapon is equipped.
RoleMechanic: null
ClassMechanic: ChargeGauge
Effect:
  DischargeSecondaryStrike: true
  RequiresGear: StableSpecialWeapon
  Note: Secondary strike potency is carried by the weapon's passive, not this skill.
ClassRestrictions:
  - Warrior
