Key: Skill.Combat.Madolt.ECWeaponDischargeControl
Name: "EC Weapon Discharge: Control"
Intent: >
  Rank 3 flagship. The 75%+ Charge Gauge "charged" discharge (top of the
  Combat/ChargeGauge.yaml gauge ladder) -- flashier and far harder-hitting
  than the baseline 50% discharge, but a longer interruptible cast that
  typically needs a Stun (Concussive Bash) or other setup to land. Generates
  heavy Focus, so using it makes Rank-3-correlated enemies more interrupt-
  prone: power that raises the difficulty rather than lowering it.
ActionType: Weaponskill
Tags:
  - Skill.Type.Weaponskill
  - Skill.Role.Tank
  - Tag.Class.Warrior
  - Tag.Mechanic.Discharge
  - Tag.Skill.Risky
  - Tag.Mechanic.Channeled   # exempt from FocusTimingRule's cast-start front-load -- see Combat/AggroSystem.yaml TankRoleExemption
Acquisition:
