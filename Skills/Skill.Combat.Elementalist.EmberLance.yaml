Key: Skill.Combat.Elementalist.EmberLance
Name: Ember Lance
Intent: >
  Weak attack variant mixed into the Elementalist's support rotation --
  low Focus generation (see Classes/Madolt_Warrior.yaml-style FocusProfile:
  Elementalist is the low-Focus end of the power/volatility axis), so it's
  safe filler between DelayedStatus tools rather than a real DPS
  contribution. Builds the class's Fire ElementalConvergence stack (own-pool
  consumption grants bonus damage -- Combat/ElementalConvergence.yaml's Fire
  universal modifier). Occupies THIS slot only outside a crisis -- while
  Passives/TriageOverride.yaml is active, this skill is replaced by
  Skill.Combat.Elementalist.TidalSurge.yaml (a WATER heal, not a same-
  element Fire one -- Fire never carries a healing function, see
  ElementalConvergence's HealingElementRule), so the kit never carries a
  redundant offense/heal duplicate at the same time.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Elementalist
  - Tag.Element.Fire
Acquisition:
  Method: LevelUp
  AcquiredLevel: 2
RoleMechanic: null
ClassMechanic: ElementalConvergence
BaseState:
  Animation: Anim_Elementalist_EmberLance
  VFX: VFX_Fire_SmallBolt
  IsOGCD: false
  CanCastWhileMoving: false
Mechanics:
  Targeting: Target
  Potency: 150     # deliberately modest vs a real DPS GCD
  Range: 25
  CastTime: 2.0
  RecastTime: 2.5
  MaxCharges: 1
GaugeGeneration: 15
FocusGeneration: 80   # low, relative to Shaman-style high-Focus kits
Resource:
  Type: Mana
  Cost: 60   # PLACEHOLDER -- Low CostTier filler, see Classes/Elementalist.yaml ManaProfile / Combat/ManaEconomy.yaml
ClassRestrictions:
  - Elementalist
