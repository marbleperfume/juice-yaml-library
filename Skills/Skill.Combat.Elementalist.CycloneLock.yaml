Key: Skill.Combat.Elementalist.CycloneLock
Name: Cyclone Lock
Intent: >
  Wind-element CC skill, CC ONLY (no damage attached -- kept single-purpose
  per Combat/DelayedStatus.yaml's AuthoringLesson). Base effect is Disorient
  (Passives/Disorient.yaml), kept distinct from Water's Slow so each
  element owns one CC identity, not an overlapping one. Worked example for
  Combat/ElementalConvergence.yaml's Wind universal modifier: consuming a
  built Wind pool converts this cast from single-target to AoE, demonstrating
  the rule on itself. Combat/CCImmunity.yaml still caps how often Disorient
  can land on the same target before it resists.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Elementalist
  - Tag.Element.Wind
  - Tag.Mechanic.CC
Acquisition:
  Method: LevelUp
  AcquiredLevel: 34
RoleMechanic: null
ClassMechanic: ElementalConvergence
BaseState:
  Animation: Anim_Elementalist_CycloneLock
  VFX: VFX_Wind_Vortex
  IsOGCD: false
  CanCastWhileMoving: false
Mechanics:
  Targeting: Target      # becomes Area_Circle if Wind stacks are consumed -- see StackConsumption
  Potency: 0
  Range: 20
  CastTime: 1.5
  RecastTime: 18     # PLACEHOLDER
  MaxCharges: 1
Effect:
  AppliesStatus: Disorient
  DurationSeconds: 5
StackConsumption:
  ConsumesElement: Wind
  Minimum: 5   # Combat/ElementalConvergence.yaml ConsumeThreshold
  Effect: "Converts Targeting from single-target to Area_Circle for this cast -- Combat/ElementalConvergence.yaml's Wind universal modifier, demonstrated on itself"
CCImmunityRef: Combat.CCImmunity
Resource:
  Type: Mana
  Cost: 90   # PLACEHOLDER -- optional-reaction skill (Wind-stack consume is a choice, not mandatory), between filler and StoneCoffin's mandatory-consume cost
ClassRestrictions:
  - Elementalist
