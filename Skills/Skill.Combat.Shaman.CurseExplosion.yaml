Key: Skill.Combat.Shaman.CurseExplosion
Name: Curse Explosion
Intent: >
  DelayedStatus applied to an ENEMY rather than an ally -- the offensive
  mirror of the Elementalist's ally-side barriers (see
  Combat/DelayedStatus.yaml WorkedExamples). Arm a curse mark on the target;
  it sits as a visible pending glyph and auto-detonates for burst damage on
  its trigger, rather than requiring the Shaman to stand and channel. Pure
  damage, single-purpose -- no CC bolted onto the detonation, per
  Combat/DelayedStatus.yaml's AuthoringLesson.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Tag.Class.Shaman
  - Tag.Mechanic.Curse
Acquisition:
  Method: LevelUp
  AcquiredLevel: 18
RoleMechanic: null
ClassMechanic: null
BaseState:
  Animation: Anim_Shaman_CurseExplosion
  VFX: VFX_Curse_MarkThenDetonate
  IsOGCD: false
  CanCastWhileMoving: true
Mechanics:
  Targeting: Target
  Potency: 0
  Range: 20
  CastTime: 1.0
  RecastTime: 15
  MaxCharges: 1
DelayedStatus:
  VisualIndicator: "Pending curse glyph on the target while armed"
  TriggerCondition: "FixedDelaySeconds: 4.0 (auto-detonates if not otherwise triggered early)"
  Effect:
    DetonationPotency: 380   # PLACEHOLDER
    HexSynergy: "+4% detonation potency per Passives/Hex.yaml stack present on the target at trigger time -- rewards layering Bone Pointing first"
FocusGeneration: 180   # moderate -- more than the DoT/leech/slow tools, still well below SpiritChannel's 650
Resource:
  Type: Mana
  Cost: 150   # PLACEHOLDER -- moderate Focus/high burst DelayedStatus detonation, priced above the DoT/leech filler tier
ClassRestrictions:
  - Shaman
