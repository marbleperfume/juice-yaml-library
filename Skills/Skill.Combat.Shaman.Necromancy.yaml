Key: Skill.Combat.Shaman.Necromancy
Name: Necromancy
Intent: >
  Shaman's Resurrection -- same hard-gate shape as
  Skill.Combat.Elementalist.TidalRevival.yaml (locked out of casting
  entirely outside Passives/TriageOverride.yaml), but its own name and
