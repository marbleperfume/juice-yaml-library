Key: Skill.Combat.Shaman.LifeLeechingCurse
Name: Life Leeching Curse
Intent: >
  DoT that returns a portion of the damage dealt to the Shaman as healing.
  The leech is mechanically coupled 1:1 to the same damage tick (not an
  independently-timed effect), so this isn't the kind of two-job overload
  Combat/DelayedStatus.yaml's AuthoringLesson warns against -- it's one
  atomic effect, not a damage skill and a heal skill sharing a cooldown.
  LOW Focus generation, self-sustain tool.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Tag.Class.Shaman
  - Tag.Mechanic.DoT
  - Tag.Mechanic.Curse
Acquisition:
  Method: LevelUp
  AcquiredLevel: 10
RoleMechanic: null
ClassMechanic: null
BaseState:
  Animation: Anim_Shaman_LifeLeechingCurse
  VFX: VFX_Curse_LeechTether
  IsOGCD: false
  CanCastWhileMoving: true
Mechanics:
  Targeting: Target
  Potency: 40     # per tick, PLACEHOLDER
  Range: 20
  CastTime: 1.5
  RecastTime: 3
  MaxCharges: 1
DurationSeconds: 15
LeechPercent: 50   # of each tick's damage, returned as self-healing
FocusGeneration: 55
Resource:
  Type: Mana
  Cost: 90   # PLACEHOLDER -- Medium CostTier DoT/leech filler, in line with WitheringPoison
ClassRestrictions:
  - Shaman
