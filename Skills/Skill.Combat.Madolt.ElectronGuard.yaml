Key: Skill.Combat.Madolt.ElectronGuard
Name: Electron Guard
Intent: >
  Defensive stance unique to the Madolt Warrior. Because the class already
  holds aggro innately, this is NOT an enmity stance (unlike FFXIV Defiance)
  -- it is purely the gauge-draining guard mode that immensely reduces damage
  taken and is the prerequisite for EC Shield Discharge. Draining Charge
  Gauge while active is the cost of the mitigation.
ActionType: Ability
