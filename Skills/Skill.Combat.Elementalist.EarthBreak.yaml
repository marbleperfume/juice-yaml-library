Key: Skill.Combat.Elementalist.EarthBreak
Name: Earth Break
Intent: >
  Earth-flavored basic attack, filling a gap Skill.Combat.Elementalist.StoneCoffin.yaml
  left open -- Stone Coffin CONSUMES a built Earth pool but nothing in the
  kit actually BUILT one. Earth Break is that builder: a plain damage cast,
  low Focus like Skill.Combat.Elementalist.EmberLance.yaml's Fire
  equivalent, filling the same "safe filler" slot for Earth. Converts to
  Skill.Combat.Elementalist.EarthenArmor.yaml while Passives/TriageOverride.yaml
  (Crisis Mode) is active -- same shape as EmberLance -> TidalSurge and
  Skill.Combat.Shaman.LeechLife.yaml -> Skill.Combat.Shaman.MagicLeech.yaml,
  but the ONE conversion in the kit that stays in its own element rather
  than crossing into Water -- Earth's existing control/defense identity
  (Stone Coffin) carries forward into Earthen Armor's defense buff instead
  of borrowing a healing element it has no claim to (see
  Passives/TriageOverride.yaml Effect.Description for the full reasoning).
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Elementalist
  - Tag.Element.Earth
Acquisition:
  Method: LevelUp
  AcquiredLevel: 2
RoleMechanic: null
ClassMechanic: ElementalConvergence
BaseState:
  Animation: Anim_Elementalist_EarthBreak
  VFX: VFX_Earth_SmallShatter
  IsOGCD: false
  CanCastWhileMoving: false
Mechanics:
  Targeting: Target
  Potency: 150     # deliberately modest vs a real DPS GCD, same tier as EmberLance
  Range: 25
  CastTime: 2.0
  RecastTime: 2.5
  MaxCharges: 1
GaugeGeneration: 15   # builds Earth, same rate EmberLance builds Fire
FocusGeneration: 80    # low, matches EmberLance
Resource:
  Type: Mana
  Cost: 60   # PLACEHOLDER -- matches EmberLance's Low-tier filler cost
ClassRestrictions:
  - Elementalist
