Key: Skill.Combat.Shaman.MagicLeech
Name: Magic Leech
Intent: >
  The healing-equivalent, hard-cast counterpart Skill.Combat.Shaman.LeechLife
  converts to while Passives/TriageOverride.yaml is active (see its
  ConversionMap). More potent than Leech Life outright (Potency 520 vs
  220), and unlike Leech Life it does not just self-sustain -- the same
  absorbed amount is ALSO applied to EVERY ally as healing, unconditionally
  and regardless of range/position, so the Shaman's essence-drain becomes a
  genuine party-wide tool during the crisis, not just personal upkeep. This
  is an AUTONOMOUS heal, not a channeled one: it does not carry
  Tag.Mechanic.Channeled and is not subject to
  Combat/AggroSystem.yaml's ChanneledCastPenalty (no Proximity lock) --
  once the 2.0s cast completes, the party-wide heal resolves on its own,
  it is not a maintained/sustained effect. Shaman's blood-adjacent answer
  to the crisis window, alongside Skill.Combat.Shaman.SpiritCleansing.yaml
  and Skill.Combat.Shaman.Necromancy.yaml. Not independently acquired --
  exists only as Leech Life's Triage Override state.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Shaman
Acquisition:
  Method: KitConversion
  ConvertsFrom: Skill.Combat.Shaman.LeechLife
  Note: "Not independently acquired -- exists only as Leech Life's Triage Override state."
RoleMechanic: Healer
ClassMechanic: null
BaseState:
  Animation: Anim_Shaman_MagicLeech
  VFX: VFX_Curse_EssenceDrain_Heavy
  IsOGCD: false
  CanCastWhileMoving: false
Mechanics:
  Targeting: Target     # the enemy being drained
  Potency: 520     # PLACEHOLDER -- stronger hard-cast, pending a simulated pass like every other new-kit number this session
  Range: 20
  CastTime: 2.0
  RecastTime: 2.5
  MaxCharges: 1
LeechPercent: 100   # full damage dealt returned as self-healing during the crisis window
AllyHealOnCast:
  Target: AllPartyMembers   # every ally, unconditionally -- not smart-targeted, not range-limited
  IgnoresRange: true
  HealAmount: EqualToSelfLeechAmount   # same absolute amount the Shaman receives, not a separate potency roll
  Autonomous: true   # resolves once the cast completes; not a maintained/channeled effect
Resource:
  Type: None
  Cost: 0   # Exempt: only exists as Leech Life's Triage Override KitConversion state -- see Combat/ManaflowSystem.yaml's crisis-exempt rule
ClassRestrictions:
  - Shaman
