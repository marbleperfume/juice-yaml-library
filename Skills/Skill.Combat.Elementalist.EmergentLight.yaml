Key: Skill.Combat.Elementalist.EmergentLight
Name: Emergent Light
Intent: >
  Bright light-element DelayedStatus flash (see Combat/DelayedStatus.yaml),
  HEAL ONLY. Split off from an earlier single-skill draft that also applied
  Daze (Skills/Skill.Combat.Elementalist.BlindingFlare.yaml now owns that) --
  bundling a CC and a heal into one cast meant one timing had to serve two
  jobs with different natural cadences: a CC wants a short, frequent-recast
  peel tool, a heal wants to be judged against TidalMending's HoT frequency.
  Left combined, the skill would get used "for the stun" regardless of heal
  need, or its heal frequency would quietly make TidalMending pointless.
  Kept separate so each can be tuned against its own real job.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Elementalist
  - Tag.Element.Water
Acquisition:
  Method: LevelUp
  AcquiredLevel: 30
RoleMechanic: Healer
ClassMechanic: null
BaseState:
  Animation: Anim_Elementalist_EmergentLight
  VFX: VFX_Light_ChargeThenFlash
  IsOGCD: false
  CanCastWhileMoving: false
Mechanics:
  Targeting: Area_PartyWide
  Potency: 300     # PLACEHOLDER -- real value needs a simulated encounter pass against TidalMending's HoT frequency, not a standalone guess
  Range: 30
  CastTime: 1.0
  RecastTime: 30
  MaxCharges: 1
DelayedStatus:
  VisualIndicator: "Building glow aura on the caster while armed"
  TriggerCondition: "FixedDelaySeconds: 2.5 (auto-flashes if not otherwise triggered early)"
  Effect:
    AlliesInRadius: {HealPotency: 300}
Requires:
  BoostedByStatus: Triage Override
  BoostedHealPotencyMultiplier: 2.0
Resource:
  Type: Mana
  Cost: 100   # PLACEHOLDER -- party-wide heal, always castable (not TriageOverride-exclusive, just boosted by it), so it keeps a normal cost
ClassRestrictions:
  - Elementalist
