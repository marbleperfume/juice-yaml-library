Key: Skill.Combat.Shaman.LeechLife
Name: Leech Life
Intent: >
  Direct-cast drain, distinct from Skill.Combat.Shaman.LifeLeechingCurse.yaml
  (a DoT-shaped curse) -- this is a single hard hit that absorbs the
  target's magic essence, damaging it and self-healing the Shaman in one
  atomic effect (not two independently-tuned jobs, so it doesn't trip
  Combat/DelayedStatus.yaml's AuthoringLesson). Baseline kit, self-sustain
  tool. Occupies THIS slot only outside a crisis -- while
  Passives/TriageOverride.yaml is active, it is replaced by
  Skill.Combat.Shaman.MagicLeech.yaml, a stronger conversion of the same
  idea (see TriageOverride's ConversionMap).
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Shaman
Acquisition:
  Method: LevelUp
  AcquiredLevel: 6
RoleMechanic: Healer
ClassMechanic: null
BaseState:
  Animation: Anim_Shaman_LeechLife
  VFX: VFX_Curse_EssenceDrain
  IsOGCD: false
  CanCastWhileMoving: true
Mechanics:
  Targeting: Target
  Potency: 220     # PLACEHOLDER
  Range: 20
  CastTime: 2.0
  RecastTime: 8
  MaxCharges: 1
LeechPercent: 60   # of damage dealt, returned as self-healing
FocusGeneration: 90
Resource:
  Type: Mana
  Cost: 110   # PLACEHOLDER -- baseline self-sustain hard-cast, kept below SpiritChannel/CurseExplosion
ClassRestrictions:
  - Shaman
