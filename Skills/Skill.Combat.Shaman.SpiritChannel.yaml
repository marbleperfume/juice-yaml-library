Key: Skill.Combat.Shaman.SpiritChannel
Name: Spirit Channel
Intent: >
  The Shaman's primary burst-damage tool -- channels through an active
  Summons/Summon.Shaman.BoneSpirit.yaml, spending it in the process. Pure
  damage, single-purpose. HIGH Focus generation -- this is the skill that
  forces the rest of the kit toward low-Focus DoT/leech/curse tools (see
  Skills/Skill.Combat.Shaman.WitheringPoison.yaml etc.), since using this
  repeatedly pulls enemy attention hard. Genuinely CHANNELED (see
  Combat/AggroSystem.yaml ChanneledCastPenalty): the caster's Proximity
  score is locked at its cast-start value for the full duration, so casting
  it close to the boss and then casting it again immediately compounds
  Focus and locked-in Proximity together -- this is what can overwhelm even
  a well-stacked Tank's Unfocus threshold, by design.
ActionType: Weaponskill
Tags:
  - Skill.Type.Weaponskill
  - Tag.Class.Shaman
  - Tag.Mechanic.Channeled
Acquisition:
  Method: LevelUp
  AcquiredLevel: 6
RoleMechanic: null
ClassMechanic: BoneSummonCycle
BaseState:
  Animation: Anim_Shaman_SpiritChannel
  VFX: VFX_Bone_SpiritBurst
  IsOGCD: false
  CanCastWhileMoving: false
Requires:
  ActiveSummon: Summon.Shaman.BoneSpirit
Mechanics:
  Targeting: Target
  Potency: 700     # PLACEHOLDER -- needs a simulated pass, same caveat as every other new-kit number this session
  Range: 20
  CastTime: 2.5
  RecastTime: 2.5
  MaxCharges: 1
ConsumesSummon: Summon.Shaman.BoneSpirit
FocusGeneration: 650   # HIGH, relative to Skill.Combat.Elementalist.EmberLance's 80 -- this is the class's Focus problem in one number
Resource:
  Type: Mana
  Cost: 220   # PLACEHOLDER -- Shaman's biggest single spend, matching Medium CostTier's "fewer, heavier commits" identity (Classes/Shaman.yaml ManaProfile) and this skill's own high Focus/Potency profile
ClassRestrictions:
  - Shaman
