Key: Skill.Combat.Elementalist.StoneCoffin
Name: Stone Coffin
Intent: >
  Earth-element CC skill, CC ONLY -- the worked example for
  Combat/ElementalConvergence.yaml's Earth universal modifier. Requires
  consuming a full pool of built Earth stacks to cast at all; applies
  Passives/StoneCoffin.yaml, a strong temporary root/imprison. Kept single-
  purpose (no damage attached) per Combat/DelayedStatus.yaml's
  AuthoringLesson -- replaces an earlier draft ("Stone Chain") that
  mistakenly made Earth's payoff a pure damage burst instead of the CC the
  element is actually meant to carry.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Elementalist
  - Tag.Element.Earth
  - Tag.Mechanic.CC
Acquisition:
  Method: LevelUp
  AcquiredLevel: 38
RoleMechanic: null
ClassMechanic: ElementalConvergence
BaseState:
  Animation: Anim_Elementalist_StoneCoffin
  VFX: VFX_Earth_CoffinEncase
  IsOGCD: false
  CanCastWhileMoving: false
Requires:
  ElementStacks: {Element: Earth, Minimum: 5}   # Combat/ElementalConvergence.yaml ConsumeThreshold
Mechanics:
  Targeting: Target
  Potency: 0
  Range: 25
  CastTime: 1.5
  RecastTime: 25     # PLACEHOLDER -- Combat/CCImmunity.yaml still governs repeat application
  MaxCharges: 1
Effect:
  AppliesStatus: Stone Coffin
ConsumesStacksOnCast: {Element: Earth, Amount: All}
CCImmunityRef: Combat.CCImmunity
Resource:
  Type: Mana
  Cost: 130   # PLACEHOLDER -- reaction skill (mandatory Earth-stack consume), costs more within Elementalist's Low tier per Classes/Elementalist.yaml ManaProfile
ClassRestrictions:
  - Elementalist
