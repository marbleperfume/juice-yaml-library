Key: Skill.Combat.Shaman.SpiritCleansing
Name: Spirit Cleansing
Intent: >
  Cleanse/dispel, gated behind Passives/TriageOverride.yaml the same way
  Skill.Combat.Elementalist.TidalRevival.yaml gates Resurrection -- not
  castable outside a genuine crisis. Removes a curse/DoT/CC-type debuff
  from an ally, fitting the class's spirit/bone lore (purifying a spirit,
  not restoring HP directly) as the Shaman's second Triage Override tool
  alongside Skill.Combat.Shaman.MagicLeech.yaml. Single-purpose: cleanse
  only, no healing or damage attached.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Shaman
Acquisition:
  Method: MercenaryRankUnlock
  MercenaryRankTier: 2
  Note: "Learned at Merc Rank 2, but locked out of casting entirely unless Triage Override is active -- a hard gate, not a cooldown, same shape as TidalRevival."
