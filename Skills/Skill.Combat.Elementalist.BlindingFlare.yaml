Key: Skill.Combat.Elementalist.BlindingFlare
Name: Blinding Flare
Intent: >
  Bright light-element DelayedStatus flash, CC ONLY -- the piece split out
  of the earlier combined Emergent Light draft. Arms a charging glow, then
  flashes, applying Daze (Passives/Daze.yaml) to enemies in radius. No heal
  component: its cooldown is tuned purely around the encounter's CC pacing
  needs (see Combat/CCImmunity.yaml), independent of any healing cadence.
  Subject to the same Daze-type resistance rule as every other CC -- casting
  it repeatedly on the same target builds resistance rather than chaining
  freely.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Elementalist
  - Tag.Element.Light
  - Tag.Mechanic.CC
Acquisition:
  Method: LevelUp
  AcquiredLevel: 26
RoleMechanic: Healer
ClassMechanic: null
BaseState:
  Animation: Anim_Elementalist_BlindingFlare
  VFX: VFX_Light_ChargeThenFlash_CC
  IsOGCD: false
  CanCastWhileMoving: false
Mechanics:
  Targeting: Area_Circle
  Potency: 0
  Range: 25
  CastTime: 1.0
  RecastTime: 20     # PLACEHOLDER -- tuned independently of EmergentLight's recast, per Combat/CCImmunity.yaml pacing
  MaxCharges: 1
DelayedStatus:
  VisualIndicator: "Building glow aura on the caster while armed"
  TriggerCondition: "FixedDelaySeconds: 1.5 (auto-flashes if not otherwise triggered early)"
  Effect:
    EnemiesInRadius: {AppliesStatus: Daze}
CCImmunityRef: Combat.CCImmunity   # this skill's repeated use is governed by that contract
Resource:
  Type: Mana
  Cost: 80   # PLACEHOLDER -- CC-only flash, always castable (not TriageOverride-exclusive), normal cost
ClassRestrictions:
  - Elementalist
