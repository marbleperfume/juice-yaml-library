Key: Skill.Combat.Madolt.ECShieldDischarge
Name: EC Shield Discharge
Intent: >
  The Madolt Warrior's strongest baseline skill (FFXIV Inner Beast / Fell
  Cleave analog). A shield block-burst that dumps a large Charge Gauge cost
  for outsized damage. Requires Electron Guard stance to be active, so its
  power is gated behind committing to the defensive mode -- Reiden Kurogane's
  block-burst-into-discharge is the flavor reference.
