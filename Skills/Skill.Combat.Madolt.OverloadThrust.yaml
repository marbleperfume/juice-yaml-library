Key: Skill.Combat.Madolt.OverloadThrust
Name: Overload Thrust
Intent: >
  Rank 2 aggressive GCD. No cooldown, but a long interruptible cast and a
  Charge Gauge cost -- and if interrupted mid-cast, the gauge is LOST. It is
  self-limiting: it shares gauge with the baseline discharges (opportunity
  cost) and, per the Focus model, its damage feeds enemy Focus, making the
  next long cast likelier to be interrupted.
ActionType: Weaponskill
Tags:
  - Skill.Type.Weaponskill
  - Skill.Role.Tank
  - Tag.Class.Warrior
  - Tag.Skill.Risky
  - Tag.Mechanic.Channeled   # exempt from FocusTimingRule's cast-start front-load -- see Combat/AggroSystem.yaml TankRoleExemption
Acquisition:
  Method: SkillQuest
  SkillQuestRef: Quest.SkillQuest.Madolt.OverloadThrust
  MercenaryRankTier: 2
RoleMechanic: Tank
ClassMechanic: ChargeGauge
BaseState:
  Animation: Anim_Madolt_OverloadThrust
  VFX: VFX_EC_OverloadST
  IsOGCD: false
  CanCastWhileMoving: false
Mechanics:
  Targeting: Target
  Potency: 620
  Range: 5
  CastTime: 3.5
  RecastTime: 2.5
  MaxCharges: 1
Resource:
  Type: ChargeGauge
  Cost: 50
InterruptedPenalty: LoseGaugeCost   # gauge is consumed on cast start, refunded only on completion
FocusGeneration: 300
ClassRestrictions:
  - Warrior
