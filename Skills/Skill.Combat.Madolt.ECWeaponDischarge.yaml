Key: Skill.Combat.Madolt.ECWeaponDischarge
Name: EC Weapon Discharge
Intent: >
  Baseline Charge Gauge spender (FFXIV Tomahawk analog, reflavored as the
  gauge tool). The EC weapon transforms and fires a ranged electron bolt --
  doubles as the ranged pull and a gauge dump. Baseline discharge spends at
  the 50% gauge threshold; the 75%+ "charged" version is a Mercenary Rank 3
  unlock (see Skill.Combat.Madolt.ECWeaponDischargeControl and
  Combat/ChargeGauge.yaml gauge ladder).
ActionType: Ability
