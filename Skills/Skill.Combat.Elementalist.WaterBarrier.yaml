Key: Skill.Combat.Elementalist.WaterBarrier
Name: Water Barrier
Intent: >
  RoleMechanic worked example (Healer): a DelayedStatus shield. Arm it on an
  ally BEFORE damage arrives -- it sits as a visible pending ward and
  auto-resolves (absorbing the next qualifying hit) the instant the trigger
  condition fires. No handshake, no recast loop -- see Combat/DelayedStatus.yaml.
  Also the worked example for Combat/ElementalConvergence.yaml's Light
  universal modifier: consuming a built Light pool (fed by
  Skill.Combat.Elementalist.RadiantMend.yaml) strengthens this cast's
  shield instead of a DPS/CC effect, since Light's job is a support
  amplifier rather than damage or control (see StackConsumption).
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Elementalist
  - Tag.Element.Water
Acquisition:
  Method: LevelUp
  AcquiredLevel: 8
RoleMechanic: Healer
ClassMechanic: ElementalConvergence
BaseState:
  Animation: Anim_Elementalist_WaterBarrier
  VFX: VFX_Water_ShimmerWard
  IsOGCD: false
  CanCastWhileMoving: true
Mechanics:
  Targeting: Target
  Potency: 0
  Range: 20
  CastTime: 1.5
  RecastTime: 8
  MaxCharges: 2
DelayedStatus:
  VisualIndicator: "Persistent shimmering ward icon on the target while pending"
  TriggerCondition: "NextInstanceOfDamageTaken"
  Effect:
    ShieldPercentMaxHP: 20
StackConsumption:
  ConsumesElement: Light
  Minimum: 5   # Combat/ElementalConvergence.yaml ConsumeThreshold
  Effect: "ShieldPercentMaxHP rises from 20 to 30 for this cast (PLACEHOLDER) -- Combat/ElementalConvergence.yaml's Light universal modifier, fed by Skill.Combat.Elementalist.RadiantMend.yaml's Light stacks."
Resource:
  Type: Mana
  Cost: 50   # PLACEHOLDER -- Low CostTier, kept cheap given MaxCharges: 2 / 8s recast
ClassRestrictions:
  - Elementalist
