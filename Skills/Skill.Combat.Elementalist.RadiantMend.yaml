Key: Skill.Combat.Elementalist.RadiantMend
Name: Radiant Mend
Intent: >
  The Elementalist's only genuine instant-cast direct HP heal -- fills a
  real gap in the kit: Skill.Combat.Elementalist.TidalMending.yaml is a
  HoT, Skill.Combat.Elementalist.WaterBarrier.yaml is a shield,
  Skill.Combat.Elementalist.EmergentLight.yaml is a delayed flash-heal, and
  Skill.Combat.Elementalist.TidalSurge.yaml only exists inside Crisis Mode
  (Passives/TriageOverride.yaml) -- none of those is a plain "press it, HP
  goes up now" button. Builds the class's Light ElementalConvergence pool
  (Combat/ElementalConvergence.yaml), but deliberately generates FEWER
  Light stacks each consecutive cast (see StackDecay) and costs MORE mana
  each consecutive cast (see Resource.CostEscalation) -- a strong, reliable
  heal that gets actively worse to lean on repeatedly, on both axes at
  once. This dual taper is also the actual mechanism behind
  Passives/TriageOverride.yaml's CrisisManaBurst UsageBased decay for this
  class: the crisis burst regen erodes exactly as fast as the player leans
  on this skill, not on a clock. Also reacts to built Water or Earth stacks
  if present (see ReactiveConsumption) -- a narrow, self-scoped exception
  to Combat/ElementalConvergence.yaml's "one universal modifier per
  element" rule, since neither Water's Slow nor Earth's Stone Coffin make
  sense applied to an ally-target heal.
ActionType: Spell
Tags:
  - Skill.Type.Spell
  - Skill.Role.Healer
  - Tag.Class.Elementalist
  - Tag.Element.Light
Acquisition:
  Method: LevelUp
  AcquiredLevel: 20
RoleMechanic: Healer
ClassMechanic: ElementalConvergence
BaseState:
  Animation: Anim_Elementalist_RadiantMend
  VFX: VFX_Light_InstantBloom
  IsOGCD: false   # still a normal GCD action (RecastTime below), just a 0-length cast bar
  CanCastWhileMoving: true
Mechanics:
  Targeting: Target
  Potency: 280     # PLACEHOLDER -- strong per-cast heal, needs a simulated pass
  Range: 20
  CastTime: 0      # genuinely instant -- the point of the skill
  RecastTime: 2.5
  MaxCharges: 1
GaugeGeneration: 15   # builds Light -- see StackDecay for why this isn't a flat number in practice
StackGeneration:
  Element: Light
  BaseStacks: 1
StackDecay:
  Description: >
    Each CONSECUTIVE cast (no gap longer than DecayResetSeconds since the
    last one) generates fewer Light stacks than the last -- 1 full stack on
    the first cast, tapering toward 0 by the fourth or fifth repeat
    (PLACEHOLDER curve, needs a simulated pass). Resets to full generation
    after DecayResetSeconds of not casting it. This is what makes Radiant
    Mend "a strong healing option but a less effective HoT-stacking
    mechanic" the more it's used back-to-back.
  DecayResetSeconds: 10   # PLACEHOLDER -- matches Passives/TriageOverride.yaml's Crisis Mode Duration on purpose
ReactiveConsumption:
  Description: >
    A narrow, self-scoped exception to Combat/ElementalConvergence.yaml's
    normal "one fixed universal modifier per element" rule (see that file's
    RadiantMendException) -- neither Water's Slow nor Earth's Stone Coffin
    apply to an ally-target heal, so this skill defines its OWN bonus for
    consuming either pool instead. Consumes at most one pool per cast,
    player's choice, same ConsumeThreshold (5) as every other reaction.
  ConsumesWater:
    Effect: "+40% Potency on this cast (PLACEHOLDER) -- Water is already the kit's healing element (Combat/ElementalConvergence.yaml HealingElementRule), so consuming it just makes THIS heal hit harder."
  ConsumesEarth:
    Effect: "Grants the heal target a flat damage-block shield worth 15% of this cast's Potency (PLACEHOLDER), alongside the HP restore -- Earth's defense identity (see Skill.Combat.Elementalist.EarthenArmor.yaml) bleeding into a single-target context instead of Earthen Armor's party-wide one."
Resource:
  Type: Mana
  Cost: 90   # PLACEHOLDER -- base cost before escalation, see CostEscalation
  CostEscalation:
    Description: >
      Rises each consecutive cast in lockstep with StackDecay's tapering
      output -- same DecayResetSeconds window, same idea from the other
      direction: 90 -> 130 -> 180 -> 240 (PLACEHOLDER curve) before
      resetting on a gap. This is the "aggressive cost cycle" that makes
      Radiant Mend a strong panic button but a bad default HoT-replacement,
      and the actual mechanism (alongside StackDecay) that eventually
      breaks the Elementalist's mana sustain if overused -- exactly the
      point, per Passives/TriageOverride.yaml CrisisManaBurst's
      Description on why Crisis Mode can't be infinitely sustained.
ClassRestrictions:
  - Elementalist
