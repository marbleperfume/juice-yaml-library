Key: Skill.Combat.Shaman.BonePointing
Name: Bone Pointing
Intent: >
  Featherfoot-inspired (Tree of Savior) cast: consumes one Monster Bone
  (Items/Item.Consumable.Bone.MonsterBone.yaml) to raise
  Summons/Summon.Shaman.FloatingBone.yaml, an installation that animates
  the Hex curse via repeated needle strikes rather than the Shaman
  directly hitting the target. This is the class's "go-to" sustained tool
  -- low upfront Focus (the installation, not the Shaman, lands the hits),
  building Passives/Hex.yaml stacks over time that both empower other
  curse skills (see Skill.Combat.Shaman.CurseExplosion.yaml) and, at 3+
  stacks, apply an unresistable Slow (Combat/CCImmunity.yaml
  CommitmentExemption -- the ramp-up itself is the paid cost).
ActionType: Ability
Tags:
  - Skill.Type.Ability
  - Tag.Class.Shaman
  - Tag.Mechanic.Curse
  - Tag.Mechanic.LongCommitment   # the ramp-up (cast + installation + multiple needle ticks) is what earns Passives/Hex.yaml's Slow the CommitmentExemption
Acquisition:
  Method: LevelUp
  AcquiredLevel: 8
RoleMechanic: null
ClassMechanic: BoneSummonCycle
BaseState:
  Animation: Anim_Shaman_BonePointing
  VFX: VFX_Bone_PointingRite
  IsOGCD: false
  CanCastWhileMoving: false
Mechanics:
  Targeting: Target
  Potency: 0
  Range: 20
  CastTime: 1.5
  RecastTime: 20
  MaxCharges: 1
ConsumesItem:
  Item: Item.Consumable.Bone.MonsterBone
  Amount: 1
SummonsRef: Summon.Shaman.FloatingBone
FocusGeneration: 30   # LOW at cast time -- the installation's ongoing needle hits generate their own separate, also-low Focus per tick, not the Shaman directly
Resource:
  Type: Mana
  Cost: 60   # PLACEHOLDER -- low upfront cost matching its low upfront Focus; the ongoing needle ticks don't carry their own separate mana cost
ClassRestrictions:
  - Shaman
