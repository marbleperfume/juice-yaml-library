Key: NPC.Friendly.MalachiteCity.WardenColm
Name: Warden Colm Ashgate
Role: TrialsInstructor
Location: Zone.MalachiteCity.TrainingGrounds
RaceKey: Grimm
Gender: Male
Appearance:
  Note: Practical training gear, no flourishes -- looks like he administers tests for a living, because he does.
Voice: ""
SpeechPattern:
  Theme: BriskProctor
  Note: >
    LLM authoring aid: brisk, procedural, no small talk. States the
    requirement, states the stakes, sends the player in. Never editorializes
    on whether the player is ready -- the trial answers that question, not him.
BanterSets:
  Default:
    - "Every rank you hold was earned facing a golem, not a level-up screen. That hasn't changed."
    - "I don't grade attempts. The golem does. I just open the door."
Tags:
  - Tag.NPC.Friendly
  - Tag.Race.Grimm
  - Tag.Profession.TrialsInstructor
  - Tag.Quest.DutySupport.Mercenary
NarrativeIntent: >
  Reusable Duty Support-style NPC: a single, permanent town fixture in
  Malachite City who administers every broad Mercenary rank test, rather than
  authoring a separate quest-giver per role/rank. He is the TargetNPC for
  both DutySupport.Mercenary.Rank2 and DutySupport.Mercenary.Rank3 (see
  Quests/DutySupport.Mercenary.Rank2_Seq0.yaml /
  DutySupport.Mercenary.Rank3_Seq0.yaml), which branch conditionally on the
  player's Role/current class to route into the correct existing
  Test.Mercenary.RankN.Role quest -- his dialogue and gating never change,
  only which underlying trial he opens. Designed to extend to a future
  DutySupport.Strategy.Rank2 hub without a new NPC file.
