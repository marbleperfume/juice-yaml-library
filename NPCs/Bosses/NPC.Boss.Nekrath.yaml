NarrativeIntent: >
  Vengeful Ancient feline, pinnacle-of-strength archetype (functionally the
  Toji-in-JJK role for Kaeloth's death in Seq2). Holds energy internally
  (per Goldwyn's Spine Sword lore note -- see
  Items/Item.Equipment.Goldwyn.SpineSword.yaml) rather than externally like
  Drakols/dragons, which is the specific property the Spine Sword magnetizes
  and the finale's ignite/Recall Sphere payoff exploits. Destroyed at the
  end of Seq4 by the combined ignite + Recall Sphere payload, assisted by
  Kaeloth's ghost redirecting his own dismissive backhand into the incoming
  sphere.
