Identity:
  Key: NPC.Boss.Test.MechaGolem
  Name: Mecha Golem (Mercenary Trial)
  TemplateRef: null
AssignedSkills:
  - Skill.Combat.Golem.SlamSmash
  - Skill.Combat.Golem.OverloadBeam
  - Skill.Combat.Golem.GroundPound
LootTable: null
Tags:
  - Tag.NPC.Test
  - Tag.Quest.Mercenary.Trial
EncounterMath:
  ExpectedDurationMinutes: 4.0
  BaseHealthPlaceholder: 60000
PhaseLogic:
  Phase2Trigger: null
  Phase3Trigger: null
MechanicScaling:
  AnimTier: 2
  Rank1_MacroMechanic: "Telegraphed slam, generous timing window"
  Rank2_MicroPunish: "Same three skills, cast order and timing randomized per attempt"

# --- Rank Profile (see Ranks/Rank_System.yaml) ---
# This is a dedicated TEST fixture, not a normal overworld enemy: the two
# Mercenary test quests below force a specific Doctrine tier regardless of
# the player's actual Strategy/Doctrine standing, so the trial is
# controlled and repeatable rather than varying with normal progression.
RankProfile:
  # Doctrine resolution is content/difficulty-scoped now -- see Ranks/Rank_System.yaml DoctrineResolution
  Adventurer:
    LootCurve: null
  Mercenary:
    Rank1:
      - Condition: "TargetInRange"
        Action: "Skill.Combat.Golem.SlamSmash"
        CastTime: 3.0
  Doctrine:
    Level1:
      Profile: Profile.Test.MercenaryTrial
      AggroRadius: 1000
      LeashRadius: 1000
      ResetBehavior: FullReset
      FocusRedirectThreshold: null   # no redirect at Level1 -- fully telegraphed baseline
    Level2:
      Inherit: Level1
      RandomCastPool:
        PoolSize: 3
        Skills:
          - Skill.Combat.Golem.SlamSmash
          - Skill.Combat.Golem.OverloadBeam
          - Skill.Combat.Golem.GroundPound
        SelectionRule: "One randomly selected per attempt; timing window differs per skill"
      FocusRedirectThreshold: 600   # Combat/AggroSystem.yaml FocusRedirectRule -- same Proximity+Focus formula as every tier, just a generous threshold here
      TestGate:
        TestQuest: Quest.Test.Mercenary.Rank2.Tank
        Checks: [RoleMechanicUse, ClassMechanicUse, CastBarTiming]
    Level3:
      Inherit: Level2
      FocusRedirectThreshold: 480   # overrides Level2's inherited 600 -- same Proximity+Focus formula, just a harsher (lower) threshold at the highest tier
      StabilityContest:
        Description: >
          If the player casts a skill tagged Tag.Skill.Risky while the
          Golem is mid-cast, the player automatically loses the stability
          contest: their cast is instantly interrupted/dropped. Teaches
          recognizing when NOT to commit a risky action, rather than
          adding raw Golem damage.
        RiskySkillTag: Tag.Skill.Risky
        PlayerCastInstantlyDropped: true
      CastInterruption:
        Description: >
          At Level3 the Golem actively interrupts the player's best casts
          UNLESS it is distracted via aggro/Focus. This is why tanks are the
          only "easy" Rank 3 Mercenary -- their innate aggro + Unfocus can
          hold the Golem off their casts, where a DPS/healer cannot. Drives
          the "needs a Stun/setup" requirement of the Rank 3 charged
          discharges (Skill.Combat.Madolt.ECWeaponDischargeControl).
        DistractedBy: [Aggro, Focus]
      GuaranteedLethal:
        Description: >
          A telegraphed mechanic that LOOKS avoidable and invites the player
          to mitigate/time it -- but it is a mathed-out guaranteed death.
          Mitigation only adds more hits to the lethal total, so defense/
          timing never survives it; only true invulnerability
          (Skill.Combat.Madolt.ElectronBulwark) does. Teaches that losing is
          not always obvious.
        MitigationScaling: AddsHitsToLethalTotal
        SurvivableBy: [Invulnerability]
        DeathScalingVisibility: Hidden   # no on-screen breakdown; deduced across retries
      TestGate:
        TestQuest: Quest.Test.Mercenary.Rank3.Tank
        Checks: [RoleMechanicUse, ClassMechanicUse, CastBarTiming, StabilityContestAvoidance, GuaranteedLethalInvuln]
