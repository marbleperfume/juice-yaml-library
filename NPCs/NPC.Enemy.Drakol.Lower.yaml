# --- Rank Profile (see Ranks/Rank_System.yaml for the contract) ---
# Minimal authoring example: required tiers + one optional Mercenary Rank2.
# Doctrine has no Level2/3, so all players see the Level1 pattern.
RankProfile:
  # Doctrine resolution is content/difficulty-scoped now -- see Ranks/Rank_System.yaml DoctrineResolution
  Adventurer:
    LootCurve: Global.LootScaling.CurveA
  Mercenary:
    Rank1:
      - Condition: "TargetInRange"
        Action: "Skill.Combat.SpearThrust"
        CastTime: 2.5
    Rank2:
      - Condition: "TargetCasting"
        Action: "Skill.Combat.SpearThrust.Tier2" # Triggers altered VFX/Animation interrupt
        CastTime: 1.0
  Doctrine:
    Level1:
      Profile: Profile.FanVillage.Cliffside # Links to specific UE5 Nav constraints
      AggroRadius: 800
      LeashRadius: 2500
      ResetBehavior: HealAndReturn