Key: Attire.MagneticArmor.System
Description: >
  Magnetic Armor is the Madolt Warrior's required armor type. It is the design
  MIRROR of the EC weapons: where weapons are low-base / right-skewed (barely
  matter early, tail late), Magnetic Armor is exceptionally-high-base /
  left-skewed -- it front-loads its stats and flattens, so one reforged piece
  carries you for many levels. This is what makes weapon drop-luck stop
  mattering: armor is the early (and dominant) stat engine.
AttributeCurve:
  Formula: "STA = round(45 + 7 * sqrt(Lvl))"     # left-skewed, high base
  Note: "Keyed to CHARACTER level at reforge, so any input heavy armor yields a level-appropriate piece."
  Entries:
    - {Level: 1,  STA: 52}
    - {Level: 10, STA: 67}
    - {Level: 20, STA: 76}
    - {Level: 30, STA: 83}
MarginalInputBonus:
  Description: >
    The dominant base above is from the character-level curve. On top of it,
    the specific input heavy armor's level/quality adds a small top-up
    (~5-6% at best), mirroring the weapon's marginal-attack theme. A better
    input nudges the result up as a light optimization, never a gate -- so
    drop-chasing stays off the table.
  Magnitude: "~ +0.15 * input_item_level STA, capped small"
Reforge:
  Input: "Any Normal Heavy Armor (drop or craft) -- nothing Magnetic-specific to farm"
  Providers:
    - "Blacksmith NPC (always available)"
    - "Player crafter selling the service/result on the market"
  Model: DestructivePermanent    # input consumed; Magnetic result is durable, no rollback
  Output: "Magnetic Armor at the character's level, per AttributeCurve + MarginalInputBonus"
  Gate: "Cost (money you save toward), NOT level or a lucky drop"
MarketACID:
  Description: "The market and reforge transactions follow database ACID guarantees."
  Atomicity: "Reforge/trade is all-or-nothing -- armor + fee -> Magnetic completes fully or fully refunds; never a half-reforged/bricked item."
  Consistency: "Item counts conserved, no dupes; output is always a legal Magnetic piece."
  Isolation: "Concurrent buys/reforges resolve as if sequential -- no double-sell, no race dupe."
  Durability: "Once committed it persists through crash/disconnect; no silent rollback of gear or currency."
Note: "Price ranges and market limitations are intentionally out of scope per design."
