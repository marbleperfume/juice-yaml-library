Key: Item.Consumable.Bone.MonsterBone
Name: Monster Bone
Category: Consumable
Rarity: Common
Stacking:
  IsStackable: true
  MaxStacks: 99
Intent: >
  Core Shaman resource -- a consumable reagent, not a gauge. Skill.Combat.Shaman.BoneSummon
  consumes one to summon Summons/Summon.Shaman.BoneSpirit.yaml. Drops from
  organic enemies (worked example: NPC.Enemy.Drakol.Lower.yaml LootRegistry)
  rather than being crafted, so the Shaman's core mechanic is itemization-
  gated the same way Magnetic Armor reforging is cost-gated -- a resource
  constraint, not a level or cooldown one.
IconPath: ""
Description: "A single intact monster bone, suitable for a Shaman's summoning rite."
ClassRestrictions:
  - Shaman
Tags:
  - Tag.Class.Shaman
  - Tag.Material.Bone
