Key: Item.Equipment.Elementalist.Staff
Name: Staff (Elementalist)
Category: Equipment
Slot: Weapon
Rarity: Common
Intent: >
  The other of Elementalist's two allowed weapon types (see
  Combat/ElementalConvergence.yaml WeaponRestriction). No auto-attack speed
  bonus, but slightly higher Atk than the Wand -- rewards a pure skill-cast
  playstyle rather than leaning on auto-attack uptime. PLACEHOLDER stats
  only; same simulated-encounter caveat as the Wand.
Stats:
  AutoAttackSpeedModifier: 1.0
  MAG: 13                          # PLACEHOLDER -- modestly higher than Wand's 10
ClassRestrictions:
  - Elementalist
Tags:
  - Tag.Class.Elementalist
  - Tag.Equipment.Staff
