Key: Item.Equipment.Madolt.ECWeapon.Stable
Name: Anchored EC Spear
Category: Equipment
Slot: Weapon
Rarity: Epic
Intent: >
  Stable special EC weapons -- fixed levels (20/25/30), attributes WORSE than
  the placeholder curve (x0.8), but strong electron-burst effects gated behind
  Mercenary rank. Attack difference stays marginal; the payoff is a burst
  (sawtooth) DPS shape rather than raw numbers. Averages ~+6% over the scaling
  weapon ONLY when the rank-gated effects are executed well (mastery edge),
  and its troughs fall below the scaling weapon's floor when they aren't.
  See Ranks/Mercenary_Unlocks.yaml PotencyRule (rank = capability, gear =
  numbers).
FixedTiers:
  - {Level: 20, Atk: 15, STR: 19, Passive: "+15% EC Discharge, +10 gauge on hit"}
  - {Level: 25, Atk: 16, STR: 26, Passive: "+20% EC Discharge, adds a secondary bolt (needs Bonus Strike, Merc Rank 2)"}
  - {Level: 30, Atk: 17, STR: 34, Passive: "+25% EC Discharge, secondary bolt + gauge refund"}
Attributes:
  StrengthMultiplierVsCurve: 0.8
RankGating:
  MercRank2: "Bonus Strike capability enables the secondary-bolt passives"
  MercRank3: "75%+ charged discharge (EC Weapon Discharge: Control) unlocks the highest-tier burst windows"
DPSProfile:
  Shape: Sawtooth              # high peaks, real troughs below the scaling floor
  MasteryEdgeVsScaling: 0.06   # ~+6% average when executed; less when not
ClassRestrictions:
  - Warrior
Tags:
  - Tag.Class.Warrior
  - Tag.Equipment.ECWeapon
  - Tag.Equipment.Stable
