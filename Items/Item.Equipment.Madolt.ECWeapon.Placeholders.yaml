Key: Item.Equipment.Madolt.ECWeapon.Placeholders
Name: EC Weapon (placeholder curve)
Category: Equipment
Slot: Weapon
Rarity: Common
IsPlaceholderCurve: true
Intent: >
  Attribute-design vehicles for the Madolt Warrior's EC weapon (bladed
  transformable spear), Lv 1-15. Not shipping items -- they define the
  baseline curve the special weapons are balanced against. Attack is marginal
  (12 + 0.15*Lvl); STRENGTH is right-skewed (1 + 0.2*Lvl^1.5), so weapons
  barely matter early and only tail up late -- armor is the early stat engine
  (see Attire/MagneticArmor.System.yaml).
Curve:
  Attack: "round(12 + 0.15 * Lvl)"
  Strength: "round(1 + 0.2 * Lvl^1.5)"
Entries:
  - {Level: 1,  Atk: 12, STR: 1}
  - {Level: 5,  Atk: 13, STR: 3}
  - {Level: 10, Atk: 14, STR: 7}
  - {Level: 15, Atk: 14, STR: 13}
ClassRestrictions:
  - Warrior
Tags:
  - Tag.Class.Warrior
  - Tag.Equipment.ECWeapon
