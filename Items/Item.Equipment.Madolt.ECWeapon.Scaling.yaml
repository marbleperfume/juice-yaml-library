Key: Item.Equipment.Madolt.ECWeapon.Scaling
Name: Adaptive EC Spear
Category: Equipment
Slot: Weapon
Rarity: Rare
Intent: >
  Scaling special EC weapon. Its level auto-tracks the character, and its
  attributes are SIGNIFICANTLY BETTER than the placeholder curve (x1.4), but
  its electron-burst effect is weak and flat. Best-in-slot at Mercenary Rank 1
  (attributes carry, and R1 can't leverage strong rank-gated effects anyway),
  and stays a consistent, low-variance choice at all ranks. Reiden Kurogane's
  gear is the flavor reference for the burst mechanic.
ScalingType: TracksCharacterLevel
Attributes:
  StrengthMultiplierVsCurve: 1.4   # e.g. Lv30 curve 34 -> ~48
Attack: "curve (marginal, same as placeholder)"
Passive:
  ElectronBurst: "+5% EC Weapon Discharge potency"
  Strength: Weak
DPSProfile:
  Shape: Consistent            # tight band, low variance
  RankIndependent: true        # weak flat effect, no rank gating
ClassRestrictions:
  - Warrior
Tags:
  - Tag.Class.Warrior
  - Tag.Equipment.ECWeapon
  - Tag.Equipment.Scaling
