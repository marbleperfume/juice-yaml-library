Key: Item.Equipment.Elementalist.Wand
Name: Wand (Elementalist)
Category: Equipment
Slot: Weapon
Rarity: Common
Intent: >
  One of only two weapon types Elementalist can equip (see
  Combat/ElementalConvergence.yaml WeaponRestriction, avoiding GW2
  Elementalist's multi-weapon-kit-on-top-of-attunements bloat). Magic-based,
  faster auto-attack tempo than the Staff -- a consistent, always-on-uptime
  playstyle. PLACEHOLDER stats only; no curve-balancing pass yet (that needs
  a simulated encounter, same caveat as Skill.Combat.Elementalist.TidalSurge).
Stats:
  AutoAttackSpeedModifier: 1.25   # faster than Staff's 1.0 baseline
  MAG: 10                          # PLACEHOLDER
ClassRestrictions:
  - Elementalist
Tags:
  - Tag.Class.Elementalist
  - Tag.Equipment.Wand
